    :root {

      --accent: #2f7dd1;

    * { box-sizing: border-box; }

      background: var(--bg);

      gap: 18px;

      align-items: center;

      border-radius: 6px;
      padding: 0 10px;
      background: white;
      color: var(--ink);
      font-size: 14px;

    button { background: var(--accent); color: white; border-color: var(--accent); cursor: pointer; }

      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
    }
    label.toggle input { width: 16px; height: 16px; }
    main {
      display: grid;
      grid-template-columns: minmax(560px, 1fr) minmax(420px, 460px);
      gap: 14px;
      padding: 14px;
      min-height: calc(100vh - 92px);
      align-items: stretch;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .plot-panel { display: grid; grid-template-rows: auto 1fr auto; height: calc(100vh - 120px); min-height: 690px; }
    .status {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
    }
    svg { width: 100%; height: 100%; min-height: 560px; background: #fbfcfe; }
    .axis { stroke: #dfe6ef; stroke-width: 1; }
    .point { stroke: white; stroke-width: 1.5; cursor: pointer; opacity: 0.88; }
    .point.dim { opacity: 0.14; }
    .point.selected { stroke: #111827; stroke-width: 3; opacity: 1; }
    .legend, .cluster-list { padding: 10px 12px; border-top: 1px solid var(--line); }
    .legend { max-height: 180px; overflow-y: auto; }
    .legend-items { display: flex; flex-wrap: wrap; gap: 8px 14px; }
    .legend-item { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    .swatch { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .details { padding: 16px; overflow: auto; height: calc(100vh - 120px); min-height: 690px; align-self: stretch; }
    .details h2 { font-size: 18px; margin: 0 0 8px; line-height: 1.25; }
    .meta { color: var(--muted); font-size: 13px; line-height: 1.45; margin-bottom: 12px; }
    .pill {
      display: inline-flex;
      align-items: center;
      margin: 3px 5px 3px 0;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef4fb;
      color: #31577f;
      font-size: 12px;
    }
    .abstract { line-height: 1.5; font-size: 14px; color: #2f3b52; }
    details.discussion-full,
    details.lexical-evidence {
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      background: #fbfcfe;
    }
    details.discussion-full summary,
    details.lexical-evidence summary {
      cursor: pointer;
      color: #31577f;
      font-weight: 700;
      font-size: 13px;
    }

    .evidence-block { margin-top: 8px; }
    .discussion-list {
      margin: 6px 0 0;
      padding-left: 18px;
      line-height: 1.45;
      font-size: 14px;
      color: #2f3b52;
    }
    .discussion-list li { margin: 0 0 7px; }
    .section-title { margin: 16px 0 6px; font-weight: 700; font-size: 13px; text-transform: uppercase; color: var(--muted); }
    .paper-link { display: block; color: var(--accent); text-decoration: none; margin: 7px 0; font-size: 13px; line-height: 1.35; }
    .cluster-card { border-top: 1px solid var(--line); padding: 10px 12px; }
    .cluster-card button { height: 28px; padding: 0 8px; margin-top: 6px; font-size: 12px; }
    @media (max-width: 980px) {
      header { display: block; }
      h1 { margin-bottom: 12px; }
      .controls, main { grid-template-columns: 1fr; }
      .plot-panel { min-height: 560px; }
    }

es were extracted. These design heuristics are outlined according to their perceived role in changing an existing product concept into a novel design, and examples of other products using the heuristics are provided. To demonstrate the ease of use of these design heuristics, we examined outcomes from a classroom study and found that concepts created using design heuristics were rated as more creative and varied. The analysis of changes from existing to innovative products can provide evidence of useful heuristic principles to apply in creating new designs.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Journal of Mechanical Design", "doi": "10.1115/1.4032219", "url": "", "keyword": "Design Heuristics", "cluster": 1, "cluster_theme_terms": "heuristics, generation, engineering, products, concept, risk, problem, aid", "cluster_label_candidate": "Cluster 1: Design Heuristics through definition and conceptual framing", "distinguishing_evidence_terms": "Idea Generation, Conceptual Repertoire, Standardized Notation, Classification Methods", "cluster_summary_candidate": "Within this keyword view, this cluster is set apart by Idea Generation, Conceptual Repertoire, Standardized Notation. Unlike most clusters in this view, its dominant design-knowledge move is definition and conceptualization. It concentrates on contexts such as Education / Learning that do not anchor the sibling clusters. Methodologically, it leans on Interview. Its contribution coding (Methodological, Empirical, Theoretical) also departs from the view majority. Representative papers: Design Heuristics: Extraction and Classification Methods With Jet Propulsion Laboratory's Architecture Team; What is the content of 'design thinking'? Design Heuristics as conceptual repertoire.", "design_knowledge_form": "Design Heuristics", "design_knowledge_action": "defines and conceptualizes", "design_knowledge_role": "Evaluation Crite estion, we combine evidence from four empirical studies of design process and outcomes, including award-winning products, multiple concepts for a project by an experienced industrial designer, and concept sets from 48 industrial and engineering designers for a single design problem. This compilation of over 3450 design process outcomes is analyzed to extract concept variations evident across design problems and solutions. The resulting set of patterns, in the form of 77 Design Heuristics, catalog how designers appear to introduce intentional variation into conceptual product designs. These heuristics provide ‚Äòcognitive shortcuts‚Äô that can help designers generate more, and more varied, candidate concepts to consider in the early phases of design. ¬© 2016 The Authors", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2016", "venue": "Design Studies", "doi": "10.1016/j.destud.2016.05.001", "url": "", "keyword": "Design Heuristics", "cluster": 1, "cluster_theme_terms": "heuristics, generation, engineering, products, concept, risk, problem, aid", "cluster_label_candidate": "Cluster 1: Design Heuristics through definition and conceptual framing", "distinguishing_evidence_terms": "Idea Generation, Conceptual Repertoire, Standardized Notation, Classification Methods", "cluster_summary_candidate": "Within this keyword view, this cluster is set apart by Idea Generation, Conceptual Repertoire, Standardized Notation. Unlike most clusters in this view, its dominant design-knowledge move is definition and conceptualization. It concentrates on contexts such as Education / Learning that do not anchor the sibling clusters. Methodologically, it leans on Interview. Its contribution coding (Methodological, Empirical, Theoretical) also departs from the view majority. Representative papers: Design Heuristics: Extraction and Classification Methods With Jet Propulsion Laboratory's Architecture Team; What is the con s the use of dialogue and associated communication formats within the context of participatory or co-design decision-making processes in the development of assistive technologies. My professional experience as a designer, researcher, and educator suggested the dialogue among the designer, end-user, and associated stakeholders is critical to effective and economic product development. The research I report on here is a systematic analysis of that understanding. First, I conducted a literature review which established that there was no standard meaning for the term ‚Äúdialogue.‚Äù The literature review highlighted the challenges of reduced options for communication through the compounding constraints of culture, language, and impairment. I then conducted a summative content analysis on twenty case studies to identify and define the terminology and points to consider in collaborative dialogue between designers and people who need assistive technologies. This analysis led to the development of a taxonomy of communication formats matched to specific sensory inputs and these have been structured to work as a heuristic design tool. Of the forty-one formats defined, around two-thirds were used in the literature reviewed. Notably, more than half the studies used just over a quarter of the formats. The definitions of dialogue and the design heuristics I put forward in this paper require further debate and refinement to be effective to wider applications. [All rights reserved Elsevier].", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "She Ji: The Journal of Design, Economics, and Innovation", "doi": "10.1016/j.sheji.2018.01.001", "url": "", "keyword": "Design Heuristics", "cluster": 0, "cluster_theme_terms": "dialogue, communication formats, associated, end, assistive, product, effective, decision development", "cluster_label_candidate": "Cluster 0: Design Heuristics through prior-work synthesis", "distinguishing_evidence_terms": "Human Factors, Sensory Perception, Dialogue Appropriate, Heuristic Evaluation", "cluster_summary_candidate": "Within this keyword view, this cluster is set apart by Human Factors, Sensory Perception, Dialogue Appropriate. Its dominant move, synthesis of prior work on design heuristics, is shared across most of this view, so the distinguishing terms above carry the interpretive weight. Methodologically, it leans on Co-design, Heuristic Evaluation. Representative papers: Dialogue Appropriate to Assistive Technology Product Design: A Taxonomy of Communication Formats in Relation to Modes of Sensory Perception; Dialogue appropriate to assistive technology product design: A taxonomy of communication formats in relation to modes of sensory perception.", "design_knowledge_form": "Design Heuristics", "design_knowledge_action": "synthesizes prior work on", "design_knowledge_role": "Empirical Evidence Base", "design_knowledge_contribution": "synthesizes prior work on Design Heuristics", "facet_population_or_context": "", "facet_stakeholder_or_population": "Designers, Practitioners", "facet_method_or_lens": "Co-design, Heuristic Evaluation", "facet_artifact_or_domain": "Tool", "facet_contribution_or_outcome": "Artifact/System, Taxonomy/Review, Theoretical", "umap_x": 10.778909683227539, "umap_y": -12.131108283996582, "distance_to_centroid": 0.09454056343211326, "representative_rank": 1, "is_representative_top3": true, "medoid_rank": 1, "lda_topic": 1, "lda_topic_probability": 0.9898233946331771, "lda_topic_words": "communication, dialogue, product, formats, associated, assistive, analysis, end", "nearest_papers": [{"paper_id": "c6955d14d66c", "title": "Dialogue appropriate to assistive technology product design: A taxonomy of communication formats in relation to modes of sensory perception", "cluster": 0, "distance": 0.0}, {"paper_id": "9eecf23c4ce7", "title": "Design Heuristics for Web-Based Severe Weather Risk Communication", "cluster   <script>
    const data = JSON.parse(document.getElementById('payload').textContent);
    const papers = data.papers;
    const palette = ['#f05a71','#4c78a8','#f58518','#54a24b','#b279a2','#72b7b2','#eeca3b','#ff9da6','#9d755d','#59a14f','#edc948','#76b7b2'];
    const colorFor = c => palette[Math.abs(Number(c)) % palette.length];
    const clusterName = c => Number(c) === -1 ? 'Unclustered papers' : `Cluster ${c}`;
    const clusterLegendLabel = c => {
      const label = String(c.label || c.theme || '').trim();
      if (!label) return clusterName(c.cluster);
      return /^Cluster\s+-?\d+:/i.test(label) ? label : `${clusterName(c.cluster)}: ${label}`;
    };
    const state = { selected: papers[0]?.paper_id || null };
    const svg = document.getElementById('plot');
    const details = document.getElementById('details');
    const status = document.getElementById('status');

    function initControls() {
      const clusterFilter = document.getElementById('clusterFilter');
      data.clusters.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.cluster;
        opt.textContent = `${clusterName(c.cluster)} (${c.count})`;
        clusterFilter.appendChild(opt);
      });
      ['clusterFilter'].forEach(id => {
        document.getElementById(id).addEventListener('input', render);
        document.getElementById(id).addEventListener('change', render);
      });
      renderLegend();
    }

    function filteredPapers() {
      const cluster = document.getElementById('clusterFilter').value;
      return papers.filter(p => {
        return (cluster === 'all' || String(p.cluster) === cluster);
      });
    }

    function renderLegend() {
      const legend = document.getElementById('legend');
      legend.innerHTML = '';
      data.clusters.forEach(c => {
        const item = document.createElement('span');
        item.className = 'legend-item';
        item.innerHTML = `<span class="swatch" style="background:${colorFor(c.cluster)}"></span> ${escapeHtml(clusterLegendLabel(c))}`;
        legend.appendChild(item);
      });
      const shapeNote = document.createElement('span');
      shapeNote.className = 'legend-item';
      shapeNote.innerHTML = '<span>◆ Discussion detected</span><span>● No explicit discussion</span>';
      legend.appendChild(shapeNote);
    }

    function render() {
      const shown = filteredPapers();
      status.textContent = `${shown.length} of ${papers.length} papers shown; ${data.clusters.length} clusters in this view. Axes are UMAP 1 and UMAP 2 coordinates, not interpretable variables.`;
      drawPlot(shown);
      renderDetails(papers.find(p => p.paper_id === state.selected) || shown[0] || papers[0]);
    }

    function drawPlot(shown) {
      const width = svg.clientWidth || 900;
      const height = svg.clientHeight || 560;
      const pad = 44;
      const xs = papers.map(p => p.umap_x), ys = papers.map(p => p.umap_y);
      let minX = Math.min(...xs), maxX = Math.max(...xs), minY = Math.min(...ys), maxY = Math.max(...ys);
      const xRange = Math.max(0.0001, maxX - minX);
      const yRange = Math.max(0.0001, maxY - minY);
      minX -= xRange * 0.08;
      maxX += xRange * 0.08;
      minY -= yRange * 0.08;
      maxY += yRange * 0.08;
      const sx = x => pad + ((x - minX) / Math.max(0.0001, maxX - minX)) * (width - pad * 2);
      const sy = y => height - pad - ((y - minY) / Math.max(0.0001, maxY - minY)) * (height - pad * 2);
      const shownIds = new Set(shown.map(p => p.paper_id));
      svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
      svg.innerHTML = '';
      for (let i = 0; i < 6; i++) {
        const x = pad + i * (width - pad * 2) / 5;
        const y = pad + i * (height - pad * 2) / 5;
        svg.insertAdjacentHTML('beforeend', `<line class="axis" x1="${x}" y1="${pad}" x2="${x}" y2="${height-pad}"></line>`);
        svg.insertAdjacentHTML('beforeend', `<line class="axis" x1="${pad}" y1="${y}" x2="${width-pad}" y2="${y}"></line>`);
      }
      svg.insertAdjacentHTML('beforeend', `<text x="${width / 2}" y="${height - 8}" text-anchor="middle" fill="#65758b" font-size="12">UMAP 1</text>`);
      svg.insertAdjacentHTML('beforeend', `<text x="16" y="${height / 2}" text-anchor="middle" fill="#65758b" font-size="12" transform="rotate(-90 16 ${height / 2})">UMAP 2</text>`);
      papers.forEach(p => {
        const visible = shownIds.has(p.paper_id);
        const selected = p.paper_id === state.selected;
        const x = sx(p.umap_x), y = sy(p.umap_y);
        const size = selected ? 7.5 : 6.5;
        const cls = `point ${visible ? '' : 'dim'} ${selected ? 'selected' : ''}`;
        const fill = colorFor(p.cluster);
        const node = document.createElementNS('http://www.w3.org/2000/svg', p.discussion_found ? 'path' : 'circle');
        node.setAttribute('class', cls);
        node.setAttribute('fill', fill);
        if (p.discussion_found) {
          const d = `M ${x} ${y - size} L ${x + size} ${y} L ${x} ${y + size} L ${x - size} ${y} Z`;
          node.setAttribute('d', d);
        } else {
          node.setAttribute('cx', x);
          node.setAttribute('cy', y);
          node.setAttribute('r', size);
        }
        node.addEventListener('click', () => {
          state.selected = p.paper_id;
          render();
        });
        node.appendChild(document.createElementNS('http://www.w3.org/2000/svg', 'title')).textContent = p.title;
        svg.appendChild(node);
      });
    }

    function renderDetails(p) {
      if (!p) return;
      const doi = p.doi ? `<a class="paper-link" href="https://doi.org/${escapeHtml(p.doi)}" target="_blank">DOI: ${escapeHtml(p.doi)}</a>` : '';
      const url = p.url ? `<a class="paper-link" href="${escapeAttr(p.url)}" target="_blank">Open paper URL</a>` : '';
      const nearest = (p.nearest_papers || []).map(n =>
        `<a class="paper-link" href="#" data-paper="${escapeAttr(n.paper_id)}">${clusterName(n.cluster)}, distance ${Number(n.distance).toFixed(3)}: ${escapeHtml(n.title)}</a>`
      ).join('');
      const discussionSummary = p.discussion_summary ?
        `<div class="section-title">Discussion Summary</div>${renderDiscussionSummary(p.discussion_summary)}` : '';
      const discussionExcerpt = '';
      const discussionStatus = p.discussion_found ?
        `<span class="pill">Discussion detected: ${p.discussion_paragraph_count} paragraphs</span>` :
        `<span class="pill">No explicit Discussion section detected</span>`;
      details.innerHTML = `
        <h2>${escapeHtml(p.title)}</h2>
        <div class="meta">${escapeHtml(p.authors)}<br>${escapeHtml(p.year)} · ${escapeHtml(p.venue)}</div>
        <span class="pill">${clusterName(p.cluster)}</span>
        <span class="pill">${escapeHtml(p.keyword)}</span>
        <span class="pill">Rep rank ${p.representative_rank}</span>
        <span class="pill">Medoid rank ${p.medoid_rank}</span>
        <span class="pill">LDA topic ${p.lda_topic} (${Math.round(p.lda_topic_probability * 100)}%)</span>
        ${discussionStatus}
        <div class="section-title">Cluster Descriptor</div>
        <div class="abstract">${escapeHtml(p.cluster_label_candidate)}</div>
        <div class="section-title">Distinguishing Evidence</div>
        <div class="abstract">${escapeHtml(p.distinguishing_evidence_terms || p.cluster_theme_terms || 'n/a')}</div>
        <div class="section-title">Cluster Summary Candidate</div>
        <div class="abstract">${escapeHtml(p.cluster_summary_candidate)}</div>
        <div class="section-title">Design-Knowledge Contribution</div>
        <div>
          <span class="pill">Form: ${escapeHtml(p.design_knowledge_form || 'n/a')}</span>
          <span class="pill">Action: ${escapeHtml(p.design_knowledge_action || 'n/a')}</span>
          <span class="pill">Auto role: ${escapeHtml(p.design_knowledge_role || 'n/a')}</span>
        </div>
        <div class="abstract">${escapeHtml(p.design_knowledge_contribution || '')}</div>
        <div class="section-title">Paper-Oriented Facets</div>
        <div>
          <span class="pill">Context/Domain: ${escapeHtml(p.facet_population_or_context || 'n/a')}</span>
          <span class="pill">Population/Stakeholder: ${escapeHtml(p.facet_stakeholder_or_population || 'n/a')}</span>
          <span class="pill">Method/Lens: ${escapeHtml(p.facet_method_or_lens || 'n/a')}</span>
          <span class="pill">Artifact/System: ${escapeHtml(p.facet_artifact_or_domain || 'n/a')}</span>
          <span class="pill">Contribution Type: ${escapeHtml(p.facet_contribution_or_outcome || 'n/a')}</span>
        </div>
        <details class="lexical-evidence">
          <summary>Show lexical evidence</summary>
          <div class="evidence-block">
            <div class="section-title">Cluster Theme Evidence</div>
            <div class="abstract">${escapeHtml(p.cluster_theme_terms)}</div>
            <div class="section-title">Secondary Topic-Model Evidence</div>
            <div class="abstract">${escapeHtml(p.lda_topic_words)}</div>
          </div>
        </details>
        <div class="section-title">Abstract</div>
        <div class="abstract">${escapeHtml(p.abstract)}</div>
        ${discussionSummary}
        ${discussionExcerpt}
        <div class="section-title">Links</div>
        ${doi}${url}
        <div class="section-title">Nearest Papers by Cosine Distance</div>
        ${nearest || '<div class="meta">No nearest-paper data available.</div>'}
      `;
      details.querySelectorAll('[data-paper]').forEach(a => {
        a.addEventListener('click', evt => {
          evt.preventDefault();
          state.selected = a.getAttribute('data-paper');
          render();
        });
      });
      details.scrollTop = 0;
    }

    function renderDiscussionSummary(value) {
      const items = String(value || '').split('\n').map(line => line.replace(/^[-•]\s*/, '').trim()).filter(Boolean);
      if (!items.length) return '<div class="meta">No discussion summary available.</div>';
      return `<ul class="discussion-list">${items.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`;
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    }
    function escapeAttr(value) { return escapeHtml(value).replace(/`/g, '&#96;'); }

    initControls();
    render();
    window.addEventListener('resize', render);
  </script>
</body>
</html>
