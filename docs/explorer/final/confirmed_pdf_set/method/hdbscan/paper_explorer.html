<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paper Corpus Explorer (tfidf-svd, hdbscan, method view)</title>
  <style>
    :root {
      --ink: #253858;
      --muted: #65758b;
      --line: #d8e0ea;
      --bg: #f7f9fc;
      --panel: #ffffff;
      --accent: #2f7dd1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }
    header {
      padding: 18px 24px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }
    h1 { margin: 0; font-size: 22px; letter-spacing: 0; min-width: 0; }
    .controls {
      display: grid;
      grid-template-columns: 180px 210px;
      gap: 10px;
      align-items: center;
    }
    input, select, button {
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 10px;
      background: white;
      color: var(--ink);
      font-size: 14px;
    }
    button { background: var(--accent); color: white; border-color: var(--accent); cursor: pointer; }
    label.toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
    }
    label.toggle input { width: 16px; height: 16px; }
    main {
      display: grid;
      grid-template-columns: minmax(560px, 1fr) minmax(420px, 460px);
      gap: 14px;
      padding: 14px;
      min-height: calc(100vh - 92px);
      align-items: stretch;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .plot-panel { display: grid; grid-template-rows: auto 1fr auto; height: calc(100vh - 120px); min-height: 690px; }
    .status {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
    }
    svg { width: 100%; height: 100%; min-height: 560px; background: #fbfcfe; }
    .axis { stroke: #dfe6ef; stroke-width: 1; }
    .point { stroke: white; stroke-width: 1.5; cursor: pointer; opacity: 0.88; }
    .point.dim { opacity: 0.14; }
    .point.selected { stroke: #111827; stroke-width: 3; opacity: 1; }
    .legend, .cluster-list { padding: 10px 12px; border-top: 1px solid var(--line); }
    .legend { max-height: 180px; overflow-y: auto; }
    .legend-items { display: flex; flex-wrap: wrap; gap: 8px 14px; }
    .legend-item { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    .swatch { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .details { padding: 16px; overflow: auto; height: calc(100vh - 120px); min-height: 690px; align-self: stretch; }
    .details h2 { font-size: 18px; margin: 0 0 8px; line-height: 1.25; }
    .meta { color: var(--muted); font-size: 13px; line-height: 1.45; margin-bottom: 12px; }
    .pill {
      display: inline-flex;
      align-items: center;
      margin: 3px 5px 3px 0;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef4fb;
      color: #31577f;
      font-size: 12px;
    }
    .abstract { line-height: 1.5; font-size: 14px; color: #2f3b52; }
    details.discussion-full,
    details.lexical-evidence {
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      background: #fbfcfe;
    }
    details.discussion-full summary,
    details.lexical-evidence summary {
      cursor: pointer;
      color: #31577f;
      font-weight: 700;
      font-size: 13px;
    }
    details.lexical-evidence { margin-top: 16px; }
    .evidence-block { margin-top: 8px; }
    .discussion-list {
      margin: 6px 0 0;
      padding-left: 18px;
      line-height: 1.45;
      font-size: 14px;
      color: #2f3b52;
    }
    .discussion-list li { margin: 0 0 7px; }
    .section-title { margin: 16px 0 6px; font-weight: 700; font-size: 13px; text-transform: uppercase; color: var(--muted); }
    .paper-link { display: block; color: var(--accent); text-decoration: none; margin: 7px 0; font-size: 13px; line-height: 1.35; }
    .cluster-card { border-top: 1px solid var(--line); padding: 10px 12px; }
    .cluster-card button { height: 28px; padding: 0 8px; margin-top: 6px; font-size: 12px; }
    @media (max-width: 980px) {
      header { display: block; }
      h1 { margin-bottom: 12px; }
      .controls, main { grid-template-columns: 1fr; }
      .plot-panel { min-height: 560px; }
    }
  </style>
</head>
<body>

      <h2>Select a paper</h2>
      <p class="meta">Click a point to inspect metadata, cluster theme, LDA topic words, representative rank, and nearest papers.</p>
      <div id="clusterCards"></div>
    </aside>

iarity, and context matching, natural interactions leverage users‚Äô best capabilities to engage in effective dialogue with their computer interlocutors. Natural interaction has prevailed and transpires today in the way we use gestures, voice, or eye gaze to interact with mobile and wearable devices, communicate with personal assistants, play video games through whole-body movements, and engage with public ambient displays. However, recent contexts of use, represented by novel extended reality environments, computer systems designed to augment the human body, and creative designs of assistive technology, have resulted in interactions that can no longer be characterized as ‚Äúnatural.‚Äù In fact, the opposite of natural is true for them. An interaction technique for retrieving digital files from thin air, without any feedback other than within users‚Äô own imagination, does not follow natural design guidelines, but can nevertheless prove effective. Alternating between normal and whispered voices is not a natural speech behavior, yet it enables effective discrimination between commands addressed to the system and actual speech to be transformed into text input. Eyelid gestures, reproducing movement patterns, are not natural for how we normally close and open our eyes, but are effective input for users with motor impairments. In this context, I will discuss non-natural interaction design&nbsp;[5], a transformative and creative process in Human-Computer Interaction research and practice that leads to highly usable and effective interactions with computer systems by deliberately deviating from users‚Äô expectations and their experience of engaging with the natural, physical world. Non-natural interactions are surprising, unexpected, thought-provoking and, by design, non natural. Yet, they foster usability, accessibility, and efficiency for users. In my talk, I will exemplify the paradigm of non-natural interaction design through practical use cases developed and examined in my lab, spanning from wearable devices that challenge user agency&nbsp;[1] to smart buildings featuring invisible layers of digital content anchored in thin air&nbsp;[3], augmenting and extending the human body with virtual limbs&nbsp;[4], and computer-supported worlds that enable switching between different reality augmentations&nbsp;[2].", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2024", "venue": "Proceedings of the 2024 International Conference on Advanced Visual Interfaces", "doi": "10.1145/3656650.3660545", "url": "https://doi.org/10.1145/3656650.3660545", "keyword": "Design Guidelines", "cluster": 9, "cluster_theme_terms": "patterns, management, software, object, computer interaction, structural, architecture, modeling", "cluster_label_candidate": "Cluster 9: Design Pattern through definition and conceptual framing", "distinguishing_evidence_terms": "Design Science, Biological Cells, Computer Interaction, Participatory Futures", "cluster_summary_candidate": "Within this keyword view, this cluster is set apart by Biological Cells, Computer Interaction, Participatory Futures. Its dominant move, definition and conceptualization of design pattern, is shared across most of this view, so the distinguishing terms above carry the interpretive weight. Representative papers: Design Patterns of Biological Cells; Patterns, anticipation and participatory futures.", "design_knowledge_form": "Design Pattern", "design_knowledge_action": "defines and conceptualizes", "design_knowledge_role": "Reusable Design Pattern Language", "design_knowledge_contribution": "defines and conceptualizes Design Pattern", "facet_population_or_context": "Education / Learning, Accessibility", "facet_stakeholder_or_population": "Designers, Practitioners, Developers", "facet_method_or_lens": "Design Science, Workshop", "facet_artifact_or_domain": "Tool, Interface, Game", "facet_contribution_or_outcome": "Methodologica ef8c48ded5", "title": "Toward an Inventory of Plans and Patterns, and Their Use to Foster Strategic Knowledge in Programming Novices", "authors": "Costantini, Umberto and Lonati, Violetta and Morpurgo, Anna", "abstract": "When learning to program, different types of knowledge and skills have to be built: syntactic knowledge, i.e., knowledge of the language features; conceptual knowledge, i.e., knowledge of the semantics of the various constructs; strategic knowledge, i.e. the ability to use syntactic and conceptual knowledge in the most appropriate and effective way to solve programming problems. Strategic knowledge also includes the ability to exploit and combine solutions to known problems to solve new ones and is one of the hardest skills to acquire when learning to programm [5, 6, 11]. Terms such as goals[10] patterns [5, 6, 11]. schema,[9] strategies[4], and variables' roles[3] have been used to refer to this kind of knowledge. Several authors suggest that strategic knowledge should be taught explicitly, however there are three main issues to address: plans/patterns/schema are used sometimes interchangeably and sometimes similarly but not correspondingly; it is claimed that a small number of plans/patterns is needed in an introductory programming course, however there is no agreed upon inventory of plans/patterns among the CS community;the notion of variables' roles isn't always explicitly linked to the notion of plans/patterns;little instructional material is available that explicitly teaches strategies, and it is neither easy nor obvious how to design such material. The aim of this study is to investigate whether and how such notions of plans/patterns/schema and variables' roles can be integrated into introductory programming courses.The idea is to establish a framework that includes and arranges the different definitions presented in literature. The framework developed will be used for building a catalogue of plans/pattern and variables' roles encountered in search through design (RtD) by arguing that in order to legitimize and make use of research through design as research, HCI researchers need to explore and clarify how RtD objects might contribute to knowledge. Leveraging the tradition of aesthetics in the arts and humanities, we argue that while the intentions of the object's designer are important and while annotations are a good mechanism to articulate them, the critical reception of objects is equally foundational to RtD's broader knowledge impacts within HCI. Such a scholarly critical reception is needed precisely because of the potential inexhaustibility of design objects' meanings; their inability to be paraphrased simply and adequately. Offering a multilevel analysis of the (critical) design fiction Menstruation Machine by Sputniko!, the paper explores how design objects co-produce knowledge, by working through complex design problem spaces in non-reductive ways, proposing new connections and distinctions, and embodying design ideas and processes across time and minds.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2015", "venue": "Proceedings of the 33rd Annual ACM Conference on Human Factors in Computing Systems", "doi": "10.1145/2702123.2702400", "url": "https://doi.org/10.1145/2702123.2702400", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain" operationalize ethics, their intended audience or context of use, their ‚Äúcore‚Äù or ‚Äúscript,‚Äù and the means by which these methods are formulated and codified. Building on these results, we provide an initial definition of ethics-focused methods, identifying potential opportunities for the development of future methods to support ethical design practice.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2024", "venue": "ACM J. Responsib. Comput.", "doi": "10.1145/3678988", "url": "https://doi.org/10.1145/3678988", "keyword": "Design methods", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 0.7563065886497498, "umap_y": 5.248833656311035, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 4, "lda_topic_probability": 0.9883111232206868, "lda_topic_words": "heuristics, field, computer, practices, usability, theoretical, tools, hri", "nearest_papers": [{"paper_id": "fd2392ff2aff", "title": "Surveying a Landscape of Ethics-Focused Design Methods", "cluster": -1, "distance": 0.0013060907261419619}, {"paper_id": "3058799f63c1", "title": "Using Schema to Inform Method Design Practices", "cluster": -1, "distance": 0.7502713910746874}, {"paper_id": "cb7daae2b94f", "title": "User Experience Design in Professional Map-Based Geo-Portals", "cluster": -1, "distance": 0.7516645433935099}, {"paper_id": "bacdc4f76eea", "title": "Work system principles: towards a justified design theory on the grounds of socio-instrumental pragmatism", "cluster": -1, "distance": 0.7856897300500809}, {"paper_id": "5f6661254e39", "title": "Ethical Encounters in Design Practice: A Framework Grounded in Practitioner Experience", "cluster": 0, "distance": 0.7935460222802923}]}, {"paper_id": "b2234ef79a5a", "title": "Tracing situated effects of innovative design methods: inexperienced designers' practices", "authors": "Lee, Jung-Joo and Vaajakallio, Kirsikka and Mattelm\\\"aki, Tuuli", "abstract": "In recent years the design research community has been active in developing new methods for user involvement and collaboration in the design process. The new methods, often called innovative design methods, correspond more to designer's genuine ways of thinking and working than do traditional user-centered ones. The entire purpose of innovative method is to allow for designer's creativity in the design of method and reflective learning, instead of relying on predefined rules of method. For this reason, codification and scientific evaluation are often regarded very challenging, if meaningful at all. This leads us to raise a question; what could be relevant ways of framing and communicating innovative design methods to better capture their nature and value?As one attempt to explore this question, our study takes a close look at inexperienced designers' practices with innovative methods, such as probes or co-design workshops. We chose students as research subjects because their situated actions -- and the challenges they face in understanding and applying these methods -- reveal just kind of knowledge about the innovative methods that needs to be communicated. To do this, we analyzed students' learning diaries written during the design course. When the students reported uncertainties and disappointments due to 'ill-defined' nature of such methods, we were able to trace the reasons for disappointments. We also found that the innovative design methods in fact supported the students for empathic learning and design inspiration from the making process of the methods.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2011", "venue": "Procedings of the Second Conference on Creativity and Innovation in Design", "doi": "10.1145/2079216.2079231", "url": "https://doi.org/10.1145/2079216.2079231", "keyword": "Design methods", "cluster": 9, "cluster_theme_terms": "patterns, management, software, object, computer interaction, structural, architecture, modeling", "cluster_label_candidate": "Cluster 9: Design Pattern through definition and conceptual framing", "distinguishing_evidence_terms": "Design Science, Biological Cells, Computer Interaction, Participatory Futures", "cluster_summary_candidate": "Within this keyword view, this cluster is set apart by Biological Cells, Computer Interaction, Participatory Futures. Its dominant move, definition and conceptualization of design pattern, is shared across most of this view, so the distinguishing terms above carry the interpretive weight. Representative papers: Design Patterns of Biological Cells; Patterns, anticipation and participatory futures.", "design_knowledge_form": "Design Pattern", "design_knowledge_action": "defines and conceptualizes", "design_knowledge_role": "Reusable Design Pattern Language", "design_knowledge_contribution": "defines and conceptualizes Design Pattern", "facet_population_or_context": "Education / Learning, Accessibility", "facet_stakeholder_or_population": "Designers, Practitioners, Developers", "facet_method_or_lens": "Design Science, Workshop", "facet_artifact_or_domain": "Tool, Interface, Game", "facet_contribution_or_outcome": "Methodological, Artifact/System, Theoretical", "umap_x": 1.0938963890075684, "umap_y": 3.9405550956726074, "distance_to  and the process of generating and evaluating them. We synthesize different types of design implications into a framework to guide their generation. Our findings identify a broader range than previously described, additional sources and heuristics supporting their development as well some important evaluation criteria. We discuss the value of these findings for interaction design research.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2014", "venue": "Proceedings of the SIGCHI Conference on Human Factors in Computing Systems", "doi": "10.1145/2556288.2557357", "url": "https://doi.org/10.1145/2556288.2557357", "keyword": "Design methods", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 0.7135528326034546, "umap_y": 7.635822296142578, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 8, "lda_topic_probability": 0.971869749330394, "lda_topic_words": "patterns, software, engineering, domain, object, architecture, solutions, problems", "nearest_papers": [{"paper_id": "103eb1a8586b", "title": "Incommensurability and multi-paradigm grounding in design science research: Implications for creating knowledge", "cluster": 6, "distance": 0.34322528977647415}, {"paper_id": "1c04ffa25528", "title": "The implications of improvisational acting and role-playing on design methodologies", "cluster": -1, "distance": 0.5299526173120219}, {"paper_id": "0bca44c18d6c", "title": "Tinkering, tailoring, and bricolage: Implications for theories of Design", "cluster": 6, "distance": 0.5308052186621456}, {"paper_id": "b256aafa902e", "title": "A Multi-Grounded Design Research Process", "cluster": -1, "distance": 0.5609476124173701}, {"paper_id": "3058799f63c1", "title": "Using Schema to Inform Method Design Practices", "cluster": -1, "distance": 0.5725965683677324}]}, {"paper_id": "7ebbe03ea0d8", "title": "Autobiographical design in HCI research: designing and learning through use-it-yourself", "authors": "Neustaedter, Carman and Sengers, Phoebe", "abstract": "Designing a system with yourself as a target user and evaluating the design through your own self-usage is commonly considered a questionable approach in HCI research. Perhaps for this reason, HCI research including extensive self-usage of a design is underdocumented. Yet such self-usage does happen and many researchers have found great value in the lessons learned from it. Our goal in this paper is to bring these hidden practices to light and offer guidelines for how HCI researchers can usefully engage in what we term 'autobiographical design'---design research drawing on extensive, genuine usage by those creating or building a system. Through interviews with HCI experts who have engaged in variations of autobiographical design, we draw out the possibilities and limitations of autobiographical design methods and lay out best practices for its use as an HCI research method.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2012", "venue": "Proceedings of the Designing Interactive Systems Conference", "doi": "10.1145/2317956.2318034", "url": "https://doi.org/10.1145/2317956.2318034", "keyword": "Design methods", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster stract": "For decades designers have used theatre metaphors to describe design methodologies and have used performance techniques to enhance the design process, two of which are improvisational acting and role-playing. Unfortunately, most design literature does not differentiate between these two practices even while using them in combination with various design methods. This paper discusses how improvisation and role-playing have been employed during the design process and why they are distinct from one another. The authors draw upon their current research involving improvisational acting and compare it with other role-playing research which examines role-playing from both a serious and entertainment angle. They conclude through this comparison that both performance techniques have their place in the design process and that more informed definitions of each technique can aid designers in deciding which technique's properties will benefit them the most.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2010", "venue": "Proceedings of the SIGCHI Conference on Human Factors in Computing Systems", "doi": "10.1145/1753326.1753398", "url": "https://doi.org/10.1145/1753326.1753398", "keyword": "Design methods", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 1.2361392974853516, "umap_y": 4.7 view and characterisation of prototyping methods and their contributions to design knowledge", "cluster": -1, "distance": 0.43811919581157066}, {"paper_id": "43856ed76df1", "title": "Hybrid Prototyping: Pure Theory or a Practical Solution to Accelerating Prototyping Tasks?", "cluster": -1, "distance": 0.4633467509233632}, {"paper_id": "ca185d91b684", "title": "Embracing Non-Natural Design in Human-Computer Interaction", "cluster": 9, "distance": 0.5056298768596976}]}, {"paper_id": "ddcb3ba05227", "title": "Design patterns for sociality in human-robot interaction", "authors": "Kahn, Peter H. and Freier, Nathan G. and Kanda, Takayuki and Ishiguro, Hiroshi and Ruckert, Jolina H. and Severson, Rachel L. and Kane, Shaun K.", "abstract": "We propose that Christopher Alexander's idea of design patterns can benefit the emerging field of HRI. We first discuss four features of design patterns that appear particularly useful. For example, a pattern should be specified abstractly enough such that many different instantiations of the pattern can be uniquely realized in the solution to specific problems in context. Then, after describing our method for generating patterns, we offer and describe eight possible design patterns for sociality in human robot interaction: initial introduction, didactic communication, in motion together, personal interests and history, recovering from mistakes, reciprocal turn-taking in game context, physical intimacy, and claiming unfair treatment or wrongful harms. We also discuss the issue of validation of design patterns. If a design pattern program proves successful, it will provide HRI researchers with basic knowledge about human robot interaction, and save time through the reuse of patterns to achieve high levels of sociality.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2008", "venue": "Proceedings of the 3rd ACM/IEEE International Conference on Human Robot Interaction their work. While HCI and design scholarship have produced a growing body of empirical work on design ethics, less attention has been given to concept-building informed by practice. Building on practice-oriented design ethics research in HCI, we define ethical encounters as practitioner-identified situations that expose tensions and value-laden decisions, emerging from the situated realities of day-to-day design work. Our analysis reveals three key dimensions of these encounters: the perceived issues, the actions taken to navigate them, and the new capacities emerging through them. Our analysis also considers how these dimensions play out differently across project phases. The framework offers a shared language and practical guidance for understanding and engaging with ethical challenges, and it contributes by framing ethical encounters as generative for relationships, ideas, and directions in HCI and design practice.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2026", "venue": "Proceedings of the 2026 CHI Conference on Human Factors in Computing Systems", "doi": "10.1145/3772318.3791435", "url": "https://doi.org/10.1145/3772318.3791435", "keyword": "Design Patterns", "cluster": 0, "cluster_theme_terms": "practice, encounters, floorplan, method case, virtual, entrepreneurship, commissioning, flexibility", "cluster_label_candidate": "Cluster 0: Design Theory through definition and conceptual framing around Education / Learning", "distinguishing_evidence_terms": "Rough Mile, Case Study, Way Forward, Guiding Principles", "cluster_summary_candidate": "Within this keyword view, this cluster is set apart by Rough Mile, Case Study, Way Forward. Its dominant move, definition and conceptualization of design theory, is shared across most of this view, so the distinguishing terms above carry the interpretive weight. Methodologically, it leans on Case Study. Its contribution coding (Methodological, Em ela", "abstract": "Educational interface designers are in an unprecedented position to facilitate autonomous learning in neurodiverse learners (children with special needs). These learners are particularly in need of special design, given the disproportionate impact it can have on their quality of life and the current vulnerability they experience due to changes in special education law. In response to the urgent conditions facing these students, we construct and define a set of design principles that are grounded in maximizing the potential of these learners by importing the meta-cognitive skills, algorithmic structures, and multiple sensory modalities that are both proven successful in their remediation and uniquely suited to technological design adaptation.We draw from our main author's experience as a heavily remediated Dyslexic, a lifelong user of modified, adaptable and assistive technology, and a self-aware learner taught to understand why the methods behind her remediation worked. We additionally draw on our cumulative experience as users, teachers and developers of technology and on interviews with participants from a wide variety of sociocultural functions and pedagogical practices involved with special education. Based upon these and existing methods and applications, we present our insights in the form of guidelines for universal design that have the potential to not only embrace the differences of all learners but to maximize the potential of underserved neurodiverse learners so they can become self-sufficient masters of their own skills and interests across their lifetime.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2013", "venue": "Proceedings of the 12th International Conference on Interaction Design and Children", "doi": "10.1145/2485760.2485848", "url": "https://doi.org/10.1145/2485760.2485848", "keyword": "Design principles", "cluster": -1, "cluster_theme_terms": "noise e a success it must develop design principles that are useful, principles that apply across a wide range of technologies. In the first part of this paper I discuss some the properties that useful principles should have. While I am at it, I warn of the dangers of the tar pits and the sirens of technology. We cannot avoid these dangers entirely, for were we to do so, we would fail to cope with the real problems and hazards of the field.The second part of the paper is intended to illustrate the first part through the example of tradeoff analysis. Any single design technique is apt to have its virtues along one dimension compensated by deficiencies along another. Tradeoff analysis provides a quantitative method of assessing tradeoff relations for two attributes xi and xj by first determining the User Satisfaction function for each, U(x), then showing how U(xi) trades off against U(xj). In general, the User Satisfaction for a system is given by the weighted sum of the User Satisfaction values for the attributes. The analysis is used to examine two different tradeoffs of information versus time and editor workspace versus menu size. Tradeoffs involving command languages versus menu-based systems, choices of names, and handheld computers versus workstations are examined briefly.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "1983", "venue": "Proceedings of the SIGCHI Conference on Human Factors in Computing Systems", "doi": "10.1145/800045.801571", "url": "https://doi.org/10.1145/800045.801571", "keyword": "Design principles", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": " models and diverse robotic forms are blended into everyday use. However, structured approaches to designing coherent and interpretable artificial identities remain limited. To address urgent challenges in artificial identity design, including harmful stereotypes and deceptive practices, we introduce the Identity Design (ID) Framework and an accompanying research agenda. Drawing on emerging work on artificial identity in human-robot interaction and taking an interdisciplinary perspective, we propose twelve design principles across three levels: individual (recognisability, behavioural consistency, identity continuity, memory, persistent goals), group (membership signalling, social alignment, role clarity), and societal (benevolence, artificiality, social justice, transparency). The research agenda outlines open questions around the operationalisation and measurement of identity, social dynamics, and ethical considerations for identity design. Together, they lay the groundwork for future research and responsible practice in robotic, virtual, and multi-embodied agents.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2026", "venue": "Proceedings of the 2026 Designing Interactive Systems Conference", "doi": "10.1145/3800645.3812962", "url": "https://doi.org/10.1145/3800645.3812962", "keyword": "Design principles", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "fac re: evaluation through formal design principles, relying on attributes not related to design, using other players to evaluate designs, and removing the design elements from the primary game loop so that evaluation is not necessary. We look at six highly successful design-based games as case studies and discuss the challenges and opportunities of evaluating player creativity, as well as design-based games as a genre.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2025", "venue": "Proceedings of the 20th International Conference on the Foundations of Digital Games", "doi": "10.1145/3723498.3723814", "url": "https://doi.org/10.1145/3723498.3723814", "keyword": "Design principles", "cluster": 5, "cluster_theme_terms": "games, ecc, instructional, collaboration, methodology, practices, cognitive architecture, player", "cluster_label_candidate": "Cluster 5: Design Theory through definition and conceptual framing around Game", "distinguishing_evidence_terms": "Design Science, Program Concerns, Horizontal Extension, Cognitive Architecture", "cluster_summary_candidate": "Within this keyword view, this cluster is set apart by Program Concerns, Horizontal Extension, Cognitive Architecture. Its dominant move, definition and conceptualization of design theory, is shared across most of this view, so the distinguishing terms above carry the interpretive weight. Its contribution coding (Methodological, Empirical, Theoretical) also departs from the view majority. Representative papers: Collaboration Engineering Methodology: Horizontal Extension to Accommodate Project and Program Concerns; The ECC Methodology for Architecture Design Theory and Practices Research.", "design_knowledge_form": "Design Theory", "design_knowledge_action": "defines and conceptualizes", "design_knowledge_role": "Conceptual Framework", "design_knowledge_contribution": "defines and conceptualizes Design Theory", "facet_population_or_con esign advice?", "authors": "Abraham, George and Atwood, Michael E.", "abstract": "Past research asserts that patterns or claims will help capture and communicate interaction-design advice. Both structures attempt to provide advice in context along with the justifications for fit. These properties aim to make patterns or claims more concrete and comprehensible to novice designers than design guidelines. However, empirical work evaluating these promises is lacking. This research presents a controlled study that examines the value of structuring design advice as patterns or as claims. Patterns and claims seem different given their respective roots in architecture and design rationale. They also differ in their emphasis when capturing design decisions; patterns emphasize capturing a problem-solution pair in a certain context, whereas claims focus on capturing the positive and negative implications to a design decision. The findings from the study suggest it may be promising to combine the claim and pattern structures and that such a structure may facilitate discussions of design trade-offs.", "discussion_summary": "- Discussions \nhave mainly focused on the form and organization \n(Borchers, 2000; Fincher et al., 2003).\n- We believe \nimproving access to design advice is important, but it's \nequally, if not more, important to examine whether the \ndesign advice is perceived as usable and effective first.\n- Without evidence showing that articulati ng design advice \nas patterns or claims facilitates sharing and \ncomprehension of design knowledge, the value of \norganization schemes, however well designed and argued, \nis unclear.", "discussion_excerpt": "Discussions \nhave mainly focused on the form and organization \n(Borchers, 2000; Fincher et al., 2003).", "discussion_found": true, "discussion_paragraph_count": 10, "year": "2009", "venue": "Proceedings of the 21st Annual Conference of the Australian Computer-Human Interaction Special Interest Group: Design: Open 2 loop is derived from similar graphi-\ncal structures employed in the context of workflow-business process model-\ning with good results [Medina-Mora et al.", "discussion_excerpt": "6. DISCUSSION AND CONCLUSIONS\n6.1 Usability\nThe use of DR approaches is hampered by two main problems: the size of\nthe resulting rationale records, and the overhead placed on the users of the\napproaches when producing them.", "discussion_found": true, "discussion_paragraph_count": 10, "year": "2000", "venue": "ACM Trans. Softw. Eng. Methodol.", "doi": "10.1145/350887.350895", "url": "https://doi.org/10.1145/350887.350895", "keyword": "Design rationale", "cluster": 7, "cluster_theme_terms": "rationale, capture, documents, argumentation, implies, reflective, reuse, influence", "cluster_label_candidate": "Cluster 7: Design Rationale as documented representations", "distinguishing_evidence_terms": "Method Rationale, Evidence Framework, Design Guidelines, Capture", "cluster_summary_candidate": "Within this keyword view, this cluster is set apart by Method Rationale, Evidence Framework, Capture. Unlike most clusters in this view, its dominant design-knowledge move is representation and documentation. Representative papers: Redesigning the rationale for design rationale; Integrating different perspective on design rationale: Supporting the emergence of design rationale from design communication.", "design_knowledge_form": "Design Rationale", "design_knowledge_action": "represents and documents", "design_knowledge_role": "Traceable Decision Rationale", "design_knowledge_contribution": "represents and documents Design Rationale", "facet_population_or_context": "", "facet_stakeholder_or_population": "Designers", "facet_method_or_lens": "Workshop", "facet_artifact_or_domain": "Tool", "facet_contribution_or_outcome": "Theoretical, Methodological, Artifact/System", "umap_x": 3.62693452835083, "umap_y": 10.287984848022461, "distance_to_centroid": 0.32537776930063844, "representative_rank": 9, "is_r ent, restoration, and safeguarding. In conclusion a scheme is offered for addressing questions concerning the disciplinary scope of undesign in the context of HCI, along with suggestions for ways that undesigning may be more strongly incorporated within HCI research.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2012", "venue": "Proceedings of the SIGCHI Conference on Human Factors in Computing Systems", "doi": "10.1145/2207676.2208540", "url": "https://doi.org/10.1145/2207676.2208540", "keyword": "Design theory", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": -2.5533976554870605, "umap_y": 5.913496494293213, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 0, "lda_topic_probability": 0.9742832931239447, "lda_topic_words": "service, architecture, creation, software, method theory, problem, theories, types", "nearest_papers": [{"paper_id": "19dd6ec0253e", "title": "A principle-based philosophical framework for fashion design praxis and education in new design landscapes", "cluster": -1, "distance": 0.13459612193436776}, {"paper_id": "994d28d55eb8", "title": "From human factors to human actors to human crafters", "cluster": -1, "distance": 0.34451227128366313}, {"paper_id": "ef3a9300a2f3", "title": "Developing a tance": 0.24507922465810816}, {"paper_id": "fffe50e033fa", "title": "Activity as the ultimate particular of interaction design", "cluster": 9, "distance": 0.3411750904285892}, {"paper_id": "dbc171dde63a", "title": "Perfect Eudaimonic User Experience Design That Aristotle Would Have Wanted", "cluster": -1, "distance": 0.4252839920101351}, {"paper_id": "098c9db1090d", "title": "A semantic representation for domain-specific patterns", "cluster": 9, "distance": 0.44490688351447183}]}, {"paper_id": "7afa6519f6fc", "title": "The experience, dynamics and artifacts framework: towards a holistic model for designing serious and entertainment games", "authors": "Natucci, G.C. (1); Borges, M.A.F. (1)", "abstract": "Games have been used by educators as a mean for increasing learning retention and providing students with entertainment experiences that go beyond the classroom. However, the process of creating a game for educational purposes (serious game) is segmented into its entertainment structures, which usually are underemployed in a pedagogical application, and in purely educational components, which have been extensively detailed in the literature. This division can hinder the player/learner experience as too much focus in one of these areas can either compromise knowledge acquisition or engagement. To overcome this issue, this work proposes a holistic view of games that includes both learning and entertainment elements, making them indistinguishable in creating either an entertainment or serious game. This notion is further reinforced by reviewing common game design frameworks found in the literature that have an empirical background, and by proposing a unified game design framework that uses elements from the analyzed frameworks and enhances them by including the latest research into game-based learning and serious games guidelines. By proposing a holistic view of games and an accompanying framework, a new way of facing game design is proposed that encourages designers to consider the postgame learning experiences and stimulates educators to take the entertainment aspects of their game more deeply.", "discussion_summary": "- Discussion\nThe proposed EDA framework is an attempt to unify\nconcepts related to entertainment games and serious games.\n- It brings forward a fundamental element of every game, the\ngame loop, to integrate Experience, Artifacts, and Dynamics\ninto an iterative cycle that represents the interactions between\nplayer and game, as well as their temporal relations.\n- The\nEDA was also detailed in a second level, following common\nstructures found in empirical frameworks, such as narrative\nelements, aesthetics elements, and game mechanics.", "discussion_excerpt": "Discussion\nThe proposed EDA framework is an attempt to unify\nconcepts related to entertainment games and serious games.", "discussion_found": true, "discussion_paragraph_count": 10, "year": "", "venue": "2021 IEEE Conference on Games (CoG)", "doi": "10.1109/CoG52621.2021.9619144", "url": "", "keyword": "Design frameworks", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 2.4828622341156006, "umap_y": 3.7394819259643555, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 3, "lda_topic_probability": 0.9915091690577009, "lda_topic_words": "rationale, games, entertainment, assessment, theoretical, components, literature, activities", "nearest_papers": [{"paper_id": "e09769771b82", "title": "The Experience, Dynamics and Artifacts Framework: Towards a Holistic Model for Designing Serious and Entertainment Games", "cluster": -1, "distance": 0.0}, {"paper_id": "2280b868ea5f", "title": "Form and Function: Toward a Better Understanding of Design-Based Games", "cluster": 5, "distance": 0.3198670481523812}, {"paper_id": "d0a936b480d4", "title": "Acquiring educational access for neurodiverse learners through multisensory design principles", "cluster": -1, "distance": 0.795541802989593}, {"paper_id": "056ae4e01610", "title": "Beyond the old game design: a new design paradigm in Game Studies through C-K Theory", "cluster": 4, "distance": 0.8027777491425112}, {"paper_id": "dbc171dde63a", "title": "Perfect Eudaimonic User Experience Design That Aristotle Would Have Wanted", "cluster": -1, "distance": 0.8049364003964857}]}, {"paper_id": "85ba95ab4fa0", "title": "Six Guidelines for Trustworthy, Ethical and Responsible Automation Design", "authors": "Jel√≠nek, Matou≈° ; Schlicker, Nadine ; de Visser, Ewart", "abstract": "Calibrated trust in automated systems (Lee and See 2004) is critical for their safe and seamless integration into society. The common goal of the various definitions of calibrated trust1 is to optimize outcomes in human-automation interaction. In other words, users should only rely on a system recommendation when it is actually correct and reject it when it is factually wrong. One requirement to achieve this goal is an accurate trustworthiness assessment, ensuring that the user's perception of the system's trustworthiness aligns with its actual trustworthiness, allowing users to make informed decisions about the extent to which they can rely on the system (Schlicker et al. 2022). The field of pragmatics offers valuable insights into the communication processes essential for developing accurate trustworthiness assessments by helping to find strategies to bridging the gap between user expectations and system capabilities, emphasizing the importance of context and mutual understanding in communication. We propose six design guidelines to help designers to optimize for accurate trustworthiness assessments, thus fostering ethical, and responsible human-automation interactions. The proposed guidelines are derived from existing literature in various fields, such as human-computer interaction, cognitive psychology, automation research, user-experience design, and ethics. We are incorporating key principles from the field of pragmatics, specifically the cultivation of common ground (H. H. Clark 1996) and Gricean communication maxims (Grice 1975). These principles are essential for the design of automated systems because the user‚Äôs perception of the system‚Äôs trustworthiness is shaped by both environmental contexts, such as organizational culture or societal norms, and by situational context, including the specific circumstances or scenarios in which the interaction occurs (Hoff and Bashir 2015). Pragmatics principles provide valuable insights into these contexts, thus enhancing our understanding and design of trustworthy systems. Our proposed guidelines provide actionable insights for designers to create automated systems that make relevant trustworthiness cues available. This would ideally foster calibrated trust and more satisfactory, productive, and safe interactions between humans and automated systems. Furthermore, the proposed heuristics might work as a tool for evaluating to what extent existing systems enable users to accurately assess a system‚Äôs trustworthiness. ¬© 2025, CC BY-NC-ND.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2025", "venue": "arXiv", "doi": "10.48550/arXiv.2508.02371", "url": "", "keyword": "Design Guidelines", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unc Heuristics as conceptual repertoire", "authors": "Gray, Colin M. (1); Seifert, Colleen M. (2); Yilmaz, Seda (3); Daly, Shanna R. (4); Gonzalez, Richard (2)", "abstract": "When engaged in design activity, what does a designer think about? And how does she draw on disciplinary knowledge, precedent, and other strategies in her design process in order to imagine new possible futures? In this paper, we explore Design Heuristics as a form of intermediate-level knowledge that may explain how designers build on existing knowledge of 'design moves'-non-deterministic, generative strategies or heuristics-during conceptual design activity.Wedescribe a set of relationships between disciplinary training and the acquisition of such heuristics, and postulate how design students might accelerate their development of expertise. We conclude with implications for future research on the development of expertise, and the ways in which methods such as Design Heuristics can enhance this developmental process. ¬© 2016 TEMPUS Publications.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2016", "venue": "International Journal of Engineering Education", "doi": "", "url": "", "keyword": "Design Heuristics", "cluster": 2, "cluster_theme_terms": "heuristics, interfaces, usability, fluent, assistive, weather, risk communication, vyyden", "cluster_label_candidate": "Cluster 2: Design Heuristic through definition and conceptual framing", "distinguishing_evidence_terms": "Risk Communication, Usability Heuristics, Standardized Notation, Conceptual Repertoire", "cluster_summary_candidate": "Within this keyword view, this cluster is set apart by Risk Communication, Usability Heuristics, Standardized Notation. Its dominant move, definition and conceptualization of design heuristic, is shared across most of this view, so the distinguishing terms above carry the interpretive weight. Representative papers: Revised set of usability he anna R. (2); Seifert, Colleen M. (2); Gonzalez, Richard (2)", "abstract": "How do product designers create multiple concepts to consider? To address this question, we combine evidence from four empirical studies of design process and outcomes, including award-winning products, multiple concepts for a project by an experienced industrial designer, and concept sets from 48 industrial and engineering designers for a single design problem. This compilation of over 3450 design process outcomes is analyzed to extract concept variations evident across design problems and solutions. The resulting set of patterns, in the form of 77 Design Heuristics, catalog how designers appear to introduce intentional variation into conceptual product designs. These heuristics provide ‚Äòcognitive shortcuts‚Äô that can help designers generate more, and more varied, candidate concepts to consider in the early phases of design. ¬© 2016 The Authors", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2016", "venue": "Design Studies", "doi": "10.1016/j.destud.2016.05.001", "url": "", "keyword": "Design Heuristics", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 1.2324246168136597, "umap_y": 6.28196907043457, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, of reduced options for communication through the compounding constraints of culture, language, and impairment. I then conducted a summative content analysis on twenty case studies to identify and define the terminology and points to consider in collaborative dialogue between designers and people who need assistive technologies. This analysis led to the development of a taxonomy of communication formats matched to specific sensory inputs and these have been structured to work as a heuristic design tool. Of the forty-one formats defined, around two-thirds were used in the literature reviewed. Notably, more than half the studies used just over a quarter of the formats. The definitions of dialogue and the design heuristics I put forward in this paper require further debate and refinement to be effective to wider applications. [All rights reserved Elsevier].", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "She Ji: The Journal of Design, Economics, and Innovation", "doi": "10.1016/j.sheji.2018.01.001", "url": "", "keyword": "Design Heuristics", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 1.3843783140182495, "umap_y": 6.443257808685303, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 7, "lda_topic_probability": 0.9898872936139199, "lda_topic_words": "rules, product, participatory, guidelines, chapter, article, field, interfaces", "nearest_papers": [{"paper_id": "c6955d14d66c", "title": "Dialogue appropriate to assistive technology product design: A taxonomy of communication formats in relation to modes of sensory perception", "cluster": -1, "distance": 3.948302329415121e-05}, {"paper_id": "cd211147691a", "title": "Design heuristics set for X: A design aid for assistive product concept generation", "cluster": 2, "distance": 0.5408175177213668}, {"paper_id": "f02904f836be", "title": "Universal Participatory Design: Achievements and Challenges", "cluster": -1, "distance": 0.7094066247397885}, {"paper_id": "a883ec94b37a", "title": "Causal design knowledge: Alternative representation method for product development knowledge management", "cluster": -1, "distance": 0.7158136180969634}, {"paper_id": "9eecf23c4ce7", "title": "Design Heuristics for Web-Based Severe Weather Risk Communication", "cluster": 2, "distance": 0.7637558952577854}]}, {"paper_id": "f50a79b2d7e1", "title": "Towards scaling expertise with generative AI: design principles for governing AI-Mediated knowledge capture and transfer", "authors": "O‚ÄôSullivan, Philip (1); Sepp√§l√§, Selja (1); Feller, Joseph (1)", "abstract": "Tacit expertise (e.g. decision heuristics, risk judgement) makes organisational decision-making distinctively human, yet resides in individuals, is hard to scale, and is lost on departure. Generative AI (GenAI) offers conversational elicitation, synthesis, and adaptive scaffolding, but risks hallucination, goal drift, and helpfulness-driven agreement bias, undermining independent judgement. Building on validated problem theory, we derive four design principles grounded in socio-cognitive knowledge-work theory. They specify governance mechanisms addressing persistent transfer challenges (knowledge hiding, articulation barriers, internalisation failure) and GenAI-specific risks (knowledge distortion, tool-dependent learning, disrupted social exchange). Logical reasoning validates for alignment, applicability, coherence, completeness, and operationality. A feasibility assessment across three GenAI configurations shows most mechanisms are implementable through prompting; those requiring persistent state or platform integration are not, with configurations approximating rather than enforcing governance. We contribute prescriptive design knowledge for preserving human-centric decision-making by motivating expert sharing, enabling articulation, establishing fidelity, and ensuring applicability to successors. ¬© 2026 The Author(s). Published by Informa UK Limited, trading as Taylor & Francis Group.", "discussion_summary": "- Discussion\nThe Echelon 1 problem theory described in O’Sullivan et al.\n- This paper extends that theory \nby deriving four DPs that operationalise its requirements as governance Mechanisms .\n- The DPs contribute to \nwork on GenAI’s potential for knowledge work (Alavi et al., 2024 ) by specifying testable Mechanisms through \nwhich conversational interaction, synthesis, and scaffolding can be governed to address documented risks \n(Lee et al., 2025 ; L", "discussion_excerpt": "Discussion\nThe Echelon 1 problem theory described in O’Sullivan et al. ( 2025 ), reframed GenAI-mediated transfer as \na governance design challenge for a probabilistic, non-human intermediary.", "discussion_found": true, "discussion_paragraph_count": 10, "year": "2026", "venue": "Journal of Decision Systems", "doi": "10.1080/12460125.2026.2669855", "url": "", "keyword": "Design knowledge", "cluster": 8, "cluster_theme_terms": "ai, transparency, systematic review, contestable, generative, expertise, patterns, mediated", "cluster_label_candidate": "Cluster 8: Design Knowledge through prior-work synthesis", "distinguishing_evidence_terms": "Contestable AI, Systematic Review, Scaling Expertise, Auditable Ai-systems", "cluster_summary_candidate": "Within this keyword view, this cluster is set apart by Contestable AI, Systematic Review, Scaling Expertise. Unlike most clusters in this view, its dominant design-knowledge move is synthesis of prior work. Methodologically, it leans on Systematic Review. Representative papers: Contestable AI by Design: Towards a Framework; Explainable Medical Imaging AI Needs Human-Centered Design: Guidelines and Evidence from a Systematic Review.", "design_knowledge_form": "Design Knowledge", "design_knowledge_action": "synthesizes prior work on", "design_knowledge_role": "Empirical Evidence Base", "design_knowledge_contribution": "synthesizes prior work on Design Knowledge", "facet_population_or_context": "", "facet_stakeholder_or_population": "Designers", "facet_method_or_lens": "Systematic Review", "facet_artifact_or_domain": "Tool", "facet_contribution_or_outcome": "Methodological, Theoretical, Artifact/System", "umap_x": -3.895390033721924, "umap_y": 6.212932586669922, "distance_to_centroid": 0.2955892629853504, "representative_rank": 4, "is_representative_top3": false, "medoid_rank": 4, "lda_topic": 9, "lda_topic_probability": 0.9830166937066148, "lda_topic_words": "guidelines, visual, decision, tools, rationale, capture, provide, typology", "nearest_papers": [{"paper_id": "560be0c20de7", "title": "Designing for Trust, Progress, and Dignity: A Conceptual Framework for Reliability, Responsiveness, and Relational Quality in AI-Enabled Service Systems", "cluster": -1, "distance": 0.26778913461236753}, {"paper_id": "bdf1addf5a10", "title": "Contestable AI by Design: Towards a Framework", "cluster": 8, "distance": 0.32888583590085996}, {"paper_id": "2efb92894924", "title": "Particles of a Whole: Design Patterns for Transparent and Auditable AI-Systems", "cluster": 8, "distance": 0.32961389231625504}, {"paper_id": "0783409933b4", "title": "A Two-Dimensional Framework for AI Agent Design Patterns: Cognitive Function and Execution Topology", "cluster": -1, "distance": 0.44030554197926264}, {"paper_id": "7d99b05f405e", "title": "Design Patterns for AI-based Systems: A Multivocal Literature Review and Pattern Repository", "cluster": -1, "distance": 0.4765596084707707}]}, {"paper_id": "02381ea80183", "title": "A design theory for data quality tools in data ecosystems: Findings from three industry cases", "authors": "Altendeitering, M. (1, 2); Guggenberger, T.M. (1, 2); MoÃàller, F. (1, 3)", "abstract": "Data ecosystems are a novel inter-organizational form of cooperation. They require at least one data provider and one or more data consumers. Existing research mainly addresses generativity mechanisms in this relationship, such as business models or role models for data ecosystems. However, an essential prerequisite for thriving data ecosystems is high data quality in the shared data. Without sufficient data quality, sharing data might lead to negative business consequences, given that the information drawn from them or services built on them might be incorrect or produce fraudulent results. We tackle this issue precisely since we report on a multi-case study deploying data quality tools in data ecosystem scenarios. From these cases, we derive generalized prescriptive design knowledge as a design theory to make the knowledge available for others designing data quality tools for data sharing. Subsequently, our study contributes to integrating the issue of data quality in data ecosystem research and provides practitioners with actionable guidelines inferred from three real-world cases. All rights reserved Elsevier.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Data & Knowledge Engineering", "doi": "10.1016/j.datak.2024.102333", "url": "", "keyword": "Design knowledge", "cluster": 6, "cluster_theme_terms": "visualization, sonification, aesthetics, theories, method theory, thriving, science, technical", "cluster_label_candidate": "Cluster 6: Design Theory through definition a e Research Projects", "authors": "Chatterjee, S. (1); Bhattacherjee, A. (2); Gilb, T. (3)", "abstract": "There is considerable debate in IS-DSR community about what constitutes design knowledge and whether they are best represented as design principles or design theories. While designing an IT artifact to solve a problem addresses the 'how' question, we agree that the 'why' question (why did this work?) is important to answer. This essay attempts to shed light on two fundamental questions in this domain: (1) What are the various ways that knowledge contribution in DSR can be stated? (2) What pathways exists to create and re(use) knowledge in DSR projects? We present a simple 2‚Äâ√ó‚Äâ2 framework that explains with concrete examples four knowledge types - design principles, design attribute postulates, design theories, and good design practices from DSR projects. We further present a dual-use of design knowledge framework that shows pathways and re(use) of knowledge in DSR. We think that this typology is a useful theoretical contribution that can benefit both academics and practitioners conducting DSR projects.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Design Science Research for a Resilient Future: 19th International Conference on Design Science Research in Information Systems and Technology, DESRIST 2024, Proceedings. Lecture Notes in Computer Science (14621)", "doi": "10.1007/978-3-031-61175-9_10", "url": "", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": -0.3369649350643158, "umap_y": 3.3190340995788574, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 0, "lda_topic_probability": 0.9774958939339701, "lda_topic_words": "service, architecture, creation, software, method theory, problem, theories, types", "nearest_papers": [{"paper_id": "2042efa7e455", "title": "The DSR grid: six core dimensions for effectively planning and communicating design science research projects", "cluster": -1, "distance": 0.18578688441134428}, {"paper_id": "95eee570b8f1", "title": "Accumulating design knowledge: A mechanisms-based approach", "cluster": -1, "distance": 0.273897498559722}, {"paper_id": "6d926f3c4a97", "title": "A domain reference ontology for design science research knowledge bases", "cluster": -1, "distance": 0.3896257008387646}, {"paper_id": "0b7e6111aa14", "title": "Synthesizing a Solution Space for Prescriptive Design Knowledge Codification", "cluster": -1, "distance": 0.40745498586493156}, {"paper_id": "6194ef223969", "title": "A typology of Urban Design theories and its application to the shared body of knowledge", "cluster": -1, "distance": 0.5557473214155174}]}, {"paper_id": "3058799f63c1", "title": "Using Schema to Inform Method Design Practices", "authors": "Chivukula, Shruthi Sai (1); Gray, Colin M. (2)", "abstract": "There are many different forms of design knowledge that guide and shape a designer‚Äôs ability to act and realize potential realities. Methods and schemas are examples of design knowledge commonly used by design researchers and designers alike. In this pictorial, we explore, engage, and describe the role of schemas as tools that can support design researchers in formulating methods to support design action, aying on design methodologies", "cluster": -1, "distance": 0.3536873995424539}, {"paper_id": "40a2d86cd488", "title": "Elements of a design method - a basis for describing and evaluating design methods", "cluster": 9, "distance": 0.4252620256823222}, {"paper_id": "b2234ef79a5a", "title": "Tracing situated effects of innovative design methods: inexperienced designers' practices", "cluster": 9, "distance": 0.48135592865814825}, {"paper_id": "82f49b5a1905", "title": "SOLUTION REPERTOIRE", "cluster": -1, "distance": 0.4911924147084987}, {"paper_id": "7e095752d24c", "title": "Think-4-EmCoDe framework: Highlighting key qualities in embodied co-design techniques for children", "cluster": -1, "distance": 0.5351589816488971}]}, {"paper_id": "73537bfbe719", "title": "A taxonomy and ontology for digital platforms", "authors": "Derave, T. (1); Gailly, F. (1); Sales, T.P. (2); Poels, G. (1)", "abstract": "In academic literature and in business communication digital platforms are categorized into different types including, but not limited to, multi-sided platform, digital marketplace, on-demand platform and sharing economy platform. Observing the substantial literature on these platform types, both in academia and professional contexts, there is lack of consensus on the definition of these digital platform types. On top of that, there is a lack of knowledge in the literature on the requirements and design of these digital platform types. We address the observed lack of shared conceptualizations by creating a taxonomy for digital platforms, by classifying digital platforms according to their distinctive features. Further, we address the lack of design knowledge with a digital platform reference ontology that describes the construction and operation of the different types of digital platform that are distinguished in the taxonomy. This reference ontology, developed using the Unified Foundational Ontology (UFO) and several of its core ontologies, is organized into different ontology modules, allowing to describe functionalities that are common to any digital platform and more specific functionalities that have their origin in the distinctive features that were used to construct the taxonomy. The taxonomy that we contribute helps to clearly define the different types of digital platform that can be observed today. It also helps analysing further evolutions in the platform domain. The contribution of a well-founded digital platform reference ontology is a step towards a better understanding of digital platform functionality, better communication between stakeholders, and eventually may facilitate future research and development of new types of digital platform. All rights reserved Elsevier.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Information Systems", "doi": "10.1016/j.is.2023.102293", "url": "", "keyword": "Design knowledge", "cluster": 1, "cluster_theme_terms": "platforms, digital, theoretical framework, service, online, remote, studio, media", "cluster_label_candidate": "Cluster 1: Design Theory through definition and conceptual framing around Interface", "distinguishing_evidence_terms": "Digital Platforms, Theoretical Framework, Design Guidelines, Education / Learning", "cluster_summary_candidate": "Within this keyword view, this cluster is set apart by Digital Platforms, Education / Learning. Its dominant move, definition and conceptualization of design theory, is shared across most of this view, so the distinguishing terms above carry the interpretive weight. It concentrates on contexts such as Education / Learning, Finance / Business that do not anchor the sibling clusters. Representative papers: A theoretical framework on embodiment in digital design; Digital Panopticon: How Remote Work Monitoring Shapes Employee Behavior and Motivation.", "design_knowledge_form": "Design Theory", "design_knowledge_action": "defines and conceptualizes", "design_knowledge_role": "Conceptual Framework", "design_knowledge_contribution": "defines and conceptualizes Design Theory", "facet_population_or_context": "Education / Learning, Finance / Business, Privacy / Security", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "Interface", "facet_contribution_or_outcome": "Methodological, Theoretical, Artifact/System", "umap_x": -2.0304200649261475, "umap_y": 7.390711307525635, "distance_to_centroid": 0.28524686050816606, "representative_rank": 4, "is_representative_top3": false, "medoid_rank": 4, "lda_topic": 6, "lda_topic_probability": 0.9808491669680116, "lda_topic_words": "literature, review, concept, management, systematic, analysis, ai, theories", "nearest_papers": [{"paper_id": "288676f720a1", "title": "A design theory for digital platforms supporting online communities: a multiple case study", "cluster": 1, "distance": 0.09688795082337143}, {"paper_id": "7f7baeb83bac", "title": "A theoretical framework on embodiment in digital design", "cluster": 1, "distance": 0.39356434687381014}, {"paper_id": "d0a17557440f", "title": "Avoiding virtual dystopia: A design theory for emancipatory participatory immersive platforms", "cluster": 1, "distance": 0.3946398041713325}, {"paper_id": "af66a447ca7c", "title": "Digital Panopticon: How Remote Work Monitoring Shapes Employee Behavior and Motivation", "cluster": 1, "distance": 0.41566974643598553}, {"paper_id": "43fee329f83e", "title": "Process design theory for digital information services", "cluster": 1, "distance": 0.47089641827270945}]}, {"paper_id": "19dd6ec0253e", "title": "A principle-based philosophical framework for fashion design praxis and education in new design landscapes", "authors": "Harvey, N. (1); Ankiewicz, P. (2)", "abstract": "Like technology and technology education (Ankiewicz, 2019a), fashion design as a discipline lacks a scientifically founded, discipline-specific philosophical framework that may hold affordances for fashion designers, research scholars, and curriculum developers. Attempting to develop an autonomous theory for fashion design might be overly ambitious, so we do not propose a new theory; instead, we superimpose Mitcham's (1994) philosophical framework of technology onto Love's (2000) meta-theoretical taxonomy for design theory for the application to fashion design praxis. The purpose of this conceptual article is to conceptualise a philosophical framework for fashion design to be considered by fashion designers, researchers and curriculum developers when engaging in praxis. The relevant research questions are then: what are the underlying philosophical principles for fashion design within the current approach to praxis? What are the affordances of such a principle-based philosophical framework for fashion designers in their practice; researchers, scholars and curriculum developers? Within the current design praxis, this article proposes a principle-based philosophical framework including volition (mind-set), design knowledge (epistemology), design process (methodology) and objects (ontology). This framework may well create opportunities for fashion designers to consider these related principles and approach their praxis in alternative ways. Similarly, researchers wanting to strengthen scholarship for fashion design could use each of these different principles as units of analysis to explore and introduce new perspectives and research about the praxis. Alternative volition and new forms of design knowledge have the potential to change designers' choices, reasoning, cognition, and design processes and scholars may well write about this also. Finally, the framework offers the potential for scholars to question and research the ontological nature of objects and the relationship between designer, intentions and artefact function when sustainability and design for social good come into play. Furthermore, the framework for fashion design will also inform curriculum and programme development in fashion design education.", "discussion_summary": "- Discussions \nare framed in terms of diverse approaches to fashion, such as modernity, communication, \nart, adornment, style, taste and dress, society, symbolic dimensions, class divisions, dress \nand material culture, body and identity (Barnard, 2007; Frisby &\n- While we acknowledge fashion as a noun, however, this article is seen from the lens \nof fashion in a verb form, which aligns to design as a verb.\n- In a verb form, Flusser ( 2012) \nargues that design means to draft and sketch, while Friedman ( 2003) claims that design \nrefers to a process involving both thought and action.", "discussion_excerpt": "Discussions \nare framed in terms of diverse approaches to fashion, such as modernity, communication, \nart, adornment, style, taste and dress, society, symbolic dimensions, class divisions, dress \nand material culture, body and identity (Barnard, 2007; Frisby & Featherstone, 2000; Heb-\ndige, 2007; Hopkins, 2012; Kang, 2019; Matteucci & Marino, 2017; Rhodes & Rawsthorn, \n2007; Rocamora & Smelik, 2016; Svendsen, 2012; Wolfendale & Kennett, 2011).", "discussion_found": true, "discussion_paragraph_count": 10, "year": "", "venue": "International Journal of Technology and Design Education", "doi": "10.1007/s10798-022-09794-7", "url": "", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "face
