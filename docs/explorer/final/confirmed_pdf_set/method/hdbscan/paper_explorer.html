sign_knowledge_form": "Design Theory", "design_knowledge_action": "synthesizes prior work on", "design_knowledge_contribution": "synthesizes prior work on Design Theory"}, {"paper_id": "b357bc5a3d3b", "title": "Towards Canonical Task Types for User Interface Design", "authors": "J. M. Gonzalez-Calleros; J. Guerrero-Garcia; J. Vanderdonckt; J. Munoz-Arteaga", "abstract": "Task models are the cornerstone of user-centred design methodologies for user interface design. Therefore, they deserve attention in order to produce them effectively and efficiently, while guaranteeing the reproducibility of a task model: different persons should in principle obtain the same task model, or a similar one, for the same problem. In order to provide user interface designers with some guidance for task modelling, a list of canonical task types is proposed that offers a unified definition of frequently used tasks types in a consistent way. Each task type consists of a task action coupled with a task object, each of them being written according to design guidelines. This list provides the following benefits: tasks are modelled in a more consistent way, their definition is more communicable and shared, task models can be efficiently used for model-driven engineering of user interfaces.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2009.0", "venue": "", "doi": "10.1109/LA-WEB.2009.33", "url": "", "keyword": "Design Guidelines", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 3.8638460636138916, "umap_y": 8.01971435546875, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 5, "lda_topic_probability": 0.9666625839173623, "lda_topic_words": "patterns, review, visualization, literature, field, value, software, domain", "nearest_papers": [{"paper_id": "29a8891f4c02", "title": "The Need for Design Cases: Disseminating Design Knowledge", "cluster": -1, "distance": 0.6087805683167631}, {"paper_id": "b14f85b19a87", "title": "Design Study Methodology: Reflections from the Trenches and the Stacks", "cluster": -1, "distance": 0.6775732633748716}, {"paper_id": "4b599d3e2eb0", "title": "Immodest Proposals: Research Through Design and Knowledge", "cluster": -1, "distance": 0.7114754068985474}, {"paper_id": "b77e7d67555e", "title": "USSF: A Unified Framework for Screen Standardization in Software Systems", "cluster": -1, "distance": 0.7185172676022984}, {"paper_id": "4ac74ce3f335", "title": "Towards a framework for documentation design: an abstract model of computer-mediated activity", "cluster": -1, "distance": 0.7650403038712744}], "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme."}, {"paper_id": "b14f85b19a87", "title": "Design Study Methodology: Reflections from the Trenches and the Stacks", "authors": "M. Sedlmair; M. Meyer; T. Munzner", "abstract": "Design studies are an increasingly popular form of problem-driven visualization research, yet there is little guidance available about how to do them effectively. In this paper we reflect on our combined experience of conducting twenty-one design studies, as well as reading and reviewing many more, and on an extensive literature review of other field work methods and methodologies. Based on this foundation we provide definitions, propose a methodological framework, and provide practical guidance for conducting design studies. We define a design study as a project in which visualization researchers analyze a specific real-world problem faced by domain experts, design a visualization system that supports solving this problem, validate the design, and reflect about lessons learned in order to refine visualization design guidelines. We characterize two axes - a task clarity axis from fuzzy to crisp and an information location axis from the domain expert's head to the computer - and use these axes to reason about design study contributions, their suitability, and uniqueness from other approaches. The proposed methodological framework consists of 9 stages: learn, winnow, cast, discover, design, implement, deploy, reflect, and write. For each stage we provide practical guidance and outline potential pitfalls. We also conducted an extensive literature survey of related methodological approaches that involve a significant amount of qualitative field work, and compare design study methodology to that of ethnography, grounded theory, and action research.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2012.0", "venue": "", "doi": "10.1109/TVCG.2012.213", "url": "", "keyword": "Design Guidelines", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 3.798086166381836, "umap_y": 7.855405330657959, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 5, "lda_topic_probability": 0.9756713930468082, "lda_topic_words": "patterns, review, visualization, literature, field, value, software, domain", "nearest_papers": [{" ce design, and web design. LabelPatterns.org is a newly launched website currently hosting over 75 design patterns that support the design of consumer-decision labels. It also offers other kinds of information about these labels and related messaging. The patterns and the website were begun as student projects in the Department of Human Centered Design & Engineering at the University of Washington, USA. It is now being managed and expanded by a volunteer project team.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2011.0", "venue": "", "doi": "10.1109/IPCC.2011.6087185", "url": "", "keyword": "Design Patterns", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 4.7264628410339355, "umap_y": 9.124452590942383, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 4, "lda_topic_probability": 0.9763140279945378, "lda_topic_words": "patterns, computer, guidelines, field, software, community, terminology, experiment", "nearest_papers": [{"paper_id": "12568f76ff90", "title": "Patterns or claims: do they help in communicating design advice?", "cluster": -1, "distance": 0.37264043774133504}, {"paper_id": "6e7959c82d5f", "title": "The anatomy of HCI design patterns", "cluster": 1, "distance": 0.5861597176992474}, {"paper_id": "a74bec243b7f", "title": "Universal Structural-Semantic Model of Design Patterns", "cluster": -1, "distance": 0.6335875612276759}, {"paper_id": "f0b2517a04a4", "title": "Don't Do That! Hunting Down Visual Design Smells in Complex UIs against Design Guidelines", "cluster": -1, "distance": 0.6940033934936567}, {"paper_id": "9eecf23c4ce7", "title": "Design Heuristics for Web-Based Severe Weather Risk Communication", "cluster": -1, "distance": 0.700040075957117}], "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme."}, {"paper_id": "7d99b05f405e", "title": "Design Patterns for AI-based Systems: A Multivocal Literature Review and Pattern Repository", "authors": "L. Heiland; M. Hauser; J. Bogner", "abstract": "Systems with artificial intelligence components, so-called AI-based systems, have gained considerable attention recently. However, many organizations have issues with achieving production readiness with such systems. As a means to improve certain software quality attributes and to address frequently occurring problems, design patterns represent proven solution blueprints. While new patterns for AI-based systems are emerging, existing patterns have also been adapted to this new context.The goal of this study is to provide an overview of design patterns for AI-based systems, both new and adapted ones. We want to collect and categorize patterns, and make them accessible for researchers and practitioners. To this end, we first performed a multivocal literature review (MLR) to collect design patterns used with AI-based systems. We then integrated the created pattern collection into a web-based pattern repository to make the patterns browsable and easy to find.As a result, we selected 51 resources (35 white and 16 gray ones), from which we extracted 70 unique patterns used for AI-based systems. Among these are 34 new patterns and 36 traditional ones that have been adapted to this context. Popular pattern categories include architecture (25 patterns), deployment (16), implementation (9), or security & safety (9). While some patterns with four or more mentions already seem established, the majority of patterns have only been mentioned once or twice (51 patterns). Our results in this emerging field can be used by researchers as a foundation for follow-up studies and by practitioners to discover relevant patterns for informing the design of AI-based systems.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2023.0", "venue": "", "doi": "10.1109/CAIN58948.2023.00035", "url": "", "keyword": "Design Patterns", "cluster": 0, "cluster_theme_terms": "ai, patterns, review, literature, systematic, generative, demand, decision", "cluster_label_candidate": "Synthesizes Design Patterns into Shared Design Constructs", "cluster_summary_candidate": "This cluster synthesizes prior work on design patterns, emphasizing how a design-knowledge construct is made explicit, organized, or put to work rather than only where it is applied. Related knowledge forms include Design Knowledge, Design Principles. The shared move also involves definition and conceptualization and capture and transfer. Its contribution pattern is coded as Methodological, Theoretical, Artifact/System. Application and method terms are supporting facets, especially methods or lenses such as Systematic Review, Design Science. Representative papers include Contestable AI by Design: Towards a Framework; Design Patterns for AI-based Systems: A Multivocal Literature Review and Pattern Repository.", "facet_population_or_context": "", "facet_stakeholder_or_population": "Practitioners, Designers", "facet_method_or_lens": "Systematic Review, Design Science", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "Methodological, Theoretical, Artifact/System", "umap_x": 3.95843768119812, "umap_y": 9.544377326965332, "distance_to_centroid": 0.0913793847625276, "representative_rank": 2, "is_representative_top3": true, "medoid_rank": 2, "lda_topic": 5, "lda_topic_probability": 0.4947864455642956, "lda_topic_words": "patterns, review, visualiza  future research.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2012.0", "venue": "", "doi": "10.1109/PacificVis.2012.6183556", "url": "", "keyword": "Design Patterns", "cluster": 1, "cluster_theme_terms": "visualization, patterns, computer, applications, theories, aesthetics, science, space", "cluster_label_candidate": "Synthesizes Design Theory into Shared Design Constructs", "cluster_summary_candidate": "This cluster synthesizes prior work on design theory, emphasizing how a design-knowledge construct is made explicit, organized, or put to work rather than only where it is applied. Related knowledge forms include Design Patterns, Design Knowledge. The shared move also involves definition and conceptualization and context-specific adaptation. Its contribution pattern is coded as Methodological, Theoretical, Artifact/System. Application and method terms are supporting facets, especially methods or lenses such as Design Science, Prototype, Interview, Case Study and contexts such as Industrial Design, Education / Learning, Sustainability. Representative papers include Towards a unified terminology for sonification and visualization; Thriving Systems Theory: An Emergent Information Systems Design Theory.", "facet_population_or_context": "Industrial Design, Education / Learning, Sustainability", "facet_stakeholder_or_population": "Designers, Developers, Practitioners", "facet_method_or_lens": "Design Science, Prototype, Interview, Case Study", "facet_artifact_or_domain": "Tool, Interface, Prototype, Robot", "facet_contribution_or_outcome": "Methodological, Theoretical, Artifact/System", "umap_x": 2.631106376647949, "umap_y": 7.850043773651123, "distance_to_centroid": 0.5544824992602863, "representative_rank": 11, "is_representative_top3": false, "medoid_rank": 11, "lda_topic": 5, "lda_topic_probability": 0.9735254185042038, "lda_topic_words": "patterns, review, visualization, literature, field ines, games, rationale, educational, formal, engineering, interfaces", "nearest_papers": [{"paper_id": "a1a2a51ae22e", "title": "Incommensurability in design science: Which comes first-Theory or artefact?", "cluster": 1, "distance": 0.4343991405423271}, {"paper_id": "ddcb3ba05227", "title": "Design patterns for sociality in human-robot interaction", "cluster": 1, "distance": 0.5077149842385178}, {"paper_id": "9f9f7295ec8c", "title": "Affordance based design: a relational theory for design", "cluster": 1, "distance": 0.5240774695791726}, {"paper_id": "beaf258777e6", "title": "What is the value of design theory?", "cluster": 1, "distance": 0.5256806267504008}, {"paper_id": "95c2b3d44aff", "title": "Multiple forms of applications and impacts of a design theory -ten years of industrial applications of C-K theory", "cluster": 1, "distance": 0.5336065165226451}], "design_knowledge_form": "Design Theory", "design_knowledge_action": "synthesizes prior work on", "design_knowledge_contribution": "synthesizes prior work on Design Theory"}, {"paper_id": "a74bec243b7f", "title": "Universal Structural-Semantic Model of Design Patterns", "authors": "S. Vlajic; A. Trujic; M. Milic; D. Savic; A. Poledica", "abstract": "This paper introduces the Universal StructuralSemantic Model of Design Patterns (USSMDP), a minimal and formal framework that explicitly separates a pattern's structural skeleton from its semantic and behavioral specification. USSMDP represents structure using Basic Design Pattern Structure of the Solution (BDPSS) and captures semantic intent, responsibilities, and operational relations through Basic Design Pattern Semantic Module (BDPSM). This separation enables unambiguous specification of pattern participants and their roles while remaining independent of implementation details and modeling notation. The approach is demonstrated through full structural-semantic formalizations of three representative GoF patterns - Abstract Factory, Composite, and Observer-covering urn are split into subcomponents. Our taxonomy can be used by researchers to inform study design, by game creators to develop design principles, and by educators to guide collaboration assessment.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2015.0", "venue": "", "doi": "10.1109/GEM.2015.7377203", "url": "", "keyword": "Design principles", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 6.0689191818237305, "umap_y": 6.084216117858887, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 9, "lda_topic_probability": 0.9808486851930658, "lda_topic_words": "patterns, ai, usability, video, visualization, collaboration, science, analysis", "nearest_papers": [{"paper_id": "6f73a944b8d6", "title": "Video collaboratories for research and education: An analysis of collaboration design patterns", "cluster": -1, "distance": 0.22779858846878087}, {"paper_id": "a7e06450729f", "title": "Game Design as an Autonomous Research Subject", "cluster": -1, "distance": 0.587214259407363}, {"paper_id": "2280b868ea5f", "title": "Form and Function: Toward a Better Understanding of Design-Based Games", "cluster": -1, "distance": 0.6414088789434883}, {"paper_id": "ccc616a68c38", "title": "Towards Creating a Body of Evidence-based Interactive Digital Narrative Design Knowledge: Approaches and Challenges", "cluster": -1, "distance": 0.6456103616766011}, {"paper_id": "19dd6ec0253e", "title": "A principle-based philosophical framework for fashion design praxis and education in new design landscapes", "cluster": -1, "distance": 0.8280671493529973}], "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme."}, {"paper_id": "44848ca19e31", "title": "Design Obligations for Software, with Examples from Data Abstraction and Adaptive Systems", "authors": "M. Shaw", "abstract": "Producing a good software design involves not only writing a definition that satisfies the syntax of the chosen language or structural constraints of a design paradigm. It also involves upholding a variety of expectations about the behavior of the system-the semantic expectations. These expectations may apply not only at the code level, but also to more abstract system structures such as software architectures. Such high-level design paradigms provide a vocabulary of components or other constructs and ways to compose those constructs, but not all expressible designs are well-formed, and even well-formed designs may fail to satisfy the expectations of the paradigm. Unfortunately, these expectations are often implicit or documented only informally, so they are challenging to discover, let alone uphold. They may for example, require correct use of complex structures, internal consistency, compliance with external standards, adherence with design principles, etc. Further, the reasons for design decisions that uphold these expectations are often not explicit in the code or other representation of the system. I introduce the idea of design obligations, which are constraints on allowable designs within a given design paradigm that help to assure appropriate use of the paradigm. To illustrate this idea, I discuss design obligations for two paradigms: data abstraction and a class of adaptive based on feedback control.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2025.0", "venue": "", "doi": "10.1109 he heterogeneous principles (such as Nielsen‚Äôs heuristics, ISO 9241 principles, WCAG accessibility recommendations, Shneiderman‚Äôs Eight Golden Rules, Norman‚Äôs design principles, etc.) into a coherent, hierarchical structure. USSF employs two novel mechanisms: (1) artifact-based indexing (APP, SCR, DIA, FRM, CMP, WID) to represent application elements in hierarchical form and (2) inheritance with override rules for systematically applying and adapting standards across different levels of user interface elements. The framework enables traceability, scalability and methodological clarity, supporting both usability evaluation and future integration with automated design tools. The USSF could acts as a composite high-level standard that integrates existing standards, principle, heuristics, established usability and accessibility guidelines into a unified model. An illustrative example demonstrates the framework‚Äôs applicability, while a discussion highlights its benefits, limitations and potential for empirical validation. The USSF thus provides a novel contribution to human-computer interaction by bridging established guidelines and enabling standardized, traceable and adaptable screen design.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2025.0", "venue": "", "doi": "10.1109/CIEES66347.2025.11300084", "url": "", "keyword": "Design principles", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 6.777982711791992, "umap_y": 8.04980754852295, "distance_to_centroid": null, "representativ ledge", "Design methods", "Design principles", "Design rationale", "Design theory"]}</script>
  <script>
    const data = JSON.parse(document.getElementById('payload').textContent);
    const papers = data.papers;
    const palette = ['#f05a71','#4c78a8','#f58518','#54a24b','#b279a2','#72b7b2','#eeca3b','#ff9da6','#9d755d','#59a14f','#edc948','#76b7b2'];
    const colorFor = c => palette[Math.abs(Number(c)) % palette.length];
    const clusterName = c => Number(c) === -1 ? 'Unclustered papers' : `Cluster ${c}`;
    const state = { selected: papers[0]?.paper_id || null };
    const svg = document.getElementById('plot');
    const details = document.getElementById('details');
    const status = document.getElementById('status');

    function initControls() {
      const clusterFilter = document.getElementById('clusterFilter');
      data.clusters.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.cluster;
        opt.textContent = `${clusterName(c.cluster)} (${c.count})`;
        clusterFilter.appendChild(opt);
      });
      ['clusterFilter','repOnly'].forEach(id => {
        document.getElementById(id).addEventListener('input', render);
        document.getElementById(id).addEventListener('change', render);
      });
      renderLegend();
    }

    function filteredPapers() {
      const cluster = document.getElementById('clusterFilter').value;
      const repOnly = document.getElementById('repOnly').checked;
      return papers.filter(p => {
        return (cluster === 'all' || String(p.cluster) === cluster) &&
          (!repOnly || p.is_representative_top3);
      });
    }

    function renderLegend() {
      const legend = document.getElementById('legend');
      legend.innerHTML = '';
      data.clusters.forEach(c => {
        const item = document.createElement('span');
        item.className = 'legend-item';
        item.innerHTML = `<span class="swatch" style="background:${colorFor(c.cluster)}"></span> ${clusterName(c.cluster)}: ${escapeHtml(c.label || c.theme)}`;
        legend.appendChild(item);
      });
      const shapeNote = document.createElement('span');
      shapeNote.className = 'legend-item';
      shapeNote.innerHTML = '<span>◆ Discussion detected</span><span>● No explicit discussion</span>';
      legend.appendChild(shapeNote);
    }

    function render() {
      const shown = filteredPapers();
      status.textContent = `${shown.length} of ${papers.length} papers shown; ${data.clusters.length} clusters in this view. Axes are UMAP 1 and UMAP 2 coordinates, not interpretable variables. Use "Top-3 reps only" to filter representative papers.`;
      drawPlot(shown);
      renderDetails(papers.find(p => p.paper_id === state.selected) || shown[0] || papers[0]);
    }

    function drawPlot(shown) {
      const width = svg.clientWidth || 900;
      const height = svg.clientHeight || 560;
      const pad = 44;
      const xs = papers.map(p => p.umap_x), ys = papers.map(p => p.umap_y);
      let minX = Math.min(...xs), maxX = Math.max(...xs), minY = Math.min(...ys), maxY = Math.max(...ys);
      const xRange = Math.max(0.0001, maxX - minX);
      const yRange = Math.max(0.0001, maxY - minY);
      minX -= xRange * 0.08;
      maxX += xRange * 0.08;
      minY -= yRange * 0.08;
      maxY += yRange * 0.08;
      const sx = x => pad + ((x - minX) / Math.max(0.0001, maxX - minX)) * (width - pad * 2);
      const sy = y => height - pad - ((y - minY) / Math.max(0.0001, maxY - minY)) * (height - pad * 2);
      const shownIds = new Set(shown.map(p => p.paper_id));
      svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
      svg.innerHTML = '';
      for (let i = 0; i < 6; i++) {
        const x = pad + i * (width - pad * 2) / 5;
        const y = pad + i * (height - pad * 2) / 5;
        svg.insertAdjacentHTML('beforeend', `<line class="axis" x1="${x}" y1="${pad}" x2="${x}" y2="${height-pad}"></line>`);
        svg.insertAdjacentHTML('beforeend', `<line class="axis" x1="${pad}" y1="${y}" x2="${width-pad}" y2="${y}"></line>`);
      }
      svg.insertAdjacentHTML('beforeend', `<text x="${width / 2}" y="${height - 8}" text-anchor="middle" fill="#65758b" font-size="12">UMAP 1</text>`);
      svg.insertAdjacentHTML('beforeend', `<text x="16" y="${height / 2}" text-anchor="middle" fill="#65758b" font-size="12" transform="rotate(-90 16 ${height / 2})">UMAP 2</text>`);
      papers.forEach(p => {
        const visible = shownIds.has(p.paper_id);
        const selected = p.paper_id === state.selected;
        const x = sx(p.umap_x), y = sy(p.umap_y);
        const size = selected ? 7.5 : 6.5;
        const cls = `point ${visible ? '' : 'dim'} ${selected ? 'selected' : ''}`;
        const fill = colorFor(p.cluster);
        const node = document.createElementNS('http://www.w3.org/2000/svg', p.discussion_found ? 'path' : 'circle');
        node.setAttribute('class', cls);
        node.setAttribute('fill', fill);
        if (p.discussion_found) {
          const d = `M ${x} ${y - size} L ${x + size} ${y} L ${x} ${y + size} L ${x - size} ${y} Z`;
          node.setAttribute('d', d);
        } else {
          node.setAttribute('cx', x);
          node.setAttribute('cy', y);
          node.setAttribute('r', size);
        }
        node.addEventListener('click', () => {
          state.selected = p.paper_id;
          render();
        });
        node.appendChild(document.createElementNS('http://www.w3.org/2000/svg', 'title')).textContent = p.title;
        svg.appendChild(node);
      });
    }

    function renderDetails(p) {
      if (!p) return;
      const doi = p.doi ? `<a class="paper-link" href="https://doi.org/${escapeHtml(p.doi)}" target="_blank">DOI: ${escapeHtml(p.doi)}</a>` : '';
      const url = p.url ? `<a class="paper-link" href="${escapeAttr(p.url)}" target="_blank">Open paper URL</a>` : '';
      const nearest = (p.nearest_papers || []).map(n =>
        `<a class="paper-link" href="#" data-paper="${escapeAttr(n.paper_id)}">${clusterName(n.cluster)}, distance ${Number(n.distance).toFixed(3)}: ${escapeHtml(n.title)}</a>`
      ).join('');
      const discussionSummary = p.discussion_summary ?
        `<div class="section-title">Discussion Summary</div>${renderDiscussionSummary(p.discussion_summary)}` : '';
      const discussionExcerpt = '';
      const discussionStatus = p.discussion_found ?
        `<span class="pill">Discussion detected: ${p.discussion_paragraph_count} paragraphs</span>` :
        `<span class="pill">No explicit Discussion section detected</span>`;
      details.innerHTML = `
        <h2>${escapeHtml(p.title)}</h2>
        <div class="meta">${escapeHtml(p.authors)}<br>${escapeHtml(p.year)} · ${escapeHtml(p.venue)}</div>
        <span class="pill">${clusterName(p.cluster)}</span>
        <span class="pill">${escapeHtml(p.keyword)}</span>
        <span class="pill">Rep rank ${p.representative_rank}</span>
        <span class="pill">Medoid rank ${p.medoid_rank}</span>
        <span class="pill">LDA topic ${p.lda_topic} (${Math.round(p.lda_topic_probability * 100)}%)</span>
        ${discussionStatus}
        <div class="section-title">Cluster Label Candidate</div>
        <div class="abstract">${escapeHtml(p.cluster_label_candidate)}</div>
        <div class="section-title">Cluster Summary Candidate</div>
        <div class="abstract">${escapeHtml(p.cluster_summary_candidate)}</div>
        <div class="section-title">Design-Knowledge Contribution</div>
        <div>
          <span class="pill">Form: ${escapeHtml(p.design_knowledge_form || 'n/a')}</span>
          <span class="pill">Action: ${escapeHtml(p.design_knowledge_action || 'n/a')}</span>
        </div>
        <div class="abstract">${escapeHtml(p.design_knowledge_contribution || '')}</div>
        <div class="section-title">Paper-Oriented Facets</div>
        <div>
          <span class="pill">Context/Domain: ${escapeHtml(p.facet_population_or_context || 'n/a')}</span>
          <span class="pill">Population/Stakeholder: ${escapeHtml(p.facet_stakeholder_or_population || 'n/a')}</span>
          <span class="pill">Method/Lens: ${escapeHtml(p.facet_method_or_lens || 'n/a')}</span>
          <span class="pill">Artifact/System: ${escapeHtml(p.facet_artifact_or_domain || 'n/a')}</span>
          <span class="pill">Contribution Type: ${escapeHtml(p.facet_contribution_or_outcome || 'n/a')}</span>
        </div>
        <details class="lexical-evidence">
          <summary>Show lexical evidence</summary>
          <div class="evidence-block">
            <div class="section-title">Cluster Theme Evidence</div>
            <div class="abstract">${escapeHtml(p.cluster_theme_terms)}</div>
            <div class="section-title">Secondary Topic-Model Evidence</div>
            <div class="abstract">${escapeHtml(p.lda_topic_words)}</div>
          </div>
        </details>
        <div class="section-title">Abstract</div>
        <div class="abstract">${escapeHtml(p.abstract)}</div>
        ${discussionSummary}
        ${discussionExcerpt}
        <div class="section-title">Links</div>
        ${doi}${url}
        <div class="section-title">Nearest Papers by Cosine Distance</div>
        ${nearest || '<div class="meta">No nearest-paper data available.</div>'}
      `;
      details.querySelectorAll('[data-paper]').forEach(a => {
        a.addEventListener('click', evt => {
          evt.preventDefault();
          state.selected = a.getAttribute('data-paper');
          render();
        });
      });
      details.scrollTop = 0;
    }

    function renderDiscussionSummary(value) {
      const items = String(value || '').split('\n').map(line => line.replace(/^[-•]\s*/, '').trim()).filter(Boolean);
      if (!items.length) return '<div class="meta">No discussion summary available.</div>';
      return `<ul class="discussion-list">${items.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`;
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    }
    function escapeAttr(value) { return escapeHtml(value).replace(/`/g, '&#96;'); }

    initControls();
    render();
    window.addEventListener('resize', render);
  </script>
