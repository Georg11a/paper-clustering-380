SE , HIDE , SEPARATE , AGGREGATE , INFORM , CONTROL , ENFORCE , and DEMONSTRATE . The strategies also provide a useful classiÔ¨Åcation of privacy design patterns and the underlying privacy enhancing technologies. We therefore believe that these privacy design strategies are not only useful when designing privacy friendly systems, but also helpful when evaluating the privacy impact of existing IT systems.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2014", "venue": "IFIP Advances in Information and Communication Technology", "doi": "", "url": "https://www.semanticscholar.org/paper/83a4fbd1050484c5a9c2242d844bef1cc34ac89c", "keyword": "Design Patterns", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": -1.830378770828247, "umap_y": 7.88005256652832, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 6, "lda_topic_probability": 0.8279395009862569, "lda_topic_words": "literature, review, concept, management, systematic, analysis, ai, theories", "nearest_papers": [{"paper_id": "d0a17557440f", "title": "Avoiding virtual dystopia: A design theory for emancipatory participatory immersive platforms", "cluster": 1, "distance": 0.4769069261290758}, {"paper_id": "774e05395765", "title": "Understanding and using patterns in software development", "cluster": 9, "distance": 0.5619760467114068}, {"paper_id": "44848ca19e31", "title": "Design Obligations for Software, with Examples from Data Abstraction and Adaptive Systems", "cluster": -1, "distance": 0.6203323129118743}, {"paper_id": "02381ea80183", "title": "A design theory for data quality tools in data ecosystems: Findings from three industry cases", "cluster": 6, "distance": 0.6279200716451019}, {"paper_id": "f6ba28a6efeb", "title": "ON the HIERARCHICAL LEVELS of DESIGN KNOWLEDGE", "cluster": -1, "distance": 0.630527477055048}]}, {"paper_id": "77ba97562fe7", "title": "Teachers‚Äô Collaborative Pattern Language Design", "authors": "Ola Knutsson; R. Ramberg", "abstract": "Teachers in their practice make choices grounded in their teaching experience resulting in what could be labelled design solutions. An identified problem is that these design solutions stay at the level of individual solutions and do not reach the teaching community. The aim of this article is to study how teachers¬¥ design solutions can be systematically captured, organized, and communicated through design patterns and a pattern language. Building on participatory design we have together with teachers used and adapted the concept of design patterns and pattern languages as a way of capturing, documenting and communicating design problems and solutions to these. This structured approach led to the teachers seeing connections and interrelations between problems, and that a solution to one of these also helped in alleviating other problems. The formulation of design patterns and proposed pattern languages thus gave the teachers an overview of their practice that would otherwise be difficult to obtain. The content of the design patterns show what problems that are dealt with by the teachers through their design solutions. The structure of the final pattern language shows how problems and solutions are connected to larger goals for the teachers, such as improving the communication with students, as well as the importance of sharing good examples between colleagues.", "discussion_summary": "- Discussion\nDeveloping a pattern language, or languages, for an \n evolving technological and pedagogical landscape, is \na very demanding process.\n- While acknowledging the \n evolving and dynamic context of the teacher, this also \npoints at an emerging need for tools and procedures to \nhandle it.\n- Thus, returning to the more general question \nwe approached in this article of how teachers´ design \nsolutions can be systematically captured, organized, and \ncommunicated, the simple answer would be “by the use of \ndesign patterns and pattern languages”.", "discussion_excerpt": "Discussion\nDeveloping a pattern language, or languages, for an \n evolving technological and pedagogical landscape, is \na very demanding process.", "discussion_found": true, "discussion_paragraph_count": 10, "year": "2018", "venue": "", "doi": "", "url": "https://www.semanticscholar.org/paper/a61eca6d22ff2d451e296be24f69dcfa9aed96fd", "keyword": "Design Patterns", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": -0.8856107592582703, "umap_y": 5.4442572593688965, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 8, "lda_topic_probability": 0.9785681194797956, "lda_topic_words": "patterns, software, engineering, domain, object, architecture, solutions, problems", "nearest_papers": [{"paper_id": "8f065cfd18a4", "title": "Pattern language: A framework for learning", "cluster": -1, "distance": 0.4178785432035391}, {"paper_id": "edde6dc75b19", "title": "The language of design: Theory and computation", "cluster": 3, "distance": 0.4800486409480488}, {"paper_id": "368e4036648e", "title": "From Directional Stimuli to Prompt Architectures: Documenting the Practice of Meta-Prompting", "cluster": -1, "distance": 0.5420389246214483}, {"paper_id": "82f49b5a1905", "title": "SOLUTION REPERTOIRE", "cluster": -1, "distance": 0.5984673268949114}, {"paper_id": "d4ef8c48ded5", "title": "Toward an Inventory of Plans and Patterns, and Their Use to Foster Strategic Knowledge in Programming Novices", "cluster": -1, "distance": 0.601372647088984}]}, {"paper_id": "368e4036648e", "title": "From Directional Stimuli to Prompt Architectures: Documenting the Practice of Meta-Prompting", "authors": "D. Ligot", "abstract": "As large language models (LLMs) transition from experimental tools to core components of production systems, the limitations of ad-hoc, instance-specific prompting have become increasingly apparent. In response, practitioners and researchers have begun to adopt meta-prompting: a family of prompt engineering practices that operate at a higher level of abstraction by defining how prompts themselves should be structured, generated, and governed across classes of tasks. This paper documents and formalizes the practice of meta-prompting as a distinct design paradigm. \n\n We present a unified conceptual definition of meta-prompting, emphasizing its focus on reusable structures, task-level abstraction, and the separation of prompt logic from task content. Building on this definition, we introduce a layered model of prompt abstraction and a comprehensive taxonomy of meta-prompting practices, including framework based prompting, prompt-generation loops, structured prompt representations, reasoning templates, governance layers, and multi-agent orchestration. We further analyze the relationship between meta-prompting and directional stimulus prompting (DSP), positioning meta-prompting as an evolutionary generalization that extends instance-level steering into full prompt architectures.¬†\n\n\n Through concrete design patterns and real-world applications‚Äîranging from enterprise standardization and compliance workflows to agent systems and orchestration frameworks‚Äîwe demonstrate how meta-prompting enables scalable, consistent, and governable LLM deployments. We conclude by discussing key limitations, open challenges, and future research directions, including automated meta-prompt learning, formal evaluation metrics, and integration with LLM operations. Together, these contributions position meta-prompting as a foundational paradigm for the design and operation of modern AI systems.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2026", "venue": "Social Science Research Network", "doi": "", "url": "https://www.semanticscholar.org/paper/cc6622c7b5aec35fb3b4174aa730a28c6c5c0844", "keyword": "Design Patterns", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": -0.8059766888618469, "umap_y": 5.528439521789551, "distance_to_centroid": null, "representative_ran n patterns, and capture the positive psychophysiological and cognitive benefits afforded by biophilia in our design interventions.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2014", "venue": "", "doi": "", "url": "https://www.semanticscholar.org/paper/f2f43cc85573cfe8f7a2770354fbea84c95e0f36", "keyword": "Design Patterns", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": -1.7234458923339844, "umap_y": 3.095057725906372, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 8, "lda_topic_probability": 0.9756718435618512, "lda_topic_words": "patterns, software, engineering, domain, object, architecture, solutions, problems", "nearest_papers": [{"paper_id": "098637c0f9ae", "title": "Pattern design in the context space: paco - a methodological framework for designing auditory display with patterns", "cluster": 9, "distance": 0.3980717884903239}, {"paper_id": "e763873f823a", "title": "Formalising design patterns", "cluster": 9, "distance": 0.45241010453317365}, {"paper_id": "c7ed46400a28", "title": "Exploring the design space of composite visualization", "cluster": 6, "distance": 0.5027725680473998}, {"paper_id": "3524dd73bb30", "title": "Design Patterns of Biological Cells", "cluster": 9, "distance": 0.5120332656504056}, {"paper_id": "35874d939f8d", "title": "Patterns, anticipation and participatory futures", "cluster": 9, "distance": 0.5156313634311164}]}, {"paper_id": "6ea89aad84f6", "title": "Development of Sustainable Integrated Design Framework for Stream Restoration", "authors": "Kidoo Park; Kil-Seong Lee", "abstract": "This study analyzed the elements of previously published stream restoration guidelines by clarifying the definition of stream restoration classified for various purposes. The purpose of this study was to establish a sustainable integrated design framework for stream restoration that supplemented the limited scope of application and the resulting problems. Stream restoration procedures were established using the method of securing water resources applied with the integrated watershed management in order to effectively and feasibly recover the modified stream, to resolve the water shortage problem, and to effectively restore the ecosystem due to climate change. An 11-step stream restoration procedure was established in three phases including the pre-restoration design phase, the restoration design phase, and the detailed design phase. Furthermore, the three stages were classified into hydrologic and hydraulic plan, geomorphic and sediment transport plan, and ecological and environmental plan depending on the direction of stream restoration, and the procedure for stream restoration was proposed to prevent river restoration from being biased toward a specific goal. An integrated design framework for stream restoration could be established by allowing the proposed stream restoration design procedures (e.g., three phases and three plans) and the elements to be carried out using numerical models for an effective design in establishing river restoration plans. Lastly, it was possible to quantify the problems of existing stream restoration by applying this stream restoration framework to the existing river restoration project and guideline report. As a result, the ex esign patterns", "cluster": 9, "distance": 0.6356501435594344}, {"paper_id": "85c3a6761bcc", "title": "Designing Process Guidance Systems", "cluster": -1, "distance": 0.6923451948554936}]}, {"paper_id": "f941f0424e1a", "title": "Design Rules, Volume 2: Chapter 6‚ÄîThe Value Structure of Technologies, Part 1: Mapping Functional Components", "authors": "Carliss Y. Baldwin", "abstract": "The purpose of this chapter is to build a robust and versatile language that is capable of representing the value structure of large technical systems. The language is based on elements I have labeled functional components. The language is more abstract than the language of technical recipes and task networks, thus it is capable of hiding details. However, the language also makes it possible to ‚Äútrace back‚Äù from each named functional component to a technical recipe and a corresponding task network. Finally, although the language itself is non-mathematical, the value structure it reveals can be used to specify equations and prove mathematical propositions about the value of technical systems. \n \nThe plan of the chapter as follows. I first explain why it is difficult to value technologies using standard economic methods based prices, quanities and probabilities. I then describe a methodology that shows how functional components are combined through technology to create a particular artifact or technical system. The methodology uses symbolic notation to clarify relationships between and among functional components. I illustrate these relationships using an ancient technology‚Äîthe technology for making a garment from pieces of cloth. I go on to describe commonly observed patterns within technical systems, including optional features; composite functions; and platforms.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2020", "venue": "Social Science Research Network", "doi": "", "url": "https://www.semanticscho ory of Sonification", "authors": "M. Nees", "abstract": "Despite over 25 years of intensive work in the field, sonification research and practice continue to be hindered by a lack of theory. In part, sonification theory has languished, because the requirements of a theory of sonification have not been clearly articulated. As a design science, sonification deals with artifacts‚Äîartificially created sounds and the tools for creating the sounds. Design fields require theoretical approaches that are different from theory-building in natural sciences. Gregor and Jones [1] described eight general components of design theories: (1) purposes and scope; (2) constructs; (3) principles of form and function; (4) artifact mutability; (5) testable propositions; (6) justificatory knowledge; (7) principles of implementation; and (8) expository instantiations. In this position paper, I examine these components as they relate to the field of sonification and use these components to clarify requirements for a theory of sonification. The current status of theory in sonification is assessed as it relates to each component, and, where possible, recommendations are offered for practices that can advance theory and theoretically-motivated research and practice in the field of sonification.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2019", "venue": "Proceedings of the 25th International Conference on Auditory Display (ICAD 2019)", "doi": "", "url": "https://www.semanticscholar.org/paper/5e41b7e4f9a1804f3369a8815558f7989daff1df", "keyword": "Design theory", "cluster": 6, "cluster_theme_terms": "visualization, sonification, aesthetics, theories, method theory, thriving, science, technical", "cluster_label_candidate": "Cluster 6: Design Theory through definition and conceptual framing", "distinguishing_evidence_terms": "Method Theory, Design Science, Comes First-theory, Unified Terminology", "cluster_summary_candi mon terminology. While the identified terminology can support audio-visual analytics research, it also provides a new perspective on sonification theory itself.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2023", "venue": "Personal and Ubiquitous Computing", "doi": "", "url": "https://www.semanticscholar.org/paper/79f758f21333f7a0a552329d1b8ad8cf8bfd0154", "keyword": "Design theory", "cluster": 6, "cluster_theme_terms": "visualization, sonification, aesthetics, theories, method theory, thriving, science, technical", "cluster_label_candidate": "Cluster 6: Design Theory through definition and conceptual framing", "distinguishing_evidence_terms": "Method Theory, Design Science, Comes First-theory, Unified Terminology", "cluster_summary_candidate": "Within this keyword view, this cluster is set apart by Comes First-theory, Unified Terminology. Its dominant move, definition and conceptualization of design theory, is shared across most of this view, so the distinguishing terms above carry the interpretive weight. Representative papers: Eight Components of a Design Theory of Sonification; Web-based information systems: Developing a design theory.", "design_knowledge_form": "Design Theory", "design_knowledge_action": "defines and conceptualizes", "design_knowledge_role": "Conceptual Framework", "design_knowledge_contribution": "defines and conceptualizes Design Theory", "facet_population_or_context": "Education / Learning", "facet_stakeholder_or_population": "Designers", "facet_method_or_lens": "Design Science", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "Theoretical, Methodological, Artifact/System", "umap_x": -1.6476508378982544, "umap_y": 8.731900215148926, "distance_to_centroid": 0.3397166182741891, "representative_rank": 6, "is_representative_top3": false, "medoid_rank": 6, "lda_topic": 6, "lda_topic_probability": 0.9804323022491576, "lda_topic_words": "literature, review, concept, management, systematic, analysis, ai, theories", "nearest_papers": [{"paper_id": "4e727e38805c", "title": "Visualization Atlases: Explaining and Exploring Complex Topics Through Data, Visualization, and Narration", "cluster": 6, "distance": 0.1947364245548493}, {"paper_id": "ee0a5b26f6dc", "title": "Formalizing Visualization Design Knowledge as Constraints: Actionable and Extensible Models in Draco", "cluster": 6, "distance": 0.3864216044124865}, {"paper_id": "50c94f5857d8", "title": "Eight Components of a Design Theory of Sonification", "cluster": 6, "distance": 0.38661252370161125}, {"paper_id": "02381ea80183", "title": "A design theory for data quality tools in data ecosystems: Findings from three industry cases", "cluster": 6, "distance": 0.3982136135846882}, {"paper_id": "75f43821c56f", "title": "Towards a Model of Information Aesthetics in Information Visualization", "cluster": 6, "distance": 0.43548340662027574}]}, {"paper_id": "3f7b5dc9fc40", "title": "Concerning the Epistemology of Design: The Role of the Eco-Cognitive Model of Abduction in Pragmatism", "authors": "Alger Sans Pinillos; A. Estany", "abstract": "Design has usually been linked to art and applied in scenarios related to everyday life. Even when design has, on occasion, made its way into the world of academia, it has always been closely linked to art and scenarios related everyday life. At last, however, the idea of design has reached the field of epistemology: an area within the very heart of philosophy that has always focused, in theory, on the foundations of knowledge. Consequently, design is being studied from different approaches interested in the foundation of knowledge, theoretical and practical. This is one of the reasons why abduction and pragmatism have been considered relevant from a design perspective. This paper first shows the main features of abduction and pragmatism, describes their evolution and considers their mutual implications. Second, the epistemology of design is analysed considering its most relevant characteristics. Third, the connection between abduction and, on the one hand, pragmatism and, on the other, design epistemology is addressed. Finally, the role of abductive inference in grounding a real epistemology for design theory from the naturalised cognitive perspective of abduction is outlined. The central proposition is that this approach is essential as a methodological innovation, as it allows us to analyse both the inquiry process and the design process as interdependent when dealing with practical problems of a social and cultural nature. This approach allows us to analyse how human actions determine changes in the theoretical framework from which we make our inquiry. In short, the world is an open-ended project that humans design through our daily inquiry.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2023", "venue": "Philosophies", "doi": "", "url": "https://www.semanticscholar.org/paper/7e135cc8cc3f2977f008136b33bf88e38576edcc", "keyword": "Design theory", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 1.0722010135650635, "umap_y": 5.439009666442871, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 0, "lda_topic_probability": 0.9790669711735672, "lda_to  in Recursive Design", "authors": "Evan Barba", "abstract": "Abstract The concept of scale is shared between systems science and design and, as a foundational element for systemic design theory and practice, provides a way to connect and share units of analysis between disciplines. To better connect these disciplines and begin a more rigorous, shared investigation of scale and hierarchy, I will illuminate the need and potential of a more explicit use of scale in problem formulation, theory and methods discussion, and design education. By discussing one well-known case study of sustainable design, I demonstrate how the designers‚Äô process can be deconstructed using scale as an organizing concept. I then apply this analytical technique to the mundane example of a cup of coffee, to demonstrate some of the important generalizable properties of multiscale thinking in design. The most notable of these is the notion of cognitive point of view, which is grounded in second-order cybernetics and operates as a construct useful for understanding the dynamics between designer, design process, and designed object. Finally, the article argues that the concepts and topics found here should be taught explicitly to design students in practical ways, and researched formally as a subfield within the systemic design community as a method for recursive design.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2019", "venue": "She Ji: The Journal of Design, Economics and Innovation", "doi": "", "url": "https://www.semanticscholar.org/paper/cd9c2c3812ad8a7feccea4741cea6b98dd33a007", "keyword": "Design theory", "cluster": 0, "cluster_theme_terms": "practice, encounters, floorplan, method case, virtual, entrepreneurship, commissioning, flexibility", "cluster_label_candidate": "Cluster 0: Design Theory through definition and conceptual framing around Education / Learning", "distinguishing_evidence_terms": "Rough Mile, C ay in which design principles can be developed, improved and used to predict desired outcomes is discussed.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2021", "venue": "IOP Conference Series: Materials Science and Engineering", "doi": "", "url": "https://www.semanticscholar.org/paper/e2e838097c3370c8b6bf8c86a344609304d86bac", "keyword": "Design theory", "cluster": 5, "cluster_theme_terms": "games, ecc, instructional, collaboration, methodology, practices, cognitive architecture, player", "cluster_label_candidate": "Cluster 5: Design Theory through definition and conceptual framing around Game", "distinguishing_evidence_terms": "Design Science, Program Concerns, Horizontal Extension, Cognitive Architecture", "cluster_summary_candidate": "Within this keyword view, this cluster is set apart by Program Concerns, Horizontal Extension, Cognitive Architecture. Its dominant move, definition and conceptualization of design theory, is shared across most of this view, so the distinguishing terms above carry the interpretive weight. Its contribution coding (Methodological, Empirical, Theoretical) also departs from the view majority. Representative papers: Collaboration Engineering Methodology: Horizontal Extension to Accommodate Project and Program Concerns; The ECC Methodology for Architecture Design Theory and Practices Research.", "design_knowledge_form": "Design Theory", "design_knowledge_action": "defines and conceptualizes", "design_knowledge_role": "Conceptual Framework", "design_knowledge_contribution": "defines and conceptualizes Design Theory", "facet_population_or_context": "Education / Learning", "facet_stakeholder_or_population": "Players", "facet_method_or_lens": "", "facet_artifact_or_domain": "Game", "facet_contribution_or_outcome": "Methodological, Empirical, Theoretical", "umap_x": 1.3737494945526123, "umap_y": 4.885493278503418, "distance_to_centroid": 0.2587195399288099, "represen   <script>
    const data = JSON.parse(document.getElementById('payload').textContent);
    const papers = data.papers;
    const palette = ['#f05a71','#4c78a8','#f58518','#54a24b','#b279a2','#72b7b2','#eeca3b','#ff9da6','#9d755d','#59a14f','#edc948','#76b7b2'];
    const colorFor = c => palette[Math.abs(Number(c)) % palette.length];
    const clusterName = c => Number(c) === -1 ? 'Unclustered papers' : `Cluster ${c}`;
    const clusterLegendLabel = c => {
      const label = String(c.label || c.theme || '').trim();
      if (!label) return clusterName(c.cluster);
      return /^Cluster\s+-?\d+:/i.test(label) ? label : `${clusterName(c.cluster)}: ${label}`;
    };
    const state = { selected: papers[0]?.paper_id || null };
    const svg = document.getElementById('plot');
    const details = document.getElementById('details');
    const status = document.getElementById('status');

    function initControls() {
      const clusterFilter = document.getElementById('clusterFilter');
      data.clusters.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.cluster;
        opt.textContent = `${clusterName(c.cluster)} (${c.count})`;
        clusterFilter.appendChild(opt);
      });
      ['clusterFilter','repOnly'].forEach(id => {
        document.getElementById(id).addEventListener('input', render);
        document.getElementById(id).addEventListener('change', render);
      });
      renderLegend();
    }

    function filteredPapers() {
      const cluster = document.getElementById('clusterFilter').value;
      const repOnly = document.getElementById('repOnly').checked;
      return papers.filter(p => {
        return (cluster === 'all' || String(p.cluster) === cluster) &&
          (!repOnly || p.is_representative_top3);
      });
    }

    function renderLegend() {
      const legend = document.getElementById('legend');
      legend.innerHTML = '';
      data.clusters.forEach(c => {
        const item = document.createElement('span');
        item.className = 'legend-item';
        item.innerHTML = `<span class="swatch" style="background:${colorFor(c.cluster)}"></span> ${escapeHtml(clusterLegendLabel(c))}`;
        legend.appendChild(item);
      });
      const shapeNote = document.createElement('span');
      shapeNote.className = 'legend-item';
      shapeNote.innerHTML = '<span>◆ Discussion detected</span><span>● No explicit discussion</span>';
      legend.appendChild(shapeNote);
    }

    function render() {
      const shown = filteredPapers();
      status.textContent = `${shown.length} of ${papers.length} papers shown; ${data.clusters.length} clusters in this view. Axes are UMAP 1 and UMAP 2 coordinates, not interpretable variables. Use "Top-3 reps only" to filter representative papers.`;
      drawPlot(shown);
      renderDetails(papers.find(p => p.paper_id === state.selected) || shown[0] || papers[0]);
    }

    function drawPlot(shown) {
      const width = svg.clientWidth || 900;
      const height = svg.clientHeight || 560;
      const pad = 44;
      const xs = papers.map(p => p.umap_x), ys = papers.map(p => p.umap_y);
      let minX = Math.min(...xs), maxX = Math.max(...xs), minY = Math.min(...ys), maxY = Math.max(...ys);
      const xRange = Math.max(0.0001, maxX - minX);
      const yRange = Math.max(0.0001, maxY - minY);
      minX -= xRange * 0.08;
      maxX += xRange * 0.08;
      minY -= yRange * 0.08;
      maxY += yRange * 0.08;
      const sx = x => pad + ((x - minX) / Math.max(0.0001, maxX - minX)) * (width - pad * 2);
      const sy = y => height - pad - ((y - minY) / Math.max(0.0001, maxY - minY)) * (height - pad * 2);
      const shownIds = new Set(shown.map(p => p.paper_id));
      svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
      svg.innerHTML = '';
      for (let i = 0; i < 6; i++) {
        const x = pad + i * (width - pad * 2) / 5;
        const y = pad + i * (height - pad * 2) / 5;
        svg.insertAdjacentHTML('beforeend', `<line class="axis" x1="${x}" y1="${pad}" x2="${x}" y2="${height-pad}"></line>`);
        svg.insertAdjacentHTML('beforeend', `<line class="axis" x1="${pad}" y1="${y}" x2="${width-pad}" y2="${y}"></line>`);
      }
      svg.insertAdjacentHTML('beforeend', `<text x="${width / 2}" y="${height - 8}" text-anchor="middle" fill="#65758b" font-size="12">UMAP 1</text>`);
      svg.insertAdjacentHTML('beforeend', `<text x="16" y="${height / 2}" text-anchor="middle" fill="#65758b" font-size="12" transform="rotate(-90 16 ${height / 2})">UMAP 2</text>`);
      papers.forEach(p => {
        const visible = shownIds.has(p.paper_id);
        const selected = p.paper_id === state.selected;
        const x = sx(p.umap_x), y = sy(p.umap_y);
        const size = selected ? 7.5 : 6.5;
        const cls = `point ${visible ? '' : 'dim'} ${selected ? 'selected' : ''}`;
        const fill = colorFor(p.cluster);
        const node = document.createElementNS('http://www.w3.org/2000/svg', p.discussion_found ? 'path' : 'circle');
        node.setAttribute('class', cls);
        node.setAttribute('fill', fill);
        if (p.discussion_found) {
          const d = `M ${x} ${y - size} L ${x + size} ${y} L ${x} ${y + size} L ${x - size} ${y} Z`;
          node.setAttribute('d', d);
        } else {
          node.setAttribute('cx', x);
          node.setAttribute('cy', y);
          node.setAttribute('r', size);
        }
        node.addEventListener('click', () => {
          state.selected = p.paper_id;
          render();
        });
        node.appendChild(document.createElementNS('http://www.w3.org/2000/svg', 'title')).textContent = p.title;
        svg.appendChild(node);
      });
    }

    function renderDetails(p) {
      if (!p) return;
      const doi = p.doi ? `<a class="paper-link" href="https://doi.org/${escapeHtml(p.doi)}" target="_blank">DOI: ${escapeHtml(p.doi)}</a>` : '';
      const url = p.url ? `<a class="paper-link" href="${escapeAttr(p.url)}" target="_blank">Open paper URL</a>` : '';
      const nearest = (p.nearest_papers || []).map(n =>
        `<a class="paper-link" href="#" data-paper="${escapeAttr(n.paper_id)}">${clusterName(n.cluster)}, distance ${Number(n.distance).toFixed(3)}: ${escapeHtml(n.title)}</a>`
      ).join('');
      const discussionSummary = p.discussion_summary ?
        `<div class="section-title">Discussion Summary</div>${renderDiscussionSummary(p.discussion_summary)}` : '';
      const discussionExcerpt = '';
      const discussionStatus = p.discussion_found ?
        `<span class="pill">Discussion detected: ${p.discussion_paragraph_count} paragraphs</span>` :
        `<span class="pill">No explicit Discussion section detected</span>`;
      details.innerHTML = `
        <h2>${escapeHtml(p.title)}</h2>
        <div class="meta">${escapeHtml(p.authors)}<br>${escapeHtml(p.year)} · ${escapeHtml(p.venue)}</div>
        <span class="pill">${clusterName(p.cluster)}</span>
        <span class="pill">${escapeHtml(p.keyword)}</span>
        <span class="pill">Rep rank ${p.representative_rank}</span>
        <span class="pill">Medoid rank ${p.medoid_rank}</span>
        <span class="pill">LDA topic ${p.lda_topic} (${Math.round(p.lda_topic_probability * 100)}%)</span>
        ${discussionStatus}
        <div class="section-title">Cluster Descriptor</div>
        <div class="abstract">${escapeHtml(p.cluster_label_candidate)}</div>
        <div class="section-title">Distinguishing Evidence</div>
        <div class="abstract">${escapeHtml(p.distinguishing_evidence_terms || p.cluster_theme_terms || 'n/a')}</div>
        <div class="section-title">Cluster Summary Candidate</div>
        <div class="abstract">${escapeHtml(p.cluster_summary_candidate)}</div>
        <div class="section-title">Design-Knowledge Contribution</div>
        <div>
          <span class="pill">Form: ${escapeHtml(p.design_knowledge_form || 'n/a')}</span>
          <span class="pill">Action: ${escapeHtml(p.design_knowledge_action || 'n/a')}</span>
          <span class="pill">Auto role: ${escapeHtml(p.design_knowledge_role || 'n/a')}</span>
        </div>
        <div class="abstract">${escapeHtml(p.design_knowledge_contribution || '')}</div>
        <div class="section-title">Paper-Oriented Facets</div>
        <div>
          <span class="pill">Context/Domain: ${escapeHtml(p.facet_population_or_context || 'n/a')}</span>
          <span class="pill">Population/Stakeholder: ${escapeHtml(p.facet_stakeholder_or_population || 'n/a')}</span>
          <span class="pill">Method/Lens: ${escapeHtml(p.facet_method_or_lens || 'n/a')}</span>
          <span class="pill">Artifact/System: ${escapeHtml(p.facet_artifact_or_domain || 'n/a')}</span>
          <span class="pill">Contribution Type: ${escapeHtml(p.facet_contribution_or_outcome || 'n/a')}</span>
        </div>
        <details class="lexical-evidence">
          <summary>Show lexical evidence</summary>
          <div class="evidence-block">
            <div class="section-title">Cluster Theme Evidence</div>
            <div class="abstract">${escapeHtml(p.cluster_theme_terms)}</div>
            <div class="section-title">Secondary Topic-Model Evidence</div>
            <div class="abstract">${escapeHtml(p.lda_topic_words)}</div>
          </div>
        </details>
        <div class="section-title">Abstract</div>
        <div class="abstract">${escapeHtml(p.abstract)}</div>
        ${discussionSummary}
        ${discussionExcerpt}
        <div class="section-title">Links</div>
        ${doi}${url}
        <div class="section-title">Nearest Papers by Cosine Distance</div>
        ${nearest || '<div class="meta">No nearest-paper data available.</div>'}
      `;
      details.querySelectorAll('[data-paper]').forEach(a => {
        a.addEventListener('click', evt => {
          evt.preventDefault();
          state.selected = a.getAttribute('data-paper');
          render();
        });
      });
      details.scrollTop = 0;
    }

    function renderDiscussionSummary(value) {
      const items = String(value || '').split('\n').map(line => line.replace(/^[-•]\s*/, '').trim()).filter(Boolean);
      if (!items.length) return '<div class="meta">No discussion summary available.</div>';
      return `<ul class="discussion-list">${items.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`;
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    }
    function escapeAttr(value) { return escapeHtml(value).replace(/`/g, '&#96;'); }

    initControls();
    render();
    window.addEventListener('resize', render);
  </script>
</body>
</html>
