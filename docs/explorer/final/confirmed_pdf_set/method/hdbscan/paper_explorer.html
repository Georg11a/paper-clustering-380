<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paper Corpus Explorer (tfidf-svd, hdbscan, method view)</title>
  <style>
    :root {
      --ink: #253858;
      --muted: #65758b;
      --line: #d8e0ea;
      --bg: #f7f9fc;
      --panel: #ffffff;
      --accent: #2f7dd1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }
    header {
      padding: 18px 24px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }
    h1 { margin: 0; font-size: 22px; letter-spacing: 0; min-width: 0; }
    .controls {
      display: grid;
      grid-template-columns: 180px 210px;
      gap: 10px;
      align-items: center;
    }
    input, select, button {
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 10px;
      background: white;
      color: var(--ink);
      font-size: 14px;
    }
    button { background: var(--accent); color: white; border-color: var(--accent); cursor: pointer; }
    label.toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
    }
    label.toggle input { width: 16px; height: 16px; }
    main {
      display: grid;
      grid-template-columns: minmax(560px, 1fr) minmax(420px, 460px);
      gap: 14px;
      padding: 14px;
      min-height: calc(100vh - 92px);
      align-items: stretch;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .plot-panel { display: grid; grid-template-rows: auto 1fr auto; height: calc(100vh - 120px); min-height: 690px; }
    .status {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
    }
    svg { width: 100%; height: 100%; min-height: 560px; background: #fbfcfe; }
    .axis { stroke: #dfe6ef; stroke-width: 1; }
    .point { stroke: white; stroke-width: 1.5; cursor: pointer; opacity: 0.88; }
    .point.dim { opacity: 0.14; }
    .point.selected { stroke: #111827; stroke-width: 3; opacity: 1; }
    .legend, .cluster-list { padding: 10px 12px; border-top: 1px solid var(--line); }
    .legend { max-height: 180px; overflow-y: auto; }
    .legend-items { display: flex; flex-wrap: wrap; gap: 8px 14px; }
    .legend-item { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    .swatch { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .details { padding: 16px; overflow: auto; height: calc(100vh - 120px); min-height: 690px; align-self: stretch; }
    .details h2 { font-size: 18px; margin: 0 0 8px; line-height: 1.25; }
    .meta { color: var(--muted); font-size: 13px; line-height: 1.45; margin-bottom: 12px; }
    .pill {
      display: inline-flex;
      align-items: center;
      margin: 3px 5px 3px 0;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef4fb;
      color: #31577f;
      font-size: 12px;
    }
    .abstract { line-height: 1.5; font-size: 14px; color: #2f3b52; }
    details.discussion-full,
    details.lexical-evidence {
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      background: #fbfcfe;
    }
    details.discussion-full summary,
    details.lexical-evidence summary {
      cursor: pointer;
      color: #31577f;
      font-weight: 700;
      font-size: 13px;
    }
    details.lexical-evidence { margin-top: 16px; }
    .evidence-block { margin-top: 8px; }
    .discussion-list {
      margin: 6px 0 0;
      padding-left: 18px;
      line-height: 1.45;
      font-size: 14px;
      color: #2f3b52;
    }
    .discussion-list li { margin: 0 0 7px; }
    .section-title { margin: 16px 0 6px; font-weight: 700; font-size: 13px; text-transform: uppercase; color: var(--muted); }
    .paper-link { display: block; color: var(--accent); text-decoration: none; margin: 7px 0; font-size: 13px; line-height: 1.35; }
    .cluster-card { border-top: 1px solid var(--line); padding: 10px 12px; }
    .cluster-card button { height: 28px; padding: 0 8px; margin-top: 6px; font-size: 12px; }
    @media (max-width: 980px) {
      header { display: block; }
      h1 { margin-bottom: 12px; }
      .controls, main { grid-template-columns: 1fr; }
      .plot-panel { min-height: 560px; }
    }
  </style>
</head>
<body>

    <h1>Paper Corpus Explorer (tfidf-svd, hdbscan, method view)</h1>

    <aside class="panel details" id="details">
      <h2>Select a paper</h2>
      <p class="meta">Click a point to inspect metadata, cluster theme, LDA topic words, representative rank, and nearest papers.</p>
      <div id="clusterCards"></div>
    </aside>

, "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme."}, {"paper_id": "7ebbe03ea0d8", "title": "Autobiographical design in HCI research: designing and learning through use-it-yourself", "authors": "Neustaedter, Carman and Sengers, Phoebe", "abstract": "Designing a system with yourself as a target user and evaluating the design through your own self-usage is commonly considered a questionable approach in HCI research. Perhaps for this reason, HCI research including extensive self-usage of a design is underdocumented. Yet such self-usage does happen and many researchers have found great value in the lessons learned from it. Our goal in this paper is to bring these hidden practices to light and offer guidelines for how HCI researchers can usefully engage in what we term 'autobiographical design'---design research drawing on extensive, genuine usage by those creating or building a system. Through interviews with HCI experts who have engaged in variations of autobiographical design, we draw out the possibilities and limitations of autobiographical design methods and lay out best practices for its use as an HCI research method.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2012.0", "venue": "Proceedings of the Designing Interactive Systems Conference", "doi": "10.1145/2317956.2318034", "url": "https://doi.org/10.1145/2317956.2318034", "keyword": "Design methods", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x m proves successful, it will provide HRI researchers with basic knowledge about human robot interaction, and save time through the reuse of patterns to achieve high levels of sociality.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2008.0", "venue": "Proceedings of the 3rd ACM/IEEE International Conference on Human Robot Interaction", "doi": "10.1145/1349822.1349836", "url": "https://doi.org/10.1145/1349822.1349836", "keyword": "Design Patterns", "cluster": 1, "cluster_theme_terms": "visualization, patterns, computer, applications, theories, aesthetics, science, space", "cluster_label_candidate": "Synthesizes Design Theory into Shared Design Constructs", "cluster_summary_candidate": "This cluster synthesizes prior work on design theory, emphasizing how a design-knowledge construct is made explicit, organized, or put to work rather than only where it is applied. Related knowledge forms include Design Patterns, Design Knowledge. The shared move also involves definition and conceptualization and context-specific adaptation. Its contribution pattern is coded as Methodological, Theoretical, Artifact/System. Application and method terms are supporting facets, especially methods or lenses such as Design Science, Prototype, Interview, Case Study and contexts such as Industrial Design, Education / Learning, Sustainability. Representative papers include Towards a unified terminology for sonification and visualization; Thriving Systems Theory: An Emergent Information Systems Design Theory.", "facet_population_or_context": "Industrial Design, Education / Learning, Sustainability", "facet_stakeholder_or_population": "Designers, Developers, Practitioners", "facet_method_or_lens": "Design Science, Prototype, Interview, Case Study", "facet_artifact_or_domain": "Tool, Interface, Prototype, Robot", "facet_contribution_or_outcome": "Methodological, Theoretical, Artifact/System", "umap_x": 5.289327621459961, " ework of ethical encounters in design practice, grounded in 98 accounts of practitioners‚Äô experiences with ethics in their work. While HCI and design scholarship have produced a growing body of empirical work on design ethics, less attention has been given to concept-building informed by practice. Building on practice-oriented design ethics research in HCI, we define ethical encounters as practitioner-identified situations that expose tensions and value-laden decisions, emerging from the situated realities of day-to-day design work. Our analysis reveals three key dimensions of these encounters: the perceived issues, the actions taken to navigate them, and the new capacities emerging through them. Our analysis also considers how these dimensions play out differently across project phases. The framework offers a shared language and practical guidance for understanding and engaging with ethical challenges, and it contributes by framing ethical encounters as generative for relationships, ideas, and directions in HCI and design practice.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2026.0", "venue": "Proceedings of the 2026 CHI Conference on Human Factors in Computing Systems", "doi": "10.1145/3772318.3791435", "url": "https://doi.org/10.1145/3772318.3791435", "keyword": "Design Patterns", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 5.604333400726318, "umap_y": 7.729808330535889, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": ution": "Not interpreted as a cluster theme."}, {"paper_id": "d0a936b480d4", "title": "Acquiring educational access for neurodiverse learners through multisensory design principles", "authors": "Puccini, Angela M. and Puccini, Marisa and Chang, Angela", "abstract": "Educational interface designers are in an unprecedented position to facilitate autonomous learning in neurodiverse learners (children with special needs). These learners are particularly in need of special design, given the disproportionate impact it can have on their quality of life and the current vulnerability they experience due to changes in special education law. In response to the urgent conditions facing these students, we construct and define a set of design principles that are grounded in maximizing the potential of these learners by importing the meta-cognitive skills, algorithmic structures, and multiple sensory modalities that are both proven successful in their remediation and uniquely suited to technological design adaptation.We draw from our main author's experience as a heavily remediated Dyslexic, a lifelong user of modified, adaptable and assistive technology, and a self-aware learner taught to understand why the methods behind her remediation worked. We additionally draw on our cumulative experience as users, teachers and developers of technology and on interviews with participants from a wide variety of sociocultural functions and pedagogical practices involved with special education. Based upon these and existing methods and applications, we present our insights in the form of guidelines for universal design that have the potential to not only embrace the differences of all learners but to maximize the potential of underserved neurodiverse learners so they can become self-sufficient masters of their own skills and interests across their lifetime.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2013.0", "venue : "01467836cecf", "title": "Design principles for human-computer interfaces", "authors": "Norman, Donald A.", "abstract": "If the field of Human Factors in Computer Systems is to be a success it must develop design principles that are useful, principles that apply across a wide range of technologies. In the first part of this paper I discuss some the properties that useful principles should have. While I am at it, I warn of the dangers of the tar pits and the sirens of technology. We cannot avoid these dangers entirely, for were we to do so, we would fail to cope with the real problems and hazards of the field.The second part of the paper is intended to illustrate the first part through the example of tradeoff analysis. Any single design technique is apt to have its virtues along one dimension compensated by deficiencies along another. Tradeoff analysis provides a quantitative method of assessing tradeoff relations for two attributes xi and xj by first determining the User Satisfaction function for each, U(x), then showing how U(xi) trades off against U(xj). In general, the User Satisfaction for a system is given by the weighted sum of the User Satisfaction values for the attributes. The analysis is used to examine two different tradeoffs of information versus time and editor workspace versus menu size. Tradeoffs involving command languages versus menu-based systems, choices of names, and handheld computers versus workstations are examined briefly.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "1983.0", "venue": "Proceedings of the SIGCHI Conference on Human Factors in Computing Systems", "doi": "10.1145/800045.801571", "url": "https://doi.org/10.1145/800045.801571", "keyword": "Design principles", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. The d Lee, Minha", "abstract": "The identity design of artificial agents carries growing ethical, psychological, and cultural weight, as ubiquitous language models and diverse robotic forms are blended into everyday use. However, structured approaches to designing coherent and interpretable artificial identities remain limited. To address urgent challenges in artificial identity design, including harmful stereotypes and deceptive practices, we introduce the Identity Design (ID) Framework and an accompanying research agenda. Drawing on emerging work on artificial identity in human-robot interaction and taking an interdisciplinary perspective, we propose twelve design principles across three levels: individual (recognisability, behavioural consistency, identity continuity, memory, persistent goals), group (membership signalling, social alignment, role clarity), and societal (benevolence, artificiality, social justice, transparency). The research agenda outlines open questions around the operationalisation and measurement of identity, social dynamics, and ethical considerations for identity design. Together, they lay the groundwork for future research and responsible practice in robotic, virtual, and multi-embodied agents.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2026.0", "venue": "Proceedings of the 2026 Designing Interactive Systems Conference", "doi": "10.1145/3800645.3812962", "url": "https://doi.org/10.1145/3800645.3812962", "keyword": "Design principles", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_o ation, science, analysis", "nearest_papers": [{"paper_id": "c6e7060b0fa0", "title": "LabelPatterns.org: A comprehensive pattern library for consumer-decision labels", "cluster": -1, "distance": 0.37264043774133504}, {"paper_id": "1416cd2b88de", "title": "Cross-disciplinary system value overview towards value-oriented design", "cluster": -1, "distance": 0.5544172110345655}, {"paper_id": "6e7959c82d5f", "title": "The anatomy of HCI design patterns", "cluster": 1, "distance": 0.5791085714486218}, {"paper_id": "ddcb3ba05227", "title": "Design patterns for sociality in human-robot interaction", "cluster": 1, "distance": 0.5978953064547723}, {"paper_id": "677c4dc89d1d", "title": "Elemental design patterns: A formal semantics for composition of OO software architecture", "cluster": -1, "distance": 0.6000579650986799}], "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme."}, {"paper_id": "296e021afe91", "title": "A generic model for reflective design", "authors": "Louridas, Panagiotis and Loucopoulos, Pericles", "abstract": "Rapid technological change has had an impact on the nature of software. This has led to new exigencies and to demands for software engineering paradigms that pay particular atttention to meeting them. We advocate that such demands can be met, at least in large parts, through the adoption of software engineering processes that are founded on a reflective stance. To this end, we turn our attention to the field of Design Rationale. We analyze and characterize Design Rationale approaches and show that despite surface differences between different approaches, they all tend to be variants of a relatively small set of static and dynamic affinities. We use the synthesis of static and dynamic affinities to develop a generic model for reflective design. The model is nonprescriptive and affects minimally the design process. It is context-independent and is intended to be used as a f ", "design_knowledge_action": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme."}, {"paper_id": "a21900f84443", "title": "Undesigning technology: considering the negation of design by design", "authors": "Pierce, James", "abstract": "Motivated by substantive concerns with the limitations and negative effects of technology, this paper inquires into the negation of technology as an explicit and intentional aspect of design research within HCI. Building on theory from areas including philosophy and design theory, this paper articulates a theoretical framework for conceptualizing the intentional negation of technology (i.e., the undesign of technology), ranging from the inhibition of particular uses of technology to the total erasure or foreclosure of technology. The framework is then expanded upon to articulate additional areas of undesigning, including self-inhibition, exclusion, removal, replacement, restoration, and safeguarding. In conclusion a scheme is offered for addressing questions concerning the disciplinary scope of undesign in the context of HCI, along with suggestions for ways that undesigning may be more strongly incorporated within HCI research.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2012.0", "venue": "Proceedings of the SIGCHI Conference on Human Factors in Computing Systems", "doi": "10.1145/2207676.2208540", "url": "https://doi.org/10.1145/2207676.2208540", "keyword": "Design theory", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 6.477914333343506, "umap_y": 7.172538757324219, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 3, "lda_topic_probability": 0.9653812866022576, "lda_topic_words": "game, ethics, practice, visualization, field, focused, empirical, autonomous", "nearest_papers": [{"paper_id": "19dd6ec0253e", "title": "A principle-based philosophical framework for fashion design praxis and education in new design landscapes", "cluster": -1, "distance": 0.17185314306149124}, {"paper_id": "994d28d55eb8", "title": "From human factors to human actors to human crafters", "cluster": -1, "distance": 0.45473892755929335}, {"paper_id": "ceac90427122", "title": "Design-oriented human-computer interaction", "cluster": 1, "distance": 0.6692546817950955}, {"paper_id": "dbc171dde63a", "title": "Perfect Eudaimonic User Experience Design That Aristotle Would Have Wanted", "cluster": -1, "distance": 0.6748366172971709}, {"paper_id": "5611cdb5c33a", "title": "Generating implications for design through design research", "cluster": -1, "distance": 0.6835217902684216}], "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme."}, {"paper_id": "ceac90427122", "title": "Design-oriented human-computer interaction", "authors": "Fallman, Daniel", "abstract": "We argue that HCI has emerged as a design-oriented field of research, directed at large towards innovation, design, and construction of new kinds of information and interaction technology. But the understanding of such an attitude to research in terms of philosophical, theoretical, and methodological underpinnings seems however relatively poor within the field. This paper intends to specifically address what design 'is' and how it is related to HCI. First, three candidate accounts from design theory of what design 'is' are introduced; the conservative, the romantic, and the pragmatic. By examining the role of sketching in design, it is found that the designer becomes involved in a necessary dialogue, from which the design problem and its solution are worked out simultaneously as a closely coupled pair. In conclusion, it is proposed that we need to acknowledge, first, the role of design in HCI conduct, and second, the difference between the knowledge-generating Design-oriented Research and the artifact-generating conduct of Research-oriented Design.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2003.0", "venue": "Proceedings of the SIGCHI Conference on Human Factors in Computing Systems", "doi": "10.1145/642611.642652", "url": "https://doi.org/10.1145/642611.642652", "keyword": "Design theory", "cluster": 1, "cluster_theme_terms": "visualization, patterns, computer, applications, theories, aesthetics, science, space", "cluster_label_candidate": "Synthesizes Design Theory into Shared Design Constructs", "cluster_summary_candidate": "This cluster synthesizes prior work on design theory, emphasizing how a design-knowledge construct is made explicit, organized, or put to work rather than only where it is applied. Related knowledge forms include Design Patterns, Design Knowledge. The shared move also involves definition and conceptualization and context-specific adaptation. Its contribution pattern is coded as Methodological, Theoretical, Artifact/System. Application and method terms are supporting facets, especially methods or lenses such as Design Science, Prototype, Interview, Case Study and contexts such as Industrial Design, Education / Learning, Sustainability. Representative papers include Towards a unified terminology for sonification and visualization; Thriving Systems Theory: An Emergent Information Systems Design Theory.", "facet_population_or_context": "Industrial Design, Education / Learning, Sustainability", "facet_stakeholder_or_population": "Designers, Developers, Practitioners", "facet_ ducational purposes (serious game) is segmented into its entertainment structures, which usually are underemployed in a pedagogical application, and in purely educational components, which have been extensively detailed in the literature. This division can hinder the player/learner experience as too much focus in one of these areas can either compromise knowledge acquisition or engagement. To overcome this issue, this work proposes a holistic view of games that includes both learning and entertainment elements, making them indistinguishable in creating either an entertainment or serious game. This notion is further reinforced by reviewing common game design frameworks found in the literature that have an empirical background, and by proposing a unified game design framework that uses elements from the analyzed frameworks and enhances them by including the latest research into game-based learning and serious games guidelines. By proposing a holistic view of games and an accompanying framework, a new way of facing game design is proposed that encourages designers to consider the postgame learning experiences and stimulates educators to take the entertainment aspects of their game more deeply.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "2021 IEEE Conference on Games (CoG)", "doi": "10.1109/CoG52621.2021.9619144", "url": "", "keyword": "Design frameworks", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 6.0544867515563965, "umap_y": 5.682004928588867, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 8, "lda_topic_probability": 0.9904251196582661, "lda_topic_words": "patterns, guidelines, games, rationale, educational, formal, engineering, interfaces", "nearest_papers": [{"paper_id": "e09769771b82", "title": "The Experience, Dynamics and Artifacts Framework: Towards a Holistic Model for Designing Serious and Entertainment Games", "cluster": -1, "distance": 1.1102230246251565e-16}, {"paper_id": "2280b868ea5f", "title": "Form and Function: Toward a Better Understanding of Design-Based Games", "cluster": -1, "distance": 0.7930744568924147}, {"paper_id": "a7e06450729f", "title": "Game Design as an Autonomous Research Subject", "cluster": -1, "distance": 0.810374745699776}, {"paper_id": "fee96194a322", "title": "Personalising learning: towards a coherent learning design framework", "cluster": -1, "distance": 0.8304573667912303}, {"paper_id": "ccc616a68c38", "title": "Towards Creating a Body of Evidence-based Interactive Digital Narrative Design Knowledge: Approaches and Challenges", "cluster": -1, "distance": 0.8369327568057197}], "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme."}, {"paper_id": "85ba95ab4fa0", "title": "Six Guidelines for Trustworthy, Ethical and Responsible Automation Design", "authors": "Jel√≠nek, Matou≈° ; Schlicker, Nadine ; de Visser, Ewart", "abstract": "Calibrated trust in automated systems (Lee and See 2004) is critical for their safe and seamless integration into society. The common goal of the various definitions of calibrated trust1 is to optimize outcomes in human-automation interaction. In other words, users should only rely on a system recommendation when it is actually correct and reject it when it is factually wrong. One requirement to achieve this goal is an accurate trustworthiness assessment, ensuring that the user's perception of the system's trustworthiness aligns with its actual trustworthiness, allowing users to make informed decisions about the extent to which they can rely on the system (Schlicker et al. 2022). The field of pragmatics offers valuable insights into the communication processes essential for developing accurate trustworthiness assessments by helping to find strategies to bridging the gap between user expectations and system capabilities, emphasizing the importance of context and mutual understanding in communication. We propose six design guidelines to help designers to optimize for accurate trustworthiness assessments, thus fostering ethical, and responsible human-automation interactions. The proposed guidelines are derived from existing literature in various fields, such as human-computer interaction, cognitive psychology, automation research, user-experience design, and ethics. We are incorporating key principles from the field of pragmatics, specifically the cultivation of common ground (H. H. Clark 1996) and Gricean communication maxims (Grice 1975). These principles are essential for the design of automated systems because the user‚Äôs perception of the system‚Äôs trustworthiness is shaped by both environmental contexts, such as organizational culture or societal norms, and by situational context, including the specific circumstances or scenarios in which the interaction occurs (Hoff and Bashir 2015). Pragmatics principles provide valuable insights into these contexts, thus enhancing our understanding and design of trustworthy systems. Our proposed guidelines provide actionable insights for designers to create automated systems that make relevant trustworthiness cues available. This would ideally foster calibrated trust and more satisfactory, productive, and safe interactions between humans and automated systems. Furthermore, the proposed heuristics might work as a tool for evaluating to what extent existing systems enable users to accurately assess a system‚Äôs trustworthiness. ¬© 2025, CC BY-NC-ND.", "discussion_summary": "- Third, our work translates these research findings into a concrete guideline that can help designers improve their human-automation designs.\n- We believe our list of guidelines still contributes uniquely to the literature for several reasons.\n- First, our guidelines are specifically designed to enhance human-automation interaction based on pragmatics principles of human communication, such as those outlined by H.", "discussion_excerpt": "[Discussion paragraph 1] Contributions This paper applies pragmatics theory to long-standing human factors challenges to provide new insights into optimal human-automation interaction. It addresses recent calls to embrace the responsible use of AI as part of the human-centered design process, as opposed to abstract calls for creating “a more ethical AI” (Lyons et al. 2023; Pflanzer et al. 2023). Applying pragmatics theories to the...\n\n[Discussion paragraph 2] For example, more monitoring of AI could present a higher burden for human operators responsible for the AI which defeats the purpose of AI in alleviating human workload. This is known as the “automation paradox” or the “double-edge sword of automation” (Parasuraman and Wickens 2008). Designers need to carefully implement how the human supervises and checks the AI without increasing the burden for human workload....\n\n[Discussion paragraph 3] How Previous Lists Are Not Adequate Previous lists have described and characterized the need for improved human-machine interaction. For example, there are 10 heuristics to assess the usability and design of a system (Nielsen 1995), 10 challenges for making automation a better team player (Klien et al. 2004), a list that describes what machines are better and what humans are better at (de Winter and Dodou 2014), a...", "discussion_found": true, "discussion_paragraph_count": 6, "year": "2025.0", "venue": "arXiv", "doi": "10.48550/arXiv.2508.02371", "url": "", "keyword": "Design Guidelines", " ); Stark, Rainer (1)", "abstract": "A wide range of tools simplify product development, e. g. Knowledge-Based Engineering Systems (KBES). Many KBES draw on knowledge derived from DfX methods. The knowledge of these methods is often available in varying degrees of detail, arising from the explicit knowledge of experts and scientists. When passing on knowledge, product developers often do so in the form of easy-to-understand rules of thumb, so-called design heuristics (DH). However, published DH do not offer sufficient clarity and usability to be integrated in daily engineering practice. This paper describes the development of a standardized notation form to make DH describable as a first step towards automated integration into KBES and towards integrating implicit knowledge of designers in future MBSE models. ¬© 2022 die Autoren.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2022.0", "venue": "Proceedings of the 33rd Symposium Design for X, DFX 2022", "doi": "10.35199/dfx2022.08", "url": "", "keyword": "Design Heuristics", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 4.774648666381836, "umap_y": 7.52673864364624, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 1, "lda_topic_probability": 0.9735277428989705, "lda_topic_words": "product, prototyping, scientists, tools, problem, contributions, engineering, heuristics", "nearest_papers": [{"paper_id": "40668e23fbab", "title": "Dimensions of knowledge in prototyping se with generative AI: design principles for governing AI-Mediated knowledge capture and transfer", "authors": "O‚ÄôSullivan, Philip (1); Sepp√§l√§, Selja (1); Feller, Joseph (1)", "abstract": "Tacit expertise (e.g. decision heuristics, risk judgement) makes organisational decision-making distinctively human, yet resides in individuals, is hard to scale, and is lost on departure. Generative AI (GenAI) offers conversational elicitation, synthesis, and adaptive scaffolding, but risks hallucination, goal drift, and helpfulness-driven agreement bias, undermining independent judgement. Building on validated problem theory, we derive four design principles grounded in socio-cognitive knowledge-work theory. They specify governance mechanisms addressing persistent transfer challenges (knowledge hiding, articulation barriers, internalisation failure) and GenAI-specific risks (knowledge distortion, tool-dependent learning, disrupted social exchange). Logical reasoning validates for alignment, applicability, coherence, completeness, and operationality. A feasibility assessment across three GenAI configurations shows most mechanisms are implementable through prompting; those requiring persistent state or platform integration are not, with configurations approximating rather than enforcing governance. We contribute prescriptive design knowledge for preserving human-centric decision-making by motivating expert sharing, enabling articulation, establishing fidelity, and ensuring applicability to successors. ¬© 2026 The Author(s). Published by Informa UK Limited, trading as Taylor & Francis Group.", "discussion_summary": "- (2025), reframed GenAI-mediated transfer as a governance design challenge for a probabilistic, non-human intermediary.\n- This paper extends that theory by deriving four DPs that operationalise its requirements as governance Mechanisms.\n- Therefore, we propose refining the Aim to explicitly acknowledge this downstream dependency rather than treating artefact production as its terminal point.", "discussion_excerpt": "[Discussion paragraph 1] The Echelon 1 problem theory described in O’Sullivan et al. (2025), reframed GenAI-mediated transfer as a governance design challenge for a probabilistic, non-human intermediary. This paper extends that theory by deriving four DPs that operationalise its requirements as governance Mechanisms. The DPs contribute to work on GenAI’s potential for knowledge work (Alavi et al., 2024) by specifying testable Mechanisms...\n\n[Discussion paragraph 2] 10 P. O’SULLIVAN ET AL. lost through turnover (Daghfous et al., 2023; Levallet & Chan, 2019), human judgement is lost as an input, and no admissibility framework can govern what was never captured. Elicitation (DP1) and verification (DP3) address admissibility directly by governing the quality and provenance of captured knowledge. Reciprocity (DP2) and scaffolding (DP4) extend beyond it, sustaining expert...\n\n[Discussion paragraph 3] However, because these records are generated text rather than system-level logs, the audit trail is itself subject to the same generation risks it is meant to detect. Conversational instruction can simulate governance outputs, but simulation is not enforcement. Deployment therefore requires system-generated audit trails, not LLM-generated approximations. Beyond this architectural distinction, GenAI is optimised for...", "discussion_found": true, "discussion_paragraph_count": 8, "year": "2026.0", "venue": "Journal of Decision Systems", "doi": "10.1080/12460125.2026.2669855", "url": "", "keyword": "Design knowledge", "cluster": 0, "cluster_theme_terms": "ai, patterns, review, literature, systematic, generative, demand, decision", "cluster_label_candidate": "Synthesizes Design Patterns into Shared Design Constructs", "cluster_summary_candidate": "This cluster synthesizes prior work on design patterns, emphasizing how a design-knowledge construct is made explicit, organized, or put to work rather than only where it is applied. Related knowledge forms include Design Knowledge, Design Principles. The shared move also involves definition and conceptualization and capture and transfer. Its contribution pattern is coded as Methodological, Theoretical, Artifact/System. Application and method terms are supporting facets, especially methods or lenses such as Systematic Review, Design Science. Representative papers include Contestable AI by Design: Towards a Framework; Design Patterns for AI-based Systems: A Multivocal Literature Review and Pattern Repository.", "facet_population_or_context": "", "facet_stakeholder_or_population": "Practitioners, Designers", "facet_method_or_lens": "Systematic Review, Design Science", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "Methodological, Theoretical, Artifact/System", "umap_x": 4.030305862426758, "umap_y": 9.454984664916992, "distance_to_centroid": 0.24698937013443922, "representative_rank": 4, "is_representative_top3": false, "medoid_rank": 4, "lda_topic": 9, "lda_topic_probability": 0.9769201125288883, "lda_topic_words": "patterns, ai, usability, video, visualization, collaboration, science, analysis", "nearest_papers": [{"paper_id": "bdf1addf5a10", "title": "Contestable AI by Design: Towards a Framework", "cluster": 0, "distance": 0.252117189418123}, {"paper_id": "2efb92894924", "title": "Particles of a Whole: Design Patterns for Transparent and Auditable AI-Systems", "cluster": 0, "distance": 0.3673572281676719}, {"paper_id": "7d99b05f405e", "title": "Design Patterns for AI-based Systems: A Multivocal Literature Review and Pattern Repository", "cluster": 0, "distance": 0.47661924471700123}, {"paper_id": "9eecf23c4ce7", "title": "Design Heuristics for Web-Based Severe Weather Risk Communication", "cluster": -1, "distance": 0.7363547373824406}, {"paper_id": "8eb8539b9712", "title": "Designing Dialogic Disclaimers: Principles for Ethical Conversational Design in LLM Interfaces", "cluster": -1, "distance": 0.7709665309197291}], "design_knowledge_form": "Design Patterns", "design_knowledge_action": "synthesizes prior work on", "design_knowledge_contribution": "synthesizes prior work on Design Patterns"}, {"paper_id": "3058799f63c1", "title": "Using Schema to Inform Method Design Practices", "authors": "Chivukula, Shruthi Sai (1); Gray, Colin M. (2)", "abstract": "There are many different forms of design knowledge that guide and shape a designer‚Äôs ability to act and realize potential realities. Methods and schemas are examples of design knowledge commonly used by design researchers and designers alike. In this pictorial, we explore, engage, and describe the role of schemas as tools that can support design researchers in formulating methods to support design action, with our framing of method design specifically focused on ethical design complexity. We present four ways for method designers to engage with schema: 1) Systems to operationalize complex design constructs such as ethical design complexity through an A.E.I.O.YOU schema; 2) Classifiers to map existing methods and identify the possibility for new methods through descriptive semantic differentials; 3) Tools that enable the creation of methods that relate to one or more elements of the schema through creative departures from research to design; and 4) Interactive channels to playfully engage potential and new opportunities through schema interactivity. ¬© 2024, CC BY-NC-ND.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2024.0", "venue": "arXiv", "doi": "10.48550/arXiv.2405.00901", "url": "", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 4.471553802490234, "umap_y": 7.411370754241943, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 1, "lda_topic_probability": 0.9653813962657768, "lda_topic_words": "product, prototyping, scientists, tools, problem, contributions, engineering, heuristics", "nearest_papers": [{"paper_id": "1c04ffa25528", "title": "The implications of improvisational acting and role-playing on design methodologies", "cluster": -1, "distance": 0.4759935266149834}, {"paper_id": "40a2d86cd488", "title": "Elements of a design method - a basis for describing and evaluating design methods", "cluster": -1, "distance": 0.5727630920522809}, {"paper_id": "85ba95ab4fa0", "title": "Six Guidelines for Trustworthy, Ethical and Responsible Automation Design", "cluster": -1, "distance": 0.6950559304995015}, {"paper_id": "e958310acab5", "title": "Prescriptive knowledge in IS research: Conceptualizing design principles in terms of materiality, action, and boundary conditions", "cluster": -1, "distance": 0.6969069348769031}, {"paper_id": "7e095752d24c", "title": "Think-4-EmCoDe framework: Highlighting key qualities in embodied co-design techniques for children", "cluster": -1, "distance": 0.7000881784552975}], "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme."}, {"paper_id": "73537bfbe719", "title": "A taxonomy and ontology for digital platforms", "authors": "Derave, T. (1); Gailly, F. (1); Sales, T.P. (2); Poels, G. (1)", "abstract": "In academic literature and in business communication digital platforms are categorized into different types including, but not limited to, multi-sided platform, digital marketplace, on-demand platform and sharing economy platform. Observing the substantial literature on these platform types, both in academia and professional contexts, there is lack of consensus on the definition of these digital platform types. On top of that, there is a lack of knowledge in the literature on the requirements and design of these digital platform types. We address the observed lack of shared conceptualizations by creating a taxonomy for digital platforms, by classifying digital platforms according to their distinctive features. Further, we address the lack of design knowledge with a digital platform reference ontology that describes the construction and operation of the different types of digital platform that are distinguished in the taxonomy. This reference ontology, developed using the Unified Foundational Ontology (UFO) and several of its core ontologies, is organized into different ontology modules, allowing to describe functionalities that are common to any digital platform and more specific functionalities that have their origin in the distinctive features that were used to construct the taxonomy. The taxonomy that we contribute helps to clearly define the different types of digital platform that can be observed today. It also helps analysing further evolutions in the platform domain. The contribution of a well-founded digital platform reference ontology is a step towards a better understanding of digital platform functionality, better communication between stakeholders, and eventually may facilitate future research and development of new types of digital platform. All rights reserved Elsevier.", "discussion_summary": "- We postulate, however, that our ontology can accommodate changes well because of its modular structure, which is based on the taxonomic structure.\n- Despite this issue, we believe that the taxonomy and ontology created in this paper can already be important artefacts to grab and communicate the complexity and future direction of the digital platform domain.\n- We wish to emphasise that to keep control over the further development of the ontology, the alig retical taxonomy for design theory for the application to fashion design praxis. The purpose of this conceptual article is to conceptualise a philosophical framework for fashion design to be considered by fashion designers, researchers and curriculum developers when engaging in praxis. The relevant research questions are then: what are the underlying philosophical principles for fashion design within the current approach to praxis? What are the affordances of such a principle-based philosophical framework for fashion designers in their practice; researchers, scholars and curriculum developers? Within the current design praxis, this article proposes a principle-based philosophical framework including volition (mind-set), design knowledge (epistemology), design process (methodology) and objects (ontology). This framework may well create opportunities for fashion designers to consider these related principles and approach their praxis in alternative ways. Similarly, researchers wanting to strengthen scholarship for fashion design could use each of these different principles as units of analysis to explore and introduce new perspectives and research about the praxis. Alternative volition and new forms of design knowledge have the potential to change designers' choices, reasoning, cognition, and design processes and scholars may well write about this also. Finally, the framework offers the potential for scholars to question and research the ontological nature of objects and the relationship between designer, intentions and artefact function when sustainability and design for social good come into play. Furthermore, the framework for fashion design will also inform curriculum and programme development in fashion design education.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "International Journal of Technology and Design Education", "doi": "10.1007/s10798-022-09794-7", "url": "", "ke  design patterns", "authors": "Kruschitz, Christian (1); Hitz, Martin (1)", "abstract": "Human-Computer Interaction design patterns became an often-used tool in the HCI community to encapsulate and share design knowledge. A good design pattern consists of several different components. There are the content elements, which encapsulate the description of the problem, context and solution. Relationships between patterns are an essential part to best profit from the full reuse potential promised. Categorization of patterns helps to navigate more effectively within large pattern repositories, and formalization of HCI patterns provides the possibility to use them in software applications such as pattern management tools or user interface design tools. This work gives a brief overview of the above-mentioned components. ¬© 2009 IEEE.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2009.0", "venue": "Computation World: Future Computing, Service Computation, Adaptive, Content, Cognitive, Patterns, ComputationWorld 2009", "doi": "10.1109/ComputationWorld.2009.45", "url": "", "keyword": "Design knowledge", "cluster": 1, "cluster_theme_terms": "visualization, patterns, computer, applications, theories, aesthetics, science, space", "cluster_label_candidate": "Synthesizes Design Theory into Shared Design Constructs", "cluster_summary_candidate": "This cluster synthesizes prior work on design theory, emphasizing how a design-knowledge construct is made explicit, organized, or put to work rather than only where it is applied. Related knowledge forms include Design Patterns, Design Knowledge. The shared move also involves definition and conceptualization and context-specific adaptation. Its contribution pattern is coded as Methodological, Theoretical, Artifact/System. Application and method terms are supporting facets, especially methods or lenses such as Design Science, Prototype, Interview, Case Study and contexts such as Industrial Design, Education / Learning, Sustainability. Representative papers include Towards a unified terminology for sonification and visualization; Thriving Systems Theory: An Emergent Information Systems Design Theory.", "facet_population_or_context": "Industrial Design, Education / Learning, Sustainability", "facet_stakeholder_or_population": "Designers, Developers, Practitioners", "facet_method_or_lens": "Design Science, Prototype, Interview, Case Study", "facet_artifact_or_domain": "Tool, Interface, Prototype, Robot", "facet_contribution_or_outcome": "Methodological, Theoretical, Artifact/System", "umap_x": 5.402716159820557, "umap_y": 9.759103775024414, "distance_to_centroid": 0.4927605982144374, "representative_rank": 5, "is_representative_top3": false, "medoid_rank": 5, "lda_topic": 4, "lda_topic_probability": 0.5692173798181687, "lda_topic_words": "patterns, computer, guidelines, field, software, community, terminology, experiment", "nearest_papers": [{"paper_id": "8393d36cff90", "title": "An overview of human-computer interaction patterns in pervasive systems", "cluster": 1, "distance": 0.21338413735992323}, {"paper_id": "ca185d91b684", "title": "Embracing Non-Natural Design in Human-Computer Interaction", "cluster": 1, "distance": 0.49050592927949865}, {"paper_id": "ddcb3ba05227", "title": "Design patterns for sociality in human-robot interaction", "cluster": 1, "distance": 0.5082366377523915}, {"paper_id": "4fb2c242dfee", "title": "Coupling of design patterns: common practices and their benefits", "cluster": 1, "distance": 0.5416486327226291}, {"paper_id": "bc6d0afdec8f", "title": "Design patterns for component-oriented software development", "cluster": -1, "distance": 0.5599492172179632}], "design_knowledge_form": "Design Theory", "design_knowledge_action": "synthesizes prior work on", "design_knowledge_contribution": "synthesizes prior work on Design Theory"}, {"paper_id": "7b15d81000db", "title": "The anatomy of a design theory", "authors": "Gregor, Shirley (1); Jones, David (2)", "abstract": "Design work and design knowledge in Information Systems (IS) is important for both research and practice. Yet there has been comparatively little critical attention paid to the problem of specifying design theory so that it can be communicated, justified, and developed cumulatively. In this essay we focus on the structural components or anatomy of design theories in IS as a special class of theory. In doing so, we aim to extend the work of Walls, Widemeyer and El Sawy (1992) on the specification of information systems design theories (ISDT), drawing on other streams of thought on design research and theory to provide a basis for a more systematic and useable formulation of these theories. We identify eight separate components of design theories: (1) purpose and scope, (2) constructs, (3) principles of form and function, (4) artifact mutability, (5) testable propositions, (6) justificatory knowledge (kernel theories), (7) principles of implementation, and (8) an expository instantiation. This specification includes components missing in the Walls et al. adaptation of Dubin (1978) and Simon (1969) and also addresses explicitly problems associated with the role of instantiations and the specification of design theories for methodologies and interventions as well as for products and applications. The essay is significant as the unambiguous establishment of design knowledge as theory gives a sounder base for arguments for the rigor and legitimacy of IS as an applied discipline and for its continuing progress. A craft can proceed with the copying of one example of a design artifact by one artisan after another. A discipline cannot. Copyright ¬© 2007, by the Association for Information Systems.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2007.0", "venue": "Journal of the Association for Information Systems", "doi": "10.17705/1jais.00129", "url": "", "keyword": "Design knowledge", "cluster": 1, "cluster_theme_terms": "visualization, patterns, computer, applications, theories, aesthetics, science, space", "cluster_label_candidate": "Synthesizes Design Theory into Shared Design Constructs", "cluster_summary_candidate": "This cluster synthesizes prior work on design theory, emphasizing how a design-knowledge construct is made explicit, organized, or put to work rather than only where it is applied. Related knowledge forms include Design Patterns, Design Knowledge. The shared move also involves definition and conceptualization and context-specific adaptation. Its contribution pattern is coded as Methodological, Theoretical, Artifact/System. Application and method terms are supporting facets, especially methods or lenses such as Design Science, Prototype, Interview, Case Study and contexts such as Industrial Design, Education / Learning, Sustainability. Representative papers include Towards a unified terminology for sonification and visualization; Thriving Systems Theory: An Emergent Information Systems Design Theory.", "facet_population_or_context": "Industrial Design, Education / Learning, Sustainability", "facet_stakeholder_or_population": "Designers, Developers, Practitioners", "facet_method_or_lens": "Design Science, Prototype, Interview, Case Study", "facet_artifact_or_domain": "Tool, Interface, Prototype, Robot", "facet_contribution_or_outcome": "Methodological, Theoretical, Artifact/System", "umap_x": 3.4829561710357666, "umap_y": 6.029115200042725, "distance_to_centroid": 0.579466298546908, "representative_rank": 14, "is_representative_top3": false, "medoid_rank": 14, "lda_topic": 7, "lda_topic_probability": 0.9699967370047553, "lda_topic_words": "tools, management, anatomy, visual, software, rationale, inquiry, reflective", "nearest_papers": [{"paper_id": "bacdc4f76eea", "title": "Work system principles: towards a justified design theory on the grounds of socio-instrumental pragmatism", "cluster": -1, "distance": 0.31409496274361604}, {"paper_id": "8107b8d7a099", "title": "Analyzing Initial Design Theory Components for Developing Information Security Laboratories", "cluster": -1, "distance": 0.4441035881365052}, {"paper_id": "a1a2a51ae22e", "title": "Incommensurability in design science: Which comes first-Theory or artefact?", "cluster": 1, "distance": 0.4592000134171047}, {"paper_id": "9f9f7295ec8c", "title": "Affordance based design: a relational theory for design", "cluster": 1, "distance": 0.5730536984864789}, {"paper_id": "4025e28730c1", "title": "Conceptual foundations of design problem solving", "cluster": -1, "distance": 0.612057272767761}], "design_knowledge_form": "Design Theory", "design_knowledge_action": "synthesizes prior work on", "design_knowledge_contribution": "synthesizes prior work on Design Theory"}, {"paper_id": "7e095752d24c", "title": "Think-4-EmCoDe framework: Highlighting key qualities in embodied co-design techniques for children", "authors": "Schaper, M.-M. (1); MaÃÅrquez Segura, E. (2); Malinverni, L. (3); Pares, N. (4)", "abstract": "Embodied, co-design and children-specific methods have been gaining traction in Interaction Design for Children, and their potential and benefits are well-established. Yet methods at the intersection of all three areas are scarcer. In addition, design researchers lack tools for the analysis and adaptation of existing methods, and the creation of new ones to suit the particularities of the design project at hand. Here, we present theThink-4-EmCoDe frameworkfor the design and analysis of embodied co-design methods and techniques for children, which foregrounds key qualities in embodied interaction design research:(1) embodied awareness; (2) reflective imaginary; (3) emergence; (4) embodied memory; (5) situated relationality; (6) contingency; (7) playful engagement; (8) play practice; (9) developmental scaffolds; and (10) social dialogue.The framework has been developed drawing from several theories, methods, and frameworks in the areas of co-design and embodied design approaches. This framework allows designers to focus on both general design qualities for embodied experiences and the specific child perspective. We illustrate the use of the framework through the analysis of three design techniques and discuss its potential as an inspirational tool to understand, adapt and refine embodied co-design techniques for children. All rights reserved Elsevier.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "International Journal of Human-Computer Studies", "doi": "10.1016/j.ijhcs.2023.103065", "url": "", "keyword": "Design methods", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 4.670547962188721, "umap_y": 7.003701210021973, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 0, "lda_topic_probability": 0.9678527982314077, "lda_topic_words": "rules, digital, literature, creation, platform, analysis, types, lack", "nearest_papers": [{"paper_id": "40a2d86cd488", "title": "Elements of a design method - a basis for describing and evaluating design methods", "cluster": -1, "distance": 0.4703891622607854}, {"paper_id": "b2234ef79a5a", "title": "Tracing situated effects of innovative design methods: inexperienced designers' practices", "cluster": -1, "distance": 0.6355012890337994}, {"paper_id": "33444d31c6dc", "title": "A design theory for visual inquiry tools", "cluster": -1, "distance": 0.6424746470878431}, {"paper_id": "43fee329f83e", "title": "Process design theory for digital information services", "cluster": -1, "distance": 0.6710120673878504}, {"paper_id": "3058799f63c1", "title": "Using Schema to Inform Method Design Practices", "cluster": -1, "distance": 0.7000881784552975}], "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme."}, {"paper_id": "40a2d86cd488", "title": "Elements of a design method - a basis for describing and evaluating design methods", "authors": "Gericke, K. (1); Eckert, C. (2); Stacey, M. (3)", "abstract": "Method development is at the heart of design research as methods are a formalised way to express knowledge about how aspects of design could or should be done. However, assuring that methods are in fact used in industry has remained a challenge. Industry will only use methods that they can understand and that they feel will give them benefit reliably. To understand the challenges involved in adopting a method, the method needs to be seen in context: it does not exist in isolation but forms a part of an ecosystem of methods for tackling related design problems. A method depends on the knowledge and skills of the practitioners using it: while a description of a method is an artefact that is a formalisation of engineering knowledge, a method in use constitutes a socio-technical system depending on the interaction of human participants with each other as well as with the description of the method, representations of design information and, often, tools for carrying out the method's tasks. This paper argues that crucial factors in the adoption of methods include how well they are described and how convincingly they are evaluated. The description of a method should cover itscore idea, therepresentationsin which design information is described, theprocedureto be followed, itsintended use, and thetoolsit uses. The account of a method's intended use should cover itspurpose, the situations or product types within itsscope, itscoverageof kinds of problems within its scope, itsexpected benefitandconditionsfor its use. The different elements need to be evaluated separately as well as the method as an integrated whole. While verification and validation are important for some elements of methods, it is rarely possible to prove the validity of a method. Rather the developers of methods need to gather sufficient evidence that a method will work within a clearly articulated scope. Most design methods do not have binary success criteria, and their usefulness in practice depends as much on simplicity and usability as on the outcomes they produce. Evaluation should focus on how well they work, and how they can be customised and improved.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Design Science", "doi": "10.1017/dsj.2022.23", "url": "", "keyword": "Design methods", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 4.7544097900390625, "umap_y": 7.087723255157471, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 6, "lda_topic_probability": 0.9769212896127699, "lda_topic_words": "theories, value, understand, ethnographic, studio, method case, architecture, critical", "nearest_papers": [{"paper_id": "b2234ef79a5a", "title": "Tracing situated effects of innovative design methods: inexperienced designers' practices", "cluster": -1, "distance": 0.29862297163399076}, {"paper_id": ts and later applied to five industry reports consisting of 218 pages. The findings reveal a spectrum of rationales underpinning design decisions. Grounded in the data, the feature, specification and evidence (FSE) framework emerged as a feature-based and low-effort capture approach. We discuss the need to improve design communication in engineering design, through structuring rationales (i.e., using the proposed FSE framework or other representations) and improving technical writing skills. Lastly, by enhancing design rationale communication and documentation practices, significant benefits can be realized for computational support tools such as automatic rationale extraction or generative approaches.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Design Science", "doi": "10.1017/dsj.2024.19", "url": "", "keyword": "Design rationale", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 7.264462947845459, "umap_y": 9.199487686157227, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 8, "lda_topic_probability": 0.971869228285956, "lda_topic_words": "patterns, guidelines, games, rationale, educational, formal, engineering, interfaces", "nearest_papers": [{"paper_id": "296e021afe91", "title": "A generic model for reflective design", "cluster": -1, "distance": 0.34376782503862136}, {"paper_id": "4ac74ce3f335", "title": "Towards a framework for documentation design: an abstract model of computer-mediated activity", "cluster": -1, "distance": 0.4294985710424718}, {"paper_id": "c90163fa7f57", "title": "A new model to express and capture the design rationale in the documents", "cluster": -1, "distance": 0.434316848674439}, {"paper_id": "7c4d2eb91f51", "title": "Using a Visual Abstract as a Lens for Communicating and Promoting Design Science Research in Software Engineering", "cluster": -1, "distance": 0.7604425409121226}, {"paper_id": "a74bec243b7f", "title": "Universal Structural-Semantic Model of Design Patterns", "cluster": -1, "distance": 0.7608409536830815}], "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme."}, {"paper_id": "4025e28730c1", "title": "Conceptual foundations of design problem solving", "authors": "Smith, G.F. (1); Browne, G.J.", "abstract": "Design problems, processes, and methods are topics of longstanding interest in fields such as architecture and engineering. Design tasks are also common in domains addressed by systems and management scientists. However, much scientific work in these fields indicates little awareness of design theories and research. This paper introduces systems and management scientists to the extensive design theory literature. More importantly, it consolidates and extends that literature by developing a deep conceptual analysis of design problems and problem solving. The analysis is built around five elements of design problems: goals, constraints, alternatives, representations, and solutions. These elements define the basic tasks or functional demands posed by design problem solving. The paper also identifies special difficulties faced by designers in systems and management science domains.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "IEEE Transactions on Systems, Man and Cybernetics", "doi": "10.1109/21.260655", "url": "", "keyword": "Design theory", "cluste s have three design aspects, i. e. content, value, and revenue, and their design has an evolutionary nature, i. e. that information gained in the service's usage stages is part of their (re)design efforts. The literature abounds of fragmented insights for information services design. This article gives a literature review of methods and techniques that are useful in the representation and analysis of the above-mentioned aspects for each evolving step of information service design. The article also describes several scenarios for information service design projects. These insights have considerable consequences for information services design practices and a list of topics for new design theory research is given. ¬© 2008 Springer-Verlag.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2008.0", "venue": "Methods and Tools for Effective Knowledge Life-Cycle-Management", "doi": "10.1007/978-3-540-78431-9_31", "url": "", "keyword": "Design theory", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 3.728790521621704, "umap_y": 8.623117446899414, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 0, "lda_topic_probability": 0.9666619479320194, "lda_topic_words": "rules, digital, literature, creation, platform, analysis, types, lack", "nearest_papers": [{"paper_id": "5a973fb8ae6f", "title": "ICT-Enabled Self-Management of Chronic Diseases: Literature Review and Analysis Using Value-Sensitive Design", "cluster": 0, "distance": 0  on the explanatory power and potential innovation fostered by this change in design thinking, as illustrated through several examples, and not on specific methods.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Research in Engineering Design", "doi": "10.1007/s00163-008-0060-3", "url": "", "keyword": "Design theory", "cluster": 1, "cluster_theme_terms": "visualization, patterns, computer, applications, theories, aesthetics, science, space", "cluster_label_candidate": "Synthesizes Design Theory into Shared Design Constructs", "cluster_summary_candidate": "This cluster synthesizes prior work on design theory, emphasizing how a design-knowledge construct is made explicit, organized, or put to work rather than only where it is applied. Related knowledge forms include Design Patterns, Design Knowledge. The shared move also involves definition and conceptualization and context-specific adaptation. Its contribution pattern is coded as Methodological, Theoretical, Artifact/System. Application and method terms are supporting facets, especially methods or lenses such as Design Science, Prototype, Interview, Case Study and contexts such as Industrial Design, Education / Learning, Sustainability. Representative papers include Towards a unified terminology for sonification and visualization; Thriving Systems Theory: An Emergent Information Systems Design Theory.", "facet_population_or_context": "Industrial Design, Education / Learning, Sustainability", "facet_stakeholder_or_population": "Designers, Developers, Practitioners", "facet_method_or_lens": "Design Science, Prototype, Interview, Case Study", "facet_artifact_or_domain": "Tool, Interface, Prototype, Robot", "facet_contribution_or_outcome": "Methodological, Theoretical, Artifact/System", "umap_x": 3.5319857597351074, "umap_y": 6.178674697875977, "distance_to_centroid": 0.5319335660238755, "representative_rank": 9, "is_representative_t on and offers a rigorous definition of Design. This is illustrated with an example: the design of Magnesium-CO2 engines for Mars explorations. Using C-K theory we also discuss Braha and Reich‚Äôs topological structures for design modelling (Braha and Reich 2003). We interpret this approach as special assumptions about the stability of objects in space K. Combining C-K theory and Braha and Reich‚Äôs models opens new areas for research about knowledge structures in Design theories. These findings confirm the analytical and interpretative power of C-K theory.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Research in Engineering Design", "doi": "10.1007/s00163-008-0043-4", "url": "", "keyword": "Design theory", "cluster": 1, "cluster_theme_terms": "visualization, patterns, computer, applications, theories, aesthetics, science, space", "cluster_label_candidate": "Synthesizes Design Theory into Shared Design Constructs", "cluster_summary_candidate": "This cluster synthesizes prior work on design theory, emphasizing how a design-knowledge construct is made explicit, organized, or put to work rather than only where it is applied. Related knowledge forms include Design Patterns, Design Knowledge. The shared move also involves definition and conceptualization and context-specific adaptation. Its contribution pattern is coded as Methodological, Theoretical, Artifact/System. Application and method terms are supporting facets, especially methods or lenses such as Design Science, Prototype, Interview, Case Study and contexts such as Industrial Design, Education / Learning, Sustainability. Representative papers include Towards a unified terminology for sonification and visualization; Thriving Systems Theory: An Emergent Information Systems Design Theory.", "facet_population_or_context": "Industrial Design, Education / Learning, Sustainability", "facet_stakeholder_or_population": "Designers, D the context of information visualization. It addresses the need to acknowledge a recently emerging number of visualization projects that combine information visualization techniques with principles of creative design. The proposed model contributes to a better understanding of information aesthetics as a potentially independent research field within visualization that specifically focuses on the experience of aesthetics, dataset interpretation and interaction. The proposed model is based on analysing existing visualization techniques by their interpretative intent and data mapping inspiration. It reveals information aesthetics as the conceptual link between information visualization and visualization art, and includes the fields of social and ambient visualization. This model is unique in its focus on aesthetics as the artistic influence on the technical implementation and intended purpose of a visualization technique, rather than subjective aesthetic judgments of the visualization outcome. This research provides a framework for understanding aesthetics in visualization, and allows for new design guidelines and reviewing criteria.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2007.0", "venue": "", "doi": "10.1109/IV.2007.114", "url": "", "keyword": "Design Guidelines", "cluster": 1, "cluster_theme_terms": "visualization, patterns, computer, applications, theories, aesthetics, science, space", "cluster_label_candidate": "Synthesizes Design Theory into Shared Design Constructs", "cluster_summary_candidate": "This cluster synthesizes prior work on design theory, emphasizing how a design-knowledge construct is made explicit, organized, or put to work rather than only where it is applied. Related knowledge forms include Design Patterns, Design Knowledge. The shared move also involves definition and conceptualization and context-specific adaptation. Its contribution pattern is coded as Methodolog
