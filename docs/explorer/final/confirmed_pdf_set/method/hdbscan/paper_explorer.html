hich occur in everyday technology use. Currently, design theory is focused solely on the artifact while obscuring the teleological information processes for which they are designed. We propose the addition of environments which can organize kernel theories and provide insight regarding interaction and influence of kernel theory in different use contexts. In addition, the modification of information artifacts and processes as users tinker with, and tailor systems is a necessary aspect of design theory specifications.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2009", "venue": "15th Americas Conference on Information Systems 2009, AMCIS 2009", "doi": "", "url": "", "keyword": "Design theory", "cluster": 6, "cluster_theme_terms": "visualization, sonification, aesthetics, theories, method theory, thriving, science, technical", "cluster_label_candidate": "Cluster 6: Design Theory through definition and conceptual framing", "distinguishing_evidence_terms": "Method Theory, Design Science, Comes First-theory, Unified Terminology", "cluster_summary_candidate": "Within this keyword view, this cluster is set apart by Comes First-theory, Unified Terminology. Its dominant move, definition and conceptualization of design theory, is shared across most of this view, so the distinguishing terms above carry the interpretive weight. Representative papers: Eight Components of a Design Theory of Sonification; Web-based information systems: Developing a design theory.", "design_knowledge_form": "Design Theory", "design_knowledge_action": "defines and conceptualizes", "design_knowledge_role": "Conceptual Framework", "design_knowledge_contribution": "defines and conceptualizes Design Theory", "facet_population_or_context": "Education / Learning", "facet_stakeholder_or_population": "Designers", "facet_method_or_lens": "Design Science", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "Theoretical, edge management. A literature search is conducted to find frameworks that support pluralism. The findings are as follow. In the hospital case study the introduction of a patient record system (hard system) was the occasion for changes to both coordination (soft systems) and power relations (critical systems). Facts, norms and feelings are intertwined. While the electronic tool by itself is neutral in the face of power relations, its use in organisations is not. In this case at least, a holistic and pluralistic approach to knowledge management is required. In the search for frameworks to support pluralism, more than 50 frameworks from the general knowledge management literature are identified. Of the eight selected for further study, three are found to be pluralistic. These three - critical systems, scientific discourses, and Habermasian inquiry - share common characteristics. All three recognise that conflict is the precondition to knowledge creation, and that power relations, value commitments, and ethics are central to knowledge management. It is concluded that the knowledge management literature as a whole favours a single systems perspective (hard systems); a single research paradigm (positivism, focusing on objective facts); and a single knowledge management domain (knowledge application). This singular (non-pluralistic) approach produces theories about knowledge that has already emerged. Yet the Davenport and Prusak (1998) definition of knowledge and the hospital case study include two other perspectives - soft systems and critical systems - that focus on the organizational and individual aspects of emergence, respectively. In practice, knowledge management must address the need to simultaneously solve technical problems, resolve interpersonal issues, and dissolve personal conflict. The contribution of the paper is the comparison of knowledge management frameworks on the basis of underlying system perspectives, and the identification, description, and application of some pluralistic frameworks. Each systems perspective constitutes a different discourse on the purposes served by knowledge management, and pluralisms are required to integrate them. Pluralisms constitute both a framework for inquiry in knowledge management and a design theory for collaborative technologies. The review is not exhaustive. It is beyond the scope of this paper to examine the link between the purposes served by knowledge management and the methodology required for development. The paper contributes to the literature that seeks to understand the complexity of knowledge management practice via 'awareness of the potential and the implications of the different discourses in the study of knowledge and knowledge management'.", "discussion_summary": "- Discussion and conclusion \n4.1 Discussion \nOnly the pluralistic frameworks described above c apture the richness of the practical example \nprovided by Ellingsen (2003), and the working definition provided by Davenport and Prusak (1998).\n- The alignment between knowledge management perspec tive (viz, knowledge application, knowledge \nnormalization, knowledge creation), the three plur alistic frameworks, and coordinating work in \nhospitals is summarised below.\n- Table 2: Pluralistic frameworks and their application to Ellingsen (2003) \nKnowledge \nmanagement \ndomain \nKnowledge \nApplication", "discussion_excerpt": "Discussion and conclusion \n4.1 Discussion \nOnly the pluralistic frameworks described above c apture the richness of the practical example \nprovided by Ellingsen (2003), and the working definition provided by Davenport and Prusak (1998).", "discussion_found": true, "discussion_paragraph_count": 10, "year": "", "venue": "Electronic Journal of Knowledge Management", "doi": "", "url": "", "keyword": "Design theory", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "  function limits the scope of design problems and explanatory power of current design theories. As an alternative with greater potential for explanatory power and a framework for solving a wider array of design problems, we propose that a relational theory of design is needed. Such a relational theory should mirror those currently developed in mathematics, physics, computer science, and even philosophy. We develop a relational theory for design based on the concept of affordances from perceptual psychology. Affordances help to explain the entanglement between designers, users, and artifacts‚Äîrelationships that are not currently handled by function based approaches to design. Affordance based design, as developed in this paper, does not offer a radical new approach to doing design, but rather a shift in design thinking. Our focus in this paper is therefore on the explanatory power and potential innovation fostered by this change in design thinking, as illustrated through several examples, and not on specific methods.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Research in Engineering Design", "doi": "10.1007/s00163-008-0060-3", "url": "", "keyword": "Design theory", "cluster": 6, "cluster_theme_terms": "visualization, sonification, aesthetics, theories, method theory, thriving, science, technical", "cluster_label_candidate": "Cluster 6: Design Theory through definition and conceptual framing", "distinguishing_evidence_terms": "Method Theory, Design Science, Comes First-theory, Unified Terminology", "cluster_summary_candidate": "Within this keyword view, this cluster is set apart by Comes First-theory, Unified Terminology. Its dominant move, definition and conceptualization of design theory, is shared across most of this view, so the distinguishing terms above carry the interpretive weight. Representative papers: Eight Components of a Design Theory of Sonification; Web-based i en two interdependent spaces with different structures and logics: the space of concepts (C) and the space of knowledge (K). Both pragmatic views of Design and existing Design theories define Design as a dynamic mapping process between required functions and selected structures. However, dynamic mapping is not sufficient to describe the generation of new objects and new knowledge which are distinctive features of Design. We show that C-K theory captures such generation and offers a rigorous definition of Design. This is illustrated with an example: the design of Magnesium-CO2 engines for Mars explorations. Using C-K theory we also discuss Braha and Reich‚Äôs topological structures for design modelling (Braha and Reich 2003). We interpret this approach as special assumptions about the stability of objects in space K. Combining C-K theory and Braha and Reich‚Äôs models opens new areas for research about knowledge structures in Design theories. These findings confirm the analytical and interpretative power of C-K theory.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Research in Engineering Design", "doi": "10.1007/s00163-008-0043-4", "url": "", "keyword": "Design theory", "cluster": 6, "cluster_theme_terms": "visualization, sonification, aesthetics, theories, method theory, thriving, science, technical", "cluster_label_candidate": "Cluster 6: Design Theory through definition and conceptual framing", "distinguishing_evidence_terms": "Method Theory, Design Science, Comes First-theory, Unified Terminology", "cluster_summary_candidate": "Within this keyword view, this cluster is set apart by Comes First-theory, Unified Terminology. Its dominant move, definition and conceptualization of design theory, is shared across most of this view, so the distinguishing terms above carry the interpretive weight. Representative papers: Eight Components of a Design Theory of Sonification; Web-based of other field work methods and methodologies. Based on this foundation we provide definitions, propose a methodological framework, and provide practical guidance for conducting design studies. We define a design study as a project in which visualization researchers analyze a specific real-world problem faced by domain experts, design a visualization system that supports solving this problem, validate the design, and reflect about lessons learned in order to refine visualization design guidelines. We characterize two axes - a task clarity axis from fuzzy to crisp and an information location axis from the domain expert's head to the computer - and use these axes to reason about design study contributions, their suitability, and uniqueness from other approaches. The proposed methodological framework consists of 9 stages: learn, winnow, cast, discover, design, implement, deploy, reflect, and write. For each stage we provide practical guidance and outline potential pitfalls. We also conducted an extensive literature survey of related methodological approaches that involve a significant amount of qualitative field work, and compare design study methodology to that of ethnography, grounded theory, and action research.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2012", "venue": "", "doi": "10.1109/TVCG.2012.213", "url": "", "keyword": "Design Guidelines", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_popul 74bec243b7f", "title": "Universal Structural-Semantic Model of Design Patterns", "authors": "S. Vlajic; A. Trujic; M. Milic; D. Savic; A. Poledica", "abstract": "This paper introduces the Universal StructuralSemantic Model of Design Patterns (USSMDP), a minimal and formal framework that explicitly separates a pattern's structural skeleton from its semantic and behavioral specification. USSMDP represents structure using Basic Design Pattern Structure of the Solution (BDPSS) and captures semantic intent, responsibilities, and operational relations through Basic Design Pattern Semantic Module (BDPSM). This separation enables unambiguous specification of pattern participants and their roles while remaining independent of implementation details and modeling notation. The approach is demonstrated through full structural-semantic formalizations of three representative GoF patterns - Abstract Factory, Composite, and Observer-covering creation, composition, and behavioral dependency management, respectively. The results show that USSMDP provides concise, machine-readable yet human-interpretable pattern specifications, suitable for systematic analysis, education, and further automation.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2026", "venue": "", "doi": "10.1109/IT67293.2026.11435724", "url": "", "keyword": "Design Patterns", "cluster": 9, "cluster_theme_terms": "patterns, management, software, object, computer interaction, structural, architecture, modeling", "cluster_label_candidate": "Cluster 9: Design Pattern through definition and conceptual framing", "distinguishing_evidence_terms": "Design Science, Biological Cells, Computer Interaction, Participatory Futures", "cluster_summary_candidate": "Within this keyword view, this cluster is set apart by Biological Cells, Computer Interaction, Participatory Futures. Its dominant move, definition and conceptualization of design pattern, is shared ac bstract": "This paper defines, analyzes, and discusses the emerging genre of visualization atlases. We currently witness an increase in web-based, data-driven initiatives that call themselves ‚Äúatlases‚Äù while explaining complex, contemporary issues through data and visualizations: climate change, sustainability, AI, or cultural discoveries. To understand this emerging genre and inform their design, study, and authoring support, we conducted a systematic analysis of 33 visualization atlases and semi-structured interviews with eight visualization atlas creators. Based on our results, we contribute (1) a definition of a visualization atlas as a compendium of (web) pages aimed at explaining and supporting exploration of data about a dedicated topic through data, visualizations and narration. (2) a set of design patterns of 8 design dimensions, (3) insights into the atlas creation from interviews and (4) the definition of 5 visualization atlas genres. We found that visualization atlases are unique in the way they combine i) exploratory visualization, ii) narrative elements from data-driven storytelling and iii) structured navigation mechanisms. They target a wide range of audiences with different levels of domain knowledge, acting as tools for study, communication, and discovery. We conclude with a discussion of current design practices and emerging questions around the ethics and potential real-world impact of visualization atlases, aimed to inform the design and study of visualization atlases.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2025", "venue": "", "doi": "10.1109/TVCG.2024.3456311", "url": "", "keyword": "Design Patterns", "cluster": 6, "cluster_theme_terms": "visualization, sonification, aesthetics, theories, method theory, thriving, science, technical", "cluster_label_candidate": "Cluster 6: Design Theory through definition and conceptual framing", "distinguishing_evidence_term paper_id": "02381ea80183", "title": "A design theory for data quality tools in data ecosystems: Findings from three industry cases", "cluster": 6, "distance": 0.4176968107185648}]}, {"paper_id": "42c66c187222", "title": "Toward an effective approach to collaboration education: A taxonomy for game design", "authors": "A. Loparev; C. A. Egert", "abstract": "Collaborative video games provide a challenge to designers, who must account for not only the thoughts and actions of individuals, but also the events and interactions among players. However, such games are also an important potential tool for teaching and promoting collaboration, a concept crucial to academia, industry, and education. Before we can develop the necessary design principles to guide game design or the assessment tools to determine the impact of collaborative video games, we must first understand the concept of collaboration. Unfortunately, collaboration is ambiguous, and contradictory definitions exist throughout literature. To reconcile the research space and develop a concrete understanding of collaboration, we analyzed over 25 existing studies and surveys from a wide range of disciplines and with diverse target demographics. The resulting multilevel taxonomy has four main components: group quality, coordination, communication, and support, which in turn are split into subcomponents. Our taxonomy can be used by researchers to inform study design, by game creators to develop design principles, and by educators to guide collaboration assessment.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2015", "venue": "", "doi": "10.1109/GEM.2015.7377203", "url": "", "keyword": "Design principles", "cluster": 5, "cluster_theme_terms": "games, ecc, instructional, collaboration, methodology, practices, cognitive architecture, player", "cluster_label_candidate": "Cluster 5: Design Theory through definition and conceptual framing around Game", "distinguishing_evidence_terms": "Design Science, Program Concerns, Horizontal Extension, Cognitive Architecture", "cluster_summary_candidate": "Within this keyword view, this cluster is set apart by Program Concerns, Horizontal Extension, Cognitive Architecture. Its dominant move, definition and conceptualization of design theory, is shared across most of this view, so the distinguishing terms above carry the interpretive weight. Its contribution coding (Methodological, Empirical, Theoretical) also departs from the view majority. Representative papers: Collaboration Engineering Methodology: Horizontal Extension to Accommodate Project and Program Concerns; The ECC Methodology for Architecture Design Theory and Practices Research.", "design_knowledge_form": "Design Theory", "design_knowledge_action": "defines and conceptualizes", "design_knowledge_role": "Conceptual Framework", "design_knowledge_contribution": "defines and conceptualizes Design Theory", "facet_population_or_context": "Education / Learning", "facet_stakeholder_or_population": "Players", "facet_method_or_lens": "", "facet_artifact_or_domain": "Game", "facet_contribution_or_outcome": "Methodological, Empirical, Theoretical", "umap_x": 2.383162021636963, "umap_y": 3.5633416175842285, "distance_to_centroid": 0.295451425228373, "representative_rank": 3, "is_representative_top3": true, "medoid_rank": 3, "lda_topic": 3, "lda_topic_probability": 0.9823497126697901, "lda_topic_words": "rationale, games, entertainment, assessment, theoretical, components, literature, activities", "nearest_papers": [{"paper_id": "6f73a944b8d6", "title": "Video collaboratories for research and education: An analysis of collaboration design patterns", "cluster": -1, "distance": 0.18475475852595769}, {"paper_id": "2280b868ea5f", "title": "Form and Function: Toward a Better Understanding of Design-Based Games", "cluster": 5, "distance": 0.42876938718865887}, {"paper_id": "1e8f1494fc78", "title": "Collaboration Engineering Method ed on feedback control.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2025", "venue": "", "doi": "10.1109/Designing66910.2025.00016", "url": "", "keyword": "Design principles", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": -1.741348147392273, "umap_y": 8.038259506225586, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 9, "lda_topic_probability": 0.9774970074237741, "lda_topic_words": "guidelines, visual, decision, tools, rationale, capture, provide, typology", "nearest_papers": [{"paper_id": "677c4dc89d1d", "title": "Elemental design patterns: A formal semantics for composition of OO software architecture", "cluster": 9, "distance": 0.4884957374671768}, {"paper_id": "02381ea80183", "title": "A design theory for data quality tools in data ecosystems: Findings from three industry cases", "cluster": 6, "distance": 0.5071867738011939}, {"paper_id": "03fd54829f02", "title": "Digisprudence: the design of legitimate code", "cluster": -1, "distance": 0.517918436340126}, {"paper_id": "93bb03ac03b6", "title": "Design principles for data analysis", "cluster": -1, "distance": 0.536891176405425}, {"paper_id": "9020aa145571", "title": "A Process Framework for Designing Software Reference Architectures for Providing Tools as a Service", "cluster": -1, "distance": 0.5422327611898837}]}, {"paper_id": "b77e7d67555e", "title": "USSF: A Unified Framework for Screen Standardization in Software Systems", "authors": "H. Hristov", "abstract": "This paper introduces the Unified Screen Standardization Framework (USSF), a methodological model that consolidates the heterogeneous principles (such as Nielsen‚Äôs heuristics, ISO 9241 principles, WCAG accessibility recommendations, Shneiderman‚Äôs Eight Golden Rules, Norman‚Äôs design principles, etc.) into a coherent, hierarchical structure. USSF employs two novel mechanisms: (1) artifact-based indexing (APP, SCR, DIA, FRM, CMP, WID) to represent application elements in hierarchical form and (2) inheritance with override rules for systematically applying and adapting standards across different levels of user interface elements. The framework enables traceability, scalability and methodological clarity, supporting both usability evaluation and future integration with automated design tools. The USSF could acts as a composite high-level standard that integrates existing standards, principle, heuristics, established usability and accessibility guidelines into a unified model. An illustrative example demonstrates the framework‚Äôs applicability, while a discussion highlights its benefits, limitations and potential for empirical validation. The USSF thus provides a novel contribution to human-computer interaction by bridging established guidelines and enabling standardized, traceable and adaptable screen design.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2025", "venue": "", "doi": "10.1109/CIEES66347.2025.11300084", "url": "", "keyword": "Design principles", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense n: Towards a Framework", "cluster": 8, "distance": 0.3688365484400403}, {"paper_id": "7d99b05f405e", "title": "Design Patterns for AI-based Systems: A Multivocal Literature Review and Pattern Repository", "cluster": -1, "distance": 0.427640615353422}, {"paper_id": "f16832406221", "title": "A Framework for Systemic Design", "cluster": -1, "distance": 0.45429634992370505}]}, {"paper_id": "560be0c20de7", "title": "Designing for Trust, Progress, and Dignity: A Conceptual Framework for Reliability, Responsiveness, and Relational Quality in AI-Enabled Service Systems", "authors": "M. Colgate; Orla Colgate", "abstract": "AI is now embedded in frontline service at scale, yet the design frameworks managers reach for were built around human agents and do not translate cleanly to systems that generate rather than retrieve, that automate rather than augment. This paper argues that three design challenges sit at the heart of the problem, though they are rarely treated as a connected set. Generative AI can produce fluent, confident outputs that are simply wrong, which is a qualitatively different kind of reliability failure from anything SERVQUAL was designed to address. AI can reply instantly while leaving the customer no closer to resolution, exposing a gap between speed and what we might call felt responsiveness. And it faces an awkward relational tension. Overclaiming warmth triggers distrust, yet there are genuine service contexts in which the non-human nature of the system is a feature rather than a liability. The RRR Design Framework developed here extends established service quality dimensions to the AI context, organising fifteen prescriptive design principles around reliability, responsiveness, and relational quality, each reconceptualised for AI-mediated service. The principles follow a prevent-and-recover logic within each dimension and are tied together by a single strategic proposition, which is to automate to protect relationships. Four empirically testable propositions are derived from the framework, each operationalised with measurable constructs, moderating conditions, and falsifiable null cases. The framework is most applicable to hybrid human-AI frontline systems where customers are actively working toward a resolution.", "discussion_summary": "- Discussion and Implications\nThe RRR Design Framework is designed for hybrid human-AI frontline service sys-\ntems where customers are actively seeking resolution, guidance, or support.\n- This includes\nchatbots, voice assistants, triage systems, and service robots operating in contexts such as\ntelecommunications, financial services, healthcare screening, and retail support.\n- The frame-\nwork translates less directly to fully automated back-end processing where customers are\nnot present as interactants, or to purely self-service systems where no human fallback exists\nby design.", "discussion_excerpt": "Discussion and Implications\nThe RRR Design Framework is designed for hybrid human-AI frontline service sys-\ntems where customers are actively seeking resolution, guidance, or support.", "discussion_found": true, "discussion_paragraph_count": 10, "year": "2026", "venue": "Information", "doi": "", "url": "https://www.semanticscholar.org/paper/51493efcd757168bfe90566436e0982efe07bfd9", "keyword": "Design frameworks", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": -3.8569302558898926, "umap_y": 6.3418402671813965, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 0, "lda_topic_probability": 0.9816297427880659, "lda_topic_words": "service, architecture, creation, software, method theory, problem, theories, types", "nearest_papers": [{"paper_id": "f50a79b2d7e1", "title": "Towards scaling expertise with generative AI: design principles for governing AI-Mediated knowledge capture and transfer", "cluster": 8, "distance": 0.26778913461236753}, {"paper_id": "3269f651fd9c", "title": "Designing AI-Enabled Engineering Courses: E-AIP Framework for Learning Outcomes, Process Evidence, and Integrity", "cluster": -1, "distance": 0.42344999627533075}, {"paper_id": "bdf1addf5a10", "title": "Contestable AI by Design: Towards a Framework", "cluster": 8, "distance": 0.4370182121464202}, {"paper_id": "2efb92894924", "title": "Particles of a Whole: Design Patterns for Transparent and Auditable AI-Systems", "cluster": 8, "distance": 0.4402466274895831}, {"paper_id": "41443180c5b4", "title": "Service Ecosystem Design: Propositions, Process Model, and Future Research Agenda", "cluster": 1, "distance": 0.5023550477874197}]}, {"paper_id": "1e7ab64c6cf9", "title": "Commentary: Strength-based co-design that EMPOWERs ‚Äì Lessons from codesigning with older adults", "authors": "Bernardo Figueiredo; T. Aleti; Diane M. Martin; Mike Reid; Jacob Sheahan; Larissa Hjorth", "abstract": "Purpose\nThis study aims to address the existing gap in co-design frameworks by introducing the EMPOWER framework, a strength-based co-design methodological approach specifically designed to tackle the key empowerment challenges associated with co-designing alongside individuals experiencing vulnerability. The purpose of this study is to provide a set of easy-to-remember empowering guidelines to enhance the co-design process.\n\n\nDesign/methodology/approach\nEMPOWER is based on lessons from the field, through five years of working with older adults.\n\n\nFindings\nThe framework includes seven guidelines to overcome common challenges in co-design research. The acronym EMPOWER refers to guidelines for extending, multiplying, publicising, outsourcing, widening, enabling and reflecting on co-design research.\n\n\nResearch limitations/implications\nAlthough extendable to other experiences of vulnerability, the examples provided focus on the experiences of ageing consumers.\n\n\nPractical implications\nEMPOWER has direct relevance to practitioners wishing not only to work with consumers experiencing vulnerabilities but also to empower these consumers through purposeful research actions.\n\n\nSocial implications\nAlthough drawing on co-design research with older adults, these guidelines can be applied to empower other groups experiencing vulnerability.\n\n\nOriginality/value\nThere is a relative lack of guidelines on how to strengthen the co-design process in a way that empowers consumers experiencing vulnerability. To address this, this paper offers a framework and some grounded examples contributing to the current knowledge of co-design in marketing.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2023", "venue": "Journal of Services Marketing", "doi": "", "url": "https://www.semanticscholar.org/paper/66872f88e4301696a2c140413d0072fc0e04dd88", "keyword": "Design frameworks", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakehol asurement. Although learning design frameworks and learning analytics have been used to evaluate learning designs, their use is hampered by this lack of an agreed terminology. This study addresses these challenges by initially identifying key ODL activities that are associated with higher quality learning designs. The learning activity terminology was tested using independent raters, who categorised the learning activities in four ODL courses as ‚Äòinteraction‚Äô, ‚Äòfeedback‚Äô or ‚Äòother‚Äô, with inter-rater reliability near or above recommended levels. Whilst challenges remain for consistent categorisation, the analysis suggests that increased clarity in the learning activity will aid categorisation. As a result of this analysis, the E-Design Assessment Tool (eDAT) has been developed to incorporate this key terminology and enable improved quantification of learning designs. This can be used with learning analytics, particularly retention and attainment data, thus providing an effective feedback loop on the learning design.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2019", "venue": "Research in Learning Technology", "doi": "", "url": "https://www.semanticscholar.org/paper/b16b678f10cc89599644f2c85895dbff730b3569", "keyword": "Design frameworks", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": -2.4113211631774902, "umap_y": 6.161081314086914, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 3, "lda_topic_probability": 0.9849984709150139, "lda_topic_words": "rationale, games, entertainment, assessment, theoretical, components, literature, activities", "nearest_papers": [{"paper_id": "92fd41483399", "title": "Design exemplars for synchronous e-learning: A design theory approach", "cluster": -1, "distance": 0.16328756949047551}, {"paper_id": "fee96194a322", "title": "Personalising learning: towards a coherent learning design framework", "cluster": -1, "distance": 0.19629116515788592}, {"paper_id": "9049c4d2bbec", "title": "Towards a design theory of blended learning curriculum", "cluster": -1, "distance": 0.30629568758438686}, {"paper_id": "3269f651fd9c", "title": "Designing AI-Enabled Engineering Courses: E-AIP Framework for Learning Outcomes, Process Evidence, and Integrity", "cluster": -1, "distance": 0.43822604968753087}, {"paper_id": "7ebbe03ea0d8", "title": "Autobiographical design in HCI research: designing and learning through use-it-yourself", "cluster": -1, "distance": 0.5008313557613704}]}, {"paper_id": "e09769771b82", "title": "The Experience, Dynamics and Artifacts Framework: Towards a Holistic Model for Designing Serious and Entertainment Games", "authors": "Gabriel C. Natucci; M. A. Borges", "abstract": "Games have been used by educators as a mean for increasing learning retention and providing students with entertainment experiences that go beyond the classroom. However, the process of creating a game for educational purposes (serious game) is segmented into its entertainment structures, which usually are underemployed in a pedagogical application, and in purely educational components, which have been extensively detailed in the literature. This division can hinder the player/learner experience as too much focus in one of these areas can either compromise knowledge acquisition or engagement. To overcome this issue, this work proposes a holistic view of games that includes both learning and entertainment elements, making them indistinguishable in creating either an entertainment or serious game. This notion is further reinforced by reviewing common game design frameworks found in the literature that have an empirical background, and by proposing a unified game design framework that uses elements from the analyzed frameworks and enhances them by including the latest research into game-based learning and serious games guidelines. By proposing a holistic view of games and an accompanying framework, a new way of facing game design is proposed that encourages designers to consider the postgame learning experiences and stimulates educators to take the entertainment aspects of their game more deeply.", "discussion_summary": "- Discussion\nThe proposed EDA framework is an attempt to unify\nconcepts related to entertainment games and serious games.\n- It brings forward a fundamental element of every game, the\ngame loop, to integrate Experience, Artifacts, and Dynamics\ninto an iterative cycle that represents the interactions between\nplayer and game, as well as their temporal relations.\n- The\nEDA was also detailed in a second level, following common\nstructures found in empirical frameworks, such as narrative\nelements, aesthetics elements, and game mechanics.", "discussion_excerpt": "Discussion\nThe proposed EDA framework is an attempt to unify\nconcepts related to entertainment games and serious games.", "discussion_found": true, "discussion_paragraph_count": 10, "year": "2021", "venue": "2021 IEEE Conference on Games (CoG)", "doi": "", "url": "https://www.semanticscholar.org/paper/c99ce43ca2809df3634eb95801e9f47fa335d56f", "keyword": "Design frameworks", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 2.527510166168213, "umap_y": 3.7840206623077393, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 3, "lda_topic_probability": 0.9915091690577009, "lda_topic_words": "rationale, games, entertainment, assessment, theoretical, components, literature, activities", "nearest_papers": [{"paper_id": "7afa6519f6fc", "title": "The experience, dynamics and artifacts framework: towards a holistic model for designing serious and entertainment games", "cluster": -1, "distance": 0.0}, {"paper_id": "2280b868ea5f", "title": "Form and Function: Toward a Better Understanding of Design-Based Games", "cluster": 5, "distance": 0.3198670481523812}, {"paper_id": "d0a936b480d4", "title": "Acquiring educational access for neurodiverse learners through multisensory design principles", "cluster": -1, "distance": 0.795541802989593}, {"paper_id": "056ae4e01610", "title": "Beyond the old game design: a new design paradigm in Game Studies through C-K Theory", "cluster": 4, "distance": 0.8027777491425112}, {"paper_id": "dbc171dde63a", "title": "Perfect Eudaimonic User Experience Design That Aristotle Would Have Wanted", "cluster": -1, "distance": 0.8049364003964857}]}, {"paper_id": "d0a17557440f", "title": "Avoiding virtual dystopia: A design theory for emancipatory participatory immersive platforms", "authors": "Fabian Tingelhoff; Jens Joachim Marga", "abstract": "Immersive platforms, accessed via VR and AR interfaces, offer a profound digital experience but raise significant privacy and ethical concerns. Current systems collect extensive user data; this enables manipulative advertising and behavior control, fosters self-censorship, and diminishes authentic self-expression ‚Äì especially among marginalized communities. The unchecked development of immersive platforms threatens to create oppressive environments due to power imbalances and a lack of regulation. This paper addresses the urgent need for emancipatory design guidelines to prevent such outcomes. By integrating critical theory with Participatory Design, we propose Emancipatory Participatory Immersive Platforms. These platforms involve users in their design and dismantle oppressive structures through four emancipatory tools (i.e., agency, dialogue, inclusion, and rationality), substantiated by eight actionable design principles. Our framework aims to empower users, promote inclusivity, and ensure rational engagement ‚Äì and thereby foster immersive platforms that maintain functional benefits while enhancing freedom and equity.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2025", "venue": "Journal of strategic information systems", "doi": "", "url": "https://www.semanticscholar.org/paper/0118e4e235a32b2389d0a4caf0344774b888ca5c", "keyword": "Design Guidelines", "cluster": 1, "cluster_theme_terms": "platforms, digital, theoretical framework, service, online, remote, studio, media", "cluster_label_candidate": "Cluster 1: Design Theory through definition and conceptual framing around Interface", "distinguishing_evidence_terms": "Digital Platforms, Theoretical Framework, Design Guidelines, Education / Learning", "cluster_summary_candidate": "Within this keyword view, this cluster is set apart by Digital Platforms, Education / Learning. Its dominant move, definition and conceptualization of design theory, is shared across most of this view, so the distinguishing terms r a good language design. In this paper we investigate guidelines that are useful for designing domain specific languages, largely based on our experience in developing languages as well as relying on existing guidelines on general purpose (GPLs) and modeling languages. We defined guidelines to support a DSL developer to achieve better quality of the language design and a better acceptance among its users.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2014", "venue": "arXiv.org", "doi": "", "url": "https://www.semanticscholar.org/paper/26640e6ab9ea74e28d9401eaf3f66a78a2ab19b7", "keyword": "Design Guidelines", "cluster": 3, "cluster_theme_terms": "language, task, toulmin, adaptation, model argumentation, symbols, functional components, canonical", "cluster_label_candidate": "Cluster 3: Design Guideline through definition and conceptual framing", "distinguishing_evidence_terms": "Model Argumentation, Canonical Task Types, Functional Components, Domain Specific Languages", "cluster_summary_candidate": "Within this keyword view, this cluster is set apart by Model Argumentation, Canonical Task Types, Functional Components. Its dominant move, definition and conceptualization of design guideline, is shared across most of this view, so the distinguishing terms above carry the interpretive weight. Representative papers: Design Guidelines for Domain Specific Languages; Design Rules, Volume 2: Chapter 6‚ÄîThe Value Structure of Technologies, Part 1: Mapping Functional Components.", "design_knowledge_form": "Design Guideline", "design_knowledge_action": "defines and conceptualizes", "design_knowledge_role": "Representational Modeling Schema", "design_knowledge_contribution": "defines and conceptualizes Design Guideline", "facet_population_or_context": "", "facet_stakeholder_or_population": "Designers", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "Methodo y also attempts to identify the contributions of sidewalk design factors in the main dimensions of EU applied to sidewalks. To achieve these objectives, we conduct an extensive literature review of available universal design guidelines and handbooks as well as scientific articles regarding the implementation of EU in outdoor environments and sidewalks. The results of this review contribute to the development of conceptual models to define EU in sidewalk design. A questionnaire was administered to collect data to test the fitness of these conceptual models. Fitness tests are conducted with structural equation modelling (SEM). The EU translation can be useful for designing and assessing sidewalks to ensure that sidewalks serve people with various abilities on an equal basis.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2019", "venue": "Cities", "doi": "", "url": "https://www.semanticscholar.org/paper/5a686e01a536a318c32f70e8b1eb114fd34c05de", "keyword": "Design Guidelines", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 0.21472987532615662, "umap_y": 6.851739883422852, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 6, "lda_topic_probability": 0.9639942791028366, "lda_topic_words": "literature, review, concept tware implementation TSPACE. The presented framework emphasizes on keeping the conceptual meta-model of the domain under investigation at the core of SRA design strategy and use it as a guiding tool for design, evaluation, implementation and evolution of the SRA. The framework also emphasizes to consider the nature of the tools to be provisioned and underlying cloud platforms to be used while designing SRA. The framework recommends adoption of the multi-faceted approach for evaluation of SRA and quantifiable measurement scheme to evaluate quality of the SRA. We foresee that RADeF can facilitate software architects and researchers during design, application and evaluation of a SRA and its instantiations into concrete software systems.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2016", "venue": "International Conference on Product Focused Software Process Improvement", "doi": "", "url": "https://www.semanticscholar.org/paper/67ea5b36bfc4ea94e7fb7aa36c54bef831deb69e", "keyword": "Design Guidelines", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": -0.4311870038509369, "umap_y": 4.4740166664123535, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 0, "lda_topic_probability": 0.9830156970360833, "lda_topic_words": " Abeele; B. Zaman", "abstract": "A theoretical framework and practical case for designing likeable interactive media applications for preschoolers in the home environment are introduced. First, we elaborate on the theoretical framework. We introduce the uses and gratifications paradigm (U&G). We argue that U&G is a good approach to researching likeability of media applications. Next, we complete the U&G framework with expectancy-value (EV) theory. EV theory helps us move from theoretical insights to concrete design guidelines. Together, the U&G framework and the EV model form the foundation of our extended likeability framework for the design and evaluation of interactive media applications, for preschoolers in the home environment. Finally, we demonstrate a practical case of our extended likeability framework via the research project CuTI. The CuTI project aims at revealing those particular user gratifications and design attributes that are important to support playful behaviour and fun activities of preschoolers in the home environment.", "discussion_summary": "- Discussion and Future W ork\nWith the emergence of new technologies, the HCI commu-\nnity is fully aware of the need for theories and methods for\nlikeability research.\n- In this article, we aimed at demonstrating\nhow the uses and gratiﬁcations paradigm together with\nexpectancy value theory could ﬁll in one of the blanks in\ndesigning likeable applications for preschoolers.\n- The paper remains exploratory, at best hypothesis-\ngenerating, in the methods used to elicit responses, in the list\nof attributes and gratiﬁcations derived and in the proposed\nstructure linking these.", "discussion_excerpt": "Discussion and Future W ork\nWith the emergence of new technologies, the HCI commu-\nnity is fully aware of the need for theories and methods for\nlikeability research.", "discussion_found": true, "discussion_paragraph_count": 10, "year": "2008", "venue": "Adv. Hum. Comput. Interact.", "doi": "", "url": "h ng New Ways to Negotiate Context, Law, and Design", "cluster": -1, "distance": 0.534130964215012}]}, {"paper_id": "af4a4237d98a", "title": "Utilization of design principles for hybrid learning configurations by interprofessional design teams", "authors": "Petra H. M. Cremers; A. Wals; R. Wesselink; M. Mulder", "abstract": "Educational design research yields design knowledge, often in the form of design principles or guidelines that provide the rationale or ‚Äòknow-why‚Äô for the design of educational interventions. As such, design principles can be utilized by designers in contexts other than the research context in which they were generated. Although research has shown that quality support is important for design success, less is known about processes that promote utilization of design principles as the rationale for instructional design. In this study we therefore explored an intervention for promoting the utilization of a set of research-based design principles in educational practice. This intervention aimed to promote utilization through enhancing perceived usefulness of the design principles by design teams in various contexts. The set of design principles that was utilized by the design teams in this study underpins the design of so-called hybrid learning configurations that are situated at the interface between school and workplace. The intervention was developed from the perspective of boundary crossing theory and was conducted with four different design teams. It was evaluated by way of a questionnaire and a dialogue with members of the design teams. This boundary crossing intervention appeared to bring about the desired outcomes. Most of the design team members considered the set of design principles useful in several different ways and they expected that utilization of the principles would lead to an improved learning configuration.", "discussion_summary": "- Discussion\nIn this study we framed the set of design principles as a boundary object.\n- One mi in particular STEM education. However, such a repositioning of teaching as a design science challenges teachers to reconceptualize educational practice as an act of design, not in the artistic meaning of the word. Our recent research finding also indicated that teacher design knowledge (TDK) processes are often invisible to both the teacher educators and the teachers. To respond to these challenges, this paper will define TDK for STEM teachers by making TDK visible in the form of a TDK competency taxonomy. A systematic literature review was conducted to identify the characteristics of teaching practices in technology-enhanced learning environments. This TDK competency taxonomy consists of four main categories drawing on existing literature on teacher design work and teacher instructional design: data practice, design practice, knowledge creation practice, and professional teaching practice. The implications of these findings were discussed.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2019", "venue": "Research and Practice in Technology Enhanced Learning", "doi": "", "url": "https://www.semanticscholar.org/paper/b2c846608aefa5aa21c43b4819c02c7bcc295e5c", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": -2.9036757946014404, "umap_y": 6.148314476013184, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 8, "lda_topic_probability": 0.6526056770090007, "lda_topic_words": "patterns, software, engineering, domain, object, architecture, solutions, problems", "nearest_papers": [{"paper_id": "00d7fbafe65f", "title": "Demystifying Tacit Knowledge in Graphic Design: Characteristics, Instances, Approaches, and Guidelines", "cluster": -1, "distance": 0.4660583788488687}, {"paper_id": "268903a30da5", "title": "Systematic Review of Systemic Design Frameworks for Complex Challenges", "cluster": 8, "distance": 0.49525826063670064}, {"paper_id": "19dd6ec0253e", "title": "A principle-based philosophical framework for fashion design praxis and education in new design landscapes", "cluster": -1, "distance": 0.5271570564855074}, {"paper_id": "fee96194a322", "title": "Personalising learning: towards a coherent learning design framework", "cluster": -1, "distance": 0.5316428512219276}, {"paper_id": "a21900f84443", "title": "Undesigning technology: considering the negation of design by design", "cluster": -1, "distance": 0.5400290215753099}]}, {"paper_id": "2042efa7e455", "title": "The DSR grid: six core dimensions for effectively planning and communicating design science research projects", "authors": "J. Brocke; A. Maedche", "abstract": "The goal of design science research (DSR) is to generate prescriptive knowledge about the design of Information Systems (IS) artifacts like software, methods, models, and concepts (Hevner et al. 2004). In a wider sense, DSR intends to generate design knowledge, that is, knowledge about innovative solutions to real-world problems (vom Brocke et al. 2019). As such, DSR is considered particularly promising regarding its ability to contribute to practice through such means as digital innovation (Rai 2017) and to address our society‚Äôs (grand) challenges (Becker et al. 2015), such as that of ensuring environmental sustainability (Loos et al. 2011; Pernici et al. 2012; vom Brocke and Seidel 2012). Each DSR project is a complex matter with many aspects that must be considered. DSR is an iterative process, starting with the identification of a problem in the problem space and evaluating alternative solutions in the solution space. Through multiple iterations, a DSRproject seeks to contributemeans-end relationships between problem and solution spaces (Venable 2006). All DSR activities must be aligned to such intended contributions so modifications in such positioning lead to subsequent changes in how to scope and plan a DSR project. Multiple stakeholders are often involved in conducting DSR project, which makes it important to coordinate and communicate DSR research (vomBrocke and Lippe 2010). Stakeholders of DSR projects include researchers, industry partners, and editors. These roles should be considered in any DSR project e.g. in terms of their focus (e.g., domain expert or method expert) and seniority (e.g., Ph.D. student, Ph.D. supervisor). Such multi-stakeholder collaboration makes it important to communicate the manifold considerations of a DSR project in an efficient way. Based on our own experience as editors of DSR special issues, conferences and tracks, directors of many DSR projects and research programs, and mentors of Ph.D. students on DSR projects, we see great value in high-level representations of a DSR project that make it possible to capture on one page the project‚Äôs key aspects. Therefore, this article identifies six core dimensions of a DSR project that can lay the foundation for a high-level, one-page framework that describesDSRprojects. Similar approaches have been presented in other areas of research, including conceptual modeling (Frank et al. 2014) and reference modeling (vom Brocke 2007), where frameworks (specifically, process frameworks) provide a high-level conceptualization of various parts of more complex models (vom Brocke and Buddendick 2006; Legner et al. 2019), an gh research has shown that quality support is important for design success, less is known about processes that promote utilization of design principles as the rationale for instructional design. In this study we therefore explored an intervention for promoting the utilization of a set of research-based design principles in educational practice. This intervention aimed to promote utilization through enhancing perceived usefulness of the design principles by design teams in various contexts. The set of design principles that was utilized by the design teams in this study underpins the design of so-called hybrid learning configurations that are situated at the interface between school and workplace. The intervention was developed from the perspective of boundary crossing theory and was conducted with four different design teams. It was evaluated by way of a questionnaire and a dialogue with members of the design teams. This boundary crossing intervention appeared to bring about the desired outcomes. Most of the design team members considered the set of design principles useful in several different ways and they expected that utilization of the principles would lead to an improved learning configuration.", "discussion_summary": "- Discussion\nIn this study we framed the set of design principles as a boundary object.\n- One might argue\nthat a boundary object’s main function is to facilitate collaboration among actors from\ndifferent social worlds and that a set of design principles that ‘travels’ from the world of\nresearch to the world of educational design practice is not aim\n- Therefore it could be considered incorrect to frame a\nset of design principles as a boundary object.", "discussion_excerpt": "Discussion\nIn this study we framed the set of design principles as a boundary object.", "discussion_found": true, "discussion_paragraph_count": 10, "year": "2016", "venue": "Instructional Science", "doi": "", "url": "https://www.semanticscholar.org/paper/c789600c7369b skas", "abstract": "According to the principles of participatory design, a genuine democratic process requires effective participation of all affected people in the design process; this must include affected disabled users. However, user participation entails complex problems, which are aggravated by conditions of illiteracy and/or aging. This article presents the concept of Universal Participatory Design, a design philosophy and practice that aims to be inclusive during the design process, and which has a positive result for all. We first conducted a review of the literature to understand the limits of the relationships between participatory design and universal design. This paper then addresses some of the challenges to achieve Universal Participatory Design (UPD) by juxtaposing deficits observed in the literature with issues we experienced during two research projects. We discuss the key components of Participatory Design and its relationship to UPD, and establish a research agenda that aims to conceptualize and investigate participatory design with universal access. Our findings indicate the need for flexible design methods, adaptable artifacts, and positive designers‚Äô attitudes when encountering unexpected situations.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2019", "venue": "", "doi": "", "url": "https://www.semanticscholar.org/paper/06bb9a92fbf53b9d7a93c86acc244c380656fc1f", "keyword": "Design methods", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster them d design method. The results illuminated trends regarding the impact of additional human-centred design methods on the HCM score. However, statistical significance remained elusive, potentially due to a series of limitations such as concept complexity, the small number of concepts, and the early developmental stage. The study‚Äôs limitations underscore the need for refined items and expanded samples to better gauge the impact of human-centred methods on product development.", "discussion_summary": "- Discussion\nThe evaluation with the HCM shows patterns and trends with regard to better human-\ncentredness when using additional methods that can be assigned to the area of human-\ncentredness in the broadest sense, in contrast to not using any additional method\n- This\nalso corresponds to our deﬁnition from Figure 1 that activities that take place without\ndirect user interaction but provide information about the user or the context of use are\nalso to be deﬁned as human-centred, since they are capable of improving human-\n- Due to the lack of signiﬁcance of the results, however,\nthis answer cannot be given conclusively.", "discussion_excerpt": "Discussion\nThe evaluation with the HCM shows patterns and trends with regard to better human-\ncentredness when using additional methods that can be assigned to the area of human-\ncentredness in the broadest sense, in contrast to not using any additional method.", "discussion_found": true, "discussion_paragraph_count": 10, "year": "2023", "venue": "Applied Sciences", "doi": "", "url": "https://www.semanticscholar.org/paper/e5f6abe0431dd1e20d6c555a3cdf31e1a8d632e9", "keyword": "Design methods", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge c design as a mindset, methodology, and set of methods that together enable teams to learn, innovate, and adapt to a complex and dynamic environment. We suggest that a systemic design mindset is inquiring, open, integrative, collaborative, and centred. We propose a systemic design methodology composed of six main activities: framing, formulating, generating, reflecting, inquiring, and facilitating. We view systemic design methods as a flexible and open-ended set of procedures for facilitating group collaboration that are both systemic and designerly.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2014", "venue": "", "doi": "", "url": "https://www.semanticscholar.org/paper/e7cf73c02d6b1359d48322826cd202eb83161e7a", "keyword": "Design methods", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": -2.9979820251464844, "umap_y": 6.899320602416992, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 1, "lda_topic_probability": 0.9742820592394544, "lda_topic_words": "practice, game, product, patterns, ontology, formal, systemic, prototyping", "nearest_papers": [{"paper_id": "d250dc6eb9d9", "title": "Systems Thinking and Design Thinking: The Search for Principles in the World We Are Making", "cluster": -1, "distance": 0.292881 ysical spaces created by the social interactions that take place there. In this article, I use this lens to uncover the ‚Äúliving places‚Äù of law, and what might be the ‚Äúliving law‚Äù that legal design patterns could capture? I explore law as a product of design, and design as an activity, an activity that produces the many material manifestations of law. These manifestations may be digital or analog, such as case files on paper or interactive online forms, courthouse architecture or institutional webpages, courtroom furniture or dispute resolution platforms. Although often overlooked in legal scholarship, such material manifestations shape legal interaction, privileging certain forms and actors over others. They reflect values and ideologies as well as legal concepts and doctrines. By thinking about law through legal design patterns, living law becomes defined through interaction. I explore this connection between spatial and material arrangements and legal interaction they manifest and enable. This analysis makes it possible to compare law‚Äôs old material manifestations with its new places and things that rely on digital technologies. This shift of focus to legal interaction enables us to ask what legal interaction is, how it should be designed, and by whom, reconceptualising the dynamics of law, technology, and design. Ultimately, legal design patterns may provide us with conceptual and methodological tools for designing user-centric justice.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2024", "venue": "Digital Society", "doi": "", "url": "https://www.semanticscholar.org/paper/1011c572d0207c2203619839525ce10850c028e4", "keyword": "Design Patterns", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are "paper_id": "ccc616a68c38", "title": "Towards Creating a Body of Evidence-based Interactive Digital Narrative Design Knowledge: Approaches and Challenges", "cluster": 4, "distance": 0.4175494433375375}, {"paper_id": "098637c0f9ae", "title": "Pattern design in the context space: paco - a methodological framework for designing auditory display with patterns", "cluster": 9, "distance": 0.5418342192684638}]}, {"paper_id": "1fda49b32463", "title": "A Pattern-Oriented Approach to a Methodical Evaluation of Modeling Methods", "authors": "M. Amberg", "abstract": "The paper describes a pattern-oriented approach to evaluate modeling methods and to compare various methods with each other from a methodical viewpoint. A specific set of principles (the patterns) is defined by investigating the notations and the documentation of comparable modeling methods. Each principle helps to examine some parts of the methods from a specific point of view. All principles together lead to an overall picture of the method under examination. First the core (\"method neutral\") meaning of each principle is described. Then the methods are examined regarding the principle. Afterwards the method specific interpretations are compared with each other and with the core meaning of the principle. By this procedure, the strengths and weaknesses of modeling methods regarding methodical aspects are identified. The principles are described uniformly using a principle description template according to descriptions of object oriented design patterns. The approach is demonstrated by evaluating a business process modeling method.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "1996", "venue": "Australasian Journal of Information Systems", "doi": "", "url": "https://www.semanticscholar.org/paper/5e199da79d0144ff9979ccc095e49b10504d7504", "keyword": "Design Patterns", "cluster": 9, "cluster_theme_terms": "patterns, management, software, object, computer interaction, structural, architecture, modeling", "cluster_label_candidate": "Cluster 9: Design Pattern through definition and conceptual framing", "distinguishing_evidence_terms": "Design Science, Biological Cells, Computer Interaction, Participatory Futures", "cluster_summary_candidate": "Within this keyword view, this cluster is set apart by Biological Cells, Computer Interaction, Participatory Futures. Its dominant move, definition and conceptualization of design pattern, is shared across most of this view, so the distinguishing terms above carry the interpretive weight. Representative papers: Design Patterns of Biological Cells; Patterns, anticipation and participatory futures.", "design_knowledge_form": "Design Pattern", "design_knowledge_action": "defines and conceptualizes", "design_knowledge_role": "Reusable Design Pattern Language", "design_knowledge_contribution": "defines and conceptualizes Design Pattern", "facet_population_or_context": "Education / Learning, Accessibility", "facet_stakeholder_or_population": "Designers, Practitioners, Developers", "facet_method_or_lens": "Design Science, Workshop", "facet_artifact_or_domain": "Tool, Interface, Game", "facet_contribution_or_outcome": "Methodological, Artifact/System, Theoretical", "umap_x": 0.9261094331741333, "umap_y": 3.7513701915740967, "distance_to_centroid": 0.4808875059577534, "representative_rank": 25, "is_representative_top3": false, "medoid_rank": 25, "lda_topic": 1, "lda_topic_probability": 0.9844807308966048, "lda_topic_words": "practice, game, product, patterns, ontology, formal, systemic, prototyping", "nearest_papers": [{"paper_id": "799b06403189", "title": "State of the Art on Robust Design Methods for Additive Manufacturing", "cluster": 9, "distance": 0.3782814812908618}, {"paper_id": "40a2d86cd488", "title": "Elements of a design method - a basis for describing and evaluating design methods", "cluster": 9, "distance": 0.4034516248542329}, {"paper_id": "ade4419d3095", "title": "Hybrid modeling design patterns", "cluster": 9, "distance": 0.42587175476006267}, {"paper_id": "35874d939f8d", "title": "Patterns, anticipation and participatory futures", "cluster": 9, "distance": 0.467632040871663}, {"paper_id": "7e095752d24c", "title": "Think-4-EmCoDe framework: Highlighting key qualities in embodied co-design techniques for children", "cluster": -1, "distance": 0.5157874612224993}]}, {"paper_id": "0783409933b4", "title": "A Two-Dimensional Framework for AI Agent Design Patterns: Cognitive Function and Execution Topology", "authors": "Jia Huang; J. Zhou", "abstract": "Existing frameworks for LLM-based agent architectures describe systems from a single perspective: industry guides (Anthropic, Google, LangChain) focus on execution topology -- how data flows -- while cognitive science surveys focus on cognitive function -- what the agent does. Neither axis alone disambiguates architecturally distinct systems: the same Orchestrator-Workers topology can implement Plan-and-Execute, Hierarchical Delegation, or Adversarial Verification -- three patterns with fundamentally different failure modes and design trade-offs. We propose a two-dimensional classification that combines (1) a Cognitive Function axis with seven categories (Perception, Memory, Reasoning, Action, Reflection, Collaboration, Governance) and (2) an Execution Topology axis with six structural archetypes (Chain, Route, Parallel, Orchestrate, Loop, Hierarchy). The resulting 7x6 matrix identifies 28 named patterns, 15 with original names. We demonstrate orthogonality through systematic cross-axis analysis, define eight representative patterns in detail, and validate descriptive coverage across four real-world domains (financial lending, legal due diligence, network operations, healthcare triage). Cross-domain analysis yields five empirical laws of pattern selection governing the relationship between environmental constraints (time pressure, action authority, failure cost asymmetry, volume) and architectural choices. The framework provides a principled, framework-neutral, and model-agnostic vocabulary for AI agent architecture design.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2026", "venue": "", "doi": "", "url": "https://www.semanticscholar.org/paper/67855ed25bb27f6a2f8bae704fdd2d35c8891262", "keyword": "Design Patterns", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": -3.90869402885437, "umap_y": 6.173056602478027, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 7, "lda_topic_probability": 0.6286801650703414, "lda_topic_words": "rules, product, participatory, guidelines, chapter, article, field, interfaces", "nearest_papers": [{"paper_id": "2efb92894924", "title": "Particles of a Whole: Design Patterns for Transparent and Auditable AI-Systems", "cluster": 8, "distance": 0.34501865972091883}, {"paper_id": "f50a79b2d7e1", "title": "Towards scaling expertise with generative AI: design principles for governing AI-Mediated knowledge capture and transfer", "cluster": 8, "distance": 0.44030554197926264}, {"paper_id": "560be0c20de7", "title": "Designing for Trust, Progress, and Dignity: A Conceptual Framework for Reliability, Responsiveness, and Relational Quality in AI-Enabled Service Systems", "cluster": -1, "distance": 0.5027737449432065}, {"paper_id": "3269f651fd9c", "title": "Designing AI-Enabled Engineering Courses: E-AIP Framework for Learning Outcomes, Process Evidence, and Integrity", "cluster": -1, "distance": 0.5350329453833051}, {"paper_id": "7d99b05f405e", "title": "Design Patterns for AI-based Systems: A Multivocal Literature Review and Pattern Repository", "cluster": -1, "distance": 0.5711489343963295}]}, {"paper_id": "09055cc69e8c", "title": "A Theoretical Model for Game Mechanics: Bridging Design Practice and Education", "authors": "Rafael Marques de Albuquerque; Fl√°vio Anthero Nunes Vianna dos Santos", "abstract": "Game design decision-making involves navigating a complex space of possible mechanics, which presents a significant challenge both for professional designers and for educators seeking to teach the discipline effectively. While existing theoretical models frequently offer high-level conceptual frameworks, these often lack the granularity necessary to support the practical needs of designers who must identify, understand, and apply specific mechanics in diverse game development contexts. This research addresses that gap by outlining the utility of a structured theoretical model that compiles and organises hundreds of individual game mechanics, not only describing them but also demonstrating a practice-oriented rationale. The model has two primary aims: to assist designers in conceptualising and navigating the broad array of mechanical possibilities, thereby supporting creative ideation and analytical problem-solving; and to provide a robust and pedagogically effective foundation for game design education. A theoretical model could bridge the gap between abstract theoretical models and the practical demands of game design practice. A model such as the one described here would enable a more direct and effective translation of theory into practice, equipping designers with a more precise vocabulary and educators with a clearer pedagogical structure for explaining complex gameplay systems. By refining the connection between gameplay theory and design implementation, this research contributes to the evolving body of knowledge in game studies and design education, offering a new perspective on how mechanical complexity can be better understood, taught, and applied in creative contexts. The framework also opens new avenues for further research into game design patterns, player experience, and curriculum development, reinforcing the central role of mechanics in shaping both game systems and player engagement.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2025", "venue": "European Conference on Games Based Learning", "doi": "", "url": "https://www.semanticscholar.org/paper/7f6e881f023b0fe5f2281893261c1c7df62ed203", "keyword": "Design Patterns", "cluster": 4, "cluster_theme_terms": "game, achievements, subject, autonomous, mechanics, theoretical, framework evaluating, subsumed", "cluster_label_candidate": "Cluster 4: Design Knowledge through definition and conceptual framing", "distinguishing_evidence_terms": "C-k Theory, Theoretical Model, Framework Evaluating, Design Patterns", "cluster_summary_candidate": "Within this keyword view, this cluster is set apart by C-k Theory, Framework Evaluating. Its dominant move, definition and conceptualization of design knowledge, is shared across most of this view, so the distinguishing terms above carry the interpretive weight. Its contribution coding (Methodological, Artifact/System, Empirical) also departs from the view majority. Representative papers: Game Design as an Autonomous Research Subject; Beyond the old game design: a new design paradigm in Game Studies through C-K Theory.", "design_knowledge_form": "Design Knowledge", "design_knowledge_action": "defines and conceptualizes", "design_knowledge_role": "Conceptual Framework", "design_knowledge_contribution": "defines and conc
