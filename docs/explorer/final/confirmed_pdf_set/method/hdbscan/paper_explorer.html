nerative design knowledge is in the form of frameworks. In this article we use qualitative-interpretative methods and visual mapping techniques to extract from the literature sociotechnical features and practices that contribute to contestable AI, and synthesize these into a design framework. ¬© The Author(s) 2022.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2023", "venue": "Minds and Machines", "doi": "10.1007/s11023-022-09611-z", "url": "", "keyword": "Design knowledge", "cluster": 8, "cluster_theme_terms": "ai, transparency, systematic review, contestable, generative, expertise, patterns, mediated", "cluster_label_candidate": "Cluster 8: Design Knowledge through prior-work synthesis", "distinguishing_evidence_terms": "Contestable AI, Systematic Review, Scaling Expertise, Auditable Ai-systems", "cluster_summary_candidate": "Within this keyword view, this cluster is set apart by Contestable AI, Systematic Review, Scaling Expertise. Unlike most clusters in this view, its dominant design-knowledge move is synthesis of prior work. Methodologically, it leans on Systematic Review. Representative papers: Contestable AI by Design: Towards a Framework; Explainable Medical Imaging AI Needs Human-Centered Design: Guidelines and Evidence from a Systematic Review.", "design_knowledge_form": "Design Knowledge", "design_knowledge_action": "synthesizes prior work on", "design_knowledge_role": "Empirical Evidence Base", "design_knowledge_contribution": "synthesizes prior work on Design Knowledge", "facet_population_or_context": "", "facet_stakeholder_or_population": "Designers", "facet_method_or_lens": "Systematic Review", "facet_artifact_or_domain": "Tool", "facet_contribution_or_outcome": "Methodological, Theoretical, Artifact/System", "umap_x": -3.6114301681518555, "umap_y": 6.078051567077637, "distance_to_centroid": 0.05452433364514753, "representative_rank": 1, "is_representative_top3": true, "medoid_rank": 1, "lda_topic": 6, "lda_topic_probability": 0.9774969571901782, "lda_topic_words": "literature, review, concept, management, systematic, analysis, ai, theories", "nearest_papers": [{"paper_id": "7d99b05f405e", "title": "Design Patterns for AI-based Systems: A Multivocal Literature Review and Pattern Repository", "cluster": -1, "distance": 0.16304596041642683}, {"paper_id": "f50a79b2d7e1", "title": "Towards scaling expertise with generative AI: design principles for governing AI-Mediated knowledge capture and transfer", "cluster": 8, "distance": 0.32888583590085996}, {"paper_id": "268903a30da5", "title": "Systematic Review of Systemic Design Frameworks for Complex Challenges", "cluster": 8, "distance": 0.3688365484400403}, {"paper_id": "31bdafb1fc73", "title": "Explainable Medical Imaging AI Needs Human-Centered Design: Guidelines and Evidence from a Systematic Review", "cluster": 8, "distance": 0.386207637143858}, {"paper_id": "2efb92894924", "title": "Particles of a Whole: Design Patterns for Transparent and Auditable AI-Systems", "cluster": 8, "distance": 0.3881576112549002}]}, {"paper_id": "9eda131748eb", "title": "Engineering Design Principles for HCI as a Way Forward for HCI Design Knowledge", "authors": "Long, J. (1); Cummaford, S. (2); Stork, A. (3)", "abstract": "The chapter offers some ideas on how HCI design knowledge, in the form of craft artefacts and design practice experience, of models and methods, and of principles, rules, and heuristics might meet the challenge of more effective support for HCI design practice. However, the primary aim is to summarise progress and the associated carry forward, which claims to have been made towards the acquisition of HCI-EDPs. The common, and so general, progress is shared by the two case studies of domestic energy planning and control and of business-to-consumer electronic commerce, summarised in the previous chapter and reported in full in the companion volume (Long et al., 2022, in press). Further research to acquire and to validate HCI-EDPs is also identified.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "HCI Design Knowledge: Critique, Challenge, and a Way Forward. Synthesis Lectures on Human-Centered Informatics", "doi": "10.1007/978-3-031-79209-0_10", "url": "", "keyword": "Design knowledge", "cluster": 0, "cluster_theme_terms": "practice, encounters, floorplan, method case, virtual, entrepreneurship, commissioning, flexibility", "cluster_label_candidate": "Cluster 0: Design Theory through definition and conceptual framing around Education / Learning", "distinguishing_evidence_terms": "Rough Mile, Case Study, Way Forward, Guiding Principles", "cluster_summary_candidate": "Within this keyword view, this cluster is set apart by Rough Mile, Case Study, Way Forward. Its dominant move, definition and conceptualization of design theory, is shared across most of this view, so the distinguishing terms above carry the interpretive weight. Methodologically, it leans on Case Study. Its contribution coding (Methodological, Empirical, Theoretical) also departs from the view majority. Representative papers: Engineering Design Principles for HCI as a Way Forward for HCI Design Knowledge; The Rough Mile: Testing a Framework of Immersive Practice.", "design_knowledge_form": "Design Theory", "design_knowledge_action": "defines and conceptualizes", "design_knowledge_role": "Actionable Design Guidance", "design_knowledge_contribution": "defines and conceptualizes Design Theory", "facet_population_or_context": "Education / Learning", "facet_stakeholder_or_population": "Practitioners, Designers", "facet_method_or_lens": "Case Study", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "Methodological, Empirical, Theoretical", "umap_x": -0.43890079855918884, "umap_y": 7.377150058746338, "distance_to_centroid": 0.20454975954144294, "representative_rank": 1, "is_representative_top3": true, "medoid_rank": 1, "lda_topic": 7, "lda_topic_probability": 0.9756688427808123, "lda_topic_words": "rules, product, participatory, guidelines, chapter, article, field, interfaces", "nearest_papers": [{"paper_id": "76669ffc8981", "title": "A Framework for Effective Virtual Commissioning: Guiding Principles for Seamless System Integration", "cluster": 0, "distance": 0.4340298291727256}, {"paper_id": "00781ed0e844", "title": "Cognitive Point of View in Recursive Design", "cluster": 0, "distance": 0.4413761418473814}, {"paper_id": "2c8a6e74557f", "title": "The tacit knowledge of entrepreneurial design: Interrelating theory, practice and prescription in entrepreneurship research", "cluster": 0, "distance": 0.4472212845767054}, {"paper_id": "215d4603e3c7", "title": "A case study of the extension of floorplan flexibility using sector margins", "cluster": 0, "distance": 0.5370979076485565}, {"paper_id": "65c31c577170", "title": "The Rough Mile: Testing a Framework of Immersive Practice", "cluster": 0, "distance": 0.5617492821461337}]}, {"paper_id": "0b7e6111aa14", "title": "Synthesizing a Solution Space for Prescriptive Design Knowledge Codification", "authors": "MoÃàller, F. (1); Hansen, M.R.P. (2); Schoormann, T. (3)", "abstract": "One of Design Science Research's (DSR) principal purposes is to generate and cod-ify design knowledge. Codification in DSR is done by providing clear chunks of prescriptive knowledge that guide the design of future solutions, including instructions on how to design (parts of) artifacts. Although various codification mechanisms have emerged over the last years, design principles are among the most prominent mechanisms. Yet, distinguishing between different codification mechanisms is often blurry, hindering designers from making informed decisions regarding appropriate mechanisms for their research aim and lever-aging the full potential of the prescriptive knowledge. We seek to bridge the challenge of selecting from the fuzzy array of codification mechanisms by proposing an inductively generated solution space. We provide a taxonomy to organize essential elements of prescrip-tive knowledge based on an analysis of design-oriented literature in four meta-dimensions (i.e., communication, application, development, and justification). These meta-dimensions make transparent how codified prescriptive design knowledge works. Overall, the taxonomy guides designers in reflecting on and selecting from the set of suitable elements for their statements. Also, providing a synthesis of options for codifying prescriptive design knowledge will simplify the identification and advance the positioning of DSR contributions.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Scandinavian Journal of Information Systems", "doi": "", "url": "", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": -0.19589807093143463, "umap_y": 3.3967700004577637, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 8, "lda_topic_probability": 0.9735191829547359, "lda_topic_words": "patterns, software, engineering, domain, object, architecture, solutions, problems", "nearest_papers": [{"paper_id": "2042efa7e455", "title": "The DSR grid: six core dimensions for effectively planning and communicating design science research projects", "cluster": -1, "distance": 0.2526508374340608}, {"paper_id": "07eb3166d706", "title": "A Typology of Knowledge Creation in Design Science Research Projects", "cluster": -1, "distance": 0.40745498586493156}, {"paper_id": "e958310acab5", "title": "Prescriptive knowledge in IS research: Conceptualizing design principles in terms of materiality, action, and boundary conditions", "cluster": -1, "distance": 0.5193856550219029}, {"paper_id": "95eee570b8f1", "title": "Accumulating design knowledge: A mechanisms-based approach", "cluster": -1, "distance": 0.5610607014853416}, {"paper_id": "6d926f3c4a97", "title": "A domain reference ontology for design science research knowledge bases", "cluster": -1, "distance": 0.563249584051746}]}, {"paper_id": "fd2392ff2aff", "title": "Surveying a Landscape of Ethics-Focused Design Methods", "authors": "Chivukula, Shruthi Sai (1); Li, Ziqing (2); Pivonka, Anne C. (2); Chen, Jingning (2); Gray, Colin M. (2)", "abstract": "Over the past decade, HCI researchers, design researchers, and practitioners have increasingly addressed ethics-focused issues through a range of theoretical, methodological and pragmatic contributions to the field. While many forms of design knowledge have been proposed and described, we focus explicitly on knowledge that has been codified as 'methods,' which we define as structured supports for everyday work practices of designers. In this paper, we identify, analyze, and map a collection of 63 existing ethics-focused methods intentionally designed for ethical impact. Building on results of a content analysis of these methods, we contribute a descriptive record of how these methods operationalize ethics, their intended audience or context of use, their 'core' or 'script,' and the means by which these methods are formulated and codified. Building on these results, we provide an initial definition of ethics-focused methods, identifying potential le": "Ethical Encounters in Design Practice: A Framework Grounded in Practitioner Experience", "cluster": 0, "distance": 0.7931749874279627}]}, {"paper_id": "a7e06450729f", "title": "Game Design as an Autonomous Research Subject", "authors": "Neves, P.P. (1); Zagalo, N. (2)", "abstract": "This paper examines the methods and systems of game design from the standpoint of existing method proposals failing to establish a common basis for systematizing design knowledge, which this paper aims to help resolve. Game design has often been subsumed by game development and associated disciplines, and game design methodology has often been subsumed by game analysis. This paper reviews related work in defining game design as an autonomous research subject and then divides the methods and systems of game design into complementary methods and core methods, with only the latter, consisting chiefly of design patterns, attempting to systematize how game design knowledge is generated. Seminal game patterns have been descriptive rather than -prescriptive and so have failed to find the requisite practitioner adoption to fulfill their role as a living method. One recent pattern approach has sought to resolve this issue by promoting pattern usage generally over the adoption of a particular language. This paper outlines an alternate and possibly complementary approach of a novel, practical basis for game design literacy for helping core methods work as a basis for systematizing game design knowledge. The proposed basis sacrifices descriptiveness to prescriptiveness to shape methods in that direction.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Information", "doi": "10.3390/info12090367", "url": "", "keyword": "Design knowledge", "cluster": 4, "cluster_theme_terms": "game, achievements, subject, autonomous, mechanics, theoretical, framework evaluating, subsumed", "cluster_label_candidate": "Cluster 4 cardo (1); C., Snider; M., Goudswaard; B., Hicks", "abstract": "Whilst prior works have characterised the affordances of prototyping methods in terms of generating knowledge about a product or process, the types, or ‚Äòdimensions‚Äô of knowledge towards which they contribute are not fully understood. In this paper we adapt the concept of ‚Äòdesign domains‚Äô as a method to interpret, and better understand the contributions of different prototyping methods to design knowledge in new product development. We first synthesise a set of ten dimensions for design knowledge from a review of literature in design-related fields. A study was then conducted in which participants from engineering backgrounds completed a Likert-type questionnaire to quantify the perceived contributions to design knowledge of 90 common prototyping methods against each dimension. We statistically analyse results to identify patterns in the knowledge contribution of different methods. Results reveal that methods exhibit significantly different contribution profiles, suggesting different methods to be suited to different knowledge. Thus, this paper indicates potential for new methods, methodology and processes to leverage such characterisations for better selection and sequencing of methods in the prototyping process. ¬© ICED 2021.All right reserved.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2021", "venue": "Proceedings of the Design Society", "doi": "10.1017/pds.2021.130", "url": "", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a ); Jiaji Wang (1); Kejian Wang (1)", "abstract": "As important design knowledge, design rationale(DR) knowledge plays an important role in design analysis, design reasoning and design innovation. There are generally two sources of DR knowledge, one is to capture DR in the design process, and the other is to extract DR from historical design documents, but the latter is always ignored. DR model is the foundation of DR. This paper aims at the deficiency of the previous DR model and requirements for DR knowledge acquisition from design documents. We propose design rationale knowledge hierarchy (DRKH) model. The model has three layers, design intent layer, design decision layer and design basis layer. The model also has three relationships, decomposed-into, achieved-by, refer-to. Using the DRKH model, we build the algorithm framework for extracting DR from design documents. Finally, we validate the feasibility of our model by extracting DR model from a welding robot design manual.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "MATEC Web of Conferences", "doi": "10.1051/matecconf/201713900016", "url": "", "keyword": "Design knowledge", "cluster": 7, "cluster_theme_terms": "rationale, capture, documents, argumentation, implies, reflective, reuse, influence", "cluster_label_candidate": "Cluster 7: Design Rationale as documented representations", "distinguishing_evidence_terms": "Method Rationale, Evidence Framework, Design Guidelines, Capture", "cluster_summary_candidate": "Within this keyword view, this cluster is set apart by Method Rationale, Evidence Framework, Capture. Unlike most clusters in this view, its dominant design-knowledge move is representation and documentation. Representative papers: Redesigning the rationale for design rationale; Integrating different perspective on design rationale: Supporting the emergence of design rationale from design communication.", "design_kn ines. Usability heuristics are widely recognized principles against which the usability of an interactive system could be evaluated. This work presents a revised set of usability heuristics that are based on the experience acquired in previous studies targeting local e-government websites. The underlying goal is to include the most important ergonomic criteria and usability heuristics into a clear hierarchical organization, which helps evaluators to better explain and developers to better understand the usability problems. The new set has only fourteen heuristics that are structured into four groups: user guidance, user effort, user control and freedom, and user support. The main strength of this approach is the good coverage achieved with a reduced number of heuristics.", "discussion_summary": "- 4 Discussion \nFrom a methodological point of view, there \nare some issues that are important to discuss.\n- First, the task -based usability inspection is \nmore effective than the heuristic evaluation.\n- Not only makes it possible to uncover most \nimportant problems, but it also makes possible \na comparative usability evaluation.", "discussion_excerpt": "4 Discussion \nFrom a methodological point of view, there \nare some issues that are important to discuss.", "discussion_found": true, "discussion_paragraph_count": 10, "year": "", "venue": "Informatica Economica", "doi": "10.12948/issn14531305/21.3.2017.03", "url": "", "keyword": "Design knowledge", "cluster": 2, "cluster_theme_terms": "heuristics, interfaces, usability, fluent, assistive, weather, risk communication, vyyden", "cluster_label_candidate": "Cluster 2: Design Heuristic through definition and conceptual framing", "distinguishing_evidence_terms": "Risk Communication, Usability Heuristics, Standardized Notation, Conceptual Repertoire", "cluster_summary_candidate": "Within this keyword view, this cluster is set apart by Risk Communication, Usability Heuristics, Standardized Notation. Its dominant move, defi istance": 0.5046219093174726}]}, {"paper_id": "fffe50e033fa", "title": "Activity as the ultimate particular of interaction design", "authors": "Waern, Annika (1); Back, Jon (1)", "abstract": "In the turn towards practice-oriented research in interaction design, one of the most important proposals has been the emphasis on the 'ultimate particulars' produced by design, as embodiments of design knowledge. In current HCI research, those particulars are almost always taken to be 'things' - artefacts or singular systems. We argue that this emphasis may have come at a cost that can be described as a loss of identity; interaction design research was never primarily concerned with the design of artefacts, but with how humans act and interact with each other with and through artefacts. We propose a complementary perspective by looking at design projects and traditions where the 'ultimate particulars' can be considered to be activities rather than things. The article is concerned with how knowledge needs to be articulated in the scholarly engagement with such design practices. We argue that engagement with activity-centric design gets design research one step closer towards understanding salient contemporary design practices and what Buchanan calls 'environmental design'. ¬© 2017 ACM.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2017", "venue": "Conference on Human Factors in Computing Systems - Proceedings", "doi": "10.1145/3025453.3025990", "url": "", "keyword": "Design knowledge", "cluster": 9, "cluster_theme_terms": "patterns, management, software, object, computer interaction, structural, architecture, modeling", "cluster_label_candidate": "Cluster 9: Design Pattern through definition and conceptual framing", "distinguishing_evidence_terms": "Design Science, Biological Cells, Computer Interaction, Participatory Futures", "cluster_summary_candidate": "Within this keyword view, this cluster is set distance": 0.4902790957158658}]}, {"paper_id": "7c4d2eb91f51", "title": "Using a Visual Abstract as a Lens for Communicating and Promoting Design Science Research in Software Engineering", "authors": "Storey, Margaret-Anne (1); Engstrom, Emelie (2); Host, Martin (2); Runeson, Per (2); Bjarnason, Elizabeth (2)", "abstract": "Empirical software engineering research aims to generate prescriptive knowledge that can help software engineers improve their work and overcome their challenges, but deriving these insights from real-world problems can be challenging. In this paper, we promote design science as an effective way to produce and communicate prescriptive knowledge. We propose using a visual abstract template to communicate design science contributions and highlight the main problem/solution constructs of this area of research, as well as to present the validity aspects of design knowledge. Our conceptualization of design science is derived from existing literature and we illustrate its use by applying the visual abstract to an example use case. This is work in progress and further evaluation by practitioners and researchers will be forthcoming. ¬© 2017 IEEE.", "discussion_summary": "- Discussion\nOur proposed visual abstract for design science culmi-\nnates from a year-long study of how design science has\nbeen used in software engineering, while also trying to\nunderstand why it has not been adopted.\n- During this time,\nwe (the authors) met regularly to discuss different papers on\ndesign science and to arrive at a shared conceptualization (as\ndiscussed in Section 2).\n- Our view is similar to the view of design science pro-\nposed by Wierenga et al.", "discussion_excerpt": "Discussion\nOur proposed visual abstract for design science culmi-\nnates from a year-long study of how design science has\nbeen used in software engineering, while also trying to\nunderstand why it has not been adopted.", "discussion_found": true, "discussion_paragraph_count": 10, "year": " _id": "1c7fa3f7d73a", "title": "A theoretical framework for the studio as a learning environment", "authors": "Brandt, Carol B. (1); Cennamo, Katherine (2); Douglas, Sarah (3); Vernon, Mitzi (4); McGrath, Margarita (5); Reimer, Yolanda (6)", "abstract": "In this article we describe a holistic, ecological framework that takes into account the surface structures and pedagogical approaches in the studio and how these elements are connected to the construction of design knowledge: epistemology. In our development of this framework, we came to understand how disciplinary underpinnings and academic culture shape the ways that studio is enacted. Using practice theory, we illustrate our framework with two examples - one in Industrial Design and another in Human Computer Interaction - that demonstrate the ways in which the studio can act as a bridge between academic and professional communities. We came to see the studio as a unique practice community that connects academic and professional contexts. We argue that successful implementation of studio-based learning involves an awareness of disciplinary canons, ontological approaches to knowledge, and the academic constraints on studio-based approaches to learning. ¬© 2011 Springer Science+Business Media B.V.", "discussion_summary": "- Discussion: the studio as practice community\nThe studio practices of the two examples presented above included many common fea-\ntures.\n- Both instructors valued the analysis of the design problem through discussion, either\nin the design crit, or in the context of design teams, where ill-formed problems in the\ndesign briefs could be explored through multiple perspectives.\n- Each studio featured the use\nof sketching or developing low ﬁdelity models that allowed faculty to view students’\nthinking and as a means to share emerging ideas.", "discussion_excerpt": "Discussion: the studio as practice community\nThe studio practices of the two examples presented above included many common fea-\ntu mponents, literature, activities", "nearest_papers": [{"paper_id": "0842498049c7", "title": "The Extended Likeability Framework: A Theoretical Framework for and a Practical Case of Designing Likeable Media Applications for Preschoolers", "cluster": 1, "distance": 0.19168279505010744}, {"paper_id": "7f7baeb83bac", "title": "A theoretical framework on embodiment in digital design", "cluster": 1, "distance": 0.4233188648676188}, {"paper_id": "ba03a17bc120", "title": "The Good, the Bad, and the Ugly: A Theoretical Framework for the Assessment of Continuous Colormaps", "cluster": 1, "distance": 0.43530573402788564}, {"paper_id": "0b35e34543e2", "title": "Designing Artificial Identity: The Identity Design Framework and Research Agenda", "cluster": -1, "distance": 0.5010227021502907}, {"paper_id": "fee96194a322", "title": "Personalising learning: towards a coherent learning design framework", "cluster": -1, "distance": 0.5255780526881864}]}, {"paper_id": "a883ec94b37a", "title": "Causal design knowledge: Alternative representation method for product development knowledge management", "authors": "Kyoung-Yun Kim (1); Yun Seon Kim (1)", "abstract": "This paper presents a mathematical comparison of procedural knowledge and causal knowledge, and discusses the potential roles and feasibility of causal knowledge across product development knowledge management. Since reuse of knowledge is so important in product development, various knowledge management approaches have been introduced. Most of the product design knowledge is represented by procedural knowledge, which unfortunately requires cumbersome processes to define, and is typically inadequate for representing the kind of knowledge generated during the product development process. A causal knowledge representation, however, can help us to overcome this limitation and is an alternative formalism for representing product design knowledge. In this paper we compare the procedural and causal knowledge representations. We present t if it is not an explicit matter, it plays implicitly a role in the background. The Characteristics-Properties Modelling / Property-Driven Development (CPM/PDD) approach is one possibility to illustrate the product development process. This paper provides a closer look on design knowledge in the context of CPM/PDD. The description of product knowledge in CPM/PDD is thereby straightforward. The more complicated part is the description of process knowledge. Therefore, the method of reduction is transferred from theoretical computer science into the context of engineering design. The result indicates what design knowledge is, especially in CPM/PDD.", "discussion_summary": "- Discussion and further work \nKnowledge is a very important and significant topic in engineering design.\n- Even if it is not an explicit \nmatter, it plays implicitly a role in the background.\n- Therefore, the \nmethod of reduction is transferred from theoretical computer science into the context of engineering \ndesign.", "discussion_excerpt": "Discussion and further work \nKnowledge is a very important and significant topic in engineering design.", "discussion_found": true, "discussion_paragraph_count": 10, "year": "2008", "venue": "Proceedings DESIGN 2008, the 10th International Design Conference", "doi": "", "url": "", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": " , Widemeyer and El Sawy (1992) on the specification of information systems design theories (ISDT), drawing on other streams of thought on design research and theory to provide a basis for a more systematic and useable formulation of these theories. We identify eight separate components of design theories: (1) purpose and scope, (2) constructs, (3) principles of form and function, (4) artifact mutability, (5) testable propositions, (6) justificatory knowledge (kernel theories), (7) principles of implementation, and (8) an expository instantiation. This specification includes components missing in the Walls et al. adaptation of Dubin (1978) and Simon (1969) and also addresses explicitly problems associated with the role of instantiations and the specification of design theories for methodologies and interventions as well as for products and applications. The essay is significant as the unambiguous establishment of design knowledge as theory gives a sounder base for arguments for the rigor and legitimacy of IS as an applied discipline and for its continuing progress. A craft can proceed with the copying of one example of a design artifact by one artisan after another. A discipline cannot. Copyright ¬© 2007, by the Association for Information Systems.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2007", "venue": "Journal of the Association for Information Systems", "doi": "10.17705/1jais.00129", "url": "", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted d Approach to a Methodical Evaluation of Modeling Methods", "cluster": 9, "distance": 0.5157874612224993}, {"paper_id": "3058799f63c1", "title": "Using Schema to Inform Method Design Practices", "cluster": -1, "distance": 0.5351589816488971}]}, {"paper_id": "60c69d24c5a3", "title": "Evaluating the efficacy and effectiveness of design methods: A systematic review and assessment framework", "authors": "Cash, Philip (1); Daalhuizen, Jaap (2); Hekkert, Paul (3)", "abstract": "The increasingly transdisciplinary context of design, where designers collaborate with other disciplinary and domain experts, means there is a growing need to evidence the effectiveness of design methods. We address this need in two ways. First, we propose a ‚Äòchain of evidence‚Äô, from motivation to claims, operationalising this in a systematic assessment framework. Second, we systematically review current design method research. Our results reveal that while all links in the chain of evidence are reported across the literature and best practices can be identified, no individual paper either reports all links or consistently achieves best practice. Our framework and results demonstrate the need for standards of evidence in this area, with implications for design method research, development, education, and practice. ¬© 2023 The Authors", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2023", "venue": "Design Studies", "doi": "10.1016/j.destud.2023.101204", "url": "", "keyword": "Design methods", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_con ion in the IS and more specifically in the DSR literature. The findings are summarized as a conceptual model outlining eight strategies of method use, which are then condensed into a 2-by-2 framework of method corroboration. The results of this paper present insight into the current state of method corroboration in the DSR field and provide guidance for working with design methods in research and practice. ¬© 2023 IEEE Computer Society. All rights reserved.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2023", "venue": "Proceedings of the Annual Hawaii International Conference on System Sciences", "doi": "", "url": "", "keyword": "Design methods", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 0.8468894362449646, "umap_y": 3.8257596492767334, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 8, "lda_topic_probability": 0.47321469966643886, "lda_topic_words": "patterns, software, engineering, domain, object, architecture, solutions, problems", "nearest_papers": [{"paper_id": "40a2d86cd488", "title": "Elements of a design method - a basis for describing and evaluating design methods", "cluster": 9, "distance": 0.4185951943820353}, {"paper_id": "799b06403189", "title": "State of the Art on Robust Design Methods for Additive Manufacturing", "cluster": 9, "distance": 0.49275303145458926}, {"paper_id": "60c69d24c5a3", "title": "Evaluating the efficacy and effectiveness of design methods: A systematic review and assessment framework", "cluster": -1, "distance": 0.5014344803030863}, {"paper_id": "b2234ef79a5a", "title": "Tracing situated effects of innovative design methods: inexperienced designers' practices", "cluster": 9, "distance": 0.5195613327901347}, {"paper_id": "1fda49b32463", "title": "A Pattern-Oriented Approach to a Methodical Evaluation of Modeling Methods", "cluster": 9, "distance": 0.5263725991927894}]}, {"paper_id": "40a2d86cd488", "title": "Elements of a design method - a basis for describing and evaluating design methods", "authors": "Gericke, K. (1); Eckert, C. (2); Stacey, M. (3)", "abstract": "Method development is at the heart of design research as methods are a formalised way to express knowledge about how aspects of design could or should be done. However, assuring that methods are in fact used in industry has remained a challenge. Industry will only use methods that they can understand and that they feel will give them benefit reliably. To understand the challenges involved in adopting a method, the method needs to be seen in context: it does not exist in isolation but forms a part of an ecosystem of methods for tackling related design problems. A method depends on the knowledge and skills of the practitioners using it: while a description of a method is an artefact that is a formalisation of engineering knowledge, a method in use constitutes a socio-technical system depending on the interaction of human participants with each other as well as with the description of the method, representations of design information and, often, tools for carrying out the method's tasks. This paper argues that crucial factors in the adoption of methods include how well they are described and how convincingly they are evaluated. The description of a method should cover itscore idea, therepresentationsin which design information is described, theprocedureto be followed, itsintended use, and thetoolsit uses. The account of a method's intended use should cover itspurpose, the situations or product types within itsscope, itscoverageof kinds of problems within its scope, itsexpected benefitandconditionsfor its use. The different elements need to be evaluated separately as well as the method as an integrated whole. While verification and validation are important for some elements of methods, it is rarely possible to prove the validity of a method. Rather the developers of methods need to gather sufficient evidence that a method will work within a clearly articulated scope. Most design methods do not have binary success criteria, and their usefulness in practice depends as much on simplicity and usability as on the outcomes they produce. Evaluation should focus on how well they work, and how they can be customised and improved.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Design Science", "doi": "10.1017/dsj.2022.23", "url": "", "keyword": "Design methods", "cluster": 9, "cluster_theme_terms": "patterns, management, software, object, computer interaction, structural, architecture, modeling", "cluster_label_candidate": "Cluster 9: Design Pattern through definition and conceptual framing", "distinguishing_evidence_terms": "Design Science, Biological Cells, Computer Interaction, Participatory Futures", "cluster_summary_candidate": "Within this keyword view, this cluster is set apart by Biological Cells, Computer Interaction, Participatory Futures. Its dominant move, definition and conceptualization of design pattern, is shared across most of this view, so the distinguishing terms above carry the interpretive weight. Representative papers: Design Patterns of Biological Cells; Patterns, anticipation and participatory futures.", "design_knowledge_form": "Desi  Subject", "cluster": 4, "distance": 0.4944178203597013}, {"paper_id": "714b3f6f8ac7", "title": "Degrees of Interaction: Towards a Classification", "cluster": -1, "distance": 0.5298203175978076}, {"paper_id": "40a2d86cd488", "title": "Elements of a design method - a basis for describing and evaluating design methods", "cluster": 9, "distance": 0.5468396423049338}, {"paper_id": "799b06403189", "title": "State of the Art on Robust Design Methods for Additive Manufacturing", "cluster": 9, "distance": 0.6410338764808999}]}, {"paper_id": "dbf31702e533", "title": "Patterns for living lab practice: describing key know-how to promote service co-creation with users", "authors": "Akasaka, Fumiya (1); Yasuoka, Mika (2); Nakatani, Momoko (1); Kimura, Atsunobu (1); Ihara, Masayuki (1)", "abstract": "'Value co-creation' among actors related to service provision is one of the key concepts in service design. Living Lab (LL) is a co-creative service design methodology in which designers and users collaboratively design services. In LL, users are actively involved in service design processes over long periods. Because LL is a design methodology based on longterm co-creation with users, its practices involve more direct and indirect communication and collaboration with users than typical service design does. Therefore, in order to make value co-creation successful in LL projects, it is crucial for designers to use not only knowledge of service design methods, but also practical know-how related to 'facilitating long-term cocreation with users.' Such know-how is not always shared, however, among LL practitioners, because it is often buried in their experiences. Thus, LL practice currently places heavy reliance on the practitioners‚Äô intuition and experience. Therefore, to support LL practitioners, it is essential to extract key knowhow on how to achieve successful LL projects from experienced practitioners, and to describe such knowhow. This would allow us to share and reuse knowhow in planning and running an LL project. Hence, the purpose of this study is to extract such key knowhow for LL practice and describe it in an easy-to-reuse manner. We first developed a workshop to extract key know-how for LL practice. In this study, we held the workshop twice and could extract 30 items of key know-how. Subsequently, we described the extracted key know-how as 'patterns' by using the pattern language framework, and we developed a booklet listing the 30 patterns in an easy-to-reuse manner. The booklet can be used by LL practitioners to refer to and reuse the key know-how for LL practice. Through an evaluation, we confirmed that the developed booklet is useful for LL practitioners for referring to and using LL know-how. ¬© 2020, Fuji Technology Press. All rights reserved.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2020", "venue": "International Journal of Automation Technology", "doi": "10.20965/ijat.2020.p0769", "url": "", "keyword": "Design methods", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": -3.398953914642334, "umap_y": 7.082129955291748, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 0, "lda_topic_probability": 0.9763097796216107, "lda_topic_words": "service, architecture, creation, so fly describing each of our respective experiences with patterns. This is followed by a joint 'lessons learned' section and conclusion.", "discussion_summary": "- Discussion remained at the design pattern level \nunless and until there was a controversy, at which \npoint we might drop down to the nuts and bolts.\n- In fact, I came away from this engagement feeling \na satisfaction I hadn’t felt after any other, and I at- \ntribute it unreservedly to the use of design patterns by \nabb concerned, not just myself.", "discussion_excerpt": "Discussion remained at the design pattern level \nunless and until there was a controversy, at which \npoint we might drop down to the nuts and bolts.", "discussion_found": true, "discussion_paragraph_count": 10, "year": "1995", "venue": "Proceedings - International Conference on Software Engineering", "doi": "", "url": "", "keyword": "Design Patterns", "cluster": 9, "cluster_theme_terms": "patterns, management, software, object, computer interaction, structural, architecture, modeling", "cluster_label_candidate": "Cluster 9: Design Pattern through definition and conceptual framing", "distinguishing_evidence_terms": "Design Science, Biological Cells, Computer Interaction, Participatory Futures", "cluster_summary_candidate": "Within this keyword view, this cluster is set apart by Biological Cells, Computer Interaction, Participatory Futures. Its dominant move, definition and conceptualization of design pattern, is shared across most of this view, so the distinguishing terms above carry the interpretive weight. Representative papers: Design Patterns of Biological Cells; Patterns, anticipation and participatory futures.", "design_knowledge_form": "Design Pattern", "design_knowledge_action": "defines and conceptualizes", "design_knowledge_role": "Reusable Design Pattern Language", "design_knowledge_contribution": "defines and conceptualizes Design Pattern", "facet_population_or_context": "Education / Learning, Accessibility", "facet_stake "Design patterns for component-oriented software development", "authors": "Rege, Karl (1)", "abstract": "In this paper we present four partially not yet documented design patterns for component-oriented programming. To this end, we first define component-orientation and show its essential properties. This definition leads us to a creational, two structural and a behavioral pattern. We first present the DYNAMIC FACTORY; a creational pattern which allows for the creation of late-bound components. Secondly, we describe the AGGREGATION and the EMBEDDING pattern. These two structural patterns are archetypal for component-oriented programming. Finally, the PROPAGATOR as an important pattern for message propagation is illustrated. Flexible message propagation, expressed in delegation and forwarding, is a key aspect of component-oriented programming. ¬© 1999 IEEE.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "1999", "venue": "Conference Proceedings of the EUROMICRO", "doi": "10.1109/EURMIC.1999.794784", "url": "", "keyword": "Design Patterns", "cluster": 9, "cluster_theme_terms": "patterns, management, software, object, computer interaction, structural, architecture, modeling", "cluster_label_candidate": "Cluster 9: Design Pattern through definition and conceptual framing", "distinguishing_evidence_terms": "Design Science, Biological Cells, Computer Interaction, Participatory Futures", "cluster_summary_candidate": "Within this keyword view, this cluster is set apart by Biological Cells, Computer Interaction, Participatory Futures. Its dominant move, definition and conceptualization of design pattern, is shared across most of this view, so the distinguishing terms above carry the interpretive weight. Representative papers: Design Patterns of Biological Cells; Patterns, anticipation and participatory futures.", "design_knowledge_form": "Design Pattern", "design_knowledge_action": "defines and concept o classify how designs may include coupled patterns. We find many examples of coupled patterns; this coupling may be 'tight' or 'loose', and provides both benefits and costs. We qualitatively assess the goodness of pattern coupling in terms of effects on maintainability, factorability, and reusability when patterns are coupled in various ways.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "25th Annual International Computer Software and Applications Conference. COMPSAC 2001", "doi": "10.1109/CMPSAC.2001.960670", "url": "", "keyword": "Design Patterns", "cluster": 9, "cluster_theme_terms": "patterns, management, software, object, computer interaction, structural, architecture, modeling", "cluster_label_candidate": "Cluster 9: Design Pattern through definition and conceptual framing", "distinguishing_evidence_terms": "Design Science, Biological Cells, Computer Interaction, Participatory Futures", "cluster_summary_candidate": "Within this keyword view, this cluster is set apart by Biological Cells, Computer Interaction, Participatory Futures. Its dominant move, definition and conceptualization of design pattern, is shared across most of this view, so the distinguishing terms above carry the interpretive weight. Representative papers: Design Patterns of Biological Cells; Patterns, anticipation and participatory futures.", "design_knowledge_form": "Design Pattern", "design_knowledge_action": "defines and conceptualizes", "design_knowledge_role": "Reusable Design Pattern Language", "design_knowledge_contribution": "defines and conceptualizes Design Pattern", "facet_population_or_context": "Education / Learning, Accessibility", "facet_stakeholder_or_population": "Designers, Practitioners, Developers", "facet_method_or_lens": "Design Science, Workshop", "facet_artifact_or_domain": "Tool, Interface, Game", "facet_contribution_or_outcome": "Methodological, Artifact/System, Theoretical", " n design and implementation without reducing the patterns to merely syntactic constructs; an extension to the œÉ-calculus, termed œÅ-calculus, a formal notation for expressing relationships between the elements of object oriented languages, and its use in expressing the EDPs directly. We discuss their use in composition and decomposition of existing patterns, identification of pattern use in existing code to aid comprehension, and future research directions, such as support for refactoring of designs, interaction with traditional code analysis systems, and the education of students of software architecture. ¬© 2003 IEEE.", "discussion_summary": "- Discussion\nConsider what we have just done - we have created a\nformally sound deﬁnition of a description of how to solve a\nproblem of software architecture design.\n- This deﬁnition is\nnow subject to formal analysis, discovery, and metrics, and,\nfollowing our example of pattern composition, can be used\nas a building block for larger, even more intricate patterns\nthat are incrementally comprehensible.\n- At the same time,\nwe believe we have retained the ﬂexibility of implementa-\ntion that patterns demand.", "discussion_excerpt": "Discussion\nConsider what we have just done - we have created a\nformally sound deﬁnition of a description of how to solve a\nproblem of software architecture design.", "discussion_found": true, "discussion_paragraph_count": 10, "year": "2003", "venue": "Proceedings - 27th Annual NASA Goddard / IEEE Software Engineering Workshop, SEW 2002", "doi": "10.1109/SEW.2002.1199472", "url": "", "keyword": "Design Patterns", "cluster": 9, "cluster_theme_terms": "patterns, management, software, object, computer interaction, structural, architecture, modeling", "cluster_label_candidate": "Cluster 9: Design Pattern through definition and conceptual framing", "distinguishing_evidence_terms": "Design Science, Biological Cells, Computer Interaction, Participatory Futures", "cluster_summary_candidate": "Wi ns", "cluster": 9, "distance": 0.39955083480285336}]}, {"paper_id": "098c9db1090d", "title": "A semantic representation for domain-specific patterns", "authors": "Montero, S. (1); Diaz, P. (1); Aedo, I. (1)", "abstract": "Design patterns are a valuable mechanism to capture and disseminate best practice in software design. The oft-cited definition of an Alexandrian pattern, 'a solution to a problem in a context', stimulates the definition of patterns from knowledge and expertise in any domain. Indeed, their application has spread from the object-oriented community, who first adopted them, through different software areas including human-computer interaction, virtual environments, ubiquitous computing, hypermedia and Web engineering. This kind of patterns that describe successful solutions to recurring design problems in terms of a specific domain of application are known as domain-specific patterns. The increasing number of available design patterns is making difficult to find the most appropriate one given a specific problem since this task requires mastery on existing design patterns. Hence, there is a need to introduce a formalism to describe them accurately and to allow a rigorous reasoning process to assist users to retrieve those patterns that solve their problems. With this purpose, we propose a semantic representation for domain-specific patterns based on the domain knowledge for which they were written and for which an ontology-based approach is applied. This representation is used as an underlying armature for complementing the informal textual pattern description by means of semantic annotations. The combination of the literary pattern representation with its formal representation counterpart could assist an intelligent search engine that supports users not just for retrieval purposes but also for the discovery useful design solutions improving, therefore, their ability to develop quality software.", "discussion_summary": "", "discussion_excerpt": "", "dis . (1); Bruegger, Pascal (1); Hirsbrunner, B√©at (1)", "abstract": "Despite a growing interest in design patterns by the Human-Computer Interaction (HCI) community, an interaction pattern collection that is universally accepted is yet to be found. Such a collection would aid the design of pervasive computing systems, in which interactions occur in both the material and logical worlds. This paper first seeks to define interaction patterns by adopting a model that captures such duality and then considers the challenges and opportunities that non-traditional interaction brings. Some patterns are then reviewed, with examples relating to motion-aware systems. We conclude that the creation of a widely accepted interaction pattern collection is unlikely in the near future. ¬©2010 IEEE.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2010", "venue": "Proceedings - 2010 International Conference on User Science and Engineering, i-USEr 2010", "doi": "10.1109/IUSER.2010.5716740", "url": "", "keyword": "Design Patterns", "cluster": 9, "cluster_theme_terms": "patterns, management, software, object, computer interaction, structural, architecture, modeling", "cluster_label_candidate": "Cluster 9: Design Pattern through definition and conceptual framing", "distinguishing_evidence_terms": "Design Science, Biological Cells, Computer Interaction, Participatory Futures", "cluster_summary_candidate": "Within this keyword view, this cluster is set apart by Biological Cells, Computer Interaction, Participatory Futures. Its dominant move, definition and conceptualization of design pattern, is shared across most of this view, so the distinguishing terms above carry the interpretive weight. Representative papers: Design Patterns of Biological Cells; Patterns, anticipation and participatory futures.", "design_knowledge_form": "Design Pattern", "design_knowledge_action": "defines and conceptualizes", "design_knowledge_role": "Reusable Design Pattern Language", "design_knowledge_contribution": "defines and conceptualizes Design Pattern", "facet_population_or_context": "Education / Learning, Accessibility", "facet_stakeholder_or_population": "Designers, Practitioners, Developers", "facet_method_or_lens": "Design Science, Workshop", "facet_artifact_or_domain": "Tool, Interface, Game", "facet_contribution_or_outcome": "Methodological, Artifact/System, Theoretical", "umap_x": -2.29731822013855, "umap_y": 4.0569539070129395, "distance_to_centroid": 0.4290580227634684, "representative_rank": 22, "is_representative_top3": false, "medoid_rank": 22, "lda_topic": 5, "lda_topic_probability": 0.7098094753355089, "lda_topic_words": "management, software, utilization, virtual, formulation, rationale, educational, teams", "nearest_papers": [{"paper_id": "ca185d91b684", "title": "Embracing Non-Natural Design in Human-Computer Interaction", "cluster": 9, "distance": 0.11791421822424164}, {"paper_id": "6e7959c82d5f", "title": "The anatomy of HCI design patterns", "cluster": 9, "distance": 0.20166273822454206}, {"paper_id": "ceac90427122", "title": "Design-oriented human-computer interaction", "cluster": 9, "distance": 0.24507922465810816}, {"paper_id": "ddcb3ba05227", "title": "Design patterns for sociality in human-robot interaction", "cluster": 9, "distance": 0.2938586977596862}, {"paper_id": "fffe50e033fa", "title": "Activity as the ultimate particular of interaction design", "cluster": 9, "distance": 0.37281497537218156}]}, {"paper_id": "1445730be68b", "title": "A problem-based approach to the advancement of heuristics for socio-technical evaluation", "authors": "Herrmann, T. (1); Jahnke, I. (2); Nolte, A. (3, 4)", "abstract": "With ubiquitous, mobile computing, health care systems, and smart factories, socio-technical phenomena continue to emerge that challenge traditional design and evaluation methods. We perceive such phenomena as the intertwinement of technical artifacts and social practices. Previous work shows that there is no sufficient method to evaluate the quality of thissocio-technical intertwinement. Hence, our goal was to develop socio-technical heuristics, in short ST-heuristics, that can be applied by individuals to detect issues. Drawing inspiration from the success of usability heuristics in the field of human-computer interaction, we first applied a literature review to develop an initial set of ST-heuristics derived from six domains comprising groupware/computer-support cooperative work, job design, usability, socio-technical design principles, privacy, and process design. We then conducted two studies to evaluate and improve this set using empirical data from 13 cases from health care, industry, and engineering education fields. In total, we analysed 306 problems. The results substantiate a final set of eight ST-heuristics which allow for evaluating the socio-technical intertwinement in situ. We perceive the contribution of this work as a starting point for evaluators to uncover crucial issues and to improve current practice. We discuss the developed set of ST-heuristics within existing literature.", "discussion_summary": "- Discussion\nRQ1 asks about a manageable set of heuristics to evalu-\nate the intertwinement between social practices and\ntechnical artifacts.\n- Our study shows that the ﬁnal set\nof eight heuristics su ﬃciently cover the scope of the rel-\nevant problems.\n- Out of a set of 173 items, we ﬁrst cre-\nated and evaluated a set of 13 heuristics, which was\neventually condensed to a set of eight.", "discussion_excerpt": "Discussion\nRQ1 asks about a manageable set of heuristics to evalu-\nate the intertwinement between social practices and\ntechnical artifacts.", "discussion_found": true, "discussion_paragraph_count": 10, "year": "", "venue": "Behaviour & Information Technology", "doi": "10.1080/0144929X.2021.1972157", "url": "", "keyword": "Design principles", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cl , "abstract": "The vision of a Personalised Learning (PL) experience in education is a long-standing notion advocated by educators. Research literature accounts for several pedagogical and technological approaches to tailor learning to learners' variability. This paper aims to contribute to PL and Learning Design (LD) research by conceptualising CPELDS (Coherent PErsonalised Learning DeSign) as a framework outlining consistent PL design principles. CPELDS blends learner profiles addressing the dimensions of interests, strengths and needs with personalisation principles. Considering evidence about the effectiveness of Universal Design for Learning in empirical studies in special education, we transform and augment its guidelines into personalisation principles of CPELDS to address broader learners' variability. The personalisation principles employed involve (i) fostering learner's engagement, (ii) providing alternative information perception and comprehension modes, including differentiation, and (iii) supporting alternative means for learners' action and expression to demonstrate acquired knowledge and skills. We anticipate the conceptualisation of CPELDS to stimulate the representational form of an LD tool towards supporting educators as designers of PL.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "2022 International Conference on Advanced Learning Technologies (ICALT)", "doi": "10.1109/ICALT55010.2022.00030", "url": "", "keyword": "Design principles", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": -2.2856478691101074, "umap_y": 6.155193328857422, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 3, "lda_topic_probability": 0.9727235143551584, "lda_topic_words": "rationale, games, entertainment, assessment, theoretical, components, literature, activities", "nearest_papers": [{"paper_id": "92fd41483399", "title": "Design exemplars for synchronous e-learning: A design theory approach", "cluster": -1, "distance": 0.07216533371790979}, {"paper_id": "660ca24145b2", "title": "The E-Design Assessment Tool: an evidence-informed approach towards a consistent terminology for quantifying online distance learning activities", "cluster": -1, "distance": 0.19629116515788592}, {"paper_id": "9049c4d2bbec", "title": "Towards a design theory of blended learning curriculum", "cluster": -1, "distance": 0.19923744665169396}, {"paper_id": "d0a936b480d4", "title": "Acquiring educational access for neurodiverse learners through multisensory design principles", "cluster": -1, "distance": 0.41616353935440353}, {"paper_id": "7ebbe03ea0d8", "title": "Autobiographical design in HCI research: designing and learning through use-it-yourself", "cluster": -1, "distance": 0.49159359158973603}]}, {"paper_id": "31bdafb1fc73", "title": "Explainable Medical Imaging AI Needs Human-Centered Design: Guidelines and Evidence from a Systematic Review", "authors": "Chen, Haomin (1); Gomez, Catalina (1); Huang, Chien-Ming (1); Unberath, Mathias (1)", "abstract": "Transparency in Machine Learning (ML) attempts to reveal the working mechanisms of complex models. From a human-centered design perspective, transparency is not a property of the ML model but an affordance, i. e., a relationship between algorithm and user. Thus, prototyping and user evaluations are critical to attaining solutions that afford transparency. Following human-centered design principles in highly specialized and high stakes domains, such as medical image analysis, is challenging due to the limited access to end users. This dilemma is further exacerbated by the high knowledge imbalance between ML designers and end users. To investigate the state of transparent ML in medical image analysis, we conducted a systematic review of the literature by screening titles, abstracts, and keywords of all available records from January 2012 through July 2021 in PubMed, EMBASE, and Compendex databases. We identified 2508 records and 68 articles met the inclusion criteria. We found that current techniques in transparent ML are dominated by computational feasibility, and barely consider end users, during neither development nor evaluation. Despite the considerable difference between the roles and knowledge of ML developers and clinical stakeholders, no study reported formative user research to inform the design and development of transparent ML models. Only a few studies validated transparency claims through empirical user evaluations. These shortcomings put contemporary research on transparent ML at risk of being incomprehensible to users, and thus, clinically irrelevant. To alleviate these shortcomings in forthcoming research while acknowledging the challenges of human-centered design in healthcare, we introduce the INTRPRT guideline, a systematic design directive for transparent ML systems in medical image analysis. The INTRPRT guideline suggests human-centered design principles and highly recommends formative user research as the first step of transparent model design to understand user needs and domain requirements. It further provides alternatives to empirical user evaluation to support transparent ML design choices to facilitate the adoption of human-centered design principles. Following these guidelines and a human-centered design process increases the likelihood that the algorithms afford transparency and enables stakeholders to capitalize on the benefits of transparent ML. ¬© 2021, CC BY.", "discussion_summary": "- Discussion\nWe discuss the INTRPRT guideline in the context of the key observations from different themes of\nour systematic review to identify opportunities to improve the design of transparent ML systems for\nmedical image analysis.\n- Furthermore, the second last subsection presents successful examples of ML systems designed with\nclinical end users and the last subsection also includes the comparison of our guideline and systematic\nreview with existing literature.\n- Importance of formative user research and empirical user testing Both formative user research\n(theme incorporation and prior) and empirical user testing (themereporting) are critical to ensure that\nsolutions meet user needs (theme target).", "discussion_excerpt": "Discussion\nWe discuss the INTRPRT guideline in the context of the key observations from different themes of\nour systematic review to identify opportunities to improve the design of transparent ML systems for\nmedical image analysis.", "discussion_found": true, "discussion_paragraph_count": 10, "year": "2021", "venue": "arXiv", "doi": "", "url": "", "keyword": "Design principles", "cluster": 8, "cluster_theme_terms": "ai, transparency, systematic review, contestable, generative, expertise, patterns, mediated", "cluster_label_candidate": "Cluster 8: Design Knowledge through prior-work synthesis", "distinguishing_evidence_terms": "Contestable AI, Systematic Review, Scaling Expertise, Auditable Ai-systems", "cluster_summary_candidate": "Within this keyword view, this cluster is set apart by Contestable AI, Systematic Review, Scaling Expertise. Unlike most clusters in this view, its dominant design-knowledge move is synthesis of prior work. Methodologically, it leans on Systematic Review. Representative papers: Contestable AI by Design: Towards a Framework; Explainable Medical Imaging AI Needs Human-Centered Design: Guidelines and Evidence from a Systematic Review.", "design_knowledge_form": "Design Knowledge", "design_knowledge_action": "synthesizes prior work on", "design_knowledge_role": "Empirical Evidence Base", "design_knowledge_contribution": "synthesizes prior work on Design Knowledge", "facet_population_or_context": "", "facet_stakeholder_or_population": "Designers", "facet_method_or_lens": "Systematic Review", "facet_artifact_or_domain": "Tool", "facet_contribution_or_outcome": "Methodological, Theoretical, Artifact/System", "umap_x": -3.1949474811553955, "umap_y": 5.869836330413818, "distance_to_centroid": 0.2652567771479124, "representative_rank": 2, "is_representative_top3": true, "medoid_rank": 2, "lda_topic": 2, "lda_topic_probability": 0.49822401545588374, "lda_topic_words": "technical, value, science, method theory, patterns, conceptual, prototyping, theories", "nearest_papers": [{"paper_id": "cda6c6785f0a", "title": "The design of social drones: a review of studies on autonomous flyers in inhabited environments", "cluster": -1, "distance": 0.3296619934658599}, {"paper_id": "60c69d24c5a3", "title": "Evaluating the efficacy and effectiveness of design methods: A systematic review and assessment framework", "cluster": -1, "distance": 0.3855815097054689}, {"paper_id": "bdf1addf5a10", "title": "Contestable AI by Design: Towards a Framework", "cluster": 8, "distance": 0.386207637143858}, {"paper_id": "f47226c43979", "title": "The Human-Centredness Metric: Early Assessment of the Quality of Human-Centred Design Activities", "cluster": -1, "distance": 0.4349200742825623}, {"paper_id": "268903a30da5", "title": "Systematic Review of Systemic Design Frameworks for Complex Challenges", "cluster": 8, "distance": 0.4639625837069693}]}, {"paper_id": "93bb03ac03b6", "title": "Design principles for data analysis", "authors": "McGowan, Lucy DAgostino (1); Peng, Roger D. (2); Hicks, Stephanie C. (2)", "abstract": "The data science revolution has led to an increased interest in the practice of data analysis. While much has been written about statistical thinking, a complementary form of thinking that appears in the practice of data analysis is design thinking ‚Äì the problem-solving process to understand the people for whom a product is being designed. For a given problem, there can be significant or subtle differences in how a data analyst (or producer of a data analysis) constructs, creates, or designs a data analysis, including differences in the choice of methods, tooling, and workflow. These choices can affect the data analysis products themselves and the experience of the consumer of the data analysis. Therefore, the role of a producer can be thought of as designing the data analysis with a set of design principles. Here, we introduce design principles for data analysis and describe how they can be mapped to data analyses in a quantitative, objective and informative manner. We also provide empirical evidence of variation of principles within and between both producers and consumers of data analyses. Our work leads to two insights: it suggests a formal mechanism to describe data analyses based on the design principles for data analysis, and it provides a framework to teach students how to build data analyses using formal design principles. Copyright ¬© 2021, The Authors. All rights reserved.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2021", "venue": "arXiv", "doi": "", "url": "", "keyword": "Design principles", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": -1.884888768196106, "umap_y": 8.296576499938965, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 6, "lda_topic_probability": 0.9812479536821916, "lda_topic_words": "literature, review, concept, management, systematic, analysis, ai, theories", "nearest_papers": [{"paper_id": "02381ea80183", "title": "A design theory for data quality tools in data ecosystems: Findings from three industry cases", "cluster": 6, "distance": 0.08708637361417548}, {"paper_id": "96dd29c8f345", "title": "Data Mesh: A Systematic Gray Literature Review", "cluster": -1, "distance": 0.2053377859069726}, {"paper_id": "5b3b013c191d", "title": "Towards a unified terminology for sonification and visualization", "cluster": 6, "distance": 0.46582055155945623}, {"paper_id": "4e727e38805c", "title": "Visualization Atlases: Explaining and Exploring Complex Topics Through Data, Visualization, and Narration", "cluster": 6, "distance": 0.4798247761344766}, {"paper_id": "44848ca19e31", "title": "Design Obligations for Software, with Examples from Data Abstraction and Adaptive Systems", "cluster": -1, "distance": 0.536891176405425}]}, {"paper_id": "2ba0daf07e8e", "title": "Engineering design principles as patterns of relationships in frame creation", "authors": "Rodriguez, J.B. (1); Benavides, E.M. (1)", "abstract": "Frame creation (framing) faces the challenge of envisioning novel viewpoints that point to value. This paper examines framing and uses Dorst's definition of frame from the perspective of engineering design theories and methods to highlight three of their key characteristics: (P1) problem-domain independence, (P2) generativity, and (P3) formal definition of a valuable design outcome or process in terms of principles. These properties support two statements. Statement 1: an engineering design theory or method satisfying (P1), (P2) and (P3) holds Dorst's definition of frame. The design principles on which the engineering design theory or method is based on are the pattern of relationships that characterizes valuable outcomes and processes in that frame. Statement 2: when a designer uses an engineering design theory or method satisfying (P3), the interaction between the design problem frame (A) and the engineering design theory or method frame (B), uncovers a new frame (C) with a definition of value. Illustrative examples based on axiomatic design and C-K theory demonstrate the practical application of these statements.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Research in Engineering Design", "doi": "10.1007/s00163-021-00362-z", "url": "", "keyword": "Design principles", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "n/a", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": -0.6717744469642639, "umap_y": 3.653461456298828, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 2, "lda_topic_probability": 0.9826899849601342, "lda_topic_words": "technical, value, science, method dence (FSE) framework emerged as a feature-based and low-effort capture approach. We discuss the need to improve design communication in engineering design, through structuring rationales (i.e., using the proposed FSE framework or other representations) and improving technical writing skills. Lastly, by enhancing design rationale communication and documentation practices, significant benefits can be realized for computational support tools such as automatic rationale extraction or generative approaches.", "discussion_summary": "- Discussion\nThree main contributions were extracted from a qualitative research process using\ndesign rationales captured in technical reports.\n- First, the iterative process details\nthe analysis and development of the concept of “levels of clarity ” consisting of\ncommunicating clearly and missing information code sets that were verified and\nlater refined into the feature, specification and evidence fra\n- Next, com-\nparisons of the codes across datasets and project innovation types were presented.", "discussion_excerpt": "Discussion\nThree main contributions were extracted from a qualitative research process using\ndesign rationales captured in technical reports.", "discussion_found": true, "discussion_paragraph_count": 10, "year": "", "venue": "Design Science", "doi": "10.1017/dsj.2024.19", "url": "", "keyword": "Design rationale", "cluster": 7, "cluster_theme_terms": "rationale, capture, documents, argumentation, implies, reflective, reuse, influence", "cluster_label_candidate": "Cluster 7: Design Rationale as documented representations", "distinguishing_evidence_terms": "Method Rationale, Evidence Framework, Design Guidelines, Capture", "cluster_summary_candidate": "Within this keyword view, this cluster is set apart by Method Rationale, Evidence Framework, Capture. Unlike most clusters in this view, its dominant design-knowledge move is representation and documentation. Representative papers: Redesigning the rationale for design r ce framework for communicating design rationale", "cluster": 7, "distance": 0.08536536751404455}, {"paper_id": "d5d39efbe945", "title": "Method rationale in method engineering", "cluster": 7, "distance": 0.12722003450835717}, {"paper_id": "4567075d70b4", "title": "Making Argumentation Serve Design", "cluster": 7, "distance": 0.24655366430591674}]}, {"paper_id": "edde6dc75b19", "title": "The language of design: Theory and computation", "authors": "Dong, Andy (1)", "abstract": "The Language of Design: Theory and Computation articulates the theory that there is a language of design. This theory claims that any language of design consists of a set of symbols, a set of relations between the symbols, features that key the expressiveness of symbols, and a set of reality producing information processing behaviors acting on the language. Drawing upon insights from computational language processing, the language of design is modeled computationally through latent semantic analysis (LSA), lexical chain analysis (LCA), and sentiment analysis (SA). The statistical co-occurrence of semantics (LSA), semantic relations (LCA), and semantic modifiers (SA) in design text are used to illustrate how the reality producing effect of language is itself an enactment of design. This insight leads to a new understanding of the connections between creative behaviors such as design and their linguistic properties. The computation of the language of design makes it possible to make direct measurements of creative behaviors which are distributed across social spaces and mediated through language. The book demonstrates how machine understanding of design texts based on computation over the language of design yields practical applications for design management such as modeling teamwork, characterizing the formation of a design concept, and understanding design rationale. The Language of Design: Theory and Computation is a unique text for postgraduates and researchers studying design theory and mana
