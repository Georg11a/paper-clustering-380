<html lang="en">
<head>

  <style>
    :root {
      --ink: #253858;
      --muted: #65758b;
      --line: #d8e0ea;
      --bg: #f7f9fc;
      --panel: #ffffff;
      --accent: #2f7dd1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }
    header {
      padding: 18px 24px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }
    h1 { margin: 0 0 12px; font-size: 22px; letter-spacing: 0; }
    .controls {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) 180px 210px 150px;
      gap: 10px;
      align-items: center;
    }
    input, select, button {
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 10px;
      background: white;
      color: var(--ink);
      font-size: 14px;
    }
    button { background: var(--accent); color: white; border-color: var(--accent); cursor: pointer; }
    label.toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
    }
    label.toggle input { width: 16px; height: 16px; }
    main {
      display: grid;
      grid-template-columns: minmax(560px, 1fr) minmax(420px, 460px);
      gap: 14px;
      padding: 14px;
      min-height: calc(100vh - 92px);
      align-items: stretch;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .plot-panel { display: grid; grid-template-rows: auto 1fr auto; height: calc(100vh - 120px); min-height: 690px; }
    .status {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
    }
    svg { width: 100%; height: 100%; min-height: 560px; background: #fbfcfe; }
    .axis { stroke: #dfe6ef; stroke-width: 1; }
    .point { stroke: white; stroke-width: 1.5; cursor: pointer; opacity: 0.88; }
    .point.dim { opacity: 0.14; }
    .point.selected { stroke: #111827; stroke-width: 3; opacity: 1; }
    .legend, .cluster-list { padding: 10px 12px; border-top: 1px solid var(--line); }
    .legend-items { display: flex; flex-wrap: wrap; gap: 8px 14px; }
    .legend-item { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    .swatch { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .details { padding: 16px; overflow: auto; height: calc(100vh - 120px); min-height: 690px; align-self: stretch; }
    .details h2 { font-size: 18px; margin: 0 0 8px; line-height: 1.25; }
    .meta { color: var(--muted); font-size: 13px; line-height: 1.45; margin-bottom: 12px; }
    .pill {
      display: inline-flex;
      align-items: center;
      margin: 3px 5px 3px 0;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef4fb;
      color: #31577f;
      font-size: 12px;
    }
    .abstract { line-height: 1.5; font-size: 14px; color: #2f3b52; }
    details.discussion-full,
    details.lexical-evidence {
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      background: #fbfcfe;
    }
    details.discussion-full summary,
    details.lexical-evidence summary {
      cursor: pointer;
      color: #31577f;
      font-weight: 700;
      font-size: 13px;
    }
    details.lexical-evidence { margin-top: 16px; }
    .evidence-block { margin-top: 8px; }
    .discussion-list {
      margin: 6px 0 0;
      padding-left: 18px;
      line-height: 1.45;
      font-size: 14px;
      color: #2f3b52;
    }
    .discussion-list li { margin: 0 0 7px; }
    .section-title { margin: 16px 0 6px; font-weight: 700; font-size: 13px; text-transform: uppercase; color: var(--muted); }
    .paper-link { display: block; color: var(--accent); text-decoration: none; margin: 7px 0; font-size: 13px; line-height: 1.35; }
    .cluster-card { border-top: 1px solid var(--line); padding: 10px 12px; }
    .cluster-card button { height: 28px; padding: 0 8px; margin-top: 6px; font-size: 12px; }
    @media (max-width: 980px) {
      .controls, main { grid-template-columns: 1fr; }
      .plot-panel { min-height: 560px; }
    }
  </style>

eering, existing", "nearest_papers": [{"paper_id": "d330bde18c87", "title": "Languaging design methods", "cluster": 7, "distance": 0.7601472381744852}, {"paper_id": "9fbb38d67689", "title": "Analysis of methods of creating new technical systems", "cluster": 7, "distance": 0.8183275126667713}, {"paper_id": "878cf959ac53", "title": "Designerly Research Methods and Researcherly Design Methods", "cluster": 1, "distance": 0.8194088484164804}, {"paper_id": "b841f16ac5b3", "title": "Design methods for real time software", "cluster": 7, "distance": 0.860949131936521}, {"paper_id": "215d4603e3c7", "title": "A case study of the extension of floorplan flexibility using sector margins", "cluster": 0, "distance": 0.865720849385714}]}, {"paper_id": "60c69d24c5a3", "title": "Evaluating the efficacy and effectiveness of design methods: A systematic review and assessment framework", "authors": "Cash, Philip (1); Daalhuizen, Jaap (2); Hekkert, Paul (3)", "abstract": "The increasingly transdisciplinary context of design, where designers collaborate with other disciplinary and domain experts, means there is a growing need to evidence the effectiveness of design methods. We address this need in two ways. First, we propose a ‚Äòchain of evidence‚Äô, from motivation to claims, operationalising this in a systematic assessment framework. Second, we systematically review current design method research. Our results reveal that while all links in the chain of evidence are reported across the literature and best practices can be identified, no individual paper either reports all links or consistently achieves best practice. Our framework and results demonstrate the need for standards of evidence in this area, with implications for design method research, development, education, and practice. ¬© 2023 The Authors", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2023", "venue": "Design Studies", "doi": "10.1016/j.destud.2023 , Roland M. (2); Lecuna, Alejandro (3); Badke-Schaub, Petra (4)", "abstract": "Practitioners design artifacts of different kinds. Researchers and practitioners both create methods for designing such artifacts. The question arises whether those methods are actually valid and useful. In this conceptual paper, we argue that there is a need for 'method corroboration'-the deliberate and reflected use and possible validation of a design method. We present a literature review of method corroboration in the IS and more specifically in the DSR literature. The findings are summarized as a conceptual model outlining eight strategies of method use, which are then condensed into a 2-by-2 framework of method corroboration. The results of this paper present insight into the current state of method corroboration in the DSR field and provide guidance for working with design methods in research and practice. ¬© 2023 IEEE Computer Society. All rights reserved.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2023", "venue": "Proceedings of the Annual Hawaii International Conference on System Sciences", "doi": "", "url": "", "keyword": "Design methods", "cluster": 0, "cluster_theme_terms": "collapse, artifacts, floorplan, corroboration, ways, findings, business models, flexibility", "cluster_label_candidate": "Design Methods", "cluster_summary_candidate": "This cluster focuses on Education / Learning, involving Designers, Practitioners, using User-centered Design, Ethnographic as the main methodological or conceptual lens, with contribution types coded as Methodological, Theoretical, Empirical.", "facet_population_or_context": "Education / Learning", "facet_stakeholder_or_population": "Designers, Practitioners", "facet_method_or_lens": "User-centered Design, Ethnographic", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "Methodological, Theoretical, Empirical", "umap_x": 8.063042640686035, "umap_y": 0.9009934663772583, "distance_to_centroid": 0.3749372788150056, "representative_rank": 1, "is_representative_top3": true, "medoid_rank": 1, "lda_topic": 2, "lda_topic_probability": 0.9666633371564759, "lda_topic_words": "architectural, virtual, artifacts, thinking, specifically, term, engineering, existing", "nearest_papers": [{"paper_id": "66218ff443f6", "title": "Deliberated Evolution: Stalking the View Matcher in Design Space", "cluster": 0, "distance": 0.6854201425296268}, {"paper_id": "b2234ef79a5a", "title": "Tracing situated effects of innovative design methods: inexperienced designers' practices", "cluster": 0, "distance": 0.7777382628971136}, {"paper_id": "60c69d24c5a3", "title": "Evaluating the efficacy and effectiveness of design methods: A systematic review and assessment framework", "cluster": 0, "distance": 0.7850807906632487}, {"paper_id": "5389fb1cc38b", "title": "Elements of a design method ‚Äì a basis for describing and evaluating design methods", "cluster": 5, "distance": 0.810102179023224}, {"paper_id": "40a2d86cd488", "title": "Elements of a design method - a basis for describing and evaluating design methods", "cluster": 5, "distance": 0.811172643177378}]}, {"paper_id": "40a2d86cd488", "title": "Elements of a design method - a basis for describing and evaluating design methods", "authors": "Gericke, K. (1); Eckert, C. (2); Stacey, M. (3)", "abstract": "Method development is at the heart of design research as methods are a formalised way to express knowledge about how aspects of design could or should be done. However, assuring that methods are in fact used in industry has remained a challenge. Industry will only use methods that they can understand and that they feel will give them benefit reliably. To understand the challenges involved in adopting a method, the method needs to be seen in context: it does not exist in isolation but forms a part of an ecosystem of methods for tackling related design problems. A method depends on the knowledge and skills of the practitioners using it: while a description of a method is an artefact that is a formalisation of engineering knowledge, a method in use constitutes a socio-technical system depending on the interaction of human participants with each other as well as with the description of the method, representations of design information and, often, tools for carrying out the method's tasks. This paper argues that crucial factors in the adoption of methods include how well they are described and how convincingly they are evaluated. The description of a method should cover itscore idea, therepresentationsin which design information is described, theprocedureto be followed, itsintended use, and thetoolsit uses. The account of a method's intended use should cover itspurpose, the situations or product types within itsscope, itscoverageof kinds of problems within its scope, itsexpected benefitandconditionsfor its use. The different elements need to be evaluated separately as well as the method as an integrated whole. While verification and validation are important for some elements of methods, it is rarely possible to prove the validity of a method. Rather the developers of methods need to gather sufficient evidence that a method will work within a clearly articulated scope. Most design methods do not have binary success criteria, and their usefulness in practice depends as much on simplicity and usability as on the outcomes they produce. Evaluation should focus on how well they work, and how they can be customised and improved.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Design Science", "doi": "10.1017/dsj.2022.23", "url": "", "keyword": "Design methods", "cluster": 5, "cluster_theme_terms": "industry, understand, method development, heart, aspects assuring, does exist, remained challenge, reliably", "cluster_label_candidate": "Design Methods", "cluster_summary_candidate":  socially responsible design practices. However, little research exists that describes how methods are created, what knowledge is used to inform this creation, or connects elements of methods to performance by designers. In this research note, I describe performative, codification-oriented, and presentation-oriented stances towards design methods, articulating a vocabulary that languages aspects of methods. I describe areas where this vocabulary may support design researchers, including building new design methods, informing descriptive accounts of methods in use, and supporting the creation of a theory of method. All rights reserved Elsevier.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Design Studies", "doi": "10.1016/j.destud.2021.101076", "url": "", "keyword": "Design methods", "cluster": 7, "cluster_theme_terms": "architectural, hood, software, mascot, children, embodied, self, creation", "cluster_label_candidate": "Design Methods", "cluster_summary_candidate": "This cluster focuses on Education / Learning, involving Designers, with contribution types coded as Methodological, Artifact/System, Theoretical.", "facet_population_or_context": "Education / Learning", "facet_stakeholder_or_population": "Designers", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "Methodological, Artifact/System, Theoretical", "umap_x": 9.322790145874023, "umap_y": 1.5167994499206543, "distance_to_centroid": 0.4833756109500559, "representative_rank": 2, "is_representative_top3": true, "medoid_rank": 2, "lda_topic": 8, "lda_topic_probability": 0.9590875243943723, "lda_topic_words": "interactive, creation, survey, technical, architecture, building, methodological, performance", "nearest_papers": [{"paper_id": "7e095752d24c", "title": "Think-4-EmCoDe framework: Highlighting key qualities in embodied co-design techniques for children", "cluster": 7, "dista ation / Learning", "facet_stakeholder_or_population": "Designers", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "Methodological, Artifact/System, Theoretical", "umap_x": 7.6020188331604, "umap_y": 1.3314018249511719, "distance_to_centroid": 0.5986230144829443, "representative_rank": 6, "is_representative_top3": false, "medoid_rank": 6, "lda_topic": 2, "lda_topic_probability": 0.9499941317521317, "lda_topic_words": "architectural, virtual, artifacts, thinking, specifically, term, engineering, existing", "nearest_papers": [{"paper_id": "714b3f6f8ac7", "title": "Degrees of Interaction: Towards a Classification", "cluster": 3, "distance": 0.7390719398028611}, {"paper_id": "721f009574ce", "title": "On integration of interface design methods: Can debates be resolved?", "cluster": 4, "distance": 0.8281675070181308}, {"paper_id": "49719118a4a0", "title": "Progressive collapse of structures ‚Äì review and outlook", "cluster": 0, "distance": 0.8340921340225564}, {"paper_id": "60c69d24c5a3", "title": "Evaluating the efficacy and effectiveness of design methods: A systematic review and assessment framework", "cluster": 0, "distance": 0.8558189043122679}, {"paper_id": "b841f16ac5b3", "title": "Design methods for real time software", "cluster": 7, "distance": 0.8562628807495087}]}, {"paper_id": "dbf31702e533", "title": "Patterns for living lab practice: describing key know-how to promote service co-creation with users", "authors": "Akasaka, Fumiya (1); Yasuoka, Mika (2); Nakatani, Momoko (1); Kimura, Atsunobu (1); Ihara, Masayuki (1)", "abstract": "'Value co-creation' among actors related to service provision is one of the key concepts in service design. Living Lab (LL) is a co-creative service design methodology in which designers and users collaboratively design services. In LL, users are actively involved in service design processes over long periods. Because LL is a design methodology based on longterm co-creation with users, its practices involve more direct and indirect communication and collaboration with users than typical service design does. Therefore, in order to make value co-creation successful in LL projects, it is crucial for designers to use not only knowledge of service design methods, but also practical know-how related to 'facilitating long-term cocreation with users.' Such know-how is not always shared, however, among LL practitioners, because it is often buried in their experiences. Thus, LL practice currently places heavy reliance on the practitioners‚Äô intuition and experience. Therefore, to support LL practitioners, it is essential to extract key knowhow on how to achieve successful LL projects from experienced practitioners, and to describe such knowhow. This would allow us to share and reuse knowhow in planning and running an LL project. Hence, the purpose of this study is to extract such key knowhow for LL practice and describe it in an easy-to-reuse manner. We first developed a workshop to extract key know-how for LL practice. In this study, we held the workshop twice and could extract 30 items of key know-how. Subsequently, we described the extracted key know-how as 'patterns' by using the pattern language framework, and we developed a booklet listing the 30 patterns in an easy-to-reuse manner. The booklet can be used by LL practitioners to refer to and reuse the key know-how for LL practice. Through an evaluation, we confirmed that the developed booklet is useful for LL practitioners for referring to and using LL know-how. ¬© 2020, Fuji Technology Press. All rights reserved.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2020", "venue": "International Journal of Automation Technology", "doi": "10.20965/ijat.2020.p0769", "url": "", "keyword": "Design methods", "cluster": 2, "cluster_theme_terms": "service, fbs, methodology, innovation, systemic, creation, living lab, rid", "cluster_label_candidate": "Design Methods", "cluster_summary_candidate": "This cluster focuses on service, fbs, involving Designers, Practitioners, using Design Science, Case Study, Workshop as the main methodological or conceptual lens, with contribution types coded as Methodological, Empirical, Artifact/System.", "facet_population_or_context": "", "facet_stakeholder_or_population": "Designers, Practitioners", "facet_method_or_lens": "Design Science, Case Study, Workshop", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "Methodological, Empirical, Artifact/System", "umap_x": 7.354063034057617, "umap_y": -0.1250678151845932, "distance_to_centroid": 0.24195438604864472, "representative_rank": 2, "is_representative_top3": true, "medoid_rank": 2, "lda_topic": 4, "lda_topic_probability": 0.7707271174299107, "lda_topic_words": "service, creation, methodology, innovation, key, propose, article, explore", "nearest_papers": [{"paper_id": "27b32c0d515d", "title": "Advancing service design research with design science research", "cluster": 2, "distance": 0.2937282451172767}, {"paper_id": "f16832406221", "title": "A Framework for Systemic Design", "cluster": 2, "distance": 0.757131338141039}, {"paper_id": "d330bde18c87", "title": "Languaging design methods", "cluster": 7, "distance": 0.7890791309146457}, {"paper_id": "7e095752d24c", "title": "Think-4-EmCoDe framework: Highlighting key qualities in embodied co-design techniques for children", "cluster": 7, "distance": 0.8679682323222976}, {"paper_id": "1416cd2b88de", "title": "Cross-disciplinary system value overview towards value-oriented design", "cluster": 1, "distance": 0.8874518757094529}]}, {"paper_id": "49719118a4a0", "title": "Progressive collapse of structures ‚Äì review and outlook", "authors": "Starossek, U. (1)", "abstract": "The difference between progressive collapse, related to mechanisms of collapse, and disproportionate collapse, related to design, is outlined. Various mechanisms of collapse are described, which helps to clarify conceptual relationships. Ordinary design procedures are inadequate for preventing disproportionate collapse. The reasons for this are explained. After defining the terms collapse resistance and robustness, a pragmatic design approach for achieving collapse resistance of general structures is outlined. In this approach, the design objectives are established in a decision-making process. Concerning design methods, segmentation is available in addition to alternative load paths. The former method can be preferable in case of large initial local failure. This pragmatic approach can be developed into model guidelines for the design of general structures against disproportionate collapse. In contrast, it is found that current design regulations apply only to buildings of small to medium size and not to structures in general. ¬© 2019 Taylor & Francis Group, London, UK.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2019", "venue": "Advances in Engineering Materials, Structures and Systems: Innovations, Mechanics and Applications - Proceedings of the 7th International Conference on Structural Engineering, Mechanics and Computation, 2019", "doi": "10.1201/9780429426506-364", "url": "", "keyword": "Design methods", "cluster": 0, "cluster_theme_terms": "collapse, artifacts, floorplan, corroboration, ways, findings, business models, flexibility", "cluster_label_candidate": "Design Methods", "cluster_summary_candidate": "This cluster focuses on Education / Learning, involving Designers, Practitioners, using User-centered Design, Ethnographic as the main methodological or conceptual lens, with contribution types coded as Methodological, Theoretical, Empirical.", "facet_population_or_context": "Education / Learning", "facet_stakeholder_or_population": "Designers, Practitioners", "facet_method_or_lens": "User-centered Design, Ethnographic", "facet_artifact_or_domain": "", "facet_contri gate the customer domain, explore the functional domain, and manage design couplings between customer needs and functional requirements. A collection of existing design methods is incorporated, in an adaptive manner, into the framework to facilitate the execution of each step. To date, the proposed framework has been iteratively taught, practiced, and refined based on two engineering design courses since 2013.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2020", "venue": "", "doi": "", "url": "https://www.semanticscholar.org/paper/1af6479afed41181f7b7d7c315f80b691cb038f1", "keyword": "Design methods", "cluster": 1, "cluster_theme_terms": "functional, virtual, product, value, commissioning, defined, robust, emotion", "cluster_label_candidate": "Design Methods", "cluster_summary_candidate": "This cluster focuses on functional, virtual, involving Designers, with contribution types coded as Methodological, Artifact/System, Theoretical.", "facet_population_or_context": "", "facet_stakeholder_or_population": "Designers", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "Methodological, Artifact/System, Theoretical", "umap_x": 8.272109031677246, "umap_y": 2.779503107070923, "distance_to_centroid": 0.45943323030508365, "representative_rank": 2, "is_representative_top3": true, "medoid_rank": 2, "lda_topic": 3, "lda_topic_probability": 0.9666631666862909, "lda_topic_words": "functional, product, hand, thinking, activities, needs, means, useful", "nearest_papers": [{"paper_id": "799b06403189", "title": "State of the Art on Robust Design Methods for Additive Manufacturing", "cluster": 1, "distance": 0.7090228068282001}, {"paper_id": "03ce61847eb3", "title": "Emotion Semantics Construction in Industrial Product Application", "cluster": 1, "distance": 0.7128005444996142}, {"paper_id": "9de0e13a7156", "title": "Towards functional de novo designed proteins.", "cluster": 4, "distance": 0.7755842252387258}, {"paper_id": "f16832406221", "title": "A Framework for Systemic Design", "cluster": 2, "distance": 0.8789380455308469}, {"paper_id": "b2234ef79a5a", "title": "Tracing situated effects of innovative design methods: inexperienced designers' practices", "cluster": 0, "distance": 0.8831340202331179}]}, {"paper_id": "878cf959ac53", "title": "Designerly Research Methods and Researcherly Design Methods", "authors": "R. Sosa", "abstract": "This paper builds on the complementary identities distinguished by Joyce Yee of a ‚Äòresearcherly designer‚Äô as a designer trained in research and a ‚Äôdesignerly researcher‚Äô as its counterpart: a researcher trained in design (Yee, 2017). Joyce reflects that adopting these two roles informs her practice allowing her to select ‚Äúthe right research tools for different purposes‚Äù. Here, I extend and examine this duality paying close attention to the methods used in these two professional practices. I argue that ‚Äòthe same‚Äô techniques, tools, and methods are used by individuals when they engage in design activity and when they ‚Äòchange hats‚Äô to engage in research activity. Whilst it is certainly true that individuals integrate and blend these activities within the same project, I make the argument that how they use these methods can be clearly distinguished by the purposes for which they use them. Individuals who are in the position to execute roles as different as designers and researchers are ‚Äòambidextrous‚Äô and they cultivate creative synergies between these worlds. However, switching membership between such different communities is not without its challenges (Gold, 2007). The paper addresses the opportunities, risks, and ethical tensions that come from ‚Äòchanging hats‚Äô and it draws from earlier work on the creative adaptation of design methods for crossdisciplinary research (Sosa & Grocott, 2020). The paper concludes with recommendations and generative questions for those who embark on the advanced practices of design and research.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2020", "venue": "", "doi": "", "url": "https://www.semanticscholar.org/paper/3c1e79eab204a59ccd27f91f5c60a8bc77fd660a", "keyword": "Design methods", "cluster": 1, "cluster_theme_terms": "functional, virtual, product, value, commissioning, defined, robust, emotion", "cluster_label_candidate": "Design Methods", "cluster_summary_candidate": "This cluster focuses on functional, virtual, involving Designers, with contribution types coded as Methodological, Artifact/System, Theoretical.", "facet_population_or_context": "", "facet_stakeholder_or_population": "Designers", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "Methodological, Artifact/System, Theoretical", "umap_x": 9.285720825195312, "umap_y": 1.0836284160614014, "distance_to_centroid": 0.571050820683779, "representative_rank": 4, "is_representative_top3": false, "medoid_rank": 4, "lda_topic": 5, "lda_topic_probability": 0.9249897734549712, "lda_topic_words": "value, aspects, challenges, understand, industry, needs, adopting, involved", "nearest_papers": [{"paper_id": "d330bde18c87", "title": "Languaging design methods", "cluster": 7, "distance": 0.7699024621631679}, {"paper_id": "7e095752d24c", "title": "Think-4-EmCoDe framework: Highlighting key qualities in embodied co-design techniques for children", "cluster": 7, "distance": 0.8194088484164804}, {"paper_id": "799b06403189", "title": "State of the Art on Robust Design Methods for Additive Manufacturing", "cluster": 1, "distance": 0.8531417341053873}, {"paper_id": "215d4603e3c7", "title": "A case study of the extension of floorplan flexibility using sector margins", "cluster": 0, "distance": 0.8763338139117572}, {"paper_id": "b841f16ac5b3", "title": "Design methods for real time software", "cluster": 7, "distance": 0.886705930080753}]}, {"paper_id": "9de0e13a7156", "title": "Towards functional de novo designed proteins.", "authors": "W. Dawson; G. G. Rhys; D. Woolfson", "abstract": "Our ability to design completely de novo proteins is improving rapidly. This is true of all three main approaches to de novo protein design, which we define as: minimal, rational and computational design. Together, these have delivered a variety of protein scaffolds characterised to high resolution. This is truly impressive and a major advance from where the field was a decade or so ago. That all said, significant challenges in the field remain. Chief amongst these is the need to deliver functional de novo proteins. Such designs might include selective and/or tight binding of specified small molecules, or the catalysis of entirely new chemical transformations. We argue that, whilst progress is being made, solving such problems will require more than simply adding functional side chains to extant de novo structures. New approaches will be needed to target and build structure, stability and function simultaneously. Moreover, if we are to match the exquisite control and subtlety of natural proteins, design methods will have to incorporate multi-state modelling and dynamics. This will require more than black-box methodology, specifically increased understanding of protein conformational changes and dynamics will be needed.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2019", "venue": "Current Opinion in Chemical Biology", "doi": "", "url": "https://www.semanticscholar.org/paper/4c8fc56c0f81ebbdc38feccc5c71e2ef2926cfba", "keyword": "Design methods", "cluster": 4, "cluster_theme_terms": "debate, novo, centredness, metric, understanding, thing, proteins, centred", "cluster_label_candidate": "Design Methods", "cluster_summary_candidate": "This cluster focuses on Education / Learning, with recurring attention to Interface, with contribution types coded as M ried perspectives on what, how and why business models should be designed. In this editorial I attempt to clarify the meaning of ‚Äòthe design of business model‚Äô by providing a framework that will hopefully help synthesise, organise and clarify the multifaceted aspects of designing business models. Additionally, I highlight three emerging meta insights from the nine papers published in this Special Issue: 1) the (importance of) integration of design principles, 2) the need for specialised, context-dependent design methods and tools and 3) the potential of technology, particularly AI, to reshape business model design. These insights offer pathways for advancing the understanding and practice of designing business models that, combined with an appreciation of the different aspects of designing business models, will hopefully encourage and shape future research directions and cumulative progress in this field.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2024", "venue": "Journal of Business Models", "doi": "", "url": "https://www.semanticscholar.org/paper/4ddeee32ce878180b4aa8e380f01a51103dc9b26", "keyword": "Design methods", "cluster": 0, "cluster_theme_terms": "collapse, artifacts, floorplan, corroboration, ways, findings, business models, flexibility", "cluster_label_candidate": "Design Methods", "cluster_summary_candidate": "This cluster focuses on Education / Learning, involving Designers, Practitioners, using User-centered Design, Ethnographic as the main methodological or conceptual lens, with contribution types coded as Methodological, Theoretical, Empirical.", "facet_population_or_context": "Education / Learning", "facet_stakeholder_or_population": "Designers, Practitioners", "facet_method_or_lens": "User-centered Design, Ethnographic", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "Methodological, Theoretical, Empirical", "umap_x": 6.768232345581055, "umap_y": 1 . Millet", "abstract": "Additive Manufacturing (AM) technologies allow to produce functional parts with complex geometries that cannot be manufactured by conventional processes. However, the complexity of the product is increased and causes new constraints in the manufacturing process. Therefore, these new processes lead particularly to new needs in design methods. The objective of this paper is to explore and form an overall view of design methods, especially, robust design (RD) methods. Robust design is defined here as a methodology that enables to design a product with optimal performances and insensitivity to small variations of the inputs of the manufacturing process. In this contribution a state of the art of robust design methods applied to AM will be carried out.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2020", "venue": "Lecture Notes in Mechanical Engineering", "doi": "", "url": "https://www.semanticscholar.org/paper/5d5004424041e3ab71ae951f9013b54439ee2cf7", "keyword": "Design methods", "cluster": 1, "cluster_theme_terms": "functional, virtual, product, value, commissioning, defined, robust, emotion", "cluster_label_candidate": "Design Methods", "cluster_summary_candidate": "This cluster focuses on functional, virtual, involving Designers, with contribution types coded as Methodological, Artifact/System, Theoretical.", "facet_population_or_context": "", "facet_stakeholder_or_population": "Designers", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "Methodological, Artifact/System, Theoretical", "umap_x": 7.822608947753906, "umap_y": 2.809511661529541, "distance_to_centroid": 0.3624091730418505, "representative_rank": 1, "is_representative_top3": true, "medoid_rank": 1, "lda_topic": 5, "lda_topic_probability": 0.6837481486366778, "lda_topic_words": "value, aspects, challenges, understand, industry, needs, adopting, involved", "nearest_papers": [{"paper_id": "c825a5e5ab08", "title": "Functional design framework for innovative design thinking in product development", "cluster": 1, "distance": 0.7090228068282001}, {"paper_id": "ac2f5510db32", "title": "Beyond geometric complexity: a critical review of complexity theory and how it relates to architecture engineering and construction", "cluster": 6, "distance": 0.7631276170592513}, {"paper_id": "03ce61847eb3", "title": "Emotion Semantics Construction in Industrial Product Application", "cluster": 1, "distance": 0.7770017133924596}, {"paper_id": "f02904f836be", "title": "Universal Participatory Design: Achievements and Challenges", "cluster": 3, "distance": 0.8341169237418937}, {"paper_id": "b841f16ac5b3", "title": "Design methods for real time software", "cluster": 7, "distance": 0.8347404811012862}]}, {"paper_id": "03ce61847eb3", "title": "Emotion Semantics Construction in Industrial Product Application", "authors": "Wenhao Jiang", "abstract": "The theory of emotion semantics constitution put forward in this study aims to explore on how to convey emotions in product design. First, the development of emotion expression methods is reviewed, to point out the trend from physiological aspect to psychological activities and bring up a double-layer research framework composed of expression communication and sensory reception. The study has made a profound discussion on how to convey emotions in product design with sensory elements such as vision, hearing and touch, and to rouse the users‚Äô emotional resonance with multiple elements in product design. On theoretical level, this study has discussed how to construct visual symbols and apply concepts such as ‚Äúemotional bionics‚Äù and product semantics, so as to optimize the function of sensory elements in regulating emotions by combining morphological aesthetics and semantic representations. In terms of practice, this study puts forward the visual modelling construction theory for ‚Äúallomorphic‚Äù product, corresponds visual symbols such as product modelling, color design and material with emotional conveyance semantics, and highlights the users‚Äô unique emotional experience facilitated by art and sensory experience, so that the viewers can be greatly impressed by the product. The study also emphasizes the key role of design in promoting emotional resonance and sensory experience, and brings forward a series of design methods and technological innovation including emotion analysis, multimedia interaction, multi-element integration, introduction of cultural symbols and the incorporation of knowledge of applied psychology and physiology, aiming at enhancing positive interaction in the users‚Äô emotion and psychology via a full range of sensory stimulation.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2024", "venue": "Spectrum of Art", "doi": "", "url": "https://www.semanticscholar.org/paper/6f02f16a16473889b3ceea6c87a753d0886a0bc5", "keyword": "Design methods", "cluster": 1, "cluster_theme_terms": "functional, virtual, product, value, commissioning, defined, robust, emotion", "cluster_label_candidate": "Design Methods", "cluster_summary_candidate": "This cluster focuses on functional, virtual, involving Designers, with contribution types coded as Methodological, Artifact/System, Theoretical.", "facet_population_or_context": "", "facet_stakeholder_or_population": "Designers", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "Methodological, Artifact/System, Theoretical", "umap_x": 8.328476905822754, "umap_y": 3.2355258464813232, "distance_to_centroid": 0.46455365851993746, "representative_rank": 3, "is_representative_top3": true, "medoid_rank": 3, "lda_topic": 7, "lda_topic_probability": 0.9571381865965363, "lda_topic_words": "complexity, product, problems, community, industrial, usage, application, provides", "nearest_papers": [{"paper_id": "c825a5e5ab08", "title": "Functional design framework for innovative design thinking in product development", "cluster": 1, "distance": 0.7128005444996142}, {"paper_id": "95c2b3d44aff", "title": "Multiple forms of applications and impacts of a design theory -ten years of industrial applications of C-K theory", "cluster": 6, "distance": 0.7665067420396621}, {"paper_id": "799b06403189", "title": "State of the Art on Robust Design Methods for Additive Manufacturing", "cluster": 1, "distance": 0.7770017133924596}, {"paper_id": "94347a49c12b", "title": "Using System Dynamics to Construct Design Theory for Community Information Systems", "cluster": 6, "distance": 0.8318515989219488}, {"paper_id": "f16832406221", "title": "A Framework for Systemic Design", "cluster": 2, "distance": 0.8353050594949849}]}, {"paper_id": "66218ff443f6", "title": "Deliberated Evolution: Stalking the View Matcher in Design Space", "authors": "John Millar Carroll; M. Rosson", "abstract": "Technology development in HCI can be interpreted as a co-evolution of tasks and artifacts. The tasks people actually engage in (successfully or problematically) and those they wish to engage in (or perhaps merely to imagine) define requirements for future technology, and specifically for new HCI artifacts. These artifacts, in turn, open up new possibilities for human tasks, new ways to do familiar things, entirely new kinds of things to do. In this paper we describe psychological design rationale as an approach to augmenting HCI technology development and to clarifying the sense in which HCI artifacts embody psychological theory. A psychological design rationale is an enumeration of the psychological claims embodied by an artifact for the situations in which it is used. As an example, we present our design work with the View Matcher, a Smalltalk programming environment for coordinating multiple views of an example application. In particular, we show how psychological design rationale was used to develop a view matcher for code reuse from prior design rationales for related programming tasks and environments. 1. TASKS AND ARTIFACTS In 1605, Sir Francis Bacon called for a ‚Äúnatural history of trades.‚Äù He urged that technical tools, techniques and processes be made more public and explicit. This was one element in his broader project of developing practical science, and hinged on the assumption that if such knowledge could be more systematically considered and integrated, human progress would necessarily result. Thus, Bacon suggested that new concepts and inventions would result ‚Äúby a connexion and transferring of the observations of one Arte, to the use of another, when the experiences of several misteries shall fall under the consideration of one man‚Äôs minde.‚Äù (1970: Book 2, p. 10) Half a century later, when the Royal Society of London and the French Acad√©mie des Sciences were established, Bacon‚Äôs proposal was high on their agendas. However, the Royal Society quietly but promptly abandoned the project. And the Acad√©mie pursued it rather haltingly over the next century, culminating in the publication of Diderot‚Äôs Encyclop√©die ou dictionaire raisson√© des science, des artes, et des m√©tiers. Though Diderot‚Äôs objectives were explicitly those Bacon had originally articulated, the final product of the Encyclop√©die substantially lagged the leading edge of technology and its directive impacts on technological evolution were relatively minor. In this paper we are disciples of Bacon in an approach to HCI that we call ‚Äúdeliberated evolution‚Äù: we want to integrate understanding systems and building systems within a single framework of research-development. Our focus is on the psychological import of HCI artifacts (workstation hardware, operating systems, application programs, user interface displays and devices, and so forth). We are exploring the directive role that psychological design rationales of HCI artifacts can play in design work. In Bacon‚Äôs terms, our interest is in the connection and transferring of one design to a use in another design by means of explicit design rationale and systematic design methods. There are many reasons why Bacon‚Äôs original proposal failed to effectively guide seventeenth-century technology evolution (Ferguson, 1977). One factor is that it just took 1 Current address: Center for Human-Computer Interaction, 660 McBryde Hall, Virginia Tech, Blacksburg,", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "1996", "venue": "Hum. Comput. Interact.", "doi": "", "url": "https://www.semanticscholar.org/paper/7396740affd17f5cc3db5d1a68c15af8c79cb17e", "keyword": "Design methods", "cluster": 0, "cluster_theme_terms": "collapse, artifacts, floorplan, corroboration, ways, findings, business models, flexibility", "cluster_label_candidate": "Design Methods", "cluster_summary_candidate": "This cluster focuses on Education / Learning, involving Designers, Practitioners, using User-centered Design, Ethnographic as the main methodological or conceptual lens, with contribution types coded as Methodological, Theoretical, Empirical.", "facet_population_or_context": "Education / Learning", "facet_stakeholder_or_population": "Designers, Practitioners", "facet_method_or_lens": "User-centered Design, Ethnographic", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "Methodological, Theoretical, Empirical", "umap_x": 8.158537864685059, "umap_y": 1.4129366874694824, "distance_to_centroid": 0.5703871836222835, "representative_rank": 4, "is_representative_top3": false, "medoid_rank": 4, "lda_topic": 2, "lda_topic_probability": 0.9571387127661198, "lda_topic_words": "architectural, virtual, artifacts, thinking, specifically, term, engineering, existing", "nearest_papers": [{"paper_id": "b5d968168f35", "title": "A Framework of Design Method Corroboration", "cluster": 0, "distance": 0.6854201425296268}, {"paper_id": "f47226c43979", "title": ity Information Systems", "authors": "A. Moor", "abstract": "Virtual communities are complex and evolving socio-technical systems. The design of community information systems requires much theoretical research to solve design problems. A design theory is a prescriptive theory which helps optimize design methods. Community IS design theory is still very young and fragmented, however. In the design theory development process, a mix of theory components is used to solve novel problems or existing problems more effectively and efficiently. We present a meta-model of IS development which focuses on the role of theory in IS design. We show how simulation via system dynamics could play an important role in a more systematic development of design theory for community information systems.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2007", "venue": "Journal of Community Informatics", "doi": "", "url": "https://www.semanticscholar.org/paper/9898a05d24456f06fae80b2792799f42c78e97c2", "keyword": "Design methods", "cluster": 6, "cluster_theme_terms": "survey, applications, attributes, complexity, problems, community, theory provides, digital", "cluster_label_candidate": "Design Methods", "cluster_summary_candidate": "This cluster focuses on Education / Learning, involving Designers, with contribution types coded as Theoretical, Empirical, Methodological.", "facet_population_or_context": "Education / Learning", "facet_stakeholder_or_population": "Designers", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "Theoretical, Empirical, Methodological", "umap_x": 7.188078880310059, "umap_y": 3.5541021823883057, "distance_to_centroid": 0.274406401617856, "representative_rank": 1, "is_representative_top3": true, "medoid_rank": 1, "lda_topic": 7, "lda_topic_probability": 0.9699974778225027, "lda_topic_words": "complexity, product, problems, community, industrial, usage ed, responsible research are translated into practical requirements that can guide RTD processes in academic and professional contexts. To continue developing landscape architecture as a design discipline, it is important that the theoretical, methodological, and technical foundations of spatial design are clarified and strengthened.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2020", "venue": "Landscape Journal", "doi": "", "url": "https://www.semanticscholar.org/paper/9ccbde1f4c0beea16f19aefd301adc55e39d9928", "keyword": "Design methods", "cluster": 3, "cluster_theme_terms": "architecture, landscape, constraint, ideation, article, concept, relation, playing", "cluster_label_candidate": "Design Methods", "cluster_summary_candidate": "This cluster focuses on Education / Learning, involving Designers, with contribution types coded as Artifact/System, Methodological, Theoretical.", "facet_population_or_context": "Education / Learning", "facet_stakeholder_or_population": "Designers", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "Artifact/System, Methodological, Theoretical", "umap_x": 6.519624710083008, "umap_y": 2.5685555934906006, "distance_to_centroid": 0.33812015485284674, "representative_rank": 1, "is_representative_top3": true, "medoid_rank": 1, "lda_topic": 9, "lda_topic_probability": 0.9624948590157618, "lda_topic_words": "concept, field, conceptual, metric, management, landscape, architecture, thinking", "nearest_papers": [{"paper_id": "4592ed134f14", "title": "The relation between brain-learning physiology and conceptualization methods in the design process of architecture students1", "cluster": 3, "distance": 0.6324097357662186}, {"paper_id": "55dc4ef842a6", "title": "IMPLEMENTATION OF THE BASIC PRINCIPLES OF FORMING THE ARCHITECTURE OF NON-FORMAL EDUCATION INSTITUTIONS", "cluster": 3, "distance": 0.7234698790905845}, {"paper_id": "0a bility", "cluster_label_candidate": "Design Methods", "cluster_summary_candidate": "This cluster focuses on Education / Learning, involving Designers, Practitioners, using User-centered Design, Ethnographic as the main methodological or conceptual lens, with contribution types coded as Methodological, Theoretical, Empirical.", "facet_population_or_context": "Education / Learning", "facet_stakeholder_or_population": "Designers, Practitioners", "facet_method_or_lens": "User-centered Design, Ethnographic", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "Methodological, Theoretical, Empirical", "umap_x": 9.478283882141113, "umap_y": 2.2104125022888184, "distance_to_centroid": 0.6169603165129707, "representative_rank": 6, "is_representative_top3": false, "medoid_rank": 6, "lda_topic": 0, "lda_topic_probability": 0.9549976761051425, "lda_topic_words": "service, review, evidence, innovative, related, need, propose, address", "nearest_papers": [{"paper_id": "714b3f6f8ac7", "title": "Degrees of Interaction: Towards a Classification", "cluster": 3, "distance": 0.8438970319650168}, {"paper_id": "9fbb38d67689", "title": "Analysis of methods of creating new technical systems", "cluster": 7, "distance": 0.849027490058884}, {"paper_id": "7e095752d24c", "title": "Think-4-EmCoDe framework: Highlighting key qualities in embodied co-design techniques for children", "cluster": 7, "distance": 0.865720849385714}, {"paper_id": "878cf959ac53", "title": "Designerly Research Methods and Researcherly Design Methods", "cluster": 1, "distance": 0.8763338139117572}, {"paper_id": "b5d968168f35", "title": "A Framework of Design Method Corroboration", "cluster": 0, "distance": 0.9058280460195882}]}, {"paper_id": "55dc4ef842a6", "title": "IMPLEMENTATION OF THE BASIC PRINCIPLES OF FORMING THE ARCHITECTURE OF NON-FORMAL EDUCATION INSTITUTIONS", "authors": "Iryna L. Kravchenko; Valerij Tovbych", "abstract": "The article presents the results of the author's research on implementing the main principles of the architectural formation of non-formal education institutions (NFEI). A scheme of their interconnection and implementation at three levels (environment, object and element) has also been presented. \nThe formulation of each principle and the necessary clarifications regarding their operation both in the field of architecture and in related fields have been provided in the article. These principles are the principle of systemic transformations, the principle of differentiated openness, the principle of typological and functional flexibility, the principle of concentration and branching, the principle of functional planning adaptability and variability, and the principle of functional accessibility. A scheme for the implementation of those main principles of the formation of NFEI architecture at the environment, object and element levels has been created. It was revealed that the principle of system transformation (system input) is closely related to analytics and strategy for the formation of the architecture of such institutions, and shows itself in the area of principled decision-making and operates at the environmental level which is under the influence of external factors. The principle of systemic transformations (systemic input) sets into action others that, when implemented, produce a certain architectural product that affects both the subsystems of non-formal education and the changing society as a whole (systemic output). Such a process is delayed in time and illustrates constant dynamic changes in the social, educational and architectural and construction sectors, as components of the system. The functional and structural justification lies in the zone of formation of NFEI concepts, it is here that place and time for taking decisions about \"cooperation\" or \"in-depth specialization\", such decisions are made both at the level of the environment and at the level of the object. The adaptability of such institutions is a powerful component of both the analytics and the practice of forming the architecture of the NFEI, which is analytically considered in the article using a strategic SWOT analysis. The main design methods and solutions are in the area of material realization of the NFEI architecture formation. The main principles are implemented thanks to such decisions and are a system output that affects the principle of system transformations but is delayed in time. Therefore, the theory of the formation of non-formal education institutions architecture consists in the implementation of the above-mentioned basic principles with the help of multi-faceted techniques, which should be optimally applied for each situation at the level of the element, the object and the environment. Clear consecutive algorithms currently do not exist, because a lot of positions depend on the actual design task. That is why the typological approach to the formation of the architecture of non-formal education institutions as separate types of buildings is currently ineffective and does not work. But the methodical approaches that were outlined above in the modern world could help to provide certain mechanisms and practical approaches that will allow the creation of architectural objects for new types of educational institutions.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2023", "venue": "Urban development and spatial planning", "doi": "", "url": "https://www.semanticscholar.org/paper/a720f8dc5c42c3805e61cfc84c13f6d8f708404b", "keyword": "Design methods", "cluster": 3, "cluster_theme_terms": "architecture, landscape, constraint, ideation, article, concept, relation, playing", "cluster_label_candidate": "Design Methods", "cluster_summary_candidate": "This cluster focuses on Education / Learning, involving Designers, with contribution types coded as Artifact/System, Methodological, Theoretical.", "facet_population_or_context": "Education / Lea nthesize a taxonomy of different definitions of complexity and ways of managing design complexity by decomposing its different levels as they relate to the fields of architecture, engineering and construction. Our hypothesis is that by reviewing the literature on complexity theory which appears to be highly fragmented, we can aid designers build a better understanding of the underlying principles. Thus designers can develop a more system approach towards the use of digital design tools and make use of concepts coming from the field of complexity theory such as abstraction, adaptation and self-organization in order to come up with novel computational design methods. Such methods can enable designers to deal with design problems holistically and manage design complexity in the contemporary digital design context.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2019", "venue": "Architectural Science Review", "doi": "", "url": "https://www.semanticscholar.org/paper/b50cc2220c9a692e8c31e6465f08e7008ae10dbf", "keyword": "Design methods", "cluster": 6, "cluster_theme_terms": "survey, applications, attributes, complexity, problems, community, theory provides, digital", "cluster_label_candidate": "Design Methods", "cluster_summary_candidate": "This cluster focuses on Education / Learning, involving Designers, with contribution types coded as Theoretical, Empirical, Methodological.", "facet_population_or_context": "Education / Learning", "facet_stakeholder_or_population": "Designers", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "Theoretical, Empirical, Methodological", "umap_x": 7.5599541664123535, "umap_y": 3.415803909301758, "distance_to_centroid": 0.33130750376354845, "representative_rank": 3, "is_representative_top3": true, "medoid_rank": 3, "lda_topic": 7, "lda_topic_probability": 0.9639966237112173, "lda_topic_words": "complexity, product, problems process in architecture is one of the most popular subjects for the researchers in this field. By reviewing the literature on the subject of design methods in architecture, the authors suggested a model of four types of conceptual design: analogical, typological, pragmatic and theoretical. Also, based on the previous studies of brain dominancy, individuals can be divided into four main groups. In order to find the relation between brain dominancy of architecture students and their preferred conceptualization methods in design, over 350 students of architecture participated in this research in Iran. Using Ned Herrmann‚Äôs brain physiology model, the findings concluded that the participants who use their A quadrant of brain prefer pragmatic and theoretical approaches. The preference of participants with B and C quarter-brain dominance is respectively typological and theoretical methods. Participants who use their D quadrant of brain prefer analogical and theoretical methods.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2023", "venue": "Art, Design &amp; Communication in Higher Education", "doi": "", "url": "https://www.semanticscholar.org/paper/c5082819981d9c379c06ad40e4e00d558456836b", "keyword": "Design methods", "cluster": 3, "cluster_theme_terms": "architecture, landscape, constraint, ideation, article, concept, relation, playing", "cluster_label_candidate": "Design Methods", "cluster_summary_candidate": "This cluster focuses on Education / Learning, involving Designers, with contribution types coded as Artifact/System, Methodological, Theoretical.", "facet_population_or_context": "Education / Learning", "facet_stakeholder_or_population": "Designers", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "Artifact/System, Methodological, Theoretical", "umap_x": 6.46262264251709, "umap_y": 2.326677083969116, "distance_to_centroid": 0.3836888258593315 tutes a socio-technical system depending on the interaction of human participants with each other as well as with the description of the method, representations of design information and, often, tools for carrying out the method‚Äôs tasks. This paper argues that crucial factors in the adoption of methods include how well they are described and how convincingly they are evaluated. The description of a method should cover its core idea, the representations in which design information is described, the procedure to be followed, its intended use, and the tools it uses. The account of a method‚Äôs intended use should cover its purpose, the situations or product types within its scope, its coverage of kinds of problems within its scope, its expected benefit and conditions for its use. The different elements need to be evaluated separately as well as the method as an integrated whole. While verification and validation are important for some elements of methods, it is rarely possible to prove the validity of a method. Rather the developers of methods need to gather sufficient evidence that a method will work within a clearly articulated scope. Most design methods do not have binary success criteria, and their usefulness in practice depends as much on simplicity and usability as on the outcomes they produce. Evaluation should focus on how well they work, and how they can be customised and improved.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2022", "venue": "Design Science", "doi": "", "url": "https://www.semanticscholar.org/paper/c6983d646df77563eea8dc5d05abb895c9c8b87f", "keyword": "Design methods", "cluster": 5, "cluster_theme_terms": "industry, understand, method development, heart, aspects assuring, does exist, remained challenge, reliably", "cluster_label_candidate": "Design Methods", "cluster_summary_candidate": "This cluster focuses on Education / Learning, involving Practitioners, Develop as well as the laws of the development of technical systems. The definition of these processes is given. The proposed classification of design (invention) methods, which may change depending on the selected criterion. According to the sign of generality, methods of invention can be divided into general, general and partial methods of invention. Universal methods of invention relate to the widest possible range of issues and are included among the strategic means of solving inventive tasks. General methods of invention are used to solve a wide range of inventive tasks in various fields of technology. Such methods include the methods of heuristic analogy, heuristic combination, heuristic inversion, etc. Partial methods of invention include methods designed to solve special inventive tasks or tasks in a defined, as a rule, narrow field of technology. They include, for example, the method of converting reciprocating motion into rotary motion, the remote hybridization method, the compounding method, etc. The process of creating new technical systems is generally divided into three phases (stages), which are called differently: 1) divergence, analysis, collection, accumulation of knowledge; 2) transformation, synthesis, maturation, incubation - ends with enlightenment; 3) convergence, assessment, control, verification. The stages of design are described from the point of view of the formation of the necessary direction of improvement of technical systems and the further formation of a rational structure using the mechanism of joint disjunction.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2023", "venue": "Journal of Mechanical Engineering and Transport", "doi": "", "url": "https://www.semanticscholar.org/paper/cf5c6ebb3656965e5eb2a4543c370e0a41f32df1", "keyword": "Design methods", "cluster": 7, "cluster_theme_terms": "architectural, hood, software, mascot, children, embodied, self, creation", "c d categories, e.g., according to the degree of user involvement. The research question here is the following: How can human-centredness be measured and evaluated based on resulting product concepts? The goal of the paper is to present and apply a new metric‚Äîthe Human-Centredness Metric (HCM)‚Äîfor the early estimation of the quality of any human-centred activity based on the four goals of human-centred design. HCM was employed to evaluate 16 concepts, utilising a 4-point Likert scale, covering four different everyday products that were created by four students, which used three different human-centred design methods for this. The first concept was created without the application of any additional human-centred design method. The results illuminated trends regarding the impact of additional human-centred design methods on the HCM score. However, statistical significance remained elusive, potentially due to a series of limitations such as concept complexity, the small number of concepts, and the early developmental stage. The study‚Äôs limitations underscore the need for refined items and expanded samples to better gauge the impact of human-centred methods on product development.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2023", "venue": "Applied Sciences", "doi": "", "url": "https://www.semanticscholar.org/paper/e5f6abe0431dd1e20d6c555a3cdf31e1a8d632e9", "keyword": "Design methods", "cluster": 4, "cluster_theme_terms": "debate, novo, centredness, metric, understanding, thing, proteins, centred", "cluster_label_candidate": "Design Methods", "cluster_summary_candidate": "This cluster focuses on Education / Learning, with recurring attention to Interface, with contribution types coded as Methodological, Artifact/System.", "facet_population_or_context": "Education / Learning", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "Interface", "facet_  / Learning, involving Designers, with contribution types coded as Artifact/System, Methodological, Theoretical.", "representatives": [{"title": "Design as Research in Landscape Architecture", "year": "2020", "paper_id": "6e06768bb26b"}, {"title": "The relation between brain-learning physiology and conceptualization methods in the design process of architecture students1", "year": "2023", "paper_id": "4592ed134f14"}, {"title": "IMPLEMENTATION OF THE BASIC PRINCIPLES OF FORMING THE ARCHITECTURE OF NON-FORMAL EDUCATION INSTITUTIONS", "year": "2023", "paper_id": "55dc4ef842a6"}]}, {"cluster": 4, "count": 3, "theme": "debate, novo, centredness, metric, understanding, thing, proteins, centred", "label": "Design Methods", "summary": "This cluster focuses on Education / Learning, with recurring attention to Interface, with contribution types coded as Methodological, Artifact/System.", "representatives": [{"title": "The Human-Centredness Metric: Early Assessment of the Quality of Human-Centred Design Activities", "year": "2023", "paper_id": "f47226c43979"}, {"title": "On integration of interface design methods: Can debates be resolved?", "year": "2006", "paper_id": "721f009574ce"}, {"title": "Towards functional de novo designed proteins.", "year": "2019", "paper_id": "9de0e13a7156"}]}, {"cluster": 5, "count": 2, "theme": "industry, understand, method development, heart, aspects assuring, does exist, remained challenge, reliably", "label": "Design Methods", "summary": "This cluster focuses on Education / Learning, involving Practitioners, Developers, Designers, with recurring attention to Tool, with contribution types coded as Methodological, Artifact/System, Theoretical.", "representatives": [{"title": "Elements of a design method - a basis for describing and evaluating design methods", "year": "", "paper_id": "40a2d86cd488"}, {"title": "Elements of a design method ‚Äì a basis for describing and evaluating design methods", "year": "2022", "paper_id": "5389fb1cc38b"}]}, {"cluster": 6, "count": 4, "theme": "survey, applications, attributes, complexity, problems, community, theory provides, digital", "label": "Design Methods", "summary": "This cluster focuses on Education / Learning, involving Designers, with contribution types coded as Theoretical, Empirical, Methodological.", "representatives": [{"title": "Using System Dynamics to Construct Design Theory for Community Information Systems", "year": "2007", "paper_id": "94347a49c12b"}, {"title": "Multiple forms of applications and impacts of a design theory -ten years of industrial applications of C-K theory", "year": "2016", "paper_id": "95c2b3d44aff"}, {"title": "Beyond geometric complexity: a critical review of complexity theory and how it relates to architecture engineering and construction", "year": "2019", "paper_id": "ac2f5510db32"}]}, {"cluster": 7, "count": 7, "theme": "architectural, hood, software, mascot, children, embodied, self, creation", "label": "Design Methods", "summary": "This cluster focuses on Education / Learning, involving Designers, with contribution types coded as Methodological, Artifact/System, Theoretical.", "representatives": [{"title": "Design methods for real time software", "year": "1990", "paper_id": "b841f16ac5b3"}, {"title": "Languaging design methods", "year": "", "paper_id": "d330bde18c87"}, {"title": "Analysis of methods of creating new technical systems", "year": "2023", "paper_id": "9fbb38d67689"}]}], "keywords": ["Design methods"]}</script>
  <script>
    const data = JSON.parse(document.getElementById('payload').textContent);
    const papers = data.papers;
    const palette = ['#f05a71','#4c78a8','#f58518','#54a24b','#b279a2','#72b7b2','#eeca3b','#ff9da6','#9d755d','#59a14f','#edc948','#76b7b2'];
    const colorFor = c => palette[Math.abs(Number(c)) % palette.length];
    const clusterName = c => Number(c) === -1 ? 'Noise / Outliers' : `Cluster ${c}`;
    const state = { selected: papers[0]?.paper_id || null };
    const svg = document.getElementById('plot');
    const details = document.getElementById('details');
    const status = document.getElementById('status');

    function initControls() {
      const clusterFilter = document.getElementById('clusterFilter');
      data.clusters.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.cluster;
        opt.textContent = `${clusterName(c.cluster)} (${c.count})`;
        clusterFilter.appendChild(opt);
      });
      ['search','clusterFilter','repOnly'].forEach(id => {
        document.getElementById(id).addEventListener('input', render);
        document.getElementById(id).addEventListener('change', render);
      });
      renderLegend();
    }

    function filteredPapers() {
      const q = document.getElementById('search').value.trim().toLowerCase();
      const cluster = document.getElementById('clusterFilter').value;
      const repOnly = document.getElementById('repOnly').checked;
      return papers.filter(p => {
        const text = `${p.title} ${p.abstract} ${p.authors} ${p.venue} ${p.keyword}`.toLowerCase();
        return (!q || text.includes(q)) &&
          (cluster === 'all' || String(p.cluster) === cluster) &&
          (!repOnly || p.is_representative_top3);
      });
    }

    function renderLegend() {
      const legend = document.getElementById('legend');
      legend.innerHTML = '';
      data.clusters.forEach(c => {
        const item = document.createElement('span');
        item.className = 'legend-item';
        item.innerHTML = `<span class="swatch" style="background:${colorFor(c.cluster)}"></span> ${clusterName(c.cluster)}: ${escapeHtml(c.label || c.theme)}`;
        legend.appendChild(item);
      });
      const shapeNote = document.createElement('span');
      shapeNote.className = 'legend-item';
      shapeNote.innerHTML = '<span>◆ Discussion detected</span><span>● No explicit discussion</span>';
      legend.appendChild(shapeNote);
    }

    function render() {
      const shown = filteredPapers();
      status.textContent = `${shown.length} of ${papers.length} papers shown. Axes are UMAP 1 and UMAP 2 coordinates, not interpretable variables. Use "Top-3 reps only" to filter representative papers.`;
      drawPlot(shown);
      renderDetails(papers.find(p => p.paper_id === state.selected) || shown[0] || papers[0]);
    }

    function drawPlot(shown) {
      const width = svg.clientWidth || 900;
      const height = svg.clientHeight || 560;
      const pad = 44;
      const xs = papers.map(p => p.umap_x), ys = papers.map(p => p.umap_y);
      let minX = Math.min(...xs), maxX = Math.max(...xs), minY = Math.min(...ys), maxY = Math.max(...ys);
      const xRange = Math.max(0.0001, maxX - minX);
      const yRange = Math.max(0.0001, maxY - minY);
      minX -= xRange * 0.08;
      maxX += xRange * 0.08;
      minY -= yRange * 0.08;
      maxY += yRange * 0.08;
      const sx = x => pad + ((x - minX) / Math.max(0.0001, maxX - minX)) * (width - pad * 2);
      const sy = y => height - pad - ((y - minY) / Math.max(0.0001, maxY - minY)) * (height - pad * 2);
      const shownIds = new Set(shown.map(p => p.paper_id));
      svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
      svg.innerHTML = '';
      for (let i = 0; i < 6; i++) {
        const x = pad + i * (width - pad * 2) / 5;
        const y = pad + i * (height - pad * 2) / 5;
        svg.insertAdjacentHTML('beforeend', `<line class="axis" x1="${x}" y1="${pad}" x2="${x}" y2="${height-pad}"></line>`);
        svg.insertAdjacentHTML('beforeend', `<line class="axis" x1="${pad}" y1="${y}" x2="${width-pad}" y2="${y}"></line>`);
      }
      svg.insertAdjacentHTML('beforeend', `<text x="${width / 2}" y="${height - 8}" text-anchor="middle" fill="#65758b" font-size="12">UMAP 1</text>`);
      svg.insertAdjacentHTML('beforeend', `<text x="16" y="${height / 2}" text-anchor="middle" fill="#65758b" font-size="12" transform="rotate(-90 16 ${height / 2})">UMAP 2</text>`);
      papers.forEach(p => {
        const visible = shownIds.has(p.paper_id);
        const selected = p.paper_id === state.selected;
        const x = sx(p.umap_x), y = sy(p.umap_y);
        const size = selected ? 7.5 : 6.5;
        const cls = `point ${visible ? '' : 'dim'} ${selected ? 'selected' : ''}`;
        const fill = colorFor(p.cluster);
        const node = document.createElementNS('http://www.w3.org/2000/svg', p.discussion_found ? 'path' : 'circle');
        node.setAttribute('class', cls);
        node.setAttribute('fill', fill);
        if (p.discussion_found) {
          const d = `M ${x} ${y - size} L ${x + size} ${y} L ${x} ${y + size} L ${x - size} ${y} Z`;
          node.setAttribute('d', d);
        } else {
          node.setAttribute('cx', x);
          node.setAttribute('cy', y);
          node.setAttribute('r', size);
        }
        node.addEventListener('click', () => {
          state.selected = p.paper_id;
          render();
        });
        node.appendChild(document.createElementNS('http://www.w3.org/2000/svg', 'title')).textContent = p.title;
        svg.appendChild(node);
      });
    }

    function renderDetails(p) {
      if (!p) return;
      const doi = p.doi ? `<a class="paper-link" href="https://doi.org/${escapeHtml(p.doi)}" target="_blank">DOI: ${escapeHtml(p.doi)}</a>` : '';
      const url = p.url ? `<a class="paper-link" href="${escapeAttr(p.url)}" target="_blank">Open paper URL</a>` : '';
      const nearest = (p.nearest_papers || []).map(n =>
        `<a class="paper-link" href="#" data-paper="${escapeAttr(n.paper_id)}">${clusterName(n.cluster)}, distance ${Number(n.distance).toFixed(3)}: ${escapeHtml(n.title)}</a>`
      ).join('');
      const discussionSummary = p.discussion_summary ?
        `<div class="section-title">Discussion Summary</div>${renderDiscussionSummary(p.discussion_summary)}` : '';
      const discussionExcerpt = '';
      const discussionStatus = p.discussion_found ?
        `<span class="pill">Discussion detected: ${p.discussion_paragraph_count} paragraphs</span>` :
        `<span class="pill">No explicit Discussion section detected</span>`;
      details.innerHTML = `
        <h2>${escapeHtml(p.title)}</h2>
        <div class="meta">${escapeHtml(p.authors)}<br>${escapeHtml(p.year)} · ${escapeHtml(p.venue)}</div>
        <span class="pill">${clusterName(p.cluster)}</span>
        <span class="pill">${escapeHtml(p.keyword)}</span>
        <span class="pill">Rep rank ${p.representative_rank}</span>
        <span class="pill">Medoid rank ${p.medoid_rank}</span>
        <span class="pill">LDA topic ${p.lda_topic} (${Math.round(p.lda_topic_probability * 100)}%)</span>
        ${discussionStatus}
        <div class="section-title">Cluster Label Candidate</div>
        <div class="abstract">${escapeHtml(p.cluster_label_candidate)}</div>
        <div class="section-title">Cluster Summary Candidate</div>
        <div class="abstract">${escapeHtml(p.cluster_summary_candidate)}</div>
        <div class="section-title">Paper-Oriented Facets</div>
        <div>
          <span class="pill">Context/Domain: ${escapeHtml(p.facet_population_or_context || 'n/a')}</span>
          <span class="pill">Population/Stakeholder: ${escapeHtml(p.facet_stakeholder_or_population || 'n/a')}</span>
          <span class="pill">Method/Lens: ${escapeHtml(p.facet_method_or_lens || 'n/a')}</span>
          <span class="pill">Artifact/System: ${escapeHtml(p.facet_artifact_or_domain || 'n/a')}</span>
          <span class="pill">Contribution Type: ${escapeHtml(p.facet_contribution_or_outcome || 'n/a')}</span>
        </div>
        <details class="lexical-evidence">
          <summary>Show lexical evidence</summary>
          <div class="evidence-block">
            <div class="section-title">Cluster Theme Evidence</div>
            <div class="abstract">${escapeHtml(p.cluster_theme_terms)}</div>
            <div class="section-title">Secondary Topic-Model Evidence</div>
            <div class="abstract">${escapeHtml(p.lda_topic_words)}</div>
          </div>
        </details>
        <div class="section-title">Abstract</div>
        <div class="abstract">${escapeHtml(p.abstract)}</div>
        ${discussionSummary}
        ${discussionExcerpt}
        <div class="section-title">Links</div>
        ${doi}${url}
        <div class="section-title">Nearest Papers by Cosine Distance</div>
        ${nearest || '<div class="meta">No nearest-paper data available.</div>'}
      `;
      details.querySelectorAll('[data-paper]').forEach(a => {
        a.addEventListener('click', evt => {
          evt.preventDefault();
          state.selected = a.getAttribute('data-paper');
          render();
        });
      });
      details.scrollTop = 0;
    }

    function renderDiscussionSummary(value) {
      const items = String(value || '').split('\n').map(line => line.replace(/^[-•]\s*/, '').trim()).filter(Boolean);
      if (!items.length) return '<div class="meta">No discussion summary available.</div>';
      return `<ul class="discussion-list">${items.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`;
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    }
    function escapeAttr(value) { return escapeHtml(value).replace(/`/g, '&#96;'); }

    initControls();
    render();
    window.addEventListener('resize', render);
  </script>
