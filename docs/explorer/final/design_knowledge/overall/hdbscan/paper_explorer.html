<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paper Corpus Explorer (tfidf-svd, hdbscan, overall view)</title>
  <style>
    :root {
      --ink: #253858;
      --muted: #65758b;
      --line: #d8e0ea;
      --bg: #f7f9fc;
      --panel: #ffffff;
      --accent: #2f7dd1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }
    header {
      padding: 18px 24px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }
    h1 { margin: 0 0 12px; font-size: 22px; letter-spacing: 0; }
    .controls {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) 180px 210px 150px;
      gap: 10px;
      align-items: center;
    }
    input, select, button {
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 10px;
      background: white;
      color: var(--ink);
      font-size: 14px;
    }
    button { background: var(--accent); color: white; border-color: var(--accent); cursor: pointer; }
    label.toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
    }
    label.toggle input { width: 16px; height: 16px; }
    main {
      display: grid;
      grid-template-columns: minmax(560px, 1fr) minmax(420px, 460px);
      gap: 14px;
      padding: 14px;
      min-height: calc(100vh - 92px);
      align-items: stretch;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .plot-panel { display: grid; grid-template-rows: auto 1fr auto; height: calc(100vh - 120px); min-height: 690px; }
    .status {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
    }
    svg { width: 100%; height: 100%; min-height: 560px; background: #fbfcfe; }
    .axis { stroke: #dfe6ef; stroke-width: 1; }
    .point { stroke: white; stroke-width: 1.5; cursor: pointer; opacity: 0.88; }
    .point.dim { opacity: 0.14; }
    .point.selected { stroke: #111827; stroke-width: 3; opacity: 1; }
    .legend, .cluster-list { padding: 10px 12px; border-top: 1px solid var(--line); }
    .legend-items { display: flex; flex-wrap: wrap; gap: 8px 14px; }
    .legend-item { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    .swatch { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .details { padding: 16px; overflow: auto; height: calc(100vh - 120px); min-height: 690px; align-self: stretch; }
    .details h2 { font-size: 18px; margin: 0 0 8px; line-height: 1.25; }
    .meta { color: var(--muted); font-size: 13px; line-height: 1.45; margin-bottom: 12px; }
    .pill {
      display: inline-flex;
      align-items: center;
      margin: 3px 5px 3px 0;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef4fb;
      color: #31577f;
      font-size: 12px;
    }
    .abstract { line-height: 1.5; font-size: 14px; color: #2f3b52; }
    details.discussion-full,
    details.lexical-evidence {
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      background: #fbfcfe;
    }
    details.discussion-full summary,
    details.lexical-evidence summary {
      cursor: pointer;
      color: #31577f;
      font-weight: 700;
      font-size: 13px;
    }
    details.lexical-evidence { margin-top: 16px; }
    .evidence-block { margin-top: 8px; }
    .discussion-list {
      margin: 6px 0 0;
      padding-left: 18px;
      line-height: 1.45;
      font-size: 14px;
      color: #2f3b52;
    }
    .discussion-list li { margin: 0 0 7px; }
    .section-title { margin: 16px 0 6px; font-weight: 700; font-size: 13px; text-transform: uppercase; color: var(--muted); }
    .paper-link { display: block; color: var(--accent); text-decoration: none; margin: 7px 0; font-size: 13px; line-height: 1.35; }
    .cluster-card { border-top: 1px solid var(--line); padding: 10px 12px; }
    .cluster-card button { height: 28px; padding: 0 8px; margin-top: 6px; font-size: 12px; }
    @media (max-width: 980px) {
      .controls, main { grid-template-columns: 1fr; }
      .plot-panel { min-height: 560px; }
    }
  </style>
</head>

413347705955705}]}, {"paper_id": "02381ea80183", "title": "A design theory for data quality tools in data ecosystems: Findings from three industry cases", "authors": "Altendeitering, M. (1, 2); Guggenberger, T.M. (1, 2); MoÃàller, F. (1, 3)", "abstract": "Data ecosystems are a novel inter-organizational form of cooperation. They require at least one data provider and one or more data consumers. Existing research mainly addresses generativity mechanisms in this relationship, such as business models or role models for data ecosystems. However, an essential prerequisite for thriving data ecosystems is high data quality in the shared data. Without sufficient data quality, sharing data might lead to negative business consequences, given that the information drawn from them or services built on them might be incorrect or produce fraudulent results. We tackle this issue precisely since we report on a multi-case study deploying data quality tools in data ecosystem scenarios. From these cases, we derive generalized prescriptive design knowledge as a design theory to make the knowledge available for others designing data quality tools for data sharing. Subsequently, our study contributes to integrating the issue of data quality in data ecosystem research and provides practitioners with actionable guidelines inferred from three real-world cases. All rights reserved Elsevier.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Data & Knowledge Engineering", "doi": "10.1016/j.datak.2024.102333", "url": "", "keyword": "Design knowledge", "cluster": 0, "cluster_theme_terms": "hri, product, critical, designerly, objects, field, rtd, engineering", "cluster_label_candidate": "Hri / Product / Critical", "cluster_summary_candidate": "This cluster focuses on Industrial Design, involving Designers, Practitioners, using Case Study as the main methodological or conceptual lens, with contribution types coded xtualized design knowledge can be produced to address the challenges presented by socio-technical contexts in the Ethiopian agriculture extension information service system. The knowledge produced is grounded on insights from kernel/reference theories and complemented with knowledge from empirical observations. The research identified six DPs to address four design requirements: (1) supporting stakeholders' networking; (2) developing information content that meets the needs of the local context; (3) improving accessibility of agricultural extension information to stakeholders; and (4) enhancing adoption and effective use of the information system. The DPs to address the above socio-technical requirements fall into principles to improve: (1) actor-to-actor networking; (2) agriculture extension information system content development; (3) the accessibility of information; (4) device accessibility; (5) accessibility of interfaces; and (6) effective use and adoption of the (AEIS).", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Information Technology for Development", "doi": "10.1080/02681102.2023.2279309", "url": "", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Noise / Outliers", "cluster_summary_candidate": "These papers were not assigned to a dense DBSCAN cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 7.453717231750488, "umap_y": 5.300355434417725, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 5, "lda_topic_probability": 0.9902307546399963, "lda_topic_words": "interactive, focus, game, analysis, field, oriented, science, professional", "nearest_papers": [{"paper_id": "e8f4a7417bf7", "title": "To hesizing a Solution Space for Prescriptive Design Knowledge Codification", "cluster": 1, "distance": 0.6250302813344759}]}, {"paper_id": "3058799f63c1", "title": "Using Schema to Inform Method Design Practices", "authors": "Chivukula, Shruthi Sai (1); Gray, Colin M. (2)", "abstract": "There are many different forms of design knowledge that guide and shape a designer‚Äôs ability to act and realize potential realities. Methods and schemas are examples of design knowledge commonly used by design researchers and designers alike. In this pictorial, we explore, engage, and describe the role of schemas as tools that can support design researchers in formulating methods to support design action, with our framing of method design specifically focused on ethical design complexity. We present four ways for method designers to engage with schema: 1) Systems to operationalize complex design constructs such as ethical design complexity through an A.E.I.O.YOU schema; 2) Classifiers to map existing methods and identify the possibility for new methods through descriptive semantic differentials; 3) Tools that enable the creation of methods that relate to one or more elements of the schema through creative departures from research to design; and 4) Interactive channels to playfully engage potential and new opportunities through schema interactivity. ¬© 2024, CC BY-NC-ND.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2024", "venue": "arXiv", "doi": "10.48550/arXiv.2405.00901", "url": "", "keyword": "Design knowledge", "cluster": 0, "cluster_theme_terms": "hri, product, critical, designerly, objects, field, rtd, engineering", "cluster_label_candidate": "Hri / Product / Critical", "cluster_summary_candidate": "This cluster focuses on Industrial Design, involving Designers, Practitioners, using Case Study as the main methodological or conceptual lens, with contribution types coded as Theoretical, Methodological, nd professional contexts, there is lack of consensus on the definition of these digital platform types. On top of that, there is a lack of knowledge in the literature on the requirements and design of these digital platform types. We address the observed lack of shared conceptualizations by creating a taxonomy for digital platforms, by classifying digital platforms according to their distinctive features. Further, we address the lack of design knowledge with a digital platform reference ontology that describes the construction and operation of the different types of digital platform that are distinguished in the taxonomy. This reference ontology, developed using the Unified Foundational Ontology (UFO) and several of its core ontologies, is organized into different ontology modules, allowing to describe functionalities that are common to any digital platform and more specific functionalities that have their origin in the distinctive features that were used to construct the taxonomy. The taxonomy that we contribute helps to clearly define the different types of digital platform that can be observed today. It also helps analysing further evolutions in the platform domain. The contribution of a well-founded digital platform reference ontology is a step towards a better understanding of digital platform functionality, better communication between stakeholders, and eventually may facilitate future research and development of new types of digital platform. All rights reserved Elsevier.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Information Systems", "doi": "10.1016/j.is.2023.102293", "url": "", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Noise / Outliers", "cluster_summary_candidate": "These papers were not assigned to a dense DBSCAN cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 7.184680938720703, "umap_y": 7.08782434463501, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 0, "lda_topic_probability": 0.9969439666901697, "lda_topic_words": "platform, digital, types, ontology, game, taxonomy, lack, focus", "nearest_papers": [{"paper_id": "77b350f029e7", "title": "A taxonomy and ontology for digital platforms", "cluster": -1, "distance": 0.00024018082846399835}, {"paper_id": "6d926f3c4a97", "title": "A domain reference ontology for design science research knowledge bases", "cluster": 1, "distance": 0.732318649140222}, {"paper_id": "7f7baeb83bac", "title": "A theoretical framework on embodiment in digital design", "cluster": -1, "distance": 0.8047930431485139}, {"paper_id": "b227e604cd40", "title": "The Dark Patterns Knowledge Stack: Exploring New Ways to Negotiate Context, Law, and Design", "cluster": -1, "distance": 0.8550734727668288}, {"paper_id": "e7091fbecdfa", "title": "Utilizing, Producing, and Contributing Design Knowledge in DSR Projects", "cluster": 1, "distance": 0.9071398421667044}]}, {"paper_id": "19dd6ec0253e", "title": "A principle-based philosophical framework for fashion design praxis and education in new design landscapes", "authors": "Harvey, N. (1); Ankiewicz, P. (2)", "abstract": "Like technology and technology education (Ankiewicz, 2019a), fashion design as a discipline lacks a scientifically founded, discipline-specific philosophical framework that may hold affordances for fashion designers, research scholars, and curriculum developers. Attempting to develop an autonomous theory for fashion design might be overly ambitious, so we do not propose a new theory; instead, we superimpose Mitcham's (1994) philosophical framework of technology onto Love's (2000) meta-theoretical taxonomy for design theory for the application to fashion design praxis. The purpose of this conceptual article is to conceptualise a philosophical framework for fashion design to be considered by fashion designers, researchers and curriculum developers when engaging in praxis. The relevant research questions are then: what are the underlying philosophical principles for fashion design within the current approach to praxis? What are the affordances of such a principle-based philosophical framework for fashion designers in their practice; researchers, scholars and curriculum developers? Within the current design praxis, this article proposes a principle-based philosophical framework including volition (mind-set), design knowledge (epistemology), design process (methodology) and objects (ontology). This framework may well create opportunities for fashion designers to consider these related principles and approach their praxis in alternative ways. Similarly, researchers wanting to strengthen scholarship for fashion design could use each of these different principles as units of analysis to explore and introduce new perspectives and research about the praxis. Alternative volition and new forms of design knowledge have the potential to change designers' choices, reasoning, cognition, and design processes and scholars may well write about this also. Finally, the framework offers the potential for scholars to question and research the ontological nature of objects and the relationship between designer, intentions and artefact function when sustainability and design for social good come into play. Furthermore, the framework for fashion design will also inform curriculum and programme development in fashion design education.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "International Journal of Technology and Design Education", "doi": "10.1007/s10798-022-09794-7", "url": "", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / nificant amount of translation to be applicable in practice. A proven way of conveying intermediate-level, generative design knowledge is in the form of frameworks. In this article we use qualitative-interpretative methods and visual mapping techniques to extract from the literature sociotechnical features and practices that contribute to contestable AI, and synthesize these into a design framework. ¬© The Author(s) 2022.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2023", "venue": "Minds and Machines", "doi": "10.1007/s11023-022-09611-z", "url": "", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Noise / Outliers", "cluster_summary_candidate": "These papers were not assigned to a dense DBSCAN cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 6.621226787567139, "umap_y": 5.065970420837402, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 5, "lda_topic_probability": 0.6754364125086788, "lda_topic_words": "interactive, focus, game, analysis, field, oriented, science, professional", "nearest_papers": [{"paper_id": "f50a79b2d7e1", "title": "Towards scaling expertise with generative AI: design principles for governing AI-Mediated knowledge capture and transfer", "cluster": -1, "distance": 0.2945042802458566}, {"paper_id": "e105857da02d", "title": "Designerly Ways of Knowing in HRI: Broadening the Scope of Design-oriented HRI Through the Concept of Intermediate-level Knowledge", "cluster": 0, "distance": 0.7163148006359541}, {"paper_id": "114973fd100e", "title": "Identification and management of the near-field knowledge of industrial design for innovative product shapes", "cluster": 0, "distance": 0.8290382995919817}, {"paper_id": "19dd6ec0253e", "title": "A principle-based philosophical framework for fashion design praxis and education in new design landscapes", "cluster": -1, "distance": 0.8645842238131567}, {"paper_id": "1401e17184c0", "title": "Software creation: cliche as intermediate knowledge in software design", "cluster": -1, "distance": 0.8674737915138953}]}, {"paper_id": "9eda131748eb", "title": "Engineering Design Principles for HCI as a Way Forward for HCI Design Knowledge", "authors": "Long, J. (1); Cummaford, S. (2); Stork, A. (3)", "abstract": "The chapter offers some ideas on how HCI design knowledge, in the form of craft artefacts and design practice experience, of models and methods, and of principles, rules, and heuristics might meet the challenge of more effective support for HCI design practice. However, the primary aim is to summarise progress and the associated carry forward, which claims to have been made towards the acquisition of HCI-EDPs. The common, and so general, progress is shared by the two case studies of domestic energy planning and control and of business-to-consumer electronic commerce, summarised in the previous chapter and reported in full in the companion volume (Long et al., 2022, in press). Further research to acquire and to validate HCI-EDPs is also identified.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "HCI Design Knowledge: Critique, Challenge, and a Way Forward. Synthesis Lectures on Human-Centered Informatics", "doi": "10.1007/978-3-031-79209-0_10", "url": "", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Noise / Outliers", "cluster_summary_candidate": "These papers were not assigned to a dense DBSCAN cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 5.707498550415039, "umap_y": 4.010782718658447, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 1, "lda_topic_probability": 0.7365727167216877, "lda_topic_words": "patterns, edps, teachers, social, media, business, practices, interface", "nearest_papers": [{"paper_id": "4effa8e553a8", "title": "Toward Engineering Design Principles for HCI", "cluster": -1, "distance": 0.045722973378865106}, {"paper_id": "03adadfa0ad4", "title": "Design Principles: Literature Review, Analysis, and Future Directions", "cluster": 1, "distance": 0.8456635853287445}, {"paper_id": "495817cc9c25", "title": "Object-oriented design knowledge: Principles, heuristics and best practices", "cluster": -1, "distance": 0.8602145507505894}, {"paper_id": "b73f2343e274", "title": "Let's Get Divorced: Constructing Knowledge Outcomes for Critical Design and Constructive Design Research", "cluster": 0, "distance": 0.8615459082643027}, {"paper_id": "817a6d8c927b", "title": "KNOWLEDGE REPRESENTATION IN THE CONCEPTUAL DESIGN PROCESS FOR BUILDING ENERGY SYSTEMS.", "cluster": -1, "distance": 0.8760511837604635}]}, {"paper_id": "0b7e6111aa14", "title": "Synthesizing a Solution Space for Prescriptive Design Knowledge Codification", "authors": "MoÃàller, F. (1); Hansen, M.R.P. (2); Schoormann, T. (3)", "abstract": "One of Design Science Research's (DSR) principal purposes is to generate and cod-ify design knowledge. Codification in DSR is done by providing clear chunks of prescriptive knowledge that guide the design of future solutions, including instructions on how to design (parts of) artifacts. Although various codification mechanisms have emerged over the last years, design principles are among the most prominent mechanisms. Yet, distinguishing between different codification mechanisms is often blurry, hindering designers from making informed decisions regarding appropriate mechanisms for their research aim and lever-aging the full potential of the prescriptive knowledge. We seek to bridge the challenge of selecting from the fuzzy array of codification mechanisms by proposing an inductively generated solution space. We provide a taxonomy to organize essential elements of prescrip-tive knowledge based on an analysis of design-oriented literature in four meta-dimensions (i.e., communication, application, development, and justification). These meta-dimensions make transparent how codified prescriptive design knowledge works. Overall, the taxonomy guides designers in reflecting on and selecting from the set of suitable elements for their statements. Also, providing a synthesis of options for codifying prescriptive design knowledge will simplify the identification and advance the positioning of DSR contributions.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Scandinavian Journal of Information Systems", "doi": "", "url": "", "keyword": "Design knowledge", "cluster": 1, "cluster_theme_terms": "dsr, science, focus, ontology, domain, lecture, bases, prescriptive", "cluster_label_candidate": "Design Rationale / Dsr / Science", "cluster_summary_candidate": "This cluster focuses on dsr, science, involving Practitioners, using Design Science as the main methodological or conceptual lens, with contribution types coded as Methodological, Theoretical, Artifact/System.", "facet_population_or_context": "", "facet_stakeholder_or_population": "Practitioners", "facet_method_or_lens": "Design Science", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "Methodological, Theoretical, Artifact/System", "umap_x": 8.023219108581543, "umap_y": 6.022257328033447, "distance_to_centroid": 0.5128983777889532, "representative_rank": 8, "is_representative_top3": false, "medoid_rank": 8, "lda_topic": 1, "lda_topic_probability": 0.9903454408695248, "lda_topic_words": "patterns, edps, teachers, social, media, business, practices, interface", "nearest_papers": [{"paper_id": "2042efa7e455", "title": "The DSR grid: six core dimensions for effectively planning and communicating design science research projects", "cluster": 1, "distance": 0.5452503960134123}, {"paper_id": "e8f4a7417bf7", "title": "Toward a Method for Design Science Research Meta-Studies to Improve the Reusability of Design Principles", "cluster": 1, "distance": 0.6250302813344759}, {"paper_id": "e7091fbecdfa", "title": "Utilizing, Producing, and Contributing Design Knowledge in DSR Projects", "cluster": 1, "distance": 0.6643427567168545}, {"paper_id": "3dbca777664c", "title": "Design Principles for Boundary Spanning in Transdisciplinary Design Science Research", "cluster": 1, "distance": 0.7212150598242988}, {"paper_id": "82f49b5a1905", "title": "SOLUTION REPERTOIRE", "cluster": -1, "distance": 0.7302315371292937}]}, {"paper_id": "3dbca777664c", "title": "Design Principles for Boundary Spanning in Transdisciplinary Design Science Research", "authors": "MoÃàller, F. (1, 2); Chandra kruse, L. (3); Schoormann, T. (4); Otto, B. (1, 2)", "abstract": "Design principles capture prescriptive design knowledge to guide design science researchers and design professionals in their design works. In the context of a transdisciplinary team, design principles can also be a powerful vehicle to bridge knowledge barriers and facilitate collaboration among team members with different backgrounds and expertise. These heterogeneous actors use design principles as a boundary object which helps to mediate their diverse perspectives. The paper draws from boundary object theory to explore the goals and the mechanisms of boundary spanning through 'design principles-in-use' and 'design principles-in-formulation'. We discuss the applicability of our findings using a case of formulation and application of design principles for data spaces in a transdisciplinary research consortium. Our results add the layers of transdisciplinary collaboration to the ongoing discourse on design principles and design knowledge accumulation and evolution.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "The Transdisciplinary Reach of Design Science Research: 17th International Conference on Design Science Research in Information Systems and Technology, DESRIST 2022, Proceedings. Lecture Notes in Computer Science (13229)", "doi": "10.1007/978-3-031-06516-3_4", "url": "", "keyword": "Design knowledge", "cluster": 1, "cluster_theme_terms": "dsr, science, focus, ontology, domain, lecture, bases, prescriptive", "cluster_label_candidate": "Design Rationale / Dsr / Science", "cluster_summary_candidate": "This cluster focuses on dsr, science, involving Practitioners, using Design Science as the main methodological or conceptual lens, with contribution types coded as Methodological, Theoretical, Artifact/System.", "facet_population_or_context": "", "facet_stakeholder_or_population": "Practitioners", "facet_method_or_lens": "Design Science", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "Methodological, Theoretical, Artifact/System", "umap_x": 7.395258903503418, "umap_y": 4.410681247711182, "distance_to_centroid": 0.3691695908557395, "representative_rank": 4, "is_representative_top3": false, "medoid_rank": 4, "lda_topic": 5, "lda_topic_probability": 0.989097479304104, "lda_topic_words": "interactive, focus, game, analysis, field, oriented, science, professional", "nearest_papers": [{"paper_id": "9d158233f041", "title": "Guidelines supporting the formulation of design principles", "cluster": 1, "distance": 0.3325073370937379}, {"paper_id": "5a716d80ac6b", "title": "Towards a Method for Design Principle Development in Information Systems", "cluster": 1, "distance": 0.3367743070231638}, {"paper_id": "e958310acab5", "title": "Prescriptive knowledge in IS research: Conceptualizing design principles in terms of materiality, action, and boundary conditions", "cluster": -1, "distance": 0.43094112769302395}, {"paper_id": "e8f4a7417bf7", "title": "Toward a Method for Design Science Research Meta-Studies to Improve the Reusability of Design Principles", "cluster": 1, "distance": 0.5267328093154722}, {"paper_id": "03adadfa0ad4", "title": "Design Principles: Literature Review, Analysis, and Future Directions", "cluster": 1, "distance": 0.5818980904747111}]}, {"paper_id": "4effa8e553a8", "title": "Toward Engineering Design Principles for HCI", "authors": "Long, John (1); Cummaford, Steve (2); Stork, Adam (3)", "abstract": "This is the second of two books by the authors about engineering design principles for human-computer interaction (HCI-EDPs). The books report research that takes an HCI engineering discipline approach to acquiring initial such principles. Together, they identify best-practice HCI design knowledge for acquiring HCI-EDPs. This book specifically reports two case studies of the acquisition of initial such principles in the domains of domestic energy planning and control and business-to-consumer electronic commerce. The book begins by summarising the earlier volume, sufficient for readers to understand the case studies reported in full here. The themes, concepts, and ideas developed in both books concern HCI design knowledge, a critique thereof, and the related challenge. The latter is expressed as the need for HCI design knowledge to increase its fitness-for-purpose to support HCI design practice more effectively. HCI-EDPs are proposed here as one response to that challenge, and the book presents case studies of the acquisition of initial HCI-EDPs, including an introduction; two development cycles; and presentation and assessment for each. Carry forward of the HCI-EDP progress is also identified. The book adopts a discipline approach framework for HCI and an HCI engineering discipline framework for HCI-EDPs. These approaches afford design knowledge that supports 'specify then implement'  define as structured supports for everyday work practices of designers. In this paper, we identify, analyze, and map a collection of 63 existing ethics-focused methods intentionally designed for ethical impact. Building on results of a content analysis of these methods, we contribute a descriptive record of how these methods operationalize ethics, their intended audience or context of use, their 'core' or 'script,' and the means by which these methods are formulated and codified. Building on these results, we provide an initial definition of ethics-focused methods, identifying potential opportunities for the development of future methods to support ethical design practice. ¬© 2021, CC BY-NC-SA.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2021", "venue": "arXiv", "doi": "10.48550/arXiv.2102.08909", "url": "", "keyword": "Design knowledge", "cluster": 0, "cluster_theme_terms": "hri, product, critical, designerly, objects, field, rtd, engineering", "cluster_label_candidate": "Hri / Product / Critical", "cluster_summary_candidate": "This cluster focuses on Industrial Design, involving Designers, Practitioners, using Case Study as the main methodological or conceptual lens, with contribution types coded as Theoretical, Methodological, Empirical.", "facet_population_or_context": "Industrial Design", "facet_stakeholder_or_population": "Designers, Practitioners", "facet_method_or_lens": "Case Study", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "Theoretical, Methodological, Empirical", "umap_x": 4.1991448402404785, "umap_y": 7.120804309844971, "distance_to_centroid": 0.5626076687016645, "representative_rank": 9, "is_representative_top3": false, "medoid_rank": 9, "lda_topic": 5, "lda_topic_probability": 0.9898758090619877, "lda_topic_words": "interactive, focus, game, analysis, field, oriented, science, professional", "nearest_papers": [{"paper_id": "40668e23fbab", "title": "Dimensions of knowledge in prototyping: A review and characterisation of prototyping methods and their contributions to design knowledge", "cluster": 0, "distance": 0.26609956621726016}, {"paper_id": "3058799f63c1", "title": "Using Schema to Inform Method Design Practices", "cluster": 0, "distance": 0.4646675037150638}, {"paper_id": "e105857da02d", "title": "Designerly Ways of Knowing in HRI: Broadening the Scope of Design-oriented HRI Through the Concept of Intermediate-level Knowledge", "cluster": 0, "distance": 0.6832676574363801}, {"paper_id": "38f057747444", "title": "Reusable design: A proposed approach to Public Health Informatics system design", "cluster": -1, "distance": 0.7772881636789782}, {"paper_id": "a7e06450729f", "title": "Game Design as an Autonomous Research Subject", "cluster": -1, "distance": 0.7802880464638678}]}, {"paper_id": "a7e06450729f", "title": "Game Design as an Autonomous Research Subject", "authors": "Neves, P.P. (1); Zagalo, N. (2)", "abstract": "This paper examines the methods and systems of game design from the standpoint of existing method proposals failing to establish a common basis for systematizing design knowledge, which this paper aims to help resolve. Game design has often been subsumed by game development and associated disciplines, and game design methodology has often been subsumed by game analysis. This paper reviews related work in defining game design as an autonomous research subject and then divides the methods and systems of game design into complementary methods and core methods, with only the latter, consisting chiefly of design patterns, attempting to systematize how game design knowledge is generated. Seminal game patterns have been descriptive rather than -prescriptive and so have failed to find the requisite practitioner adoption to fulfill their role as a living method. One recent pattern approach has sought to resolve this issue by promoting pattern usage generally over the adoption of a particular language. ccbb96c", "title": "Is there a specific type of knowledge associated with design?", "cluster": -1, "distance": 0.834651524854708}]}, {"paper_id": "82f49b5a1905", "title": "SOLUTION REPERTOIRE", "authors": "van Turnhout, Koen (1); Smits, Aletta (1)", "abstract": "In this paper, we argue that design ‚Äòsolutions‚Äô such as iconic designs, archetypes and design patterns, ought to be recognized as crucial forms of design knowledge. There is an abundance of literature suggesting solutions play a crucial role in design cognition: they can act as a gateway to understand the design situation better, as a stepping-stone to novel ideas and as an illustration of good practices. Unfortunately, however, the question of what this means for our teaching and our curriculum design has received less attention. How should instructors and design programmers handle solution-oriented knowledge? To spark a more informed debate about teaching solution-oriented thinking, we introduce the notion of solution repertoire: 'the competence of appreciating and handling solutions in one‚Äôs design discipline and to use them as an anchor point for design-relevant knowledge that goes beyond the anecdotal experience'. This paper sets the stage by introducing and defining solution repertoire and by examining the implications of way of thinking for our own curriculum. ¬© PDE 2021.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2021", "venue": "Proceedings of the 23rd International Conference on Engineering and Product Design Education, E and PDE 2021", "doi": "", "url": "", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Noise / Outliers", "cluster_summary_candidate": "These papers were not assigned to a dense DBSCAN cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", " les provide a medium to make such design knowledge available to others and to make it transferable from a single application onto more scenarios that are subject to similar boundary conditions. The study proposes a preliminary method for the development of design principles based on a structured literature review and the inductive derivation of methodological components from it. The purpose of the method is to give researchers and practitioners executable steps to generate design principles.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Designing for Digital Transformation. Co-Creating Services with Citizens and Industry. 15th International Conference on Design Science Research in Information Systems and Technology, DESRIST 2020. Proceedings. Lecture Notes in Computer Science (LNCS 12388)", "doi": "10.1007/978-3-030-64823-7_20", "url": "", "keyword": "Design knowledge", "cluster": 1, "cluster_theme_terms": "dsr, science, focus, ontology, domain, lecture, bases, prescriptive", "cluster_label_candidate": "Design Rationale / Dsr / Science", "cluster_summary_candidate": "This cluster focuses on dsr, science, involving Practitioners, using Design Science as the main methodological or conceptual lens, with contribution types coded as Methodological, Theoretical, Artifact/System.", "facet_population_or_context": "", "facet_stakeholder_or_population": "Practitioners", "facet_method_or_lens": "Design Science", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "Methodological, Theoretical, Artifact/System", "umap_x": 7.667178630828857, "umap_y": 4.7254252433776855, "distance_to_centroid": 0.5267235813062081, "representative_rank": 9, "is_representative_top3": false, "medoid_rank": 9, "lda_topic": 2, "lda_topic_probability": 0.9898824812718603, "lda_topic_words": "dsr, science, focus, patterns, tools, engineering, schema, visual", "nearest_papers": [{"paper_id": "3dbca77766 se when considering technological pedagogical content knowledge (TPACK)", "authors": "Koh, J.H.L. (1); Ching Sing Chai (1)", "abstract": "Technological pedagogical content knowledge (TPACK) encapsulates teachers' pedagogical knowledge for the integration of information and communications technologies (ICT). It is created as teachers engage in collaborative talk during the design of ICT lessons. Design frames characterize teachers' design reasoning and can substantially influence teachers' TPACK considerations. Yet, this aspect of teachers' TPACK is not well understood. This study examined the design talk conducted by 27 Singapore primary teachers as they worked in teams to integrate student-centered ICT lessons into their school curriculum. Through content analysis and chi-square analyses of about 35 h of coded design talk, it was found that teachers used seven design frames and predominantly considered pedagogical content knowledge, TPACK, and design knowledge when they engaged in ICT lesson design. Teachers' consideration of pedagogical content knowledge was driven by design frames related to idea development, perception, enactment, institutional considerations, and interpersonal factors. On the other hand, teachers emphasized idea development and enactment when they considered TPACK. Teachers also had to consider the management of design processes during ICT lesson design. The implications for teacher ICT professional development are discussed. [All rights reserved Elsevier].", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Computers & Education", "doi": "10.1016/j.compedu.2016.09.003", "url": "", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Noise / Outliers", "cluster_summary_candidate": "These papers were not assigned to a dense DBSCAN cluster.", "facet_population_or_context": "", "facet_stakeholder_or_po sign?", "cluster": -1, "distance": 0.7949707654383174}]}, {"paper_id": "e958310acab5", "title": "Prescriptive knowledge in IS research: Conceptualizing design principles in terms of materiality, action, and boundary conditions", "authors": "Chandra, Leona (1); Seidel, Stefan (1); Gregor, Shirley (2)", "abstract": "In the IS discipline, the formulation of design principles is an important vehicle to convey design knowledge that contributes beyond instantiations applicable in a limited context of use. However, their formulation still varies in terms of orientation, clarity, and precision. In this paper, we focus on the design of artifacts that are oriented towards human use, and we identify and analyze three orientations in the formulation of such design principles in IS journals - action oriented, materiality oriented, and both action and materiality oriented. We propose an effective and actionable formulation of design principles that is both clear and precise. ¬© 2015 IEEE.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2015", "venue": "Proceedings of the Annual Hawaii International Conference on System Sciences", "doi": "10.1109/HICSS.2015.485", "url": "", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Noise / Outliers", "cluster_summary_candidate": "These papers were not assigned to a dense DBSCAN cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 7.288262844085693, "umap_y": 3.952760696411133, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 5, "lda_topic_probability": 0.9832488871876164, "lda_topic_words": "interactive, focus, game, analysis, field, oriented, science, professional", "nearest_papers": [{"paper_id": "9d158233f041", "title": "Guidelines supporting the formulation of design principles", "cluster": 1, "distance": 0.13285730751187153}, {"paper_id": "3dbca777664c", "title": "Design Principles for Boundary Spanning in Transdisciplinary Design Science Research", "cluster": 1, "distance": 0.43094112769302395}, {"paper_id": "d6b2bf339ae4", "title": "Co-producing, curating, and defining design knowledge in an online practitioner community", "cluster": -1, "distance": 0.7973412139936098}, {"paper_id": "a140a90ce7b9", "title": "The object-oriented design knowledge ontology", "cluster": -1, "distance": 0.8100658473987269}, {"paper_id": "7b15d81000db", "title": "The anatomy of a design theory", "cluster": -1, "distance": 0.8104238892402402}]}, {"paper_id": "1c7fa3f7d73a", "title": "A theoretical framework for the studio as a learning environment", "authors": "Brandt, Carol B. (1); Cennamo, Katherine (2); Douglas, Sarah (3); Vernon, Mitzi (4); McGrath, Margarita (5); Reimer, Yolanda (6)", "abstract": "In this article we describe a holistic, ecological framework that takes into account the surface structures and pedagogical approaches in the studio and how these elements are connected to the construction of design knowledge: epistemology. In our development of this framework, we came to understand how disciplinary underpinnings and academic culture shape the ways that studio is enacted. Using practice theory, we illustrate our framework with two examples - one in Industrial Design and another in Human Computer Interaction - that demonstrate the ways in which the studio can act as a bridge between academic and professional communities. We came to see the studio as a unique practice community that connects academic and professional contexts. We argue that successful implementation of studio-based learning involves an awareness of disciplinary canons, ontological approaches to knowledge, and the academic constraints on studio-based approaches to learning. ¬© 2011 Springer Science+Business Media B.V.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2013", "venue": "International Journal of Technology and Design Education", "doi": "10.1007/s10798-011-9181-5", "url": "", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Noise / Outliers", "cluster_summary_candidate": "These papers were not assigned to a dense DBSCAN cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 4.437429428100586, "umap_y": 5.8659563064575195, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 5, "lda_topic_probability": 0.48580286003705114, "lda_topic_words": "interactive, focus, game, analysis, field, oriented, science, professional", "nearest_papers": [{"paper_id": "19dd6ec0253e", "title": "A principle-based philosophical framework for fashion design praxis and education in new design landscapes", "cluster": -1, "distance": 0.5720947876693852}, {"paper_id": "6aeae7ccf85b", "title": "Toward a Framework for the Design of Interactive Technology for Nature Recreation", "cluster": -1, "distance": 0.6528117518642877}, {"paper_id": "5000c5049cbd", "title": "Learning design knowledge as generalization", "cluster": -1, "distance": 0.72112431645624}, {"paper_id": "8f065cfd18a4", "title": "Pattern language: A framework for learning", "cluster": -1, "distance": 0.7406327530515673}, {"paper_id": "7f7baeb83bac", "title": "A theoretical framework on embodiment in digital design", "cluster": -1, "distance": 0.7618445530792773}]}, {"paper_id": "c0efa7750b45", "title": "Forms of reasoning in the design science research process", "authors": "Fischer, Christian (1, 2); Gregor, Shirley (2)", "abstract": "Several models for the conduct of design science research (DSR) in information systems (IS) have been suggested. There has, however, been little academic investigation of the basic forms of reasoning underlying these models, namely: deduction, induction and abduction. We argue that a more thorough investigation of these reasoning logics allows for a more comprehensive understanding of the DSR models and the building of information systems design theories (ISDTs). In particular, the question of whether prescriptive design knowledge can be ‚Äòtheory driven' by descriptive kernel theory can be addressed. First, we show that it is important to distinguish between a context of discovery and a context of justification in theory building and to consider the fundamental forms of reasoning in this light. We present an idealized model of the hypothetico-deductive method, showing how progress is achieved in science. This model includes the contexts of discovery and justification and the matching forms of reasoning. Second, we analyze frameworks for IS DSR and ISDT in comparison with this idealized model. This analysis suggests that few frameworks explicitly refer to the underlying forms of reasoning. Illustrative case studies with first-hand accounts of how IS DSR occurs in practice lend support to the conception of the idealized model. We conclude that work on methodological models for IS DSR and ISDT building would be given a firmer base and some differences in opinion resolved if there was explicit reflection on the underlying contexts of both discovery and justification and the forms of reasoning implicated, as in our idealized model. ¬© Springer-Verlag Berlin Heidelberg 2011.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2011", "venue": "Lecture Notes in Computer Science (including subseries Lecture Notes in Artificial Intelligence and Lecture Notes in Bioinformatics)", "doi": "10.1007/978-3-642-20633-7_2", "url": "", "keyword": " evelopment knowledge management", "authors": "Kyoung-Yun Kim (1); Yun Seon Kim (1)", "abstract": "This paper presents a mathematical comparison of procedural knowledge and causal knowledge, and discusses the potential roles and feasibility of causal knowledge across product development knowledge management. Since reuse of knowledge is so important in product development, various knowledge management approaches have been introduced. Most of the product design knowledge is represented by procedural knowledge, which unfortunately requires cumbersome processes to define, and is typically inadequate for representing the kind of knowledge generated during the product development process. A causal knowledge representation, however, can help us to overcome this limitation and is an alternative formalism for representing product design knowledge. In this paper we compare the procedural and causal knowledge representations. We present the mathematical definitions of two knowledge paradigms, then mathematically describe the relationship between the two. Both knowledge paradigms are then compared based on the perspective of knowledge expression, decision alternative representation, reasoning capability, and knowledge cultivation. This paper concludes that causal knowledge representation is superior to procedural knowledge representation based on the four perspectives. Finally, the knowledge systems are modeled using Systems Modeling Language (SysML), and we present a case study that demonstrates the causal knowledge features using a realistic example from industry. [All rights reserved Elsevier].", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Computer Aided Design", "doi": "10.1016/j.cad.2011.05.005", "url": "", "keyword": "Design knowledge", "cluster": 0, "cluster_theme_terms": "hri, product, critical, designerly, objects, field, rtd, engineering", "cluster_label_candidate": "Hri / Product hip of user' tacit knowledge and explicit knowledge in product design were introduced. The externalization model and gyroidal model of tacit knowledge transfer were put forward. Methodologies and key technologies such as protocol analysis, ethnography, graphic thinking, Kansei engineering, image scale were discussed, and the mapping of user' tacit knowledge and design knowledge was also analyzed. Finally, according to the integrated development of product design and information technology, some highlighted research issues on user' tacit knowledge were presented and the future development trend was outlined.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2010", "venue": "Jisuanji Jicheng Zhizao Xitong/Computer Integrated Manufacturing Systems, CIMS", "doi": "", "url": "", "keyword": "Design knowledge", "cluster": 0, "cluster_theme_terms": "hri, product, critical, designerly, objects, field, rtd, engineering", "cluster_label_candidate": "Hri / Product / Critical", "cluster_summary_candidate": "This cluster focuses on Industrial Design, involving Designers, Practitioners, using Case Study as the main methodological or conceptual lens, with contribution types coded as Theoretical, Methodological, Empirical.", "facet_population_or_context": "Industrial Design", "facet_stakeholder_or_population": "Designers, Practitioners", "facet_method_or_lens": "Case Study", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "Theoretical, Methodological, Empirical", "umap_x": 5.326607704162598, "umap_y": 7.453125476837158, "distance_to_centroid": 0.5085145063031753, "representative_rank": 7, "is_representative_top3": false, "medoid_rank": 7, "lda_topic": 2, "lda_topic_probability": 0.6447520211257703, "lda_topic_words": "dsr, science, focus, patterns, tools, engineering, schema, visual", "nearest_papers": [{"paper_id": "6b9f020cd024", "title": "Design knowledge for decision-making process in a DFX  "8f065cfd18a4", "title": "Pattern language: A framework for learning", "cluster": -1, "distance": 0.6873774061194668}, {"paper_id": "7b15d81000db", "title": "The anatomy of a design theory", "cluster": -1, "distance": 0.7398657832477696}, {"paper_id": "7c4d2eb91f51", "title": "Using a Visual Abstract as a Lens for Communicating and Promoting Design Science Research in Software Engineering", "cluster": -1, "distance": 0.7721276780121888}]}, {"paper_id": "2a3139d14895", "title": "What is design knowledge from the viewpoint of CPM/PDD?", "authors": "Conrad, J. (1); K√∂hler, C. (1); Wanke, S. (1); Weber, C. (1)", "abstract": "Knowledge is a very common term in engineering design and also extensively discussed. Even if it is not an explicit matter, it plays implicitly a role in the background. The Characteristics-Properties Modelling / Property-Driven Development (CPM/PDD) approach is one possibility to illustrate the product development process. This paper provides a closer look on design knowledge in the context of CPM/PDD. The description of product knowledge in CPM/PDD is thereby straightforward. The more complicated part is the description of process knowledge. Therefore, the method of reduction is transferred from theoretical computer science into the context of engineering design. The result indicates what design knowledge is, especially in CPM/PDD.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2008", "venue": "Proceedings DESIGN 2008, the 10th International Design Conference", "doi": "", "url": "", "keyword": "Design knowledge", "cluster": 0, "cluster_theme_terms": "hri, product, critical, designerly, objects, field, rtd, engineering", "cluster_label_candidate": "Hri / Product / Critical", "cluster_summary_candidate": "This cluster focuses on Industrial Design, involving Designers, Practitioners, using Case Study as the main methodological or conceptual lens, with contribution types cod esigners. This paper aims to describe knowledge which is needed in the early stages of design processes. Driven by an educational problem referred to in the paper, several aspects of design knowledge are discussed in contrast to engineering design knowledge. This paper does not develop a cohesive model of design knowledge. But the aspects help developing a method for easier knowledge evaluation in early stages of the industrial design process.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2008", "venue": "DS 46: Proceedings of E and PDE 2008, the 10th International Conference on Engineering and Product Design Education", "doi": "", "url": "", "keyword": "Design knowledge", "cluster": 0, "cluster_theme_terms": "hri, product, critical, designerly, objects, field, rtd, engineering", "cluster_label_candidate": "Hri / Product / Critical", "cluster_summary_candidate": "This cluster focuses on Industrial Design, involving Designers, Practitioners, using Case Study as the main methodological or conceptual lens, with contribution types coded as Theoretical, Methodological, Empirical.", "facet_population_or_context": "Industrial Design", "facet_stakeholder_or_population": "Designers, Practitioners", "facet_method_or_lens": "Case Study", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "Theoretical, Methodological, Empirical", "umap_x": 5.56751823425293, "umap_y": 7.6933794021606445, "distance_to_centroid": 0.5509411899753278, "representative_rank": 8, "is_representative_top3": false, "medoid_rank": 8, "lda_topic": 2, "lda_topic_probability": 0.9853178279757231, "lda_topic_words": "dsr, science, focus, patterns, tools, engineering, schema, visual", "nearest_papers": [{"paper_id": "2a3139d14895", "title": "What is design knowledge from the viewpoint of CPM/PDD?", "cluster": 0, "distance": 0.4700607801044858}, {"paper_id": "114973fd100e", "title": "Identification and management of the near-field knowledge of industrial design for innovative product shapes", "cluster": 0, "distance": 0.5492763987477745}, {"paper_id": "82f49b5a1905", "title": "SOLUTION REPERTOIRE", "cluster": -1, "distance": 0.6197069432508059}, {"paper_id": "7c4d2eb91f51", "title": "Using a Visual Abstract as a Lens for Communicating and Promoting Design Science Research in Software Engineering", "cluster": -1, "distance": 0.6556724458219144}, {"paper_id": "86c052a239d1", "title": "Towards a formal definition of design and its possible applications", "cluster": -1, "distance": 0.7097204416830851}]}, {"paper_id": "6b9f020cd024", "title": "Design knowledge for decision-making process in a DFX product design approach", "authors": "Wang, Keqin (1); Roucoules, Lionel (2); Tong, Shurong (1); Eynard, Benoit (2); Matta, Nada (2)", "abstract": "Product design is a knowledge-intensive process and involves large quantities of decisions. The efficiency and effectiveness of these decisions depend on the provision of many kinds of related knowledge to designers from different sources throughout the product lifecycle. First, this paper makes a literature review about the related works on product design knowledge and classifies the product design knowledge into three categories, namely product, process and product support knowledge. Secondly, the knowledge needs of product design decisions are analyzed. The decisions made during the design process have a critical impact both on the design solution obtained but also on the design process itself. These decisions are of many different types and made by different kinds of engineers and managers. This work illustrates decision-making in product design and some related works are reviewed. The decision-making during the product design process is analyzed and classified into two main categories, namely organizational and technical decisions, which are illustrated in a three dimensional figure. Finally, some conclusions and future works are discussed.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2008", "venue": "Global Design to Gain a Competitive Edge: An Holistic and Collaborative Design Approach Based on Computational Tools", "doi": "10.1007/978-1-84800-239-5_13", "url": "", "keyword": "Design knowledge", "cluster": 0, "cluster_theme_terms": "hri, product, critical, designerly, objects, field, rtd, engineering", "cluster_label_candidate": "Hri / Product / Critical", "cluster_summary_candidate": "This cluster focuses on Industrial Design, involving Designers, Practitioners, using Case Study as the main methodological or conceptual lens, with contribution types coded as Theoretical, Methodological, Empirical.", "facet_population_or_context": "Industrial Design", "facet_stakeholder_or_population": "Designers, Practitioners", "facet_method_or_lens": "Case Study", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "Theoretical, Methodological, Empirical", "umap_x": 5.183675289154053, "umap_y": 8.175614356994629, "distance_to_centroid": 0.4395441868766622, "representative_rank": 4, "is_representative_top3": false, "medoid_rank": 4, "lda_topic": 5, "lda_topic_probability": 0.8309871807722723, "lda_topic_words": "interactive, focus, game, analysis, field, oriented, science, professional", "nearest_papers": [{"paper_id": "a883ec94b37a", "title": "Causal design knowledge: Alternative representation method for product development knowledge management", "cluster": 0, "distance": 0.46791105627722474}, {"paper_id": "2a3139d14895", "title": "What is design knowledge from the viewpoint of CPM/PDD?", "cluster": 0, "distance": 0.4708752198166245}, {"paper_id": "40668e23fbab", "title": "Dimensions of knowledge in prototyping: A review and characterisation of prototyping methods and their contributions to design knowledge", "cluster": 0, "distance": 0.5428578983577508}, {"paper_id": "92fb23753506", "title": "Statues and progress of research on users' tacit knowledge in product design", "cluster": 0, "distance": 0.5541321868894713}, {"paper_id": "114973fd100e", "title": "Identification and management of the near-field knowledge of industrial design for innovative product shapes", "cluster": 0, "distance": 0.573007848049367}]}, {"paper_id": "7b15d81000db", "title": "The anatomy of a design theory", "authors": "Gregor, Shirley (1); Jones, David (2)", "abstract": "Design work and design knowledge in Information Systems (IS) is important for both research and practice. Yet there has been comparatively little critical attention paid to the problem of specifying design theory so that it can be communicated, justified, and developed cumulatively. In this essay we focus on the structural components or anatomy of design theories in IS as a special class of theory. In doing so, we aim to extend the work of Walls, Widemeyer and El Sawy (1992) on the specification of information systems design theories (ISDT), drawing on other streams of thought on design research and theory to provide a basis for a more systematic and useable formulation of these theories. We identify eight separate components of design theories: (1) purpose and scope, (2) constructs, (3) principles of form and function, (4) artifact mutability, (5) testable propositions, (6) justificatory knowledge (kernel theories), (7) principles of implementation, and (8) an expository instantiation. This specification includes components missing in the Walls et al. adaptation of Dubin (1978) and Simon (1969) and also addresses explicitly problems associated with the role of instantiations and the specification of design theories for methodologies and interventions as well as for products and applications. The essay is significant as the unambiguous establishment of design knowledge as theory gives a sounder base for arguments for the rigor and legitimacy of IS as an applied discipline and for its continuing progress. A craft can proceed with the copying of one example of a design artifact by one artisan after another. A discipline cannot. Copyright ¬© 2007, by the Association for Information Systems.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2007", "venue": "Journal of the Association for Information Systems", "doi": "10.17705/1jais.00129", "url": "", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Noise / Outliers", "cluster_summary_candidate": "These papers were not assigned to a dense DBSCAN cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 7.2473320960998535, "umap_y": 6.069876194000244, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 3, "lda_topic_probability": 0.9904596650629902, "lda_topic_words": "critical, focus, practice, outcomes, field, tools, pragmatic, level", "nearest_papers": [{"paper_id": "e105857da02d", "title": "Designerly Ways of Knowing in HRI: Broadening the Scope of Design-oriented HRI Through the Concept of Intermediate-level Knowledge", "cluster": 0, "distance": 0.7018855151950638}, {"paper_id": "07eb3166d706", "title": "A Typology of Knowledge Creation in Design Science Research Projects", "cluster": 1, "distance": 0.7029085387278143}, {"paper_id": "7f7baeb83bac", "title": "A theoretical framework on embodiment in digital design", "cluster": -1, "distance": 0.7250082794603483}, {"paper_id": "95eee570b8f1", "title": "Accumulating design knowledge: A mechanisms-based approach", "cluster": 1, "distance": 0.7393103873404849}, {"paper_id": "6e7959c82d5f", "title": "The anatomy of HCI design patterns", "cluster": -1, "distance": 0.7398657832477696}]}, {"paper_id": "86c052a239d1", "title": "Towards a formal definition of design and its possible applications", "authors": "Ralph, Paul (1); Wand, Yair (1)", "abstract": "Studying and developing design practices and sharing design knowledge are of particular significance for systems development. Creating cumulative design knowledge requires that the subject of study - namely the concept of design in general - be well-defined. The literature usually assumes (implicitly) that 'design,' as a concept, is well-understoodwell understood. However, no generally-accepted, precise and useful definition of design is yet available. In this paper we describe work intended to develop a general definition of design. To develop the definition we conducted a survey of definitions of design in the literature. The definitions all referred to some aspects of design, but often suffered from ambiguity or from incomplete coverage of design phenomena. Moreover, while some common aspects of design seem to emerge from the surveyed definitions, lack of agreement on other aspects was also observed. Combining the aspects gleaned from these definitions, we propose a new definition of the concept of design. The definition is comprised of six elements. The proposed definition can be used for to supporting sharing of design knowledge and for informing research about design and design science.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2007", "venue": "DESRIST 2007 Conference Proceedings - 2nd International Conference on Design Science Research in Information Systems and Technology", "doi": "", "url": "", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Noise / Outliers", "cluster_summary_candidate": "These papers were not assigned to a dense DBSCAN cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 6.3581714630 or branch, and particularly the knowhow of realizing a technical system. SDK has a prescriptive character, and at present does not possess a fully developed and advantageous form and completeness. In particular, part of SDK consists of `personal, often unconscious knowledge' of design experts. The right content and form for presenting SDK is decisive for the quality of the designed product, the technical system (TS), and for the efficiency and effectiveness of the design process. Beyond that consideration, computer-based expert systems depend fully on the kind of knowledge available in SDK, and its form of presentation. The aspects to be discussed include the character, types, forms, and ways of obtaining the available SDK.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Journal of Engineering Design", "doi": "10.1080/09544829008901646", "url": "", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Noise / Outliers", "cluster_summary_candidate": "These papers were not assigned to a dense DBSCAN cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 5.822403907775879, "umap_y": 8.109098434448242, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 2, "lda_topic_probability": 0.9847545492049367, "lda_topic_words": "dsr, science, focus, patterns, tools, engineering, schema, visual", "nearest_papers": [{"paper_id": "6b9f020cd024", "title": "Design knowledge for decision-making process in a DFX product design approach", "cluster": 0, "distance": 0.6713451437509446}, {"paper_id": "76d309f713b9", "title": "How industrial design knowledge differs from engineering design knowledge", "cluster": 0, "distance": 0.73447874858 edge: Principles, heuristics and best practices", "cluster": -1, "distance": 0.8633935853756558}]}, {"paper_id": "37f353dbe230", "title": "Managing design knowledge", "authors": "Neelamkavil, J. (1)", "abstract": "The great ancient philosopher Confucius once said: 'real knowledge is to know the extent of one's ignorance'. Industries are recognizing the strategic value of knowledge and the careful management and distribution of their intellectual assets across the company to create value and to gain/sustain competitive advantage. In any organization, the data, information and experience that make-up the knowledge repository is really corporate assets. So what is knowledge? The first part of this paper differentiates between the terms such as 'data', 'information' and 'knowledge'. It will also differentiate between 'explicit' vs. 'tacit' knowledge, and how to derive explicit knowledge from its tacit form. The second part of the paper addresses the important issue of design knowledge management. Study has indicated that design engineers spend, on average, about one quarter of their time searching for information. Managing design knowledge, how such knowledge can be identified, captured, represented and stored for future use are vital issues, as three-quarters of all engineering designs are variations of existing designs. The paper also outlines the architecture of the design knowledge management system that is being developed at IMTI.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Proceedings of the IASTED International Conference Intelligent Systems and Control", "doi": "", "url": "", "keyword": "Design knowledge", "cluster": 0, "cluster_theme_terms": "hri, product, critical, designerly, objects, field, rtd, engineering", "cluster_label_candidate": "Hri / Product / Critical", "cluster_summary_candidate": "This cluster focuses on Industrial Design, involving Designers, Practitioner terns Knowledge Stack: Exploring New Ways to Negotiate Context, Law, and Design", "cluster": -1, "distance": 0.8008811850266001}]}, {"paper_id": "1401e17184c0", "title": "Software creation: cliche as intermediate knowledge in software design", "authors": "Abolhassani, H. (1); Hui Chen (1); Koono, Z. (1)", "abstract": "This paper reports on cliche and related mechanisms appearing in the human design of software. During studies on human design knowledge, the authors found frequent instances of the same pattern of detailing, named cliche. In our study, cliche is an intermediate level of design knowledge, during a hierarchical detailing step, residing between simple reuse and creation by micro design rules, which have already been reported. These three kinds of design knowledge are of various types and have different complexities. Discussions of them, focusing on cliche type, with procedures of formation of a simple cliche skeleton and generation of a cliche are given. The studies show a working model of Zipf's principle.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "IEICE Transactions on Information and Systems", "doi": "", "url": "", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Noise / Outliers", "cluster_summary_candidate": "These papers were not assigned to a dense DBSCAN cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 6.306988716125488, "umap_y": 5.190419673919678, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 5, "lda_topic_probability": 0.5773687978067572, "lda_topic_words": "interactive, focus, game, analysis, field, oriented, science, professional", "nearest_papers": [{"paper_id": "95eee5
