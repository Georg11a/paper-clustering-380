 "doi": "10.4018/978-1-59140-896-3.ch002", "url": "", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Noise / Outliers", "cluster_summary_candidate": "These papers were not assigned to a dense DBSCAN cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 6.770092964172363, "umap_y": 3.6130547523498535, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 5, "lda_topic_probability": 0.9869169137252229, "lda_topic_words": "interactive, focus, game, analysis, field, oriented, science, professional", "nearest_papers": [{"paper_id": "18d57211cb40", "title": "Object oriented design knowledge: ontology and measurement of impact", "cluster": -1, "distance": 0.036499364118506517}, {"paper_id": "495817cc9c25", "title": "Object-oriented design knowledge: Principles, heuristics and best practices", "cluster": -1, "distance": 0.17042953151891993}, {"paper_id": "6d926f3c4a97", "title": "A domain reference ontology for design science research knowledge bases", "cluster": 1, "distance": 0.7970991601364621}, {"paper_id": "e958310acab5", "title": "Prescriptive knowledge in IS research: Conceptualizing design principles in terms of materiality, action, and boundary conditions", "cluster": -1, "distance": 0.8100658473987269}, {"paper_id": "3dbca777664c", "title": "Design Principles for Boundary Spanning in Transdisciplinary Design Science Research", "cluster": 1, "distance": 0.8303014816467}]}, {"paper_id": "a1ccc16dab98", "title": "ANALYSIS OF DESIGN COMPETENCE OF FUTURE ENGINEER-TEACHERS", "authors": "N. Korolova; Y. Bilotserkivska; –û. Y. Mukhin", "abstract": "Purpose. To analyze current scientific research on the problem of design competence of future engineer-teachers, and to conduct a terminological analysis of related and fundamental concepts, such as ¬´competence,¬ª ¬´design activity,¬ª ¬´design competence,¬ª and ¬´design competence of engineer-teachers.¬ª\n\nMethods. Methods of theoretical and methodological analysis of literature on the research topic, regulatory and legislative documents were applied, along with analysis, synthesis, generalization, and systematization to clarify the meanings of the studied concepts and formulate conclusions.\n\nResults. In modern conditions, ensuring a workforce that meets the real conditions and needs of the labor market and the demands for the quality of the country‚Äôs production potential is of paramount importance in Ukraine. A strategic role in solving this task is played by the system of vocational and technical education, which is closely linked to production and aims to train highly qualified specialists. This, in turn, requires teaching staff with a high level of current professional knowledge, skills, and competencies in both the psychological-pedagogical sphere and the field of production.Theoretical research allowed for the identification of related and fundamental concepts of the study. Based on an analysis of scientific works, the concept of competence was clarified as an integrative, dynamic quality of a person, characterizing their ability and readiness for successful activity in a specific field (including professional activity). Researchers view it from various perspectives, but its essential components are knowledge, skills, experience, values, and attitudes toward activity in a specific professional domain. It was found that in modern scientific literature, design activity is interpreted as an integrative process combining theoretical knowledge and practical actions of an educator aimed at developing and implementing educational projects to enhance the quality of education and develop professional competencies. It was determined that the specificity of training engineer-teachers in any field lies in the fact that their design activity is considered both in the psychological-pedagogical and professional training domains. Design competence should encompass both psychological-pedagogical and professional engineering-technical components of the training of future engineer-teachers in accordance with regulatory documentation: programs, plans, and innovative projects for the development of subject areas of the future specialist‚Äôs activity. In general, design competence is interpreted as an integrative quality of an educator that combines knowledge, skills, and personal qualities necessary for effective design and implementation of the educational process. The study also examined the specifics of the design competence of engineer-teachers as an integrative personal characteristic that accumulates interdisciplinary knowledge and skills enabling them to develop collaborative research activities with students, provide scientific guidance, and assist in the implementation of research projects. The analysis of scientific works on the issue of design competence of engineer-teachers revealed that there is currently no single interpretation of this concept. The essence of the term ¬´design competence of an engineer-teacher¬ª was clarified as the integrated result of the educational training of future engineer-teachers. It reflects the formation of relevant knowledge, skills, and professionally important qualities, representing the ability to engage in design activities in the fields of pedagogy and production through the development of pedagogical and production projects. The analysis of psychological-pedagogical literature also identified the structure of design competence, which includes the following components: motivational-value, cognitive, activity-based, and reflexive-evaluative.\n\nConclusion. Based on an analysis of scientific and pedagogical literature, the essence of the concept of ¬´design competence of an engineer-teacher¬ª was clarified as an integrative, dynamic personal characteristic. It reflects a combination of design knowledge and skills, experience in design activities, orientation toward motivational-value attitudes, and reflexive-evaluative actions, enabling the development and evaluation of projects in the dual professional domains of pedagogy and technological expertise.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2024", "venue": "Problems of Engineering Pedagogic Education", "doi": "", "url": "https://www.semanticscholar.org/paper/15c3811ae940cd712a69146bed4bed2a119080d6", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Noise / Outliers", "cluster_summary_candidate": "These papers were not assigned to a dense DBSCAN cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 4.597471237182617, "umap_y": 4.671419620513916, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 5, "lda_topic_probability": 0.8093940205348564, "lda_topic_words": "interactive, focus, game, analysis, field, oriented, science, professional", "nearest_papers": [{"paper_id": "1b8c995dfc43", "title": "Seven design frames that teachers use when considering technological pedagogical content knowledge (TPACK)", "cluster": -1, "distance": 0.2371824788171797}, {"paper_id": "ef3a9300a2f3", "title": "Developing a competency taxonomy for teacher design knowledge in technology-enhanced learning environments: a literature review", "cluster": -1, "distance": 0.7248447663277384}, {"paper_id": "94bc88b88ae6", "title": "Design knowledge in the artistic‚Äìaesthetic development and transformation of the world", "cluster": -1, "distance": 0.7491709263346573}, {"paper_id": "82f49b5a1905", "title": "SOLUTION REPERTOIRE", "clust fits of nature recreation.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2025", "venue": "International journal of human computer interactions", "doi": "", "url": "https://www.semanticscholar.org/paper/27eb58f9f616fb54aae331fcbec9abdb5496f5e0", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Noise / Outliers", "cluster_summary_candidate": "These papers were not assigned to a dense DBSCAN cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 4.622736930847168, "umap_y": 5.753764629364014, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 2, "lda_topic_probability": 0.9886819171554209, "lda_topic_words": "dsr, science, focus, patterns, tools, engineering, schema, visual", "nearest_papers": [{"paper_id": "ccc616a68c38", "title": "Towards Creating a Body of Evidence-based Interactive Digital Narrative Design Knowledge: Approaches and Challenges", "cluster": -1, "distance": 0.512108748987349}, {"paper_id": "a707fd62833a", "title": "Tracing the tensions surrounding understandings of agency and knowledge in technology design", "cluster": -1, "distance": 0.5838985587510905}, {"paper_id": "1c7fa3f7d73a", "title": "A theoretical framework for the studio as a learning environment", "cluster": -1, "distance": 0.6528117518642877}, {"paper_id": "19dd6ec0253e", "title": "A principle-based philosophical framework for fashion design praxis and education in new design landscapes", "cluster": -1, "distance": 0.7602269029588637}, {"paper_id": "7f559689c730", "title": "Strong Technology-Enhanced Learning Concepts", "cluster": -1, "distance": 0.8019081950728717}]}, {"paper_id": "af4a4237d98a", "title": "Utilization of design principles for hybrid learning configurations by interprofessional design teams", "authors": "Petra H. M. Cremers; A. Wals; R. Wesselink; M. Mulder", "abstract": "Educational design research yields design knowledge, often in the form of design principles or guidelines that provide the rationale or ‚Äòknow-why‚Äô for the design of educational interventions. As such, design principles can be utilized by designers in contexts other than the research context in which they were generated. Although research has shown that quality support is important for design success, less is known about processes that promote utilization of design principles as the rationale for instructional design. In this study we therefore explored an intervention for promoting the utilization of a set of research-based design principles in educational practice. This intervention aimed to promote utilization through enhancing perceived usefulness of the design principles by design teams in various contexts. The set of design principles that was utilized by the design teams in this study underpins the design of so-called hybrid learning configurations that are situated at the interface between school and workplace. The intervention was developed from the perspective of boundary crossing theory and was conducted with four different design teams. It was evaluated by way of a questionnaire and a dialogue with members of the design teams. This boundary crossing intervention appeared to bring about the desired outcomes. Most of the design team members considered the set of design principles useful in several different ways and they expected that utilization of the principles would lead to an improved learning configuration.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2017", "venue": "", "doi": "", "url": "https://www.semanticscholar.org/paper/283b7871f4761ad84513199e4f22100232b20a4b", "keyword": "Design knowledge", "cluster": -1, "cluster_t ages of formalizing design knowledge more explicitly. We introduce the Whole View model to provide the field of design with a tentative structure for its knowledge that could make it easier for design and other fields to work together. We situate the model in the context of different types of design education, and show examples of how the Whole View provides a structure for teaching, research, and practice. We conclude by introducing a new agenda for design centered on the well-being of people, organizations, and the natural environment, with health, happiness, and prosperity as the levers driving change.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2020", "venue": "She Ji: The Journal of Design, Economics and Innovation", "doi": "", "url": "https://www.semanticscholar.org/paper/435277a3e5471ed7631d518071836b93944925b0", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Noise / Outliers", "cluster_summary_candidate": "These papers were not assigned to a dense DBSCAN cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 4.201067924499512, "umap_y": 6.276537895202637, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 5, "lda_topic_probability": 0.48051977114343897, "lda_topic_words": "interactive, focus, game, analysis, field, oriented, science, professional", "nearest_papers": [{"paper_id": "38f057747444", "title": "Reusable design: A proposed approach to Public Health Informatics system design", "cluster": -1, "distance": 0.25511515542352703}, {"paper_id": "114973fd100e", "title": "Identification and management of the near-field knowledge of industrial design for innovative product shapes", "cluster": 0, "distance": 0. er's tacit ways of knowing can be accommodated in digital design practices by developing tools that allow intuitive and embodied interactions. To this end, it points out specific concepts, methods, and theories within Human-Computer Interaction (HCI) research, arguing that they can enable the development of better digital design tools that can cope with complex human perceptual mechanisms, including touch, as an extension of both body and mind, and that can encompass the implicit areas inherent in design knowledge. Therefore, concerning the creative design disciplines, it highlights the importance of closely following the findings of research within HCI that are relevant to design knowledge and its implementation.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2024", "venue": "Journal of Design for Resilience in Architecture and Planning", "doi": "", "url": "https://www.semanticscholar.org/paper/999c3e425c176f6b5edd863d167d256744852b1e", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Noise / Outliers", "cluster_summary_candidate": "These papers were not assigned to a dense DBSCAN cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 6.124889850616455, "umap_y": 6.483559608459473, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 2, "lda_topic_probability": 0.989498201239864, "lda_topic_words": "dsr, science, focus, patterns, tools, engineering, schema, visual", "nearest_papers": [{"paper_id": "e105857da02d", "title": "Designerly Ways of Knowing in HRI: Broadening the Scope of Design-oriented HRI Through the Concept of Intermediate-level Knowledge", "cluster": 0, "distance": 0.5322704386725865}, {"paper_id": "92fb23753 n and participatory design as two widely-employed methodologies that are appropriate for adoption as PHI standards. We make the case that these methods show promise to create reusable design knowledge in PHI.SummaryWe propose the formalization of a set of standard design methods within PHI that can be used to pursue a strategy of design knowledge creation and reuse for cost-effective, interoperable public health information systems. We suggest that all public health informaticians should be able to use these design methods and the methods should be incorporated into PHI training.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2011", "venue": "BMC Public Health", "doi": "", "url": "https://www.semanticscholar.org/paper/9c8b1c67ac970533f6aee74d608749c545113cdd", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Noise / Outliers", "cluster_summary_candidate": "These papers were not assigned to a dense DBSCAN cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 4.029733657836914, "umap_y": 6.8245930671691895, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 5, "lda_topic_probability": 0.8355219723734225, "lda_topic_words": "interactive, focus, game, analysis, field, oriented, science, professional", "nearest_papers": [{"paper_id": "39fee30eb03c", "title": "Cutting Cubes Out of Fog: The Whole View of Design", "cluster": -1, "distance": 0.25511515542352703}, {"paper_id": "40668e23fbab", "title": "Dimensions of knowledge in prototyping: A review and characterisation of prototyping methods and their contributions to design knowledge", "cluster": 0, "distance": 0.7420682858121687}, {"paper_id": "fd2392ff2aff", "title": "Surveying a Landscape of Ethics-Focused Design Methods", "cluster": 0, "distance": 0.7772881636789782}, {"paper_id": "a7e06450729f", "title": "Game Design as an Autonomous Research Subject", "cluster": -1, "distance": 0.8691543595532538}, {"paper_id": "3058799f63c1", "title": "Using Schema to Inform Method Design Practices", "cluster": 0, "distance": 0.8705896236077961}]}, {"paper_id": "cc5e9fe45cc6", "title": "A study of practice based design research models from knowledge integration perspective", "authors": "Honghai Li; Jun Cai", "abstract": "The transformation of China's design innovation industry has highlighted the importance of design research. The design research process in practice can be regarded as the process of knowledge production. The design 3.0 mode based on knowledge production MODE2 has been shown in the Chinese design innovation industry. On this cognition, this paper establishes a map with two dimensions of how knowledge integration occurs in practice based design research, which are the design knowledge transfer and contextual transformation of design knowledge. We use this map to carry out the analysis of design research cases. Through the analysis, we define four typical practice based design research models from the viewpoint of knowledge integration. This method and the proposed model can provide a theoretical basis and a path for better management design research projects.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2019", "venue": "", "doi": "", "url": "https://www.semanticscholar.org/paper/9f26e050d534e82159a5fa1af1f865603733aa49", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Noise / Outliers", "cluster_summary_candidate": "These papers were not assigned to a dense DBSCAN cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 6.01446008682251, "umap_y": 4.645087242126465, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 3, "lda_topic_probability": 0.9844699958923384, "lda_topic_words": "critical, focus, practice, outcomes, field, tools, pragmatic, level", "nearest_papers": [{"paper_id": "a707fd62833a", "title": "Tracing the tensions surrounding understandings of agency and knowledge in technology design", "cluster": -1, "distance": 0.6126364900495409}, {"paper_id": "94bc88b88ae6", "title": "Design knowledge in the artistic‚Äìaesthetic development and transformation of the world", "cluster": -1, "distance": 0.6508221203627605}, {"paper_id": "c0efa7750b45", "title": "Forms of reasoning in the design science research process", "cluster": 1, "distance": 0.7449464330601154}, {"paper_id": "03adadfa0ad4", "title": "Design Principles: Literature Review, Analysis, and Future Directions", "cluster": 1, "distance": 0.8079879503325778}, {"paper_id": "2a3139d14895", "title": "What is design knowledge from the viewpoint of CPM/PDD?", "cluster": 0, "distance": 0.8173179458498446}]}, {"paper_id": "c5d4c66275a8", "title": "Towards a Theory Driven Foundational Model for Design: Rethinking Requirement Elicitation for Special Needs", "authors": "K. Venkatesh; Shakuntala Acharya; J. Allen; F. Mistree", "abstract": "Designing assistive devices involves complex interactions between design knowledge structures, requirement elicitation methods, and stakeholder engagement. Current co-design approaches, while effective, rely heavily on implicit knowledge transfer, particularly when designing for users unable to articulate their needs. In this paper we present the theoretical underpinnings of requirement elicitation as a design knowledge transformation process. It requires a comprehensive understanding of the special needs of the users, critical domain knowledge, interdisciplinary expertise and engagement with multiple stakeholders, presently well supported by co-design approaches. However, engaging with certain user groups, such as, children with special needs is particularly harrowing as they are unable to articulate their needs or offer consistent feedback. This often renders their needs missed, ill understood or inaccurately captured. Additionally, designers struggle to gather clinical requirements and mitigate the demands and aspirations of other stakeholders beyond the beneficiaries, and above all, prioritizing the requirements to systematically undertake design. These findings are corroborated between literature and primary research, emphasizing the need for a knowledge support in requirement elicitation. Therefore, an existing support, the Master List of Requirements (MLoR) is further investigated in this paper and validation is sought, with respect to two key hypotheses; H1: The knowledge content of the MLoR, (i.e., Requirement and its corresponding ontological tagging) is ‚Äòpractically sound‚Äô; and H2: A Master List of Requirement is an appropriate (type of) knowledge support for designing for Children with special needs (DfC*). An empirical validation study is undertaken with design and clinical experts, with respect to the Validation Square, and the results indicate several disagreements on the practical soundness and interpretation of the requirements and their priority in the MLoR. The experts confirm that requirements tend to be context-specific, and hence, the proposition of a generic, standardized MLoR poses difficulties in adapting to apply to various use-cases, however, they commend the ontology. The underlying phenomena leading to this ambiguity in interpretation of an explicit knowledge, such as a requirement, is due to the tacit nature of contextual knowledge. Thus, a concept of a Foundational Model for DfC* is proposed, leveraging an extended ontology on knowledge typology to offer a structured and explicit manner to capture implicit needs, and is intended to support both customized one-off solutions and generalizable frameworks by facilitating access to context-sensitive knowledge which is reflective of the complexities of the real world.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2025", "venue": "Digital Enterprise Computing", "doi": "", "url": "https://www.semanticscholar.org/paper/a02bcc09b09789ba51cd5bf0e57da568c03c8021", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Noise / Outliers", "cluster_summary_candidate": "These papers were not assigned to a dense DBSCAN cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 6.319730758666992, "umap_y": 5.99293327331543, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 5, "lda_topic_probability": 0.994135418433936, "lda_topic_words": "interactive, focus, game, analysis, field, oriented, science, professional", "nearest_papers": [{"paper_id": "78ea04e5eaee", "title": "Socio-technical design principles for a multi-stakeholder agriculture extension information system in Ethiopia", "cluster": -1, "distance": 0.7050757571447976}, {"paper_id": "b0fe7e080516", "title": "Design knowledge representation: An ontological perspective", "cluster": -1, "distance": 0.7328718458428125}, {"paper_id": "94bc88b88ae6", "title": "Design knowledge in the artistic‚Äìaesthetic development and transformation of the world", "cluster": -1, "distance": 0.7387769659951069}, {"paper_id": "fffe50e033fa", "title": "Activity as the ultimate particular of interaction design", "cluster": -1, "distance": 0.7494817651171566}, {"paper_id": "4b599d3e2eb0", "title": "Immodest Proposals: Research Through Design and Knowledge", "cluster": 0, "distance": 0.7635175773588128}]}, {"paper_id": "53adec5acee6", "title": "Mapping design knowledge: 36 years of Design Studies", "authors": "K. Burns; Jack Ingram; L. Annable", "abstract": "This paper examines the nature of design research, knowledge and theory, as revealed through an overview of the areas of interest that make up published writing on design, specifically that published in Design Studies, since its first publication in 1979. The research proposes a taxonomy of design knowledge addressing the objects, processes and practices of design and consumption. This is used as the basis to trace the history and development of design ideas and design writing over the following 36 years through classifying the issues that are central to the published papers published in Design Studies, and quantifying the changes of emphasis in design topics over that period. \n \nThe paper offers proposals for the areas within which design theory resides, suggests that until a mature design epistemology evolves the concept of epistemics is a more appropriate term and reflects on the relationship between design research, knowledge, theory and practice.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2016", "venue": "", "doi": "", "url": "https://www.semanticscholar.org/paper/a749b4fe5ef70d2391f17102eab0671f5d3f3dc1", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Noise / Outliers", "cluster_summary_candidate": "These papers were not assigned to a dense DBSCAN cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 5.965828895568848, "umap_y": 5.656722545623779, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": guished in the taxonomy. This reference ontology, developed using the Unified Foundational Ontology (UFO) and several of its core ontologies, is organized into different ontology modules, allowing to describe functionalities that are common to any digital platform and more specific functionalities that have their origin in the distinctive features that were used to construct the taxonomy. The taxonomy that we contribute helps to clearly define the different types of digital platform that can be observed today. It also helps analysing further evolutions in the platform domain. The contribution of a well-founded digital platform reference ontology is a step towards a better understanding of digital platform functionality, better communication be-tween stakeholders, and eventually may facilitate future research and development of", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2023", "venue": "Information Systems", "doi": "", "url": "https://www.semanticscholar.org/paper/a9332bbc8582c4f0033949a3b7f7f447b5654b6b", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Noise / Outliers", "cluster_summary_candidate": "These papers were not assigned to a dense DBSCAN cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 7.2753143310546875, "umap_y": 7.166621208190918, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 0, "lda_topic_probability": 0.9968280101810183, "lda_topic_words": "platform, digital, types, ontology, game, taxonomy, lack, focus", "nearest_papers": [{"paper_id": "73537bfbe719", "title": "A taxonomy and ontology for digital platforms", "cluster": -1, "distance": 0.00024018082846399835}, {"paper_id": "6d926f3c4a97", " .", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2019", "venue": "Research and Practice in Technology Enhanced Learning", "doi": "", "url": "https://www.semanticscholar.org/paper/b2c846608aefa5aa21c43b4819c02c7bcc295e5c", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Noise / Outliers", "cluster_summary_candidate": "These papers were not assigned to a dense DBSCAN cluster.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 4.373836517333984, "umap_y": 5.12130069732666, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 5, "lda_topic_probability": 0.9923657337828101, "lda_topic_words": "interactive, focus, game, analysis, field, oriented, science, professional", "nearest_papers": [{"paper_id": "7f559689c730", "title": "Strong Technology-Enhanced Learning Concepts", "cluster": -1, "distance": 0.22966874846365726}, {"paper_id": "1b8c995dfc43", "title": "Seven design frames that teachers use when considering technological pedagogical content knowledge (TPACK)", "cluster": -1, "distance": 0.5990060494739504}, {"paper_id": "a1ccc16dab98", "title": "ANALYSIS OF DESIGN COMPETENCE OF FUTURE ENGINEER-TEACHERS", "cluster": -1, "distance": 0.7248447663277384}, {"paper_id": "1c7fa3f7d73a", "title": "A theoretical framework for the studio as a learning environment", "cluster": -1, "distance": 0.8085748743713483}, {"paper_id": "364b7d9127ec", "title": "Toward a Unified Model of Design Knowledge", "cluster": -1, "distance": 0.8126248249644022}]}, {"paper_id": "2042efa7e455", "title": "The DSR grid: six core dimensions for effectively planning and communicating design science research projects", "authors": "J. Brocke; A. Maedche", "abstract": "The goal of design science research (DSR) is to generate prescriptive knowledge about the design of Information Systems (IS) artifacts like software, methods, models, and concepts (Hevner et al. 2004). In a wider sense, DSR intends to generate design knowledge, that is, knowledge about innovative solutions to real-world problems (vom Brocke et al. 2019). As such, DSR is considered particularly promising regarding its ability to contribute to practice through such means as digital innovation (Rai 2017) and to address our society‚Äôs (grand) challenges (Becker et al. 2015), such as that of ensuring environmental sustainability (Loos et al. 2011; Pernici et al. 2012; vom Brocke and Seidel 2012). Each DSR project is a complex matter with many aspects that must be considered. DSR is an iterative process, starting with the identification of a problem in the problem space and evaluating alternative solutions in the solution space. Through multiple iterations, a DSRproject seeks to contributemeans-end relationships between problem and solution spaces (Venable 2006). All DSR activities must be aligned to such intended contributions so modifications in such positioning lead to subsequent changes in how to scope and plan a DSR project. Multiple stakeholders are often involved in conducting DSR project, which makes it important to coordinate and communicate DSR research (vomBrocke and Lippe 2010). Stakeholders of DSR projects include researchers, industry partners, and editors. These roles should be considered in any DSR project e.g. in terms of their focus (e.g., domain expert or method expert) and seniority (e.g., Ph.D. student, Ph.D. supervisor). Such multi-stakeholder collaboration makes it important to communicate the manifold considerations of a DSR project in an efficient way. Based on our own experience as editors of DSR special issues, conferences and tracks, directors of many DSR projects and research programs, and mentors of Ph.D. students on DSR projects, we see great value in high-level representations of a DSR project that make it possible to capture on one page the project‚Äôs key aspects. Therefore, this article identifies six core dimensions of a DSR project that can lay the foundation for a high-level, one-page framework that describesDSRprojects. Similar approaches have been presented in other areas of research, including conceptual modeling (Frank et al. 2014) and reference modeling (vom Brocke 2007), where frameworks (specifically, process frameworks) provide a high-level conceptualization of various parts of more complex models (vom Brocke and Buddendick 2006; Legner et al. 2019), and business modeling, where the business model canvas (BMC) in particular provides a high-level conceptualization of the information needed to plan and communicate business models (Osterwalder and Pigneur 2010). Recently, we have seen an increase in contributions that have suggested canvas models, also referred to as visual inquiry tools, for many areas, and that have suggested principles for canvas design in general terms (Avdiji et al. 2019). In the DSR literature, too, This article is part of the Topical Collection on Science Research in the Networked Economy", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2019", "venue": "Electronic Markets", "doi": "", "url": "https://www.semanticscholar.org/paper/b4891a8c14bc74a60e95cce3915a3efae59ff889", "keyword": "Design knowledge", "cluster": 1, "cluster_theme_terms": "dsr, science, focus, ontology, domain, lecture, bases, prescriptive", "cluster_label_candidate": "Design Rationale / Dsr / Science", "cluster_summary_candidate": "This cluster focuses on dsr, science, involving Practitioners, using Design Science as the main methodological or conceptual lens, with contribution types coded as Methodological, Theoretical, Artifact/System.", "facet_population_or_context": "", "facet_stakeholder_or_population": "Practitioners   <script>
    const data = JSON.parse(document.getElementById('payload').textContent);
    const papers = data.papers;
    const palette = ['#f05a71','#4c78a8','#f58518','#54a24b','#b279a2','#72b7b2','#eeca3b','#ff9da6','#9d755d','#59a14f','#edc948','#76b7b2'];
    const colorFor = c => palette[Math.abs(Number(c)) % palette.length];
    const clusterName = c => Number(c) === -1 ? 'Noise / Outliers' : `Cluster ${c}`;
    const state = { selected: papers[0]?.paper_id || null };
    const svg = document.getElementById('plot');
    const details = document.getElementById('details');
    const status = document.getElementById('status');

    function initControls() {
      const clusterFilter = document.getElementById('clusterFilter');
      data.clusters.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.cluster;
        opt.textContent = `${clusterName(c.cluster)} (${c.count})`;
        clusterFilter.appendChild(opt);
      });
      const keywordFilter = document.getElementById('keywordFilter');
      data.keywords.forEach(k => {
        const opt = document.createElement('option');
        opt.value = k;
        opt.textContent = k;
        keywordFilter.appendChild(opt);
      });
      ['search','clusterFilter','keywordFilter','repOnly'].forEach(id => {
        document.getElementById(id).addEventListener('input', render);
        document.getElementById(id).addEventListener('change', render);
      });
      renderLegend();
    }

    function filteredPapers() {
      const q = document.getElementById('search').value.trim().toLowerCase();
      const cluster = document.getElementById('clusterFilter').value;
      const keyword = document.getElementById('keywordFilter').value;
      const repOnly = document.getElementById('repOnly').checked;
      return papers.filter(p => {
        const text = `${p.title} ${p.abstract} ${p.authors} ${p.venue} ${p.keyword}`.toLowerCase();
        return (!q || text.includes(q)) &&
          (cluster === 'all' || String(p.cluster) === cluster) &&
          (keyword === 'all' || p.keyword === keyword) &&
          (!repOnly || p.is_representative_top3);
      });
    }

    function renderLegend() {
      const legend = document.getElementById('legend');
      legend.innerHTML = '';
      data.clusters.forEach(c => {
        const item = document.createElement('span');
        item.className = 'legend-item';
        item.innerHTML = `<span class="swatch" style="background:${colorFor(c.cluster)}"></span> ${clusterName(c.cluster)}: ${escapeHtml(c.label || c.theme)}`;
        legend.appendChild(item);
      });
      const shapeNote = document.createElement('span');
      shapeNote.className = 'legend-item';
      shapeNote.innerHTML = '<span>◆ Discussion detected</span><span>● No explicit discussion</span>';
      legend.appendChild(shapeNote);
    }

    function render() {
      const shown = filteredPapers();
      status.textContent = `${shown.length} of ${papers.length} papers shown. Axes are UMAP 1 and UMAP 2 coordinates, not interpretable variables. Use "Top-3 reps only" to filter representative papers.`;
      drawPlot(shown);
      renderDetails(papers.find(p => p.paper_id === state.selected) || shown[0] || papers[0]);
    }

    function drawPlot(shown) {
      const width = svg.clientWidth || 900;
      const height = svg.clientHeight || 560;
      const pad = 44;
      const xs = papers.map(p => p.umap_x), ys = papers.map(p => p.umap_y);
      let minX = Math.min(...xs), maxX = Math.max(...xs), minY = Math.min(...ys), maxY = Math.max(...ys);
      const xRange = Math.max(0.0001, maxX - minX);
      const yRange = Math.max(0.0001, maxY - minY);
      minX -= xRange * 0.08;
      maxX += xRange * 0.08;
      minY -= yRange * 0.08;
      maxY += yRange * 0.08;
      const sx = x => pad + ((x - minX) / Math.max(0.0001, maxX - minX)) * (width - pad * 2);
      const sy = y => height - pad - ((y - minY) / Math.max(0.0001, maxY - minY)) * (height - pad * 2);
      const shownIds = new Set(shown.map(p => p.paper_id));
      svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
      svg.innerHTML = '';
      for (let i = 0; i < 6; i++) {
        const x = pad + i * (width - pad * 2) / 5;
        const y = pad + i * (height - pad * 2) / 5;
        svg.insertAdjacentHTML('beforeend', `<line class="axis" x1="${x}" y1="${pad}" x2="${x}" y2="${height-pad}"></line>`);
        svg.insertAdjacentHTML('beforeend', `<line class="axis" x1="${pad}" y1="${y}" x2="${width-pad}" y2="${y}"></line>`);
      }
      svg.insertAdjacentHTML('beforeend', `<text x="${width / 2}" y="${height - 8}" text-anchor="middle" fill="#65758b" font-size="12">UMAP 1</text>`);
      svg.insertAdjacentHTML('beforeend', `<text x="16" y="${height / 2}" text-anchor="middle" fill="#65758b" font-size="12" transform="rotate(-90 16 ${height / 2})">UMAP 2</text>`);
      papers.forEach(p => {
        const visible = shownIds.has(p.paper_id);
        const selected = p.paper_id === state.selected;
        const x = sx(p.umap_x), y = sy(p.umap_y);
        const size = selected ? 7.5 : 6.5;
        const cls = `point ${visible ? '' : 'dim'} ${selected ? 'selected' : ''}`;
        const fill = colorFor(p.cluster);
        const node = document.createElementNS('http://www.w3.org/2000/svg', p.discussion_found ? 'path' : 'circle');
        node.setAttribute('class', cls);
        node.setAttribute('fill', fill);
        if (p.discussion_found) {
          const d = `M ${x} ${y - size} L ${x + size} ${y} L ${x} ${y + size} L ${x - size} ${y} Z`;
          node.setAttribute('d', d);
        } else {
          node.setAttribute('cx', x);
          node.setAttribute('cy', y);
          node.setAttribute('r', size);
        }
        node.addEventListener('click', () => {
          state.selected = p.paper_id;
          render();
        });
        node.appendChild(document.createElementNS('http://www.w3.org/2000/svg', 'title')).textContent = p.title;
        svg.appendChild(node);
      });
    }

    function renderDetails(p) {
      if (!p) return;
      const doi = p.doi ? `<a class="paper-link" href="https://doi.org/${escapeHtml(p.doi)}" target="_blank">DOI: ${escapeHtml(p.doi)}</a>` : '';
      const url = p.url ? `<a class="paper-link" href="${escapeAttr(p.url)}" target="_blank">Open paper URL</a>` : '';
      const nearest = (p.nearest_papers || []).map(n =>
        `<a class="paper-link" href="#" data-paper="${escapeAttr(n.paper_id)}">${clusterName(n.cluster)}, distance ${Number(n.distance).toFixed(3)}: ${escapeHtml(n.title)}</a>`
      ).join('');
      const discussionSummary = p.discussion_summary ?
        `<div class="section-title">Discussion Summary</div>${renderDiscussionSummary(p.discussion_summary)}` : '';
      const discussionExcerpt = '';
      const discussionStatus = p.discussion_found ?
        `<span class="pill">Discussion detected: ${p.discussion_paragraph_count} paragraphs</span>` :
        `<span class="pill">No explicit Discussion section detected</span>`;
      details.innerHTML = `
        <h2>${escapeHtml(p.title)}</h2>
        <div class="meta">${escapeHtml(p.authors)}<br>${escapeHtml(p.year)} · ${escapeHtml(p.venue)}</div>
        <span class="pill">${clusterName(p.cluster)}</span>
        <span class="pill">${escapeHtml(p.keyword)}</span>
        <span class="pill">Rep rank ${p.representative_rank}</span>
        <span class="pill">Medoid rank ${p.medoid_rank}</span>
        <span class="pill">LDA topic ${p.lda_topic} (${Math.round(p.lda_topic_probability * 100)}%)</span>
        ${discussionStatus}
        <div class="section-title">Cluster Label Candidate</div>
        <div class="abstract">${escapeHtml(p.cluster_label_candidate)}</div>
        <div class="section-title">Cluster Summary Candidate</div>
        <div class="abstract">${escapeHtml(p.cluster_summary_candidate)}</div>
        <div class="section-title">Paper-Oriented Facets</div>
        <div>
          <span class="pill">Context/Domain: ${escapeHtml(p.facet_population_or_context || 'n/a')}</span>
          <span class="pill">Population/Stakeholder: ${escapeHtml(p.facet_stakeholder_or_population || 'n/a')}</span>
          <span class="pill">Method/Lens: ${escapeHtml(p.facet_method_or_lens || 'n/a')}</span>
          <span class="pill">Artifact/System: ${escapeHtml(p.facet_artifact_or_domain || 'n/a')}</span>
          <span class="pill">Contribution Type: ${escapeHtml(p.facet_contribution_or_outcome || 'n/a')}</span>
        </div>
        <details class="lexical-evidence">
          <summary>Show lexical evidence</summary>
          <div class="evidence-block">
            <div class="section-title">Cluster Theme Evidence</div>
            <div class="abstract">${escapeHtml(p.cluster_theme_terms)}</div>
            <div class="section-title">Secondary Topic-Model Evidence</div>
            <div class="abstract">${escapeHtml(p.lda_topic_words)}</div>
          </div>
        </details>
        <div class="section-title">Abstract</div>
        <div class="abstract">${escapeHtml(p.abstract)}</div>
        ${discussionSummary}
        ${discussionExcerpt}
        <div class="section-title">Links</div>
        ${doi}${url}
        <div class="section-title">Nearest Papers by Cosine Distance</div>
        ${nearest || '<div class="meta">No nearest-paper data available.</div>'}
      `;
      details.querySelectorAll('[data-paper]').forEach(a => {
        a.addEventListener('click', evt => {
          evt.preventDefault();
          state.selected = a.getAttribute('data-paper');
          render();
        });
      });
      details.scrollTop = 0;
    }

    function renderDiscussionSummary(value) {
      const items = String(value || '').split('\n').map(line => line.replace(/^[-•]\s*/, '').trim()).filter(Boolean);
      if (!items.length) return '<div class="meta">No discussion summary available.</div>';
      return `<ul class="discussion-list">${items.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`;
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    }
    function escapeAttr(value) { return escapeHtml(value).replace(/`/g, '&#96;'); }

    initControls();
    render();
    window.addEventListener('resize', render);
  </script>
</body>
</html>
