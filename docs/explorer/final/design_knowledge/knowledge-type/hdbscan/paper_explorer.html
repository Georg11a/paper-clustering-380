<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paper Corpus Explorer (tfidf-svd, hdbscan, knowledge-type view)</title>
  <style>
    :root {
      --ink: #253858;
      --muted: #65758b;
      --line: #d8e0ea;
      --bg: #f7f9fc;
      --panel: #ffffff;
      --accent: #2f7dd1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }
    header {
      padding: 18px 24px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }
    h1 { margin: 0; font-size: 22px; letter-spacing: 0; min-width: 0; }
    .controls {
      display: grid;
      grid-template-columns: 180px 210px;
      gap: 10px;
      align-items: center;
    }
    input, select, button {
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 10px;
      background: white;
      color: var(--ink);
      font-size: 14px;
    }
    button { background: var(--accent); color: white; border-color: var(--accent); cursor: pointer; }
    label.toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
    }
    label.toggle input { width: 16px; height: 16px; }
    main {
      display: grid;
      grid-template-columns: minmax(560px, 1fr) minmax(420px, 460px);
      gap: 14px;
      padding: 14px;
      min-height: calc(100vh - 92px);
      align-items: stretch;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .plot-panel { display: grid; grid-template-rows: auto 1fr auto; height: calc(100vh - 120px); min-height: 690px; }
    .status {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
    }
    svg { width: 100%; height: 100%; min-height: 560px; background: #fbfcfe; }
    .axis { stroke: #dfe6ef; stroke-width: 1; }
    .point { stroke: white; stroke-width: 1.5; cursor: pointer; opacity: 0.88; }
    .point.dim { opacity: 0.14; }
    .point.selected { stroke: #111827; stroke-width: 3; opacity: 1; }
    .legend, .cluster-list { padding: 10px 12px; border-top: 1px solid var(--line); }
    .legend { max-height: 180px; overflow-y: auto; }
    .legend-items { display: flex; flex-wrap: wrap; gap: 8px 14px; }
    .legend-item { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    .swatch { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .details { padding: 16px; overflow: auto; height: calc(100vh - 120px); min-height: 690px; align-self: stretch; }
    .details h2 { font-size: 18px; margin: 0 0 8px; line-height: 1.25; }
    .meta { color: var(--muted); font-size: 13px; line-height: 1.45; margin-bottom: 12px; }
    .pill {
      display: inline-flex;
      align-items: center;
      margin: 3px 5px 3px 0;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef4fb;
      color: #31577f;
      font-size: 12px;
    }
    .abstract { line-height: 1.5; font-size: 14px; color: #2f3b52; }
    details.discussion-full,
    details.lexical-evidence {
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      background: #fbfcfe;
    }
    details.discussion-full summary,
    details.lexical-evidence summary {
      cursor: pointer;
      color: #31577f;
      font-weight: 700;
      font-size: 13px;
    }
    details.lexical-evidence { margin-top: 16px; }
    .evidence-block { margin-top: 8px; }
    .discussion-list {
      margin: 6px 0 0;
      padding-left: 18px;
      line-height: 1.45;
      font-size: 14px;
      color: #2f3b52;
    }
    .discussion-list li { margin: 0 0 7px; }
    .section-title { margin: 16px 0 6px; font-weight: 700; font-size: 13px; text-transform: uppercase; color: var(--muted); }
    .paper-link { display: block; color: var(--accent); text-decoration: none; margin: 7px 0; font-size: 13px; line-height: 1.35; }
    .cluster-card { border-top: 1px solid var(--line); padding: 10px 12px; }
    .cluster-card button { height: 28px; padding: 0 8px; margin-top: 6px; font-size: 12px; }
    @media (max-width: 980px) {
      header { display: block; }
      h1 { margin-bottom: 12px; }
      .controls, main { grid-template-columns: 1fr; }
      .plot-panel { min-height: 560px; }
    }
  </style>
</head>
<body>

      <p class="meta">Click a point to inspect metadata, cluster theme, LDA topic words, representative rank, and nearest papers.</p>
      <div id="clusterCards"></div>
    </aside>

res system-generated audit trails, not LLM-generated approximations. Beyond this architectural distinction, GenAI is optimised for...", "discussion_found": true, "discussion_paragraph_count": 8, "year": "2026", "venue": "Journal of Decision Systems", "doi": "10.1080/12460125.2026.2669855", "url": "", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 2.5322697162628174, "umap_y": 1.6809215545654297, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 5, "lda_topic_probability": 0.9729316654431215, "lda_topic_words": "patterns, practices, object, heuristics, understand, ontology, accumulated, structure", "nearest_papers": [{"paper_id": "bdf1addf5a10", "title": "Contestable AI by Design: Towards a Framework", "cluster": -1, "distance": 0.22745020729151555}, {"paper_id": "3dbca777664c", "title": "Design Principles for Boundary Spanning in Transdisciplinary Design Science Research", "cluster": 0, "distance": 0.612865658097288}, {"paper_id": "9d158233f041", "title": "Guidelines supporting the formulation of design principles", "cluster": 0, "distance": 0.723117945573406}, {"paper_id": "c5d4c66275a8", "title": "Towards a Theory Driven Foundational Model for Design: Rethinking Requirement Elicitation for Special Needs", "cluster": -1, "distance": 0.7240926956192787}, {"pa echnical design principles for a multi-stakeholder agriculture extension information system in Ethiopia", "authors": "Atinaf, M. (1); Anteneh, S. (1); Kifle, M. (1)", "abstract": "Though the importance of design knowledge is becoming critical the effort to producing prescriptive knowledge in the information and communication for development domain is limited. Such knowledge addresses the requirements of local development contexts, practices, and priorities and balance the issues of generalizability and specificity through contextualizing the design principles (DPs). This research shows how such contextualized design knowledge can be produced to address the challenges presented by socio-technical contexts in the Ethiopian agriculture extension information service system. The knowledge produced is grounded on insights from kernel/reference theories and complemented with knowledge from empirical observations. The research identified six DPs to address four design requirements: (1) supporting stakeholders' networking; (2) developing information content that meets the needs of the local context; (3) improving accessibility of agricultural extension information to stakeholders; and (4) enhancing adoption and effective use of the information system. The DPs to address the above socio-technical requirements fall into principles to improve: (1) actor-to-actor networking; (2) agriculture extension information system content development; (3) the accessibility of information; (4) device accessibility; (5) accessibility of interfaces; and (6) effective use and adoption of the (AEIS).", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Information Technology for Development", "doi": "10.1080/02681102.2023.2279309", "url": "", "keyword": "Design knowledge", "cluster": 0, "cluster_theme_terms": "dsr, science, patterns, practices, prescriptive, heuristics, nature, interactive", "cluster_label_candida lication_domain_support": "Environment, Resource, Energy: 5/24 papers; Education, Teaching, Research: 4/24 papers"}, {"paper_id": "e8f4a7417bf7", "title": "Toward a Method for Design Science Research Meta-Studies to Improve the Reusability of Design Principles", "authors": "Khosrawi-Rad, B. (1); Grogorick, L. (1); Strohmann, T. (1); Robra-Bissantz, S. (1)", "abstract": "Design science research (DSR) is an established approach to create innovative artifacts while considering relevance and rigor. Design principles (DPs) are the most common knowledge contribution. However, DPs are often not reused in the research and practice community. In this methodology paper, we propose an approach to conduct meta-studies for design knowledge to tackle the issue of low DP reusability. We developed a process model for meta-studies based on DSR-specific terms, evaluated it in an expert workshop with DSR scholars, and demonstrated its application to the example of virtual reality literature. Our meta-study model contributes to the research discussion on the reusability of DPs and is a new approach to gain more transparency about existing DPs in research and practice, enabling the community to better guide future research.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Design Science Research for a Resilient Future: 19th International Conference on Design Science Research in Information Systems and Technology, DESRIST 2024, Proceedings. Lecture Notes in Computer Science (14621)", "doi": "10.1007/978-3-031-61175-9_13", "url": "", "keyword": "Design knowledge", "cluster": 0, "cluster_theme_terms": "dsr, science, patterns, practices, prescriptive, heuristics, nature, interactive", "cluster_label_candidate": "Design Knowledge: Methodological Contribution | Domain: Environment, Resource, Energy; Education, Teaching, Research", "distinguishing_evidence_terms": "Dark Patterns, Solution Space, Design Scien f the different types of digital platform that are distinguished in the taxonomy. This reference ontology, developed using the Unified Foundational Ontology (UFO) and several of its core ontologies, is organized into different ontology modules, allowing to describe functionalities that are common to any digital platform and more specific functionalities that have their origin in the distinctive features that were used to construct the taxonomy. The taxonomy that we contribute helps to clearly define the different types of digital platform that can be observed today. It also helps analysing further evolutions in the platform domain. The contribution of a well-founded digital platform reference ontology is a step towards a better understanding of digital platform functionality, better communication between stakeholders, and eventually may facilitate future research and development of new types of digital platform. All rights reserved Elsevier.", "discussion_summary": "- We postulate, however, that our ontology can accommodate changes well because of its modular structure, which is based on the taxonomic structure.\n- Despite this issue, we believe that the taxonomy and ontology created in this paper can already be important artefacts to grab and communicate the complexity and future direction of the digital platform domain.\n- We wish to emphasise that to keep control over the further development of the ontology, the alignment of taxonomy and ontology is key.", "discussion_excerpt": "[Discussion paragraph 1] One of the main issues in ontology engineering is the knowledge acquisition bottleneck (Starr and Parente De Oliveira, 2013). This bottleneck is observed in the digital platform domain where the meaning of concepts can change very fast. This may create two problems. First, it may be the case that just after the ontology is ready to be deployed, the digital platform conceptualisation has already changed. Second, it...\n\n[Discussion paragraph 2] A Taxonomy and Onto  of this conceptual article is to conceptualise a philosophical framework for fashion design to be considered by fashion designers, researchers and curriculum developers when engaging in praxis. The relevant research questions are then: what are the underlying philosophical principles for fashion design within the current approach to praxis? What are the affordances of such a principle-based philosophical framework for fashion designers in their practice; researchers, scholars and curriculum developers? Within the current design praxis, this article proposes a principle-based philosophical framework including volition (mind-set), design knowledge (epistemology), design process (methodology) and objects (ontology). This framework may well create opportunities for fashion designers to consider these related principles and approach their praxis in alternative ways. Similarly, researchers wanting to strengthen scholarship for fashion design could use each of these different principles as units of analysis to explore and introduce new perspectives and research about the praxis. Alternative volition and new forms of design knowledge have the potential to change designers' choices, reasoning, cognition, and design processes and scholars may well write about this also. Finally, the framework offers the potential for scholars to question and research the ontological nature of objects and the relationship between designer, intentions and artefact function when sustainability and design for social good come into play. Furthermore, the framework for fashion design will also inform curriculum and programme development in fashion design education.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "International Journal of Technology and Design Education", "doi": "10.1007/s10798-022-09794-7", "url": "", "keyword": "Design knowledge", "cluster": 0, "cluster_theme_terms": "dsr, science, patterns, pr  of the acquisition of initial HCI-EDPs, including an introduction; two development cycles; and presentation and assessment for each. Carry forward of the HCI-EDP progress is also identified. The book adopts a discipline approach framework for HCI and an HCI engineering discipline framework for HCI-EDPs. These approaches afford design knowledge that supports 'specify then implement' design practices. Acquisition of the initial EDPs apply current best-practice design knowledge in the form of 'specify, implement, test, and iterate' design practices. This can be used similarly to acquire new HCI-EDPs. Strategies for developing HCI-EDPs are proposed together with conceptions of human-computer systems, required for conceptualisation and operationalisation of their associated design problems and design solutions. This book is primarily for postgraduate students and young researchers wishing to develop further the idea of HCI-EDPs and other more reliable HCI design knowledge. It is structured to support both the understanding and the operationalisation of HCI-EDPs, as required for their acquisition, their long-term potential contribution to HCI design knowledge, and their ultimate application to design practice. ¬© 2022 Morgan and Claypool Publishers. All rights reserved.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2022", "venue": "Synthesis Lectures on Human-Centered Informatics", "doi": "10.2200/s01172ed1v02y202202hci055", "url": "", "keyword": "Design knowledge", "cluster": 0, "cluster_theme_terms": "dsr, science, patterns, practices, prescriptive, heuristics, nature, interactive", "cluster_label_candidate": "Design Knowledge: Methodological Contribution | Domain: Environment, Resource, Energy; Education, Teaching, Research", "distinguishing_evidence_terms": "Dark Patterns, Solution Space, Design Science, Boundary Spanning", "cluster_summary_candidate": "The deterministic first-pass typology d. We further explore research methodologies, validation approaches, semantic principle composition through computational analysis, and a proposed formal approach to articulating principles. In analyzing the methodology for discovering, deriving, formulating, and validating design principles, the goal is to understand and advance the theoretical basis of design, the foundations of new tools and techniques, and the complex systems of the future. Suggestions for the future of design principles research methodology for added rigor and repeatability are proposed.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Journal of Mechanical Design", "doi": "10.1115/1.4034105", "url": "", "keyword": "Design knowledge", "cluster": 0, "cluster_theme_terms": "dsr, science, patterns, practices, prescriptive, heuristics, nature, interactive", "cluster_label_candidate": "Design Knowledge: Methodological Contribution | Domain: Environment, Resource, Energy; Education, Teaching, Research", "distinguishing_evidence_terms": "Dark Patterns, Solution Space, Design Science, Boundary Spanning", "cluster_summary_candidate": "The deterministic first-pass typology codes the primary research contribution as methodological contribution. The decision is supported by 13/24 papers; weighted score 69; matched indicators include explicit methodological output (23). Its application domain coding is Environment, Resource, Energy; Education, Teaching, Research. Representative papers include Guidelines supporting the formulation of design principles; Design Principles for Boundary Spanning in Transdisciplinary Design Science Research.", "design_knowledge_form": "Design Knowledge", "design_knowledge_action": "Methodological Contribution", "design_knowledge_role": "Automatic first-pass coding", "design_knowledge_contribution": "Methodological Contribution", "facet_population_or_context": "Sustainability, Education / Learni tion_type_secondary": "", "contribution_type_patterns": "n/a", "contribution_type_support": "n/a", "application_domains": "n/a", "application_domain_patterns": "n/a", "application_domain_support": "n/a"}, {"paper_id": "c0efa7750b45", "title": "Forms of reasoning in the design science research process", "authors": "Fischer, Christian (1, 2); Gregor, Shirley (2)", "abstract": "Several models for the conduct of design science research (DSR) in information systems (IS) have been suggested. There has, however, been little academic investigation of the basic forms of reasoning underlying these models, namely: deduction, induction and abduction. We argue that a more thorough investigation of these reasoning logics allows for a more comprehensive understanding of the DSR models and the building of information systems design theories (ISDTs). In particular, the question of whether prescriptive design knowledge can be ‚Äòtheory driven' by descriptive kernel theory can be addressed. First, we show that it is important to distinguish between a context of discovery and a context of justification in theory building and to consider the fundamental forms of reasoning in this light. We present an idealized model of the hypothetico-deductive method, showing how progress is achieved in science. This model includes the contexts of discovery and justification and the matching forms of reasoning. Second, we analyze frameworks for IS DSR and ISDT in comparison with this idealized model. This analysis suggests that few frameworks explicitly refer to the underlying forms of reasoning. Illustrative case studies with first-hand accounts of how IS DSR occurs in practice lend support to the conception of the idealized model. We conclude that work on methodological models for IS DSR and ISDT building would be given a firmer base and some differences in opinion resolved if there was explicit reflection on the underlying contexts of both discovery and justification and the forms of reasoning implicated, as in our idealized model. ¬© Springer-Verlag Berlin Heidelberg 2011.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2011", "venue": "Lecture Notes in Computer Science (including subseries Lecture Notes in Artificial Intelligence and Lecture Notes in Bioinformatics)", "doi": "10.1007/978-3-642-20633-7_2", "url": "", "keyword": "Design knowledge", "cluster": 0, "cluster_theme_terms": "dsr, science, patterns, practices, prescriptive, heuristics, nature, interactive", "cluster_label_candidate": "Design Knowledge: Methodological Contribution | Domain: Environment, Resource, Energy; Education, Teaching, Research", "distinguishing_evidence_terms": "Dark Patterns, Solution Space, Design Science, Boundary Spanning", "cluster_summary_candidate": "The deterministic first-pass typology codes the primary research contribution as methodological contribution. The decision is supported by 13/24 papers; weighted score 69; matched indicators include explicit methodological output (23). Its application domain coding is Environment, Resource, Energy; Education, Teaching, Research. Representative papers include Guidelines supporting the formulation of design principles; Design Principles for Boundary Spanning in Transdisciplinary Design Science Research.", "design_knowledge_form": "Design Knowledge", "design_knowledge_action": "Methodological Contribution", "design_knowledge_role": "Automatic first-pass coding", "design_knowledge_contribution": "Methodological Contribution", "facet_population_or_context": "Sustainability, Education / Learning", "facet_stakeholder_or_population": "Designers, Practitioners, Developers", "facet_method_or_lens": "Design Science, Prototype, Ontology, Workshop", "facet_artifact_or_domain": "Tool, Interface, Prototype", "facet_contribution_or_outcome": "Methodological, Theoretical, Artifact/System", "umap_x": 4.204793930053711, "umap_y": 1.4736335277557373, "distance_to_centroi  representation method for product development knowledge management", "authors": "Kyoung-Yun Kim (1); Yun Seon Kim (1)", "abstract": "This paper presents a mathematical comparison of procedural knowledge and causal knowledge, and discusses the potential roles and feasibility of causal knowledge across product development knowledge management. Since reuse of knowledge is so important in product development, various knowledge management approaches have been introduced. Most of the product design knowledge is represented by procedural knowledge, which unfortunately requires cumbersome processes to define, and is typically inadequate for representing the kind of knowledge generated during the product development process. A causal knowledge representation, however, can help us to overcome this limitation and is an alternative formalism for representing product design knowledge. In this paper we compare the procedural and causal knowledge representations. We present the mathematical definitions of two knowledge paradigms, then mathematically describe the relationship between the two. Both knowledge paradigms are then compared based on the perspective of knowledge expression, decision alternative representation, reasoning capability, and knowledge cultivation. This paper concludes that causal knowledge representation is superior to procedural knowledge representation based on the four perspectives. Finally, the knowledge systems are modeled using Systems Modeling Language (SysML), and we present a case study that demonstrates the causal knowledge features using a realistic example from industry. [All rights reserved Elsevier].", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Computer Aided Design", "doi": "10.1016/j.cad.2011.05.005", "url": "", "keyword": "Design knowledge", "cluster": 1, "cluster_theme_terms": "product, management, industrial, cpm, pdd, architecture, tacit, prototyping" tting", "application_domain_support": "Design, Creativity, Architecture: 6/8 papers"}, {"paper_id": "7b15d81000db", "title": "The anatomy of a design theory", "authors": "Gregor, Shirley (1); Jones, David (2)", "abstract": "Design work and design knowledge in Information Systems (IS) is important for both research and practice. Yet there has been comparatively little critical attention paid to the problem of specifying design theory so that it can be communicated, justified, and developed cumulatively. In this essay we focus on the structural components or anatomy of design theories in IS as a special class of theory. In doing so, we aim to extend the work of Walls, Widemeyer and El Sawy (1992) on the specification of information systems design theories (ISDT), drawing on other streams of thought on design research and theory to provide a basis for a more systematic and useable formulation of these theories. We identify eight separate components of design theories: (1) purpose and scope, (2) constructs, (3) principles of form and function, (4) artifact mutability, (5) testable propositions, (6) justificatory knowledge (kernel theories), (7) principles of implementation, and (8) an expository instantiation. This specification includes components missing in the Walls et al. adaptation of Dubin (1978) and Simon (1969) and also addresses explicitly problems associated with the role of instantiations and the specification of design theories for methodologies and interventions as well as for products and applications. The essay is significant as the unambiguous establishment of design knowledge as theory gives a sounder base for arguments for the rigor and legitimacy of IS as an applied discipline and for its continuing progress. A craft can proceed with the copying of one example of a design artifact by one artisan after another. A discipline cannot. Copyright ¬© 2007, by the Association for Information Systems.", "discussion_summary": "", "discussion_excerpt": "", "disc abstract": "The study of specific design knowledge (SDK) is part of design science, and contains the knowledge of the specialist's domain or branch, and particularly the knowhow of realizing a technical system. SDK has a prescriptive character, and at present does not possess a fully developed and advantageous form and completeness. In particular, part of SDK consists of `personal, often unconscious knowledge' of design experts. The right content and form for presenting SDK is decisive for the quality of the designed product, the technical system (TS), and for the efficiency and effectiveness of the design process. Beyond that consideration, computer-based expert systems depend fully on the kind of knowledge available in SDK, and its form of presentation. The aspects to be discussed include the character, types, forms, and ways of obtaining the available SDK.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Journal of Engineering Design", "doi": "10.1080/09544829008901646", "url": "", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 3.703207492828369, "umap_y": 4.332528114318848, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 1, "lda_topic_probability": 0.960085517499194, esigner. These phenomena include: the designer's seeing-moving-seeing, the construction of figures from marks on a page, the appreciation of design qualities, the evolution of design intentions in the course of the design process, the recognition of unintended consequences of move experiments, the storage and deployment of prototypes, which must be placed in transaction with the design situation, and communication across divergent design worlds.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Knowledge-Based Systems", "doi": "10.1016/0950-7051(92)90020-G", "url": "", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 2.914849281311035, "umap_y": 3.348693609237671, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 2, "lda_topic_probability": 0.9302490714693448, "lda_topic_words": "domain, dsr, patterns, teachers, important, form, educational, rationale", "nearest_papers": [{"paper_id": "82f49b5a1905", "title": "SOLUTION REPERTOIRE", "cluster": 0, "distance": 0.6436802275966551}, {"paper_id": "0b7e6111aa14", "title": "Synthesizing a Solution Space for Prescriptive Design Knowledge Codification", "cluster": 0, "distance": 0.7821712794888881}, {"paper_id": "94bc88b88ae6", "title": ribution_type_support": "n/a", "application_domains": "n/a", "application_domain_patterns": "n/a", "application_domain_support": "n/a"}, {"paper_id": "37f353dbe230", "title": "Managing design knowledge", "authors": "Neelamkavil, J. (1)", "abstract": "The great ancient philosopher Confucius once said: 'real knowledge is to know the extent of one's ignorance'. Industries are recognizing the strategic value of knowledge and the careful management and distribution of their intellectual assets across the company to create value and to gain/sustain competitive advantage. In any organization, the data, information and experience that make-up the knowledge repository is really corporate assets. So what is knowledge? The first part of this paper differentiates between the terms such as 'data', 'information' and 'knowledge'. It will also differentiate between 'explicit' vs. 'tacit' knowledge, and how to derive explicit knowledge from its tacit form. The second part of the paper addresses the important issue of design knowledge management. Study has indicated that design engineers spend, on average, about one quarter of their time searching for information. Managing design knowledge, how such knowledge can be identified, captured, represented and stored for future use are vital issues, as three-quarters of all engineering designs are variations of existing designs. The paper also outlines the architecture of the design knowledge management system that is being developed at IMTI.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Proceedings of the IASTED International Conference Intelligent Systems and Control", "doi": "", "url": "", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. The oid_rank": -1, "lda_topic": 5, "lda_topic_probability": 0.9785990504356259, "lda_topic_words": "patterns, practices, object, heuristics, understand, ontology, accumulated, structure", "nearest_papers": [{"paper_id": "18d57211cb40", "title": "Object oriented design knowledge: ontology and measurement of impact", "cluster": -1, "distance": 0.04171732635485059}, {"paper_id": "495817cc9c25", "title": "Object-oriented design knowledge: Principles, heuristics and best practices", "cluster": 0, "distance": 0.5459554841735615}, {"paper_id": "6d926f3c4a97", "title": "A domain reference ontology for design science research knowledge bases", "cluster": -1, "distance": 0.7682193442477513}, {"paper_id": "4b599d3e2eb0", "title": "Immodest Proposals: Research Through Design and Knowledge", "cluster": -1, "distance": 0.835574581443293}, {"paper_id": "82f49b5a1905", "title": "SOLUTION REPERTOIRE", "cluster": 0, "distance": 0.8500467483940213}], "theory_move_key": "n/a", "theory_move": "n/a", "theory_move_patterns": "n/a", "theory_move_support": "n/a", "contribution_type_key": "n/a", "contribution_type": "n/a", "contribution_type_secondary": "", "contribution_type_patterns": "n/a", "contribution_type_support": "n/a", "application_domains": "n/a", "application_domain_patterns": "n/a", "application_domain_support": "n/a"}, {"paper_id": "a1ccc16dab98", "title": "ANALYSIS OF DESIGN COMPETENCE OF FUTURE ENGINEER-TEACHERS", "authors": "N. Korolova; Y. Bilotserkivska; –û. Y. Mukhin", "abstract": "Purpose. To analyze current scientific research on the problem of design competence of future engineer-teachers, and to conduct a terminological analysis of related and fundamental concepts, such as ¬´competence,¬ª ¬´design activity,¬ª ¬´design competence,¬ª and ¬´design competence of engineer-teachers.¬ª\n\nMethods. Methods of theoretical and methodological analysis of literature on the research topic, regulatory and legislative documents were applied, along with analysis, synthesis, generalization, and systematization to clarify the meanings of the studied concepts and formulate conclusions.\n\nResults. In modern conditions, ensuring a workforce that meets the real conditions and needs of the labor market and the demands for the quality of the country‚Äôs production potential is of paramount importance in Ukraine. A strategic role in solving this task is played by the system of vocational and technical education, which is closely linked to production and aims to train highly qualified specialists. This, in turn, requires teaching staff with a high level of current professional knowledge, skills, and competencies in both the psychological-pedagogical sphere and the field of production.Theoretical research allowed for the identification of related and fundamental concepts of the study. Based on an analysis of scientific works, the concept of competence was clarified as an integrative, dynamic quality of a person, characterizing their ability and readiness for successful activity in a specific field (including professional activity). Researchers view it from various perspectives, but its essential components are knowledge, skills, experience, values, and attitudes toward activity in a specific professional domain. It was found that in modern scientific literature, design activity is interpreted as an integrative process combining theoretical knowledge and practical actions of an educator aimed at developing and implementing educational projects to enhance the quality of education and develop professional competencies. It was determined that the specificity of training engineer-teachers in any field lies in the fact that their design activity is considered both in the psychological-pedagogical and professional training domains. Design competence should encompass both psychological-pedagogical and professional engineering-technical components of the training of future engineer-teachers in accordance with regulatory documentation: programs, plans, and innovative projects for the development of subject areas of the future specialist‚Äôs activity. In general, design competence is interpreted as an integrative quality of an educator that combines knowledge, skills, and personal qualities necessary for effective design and implementation of the educational process. The study also examined the specifics of the design competence of engineer-teachers as an integrative personal characteristic that accumulates interdisciplinary knowledge and skills enabling them to develop collaborative research activities with students, provide scientific guidance, and assist in the implementation of research projects. The analysis of scientific works on the issue of design competence of engineer-teachers revealed that there is currently no single interpretation of this concept. The essence of the term ¬´design competence of an engineer-teacher¬ª was clarified as the integrated result of the educational training of future engineer-teachers. It reflects the formation of relevant knowledge, skills, and professionally important qualities, representing the ability to engage in design activities in the fields of pedagogy and production through the development of pedagogical and production projects. The analysis of psychological-pedagogical literature also identified the structure of design competence, which includes the following components: motivational-value, cognitive, activity-based, and reflexive-evaluative.\n\nConclusion. Based on an analysis of scientific and pedagogical literature, the essence of the concept of ¬´design competence of an engineer-teacher¬ª was clarified as an integrative, dynamic personal characteristic. It reflects a combination of design knowledge and skills, experience in design activities, orientation toward motivational-value attitudes, and reflexive-evaluative actions, enabling the development and evaluation of projects in the dual professional domains of pedagogy and technological expertise.", "discussion_summary": "", "di sign methods and solution approaches are applicable to the design of public health information systems. Among the numerous methodological frameworks used in other disciplines, we identify scenario-based design and participatory design as two widely-employed methodologies that are appropriate for adoption as PHI standards. We make the case that these methods show promise to create reusable design knowledge in PHI.SummaryWe propose the formalization of a set of standard design methods within PHI that can be used to pursue a strategy of design knowledge creation and reuse for cost-effective, interoperable public health information systems. We suggest that all public health informaticians should be able to use these design methods and the methods should be incorporated into PHI training.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2011", "venue": "BMC Public Health", "doi": "", "url": "https://www.semanticscholar.org/paper/9c8b1c67ac970533f6aee74d608749c545113cdd", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 3.523545503616333, "umap_y": 5.025991916656494, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 2, "lda_topic_probability": 0.9729323526226967, "lda_topic_words": "domain, dsr rch cases. Through the analysis, we define four typical practice based design research models from the viewpoint of knowledge integration. This method and the proposed model can provide a theoretical basis and a path for better management design research projects.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2019", "venue": "", "doi": "", "url": "https://www.semanticscholar.org/paper/9f26e050d534e82159a5fa1af1f865603733aa49", "keyword": "Design knowledge", "cluster": -1, "cluster_theme_terms": "noise / outliers", "cluster_label_candidate": "Unclustered papers", "distinguishing_evidence_terms": "", "cluster_summary_candidate": "HDBSCAN did not assign these papers to a dense cluster. They are retained for inspection but should not be interpreted as a thematic cluster.", "design_knowledge_form": "n/a", "design_knowledge_action": "n/a", "design_knowledge_role": "", "design_knowledge_contribution": "Not interpreted as a cluster theme.", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "", "umap_x": 4.357419013977051, "umap_y": 4.042678356170654, "distance_to_centroid": null, "representative_rank": -1, "is_representative_top3": true, "medoid_rank": -1, "lda_topic": 0, "lda_topic_probability": 0.9665988045019778, "lda_topic_words": "product, field, industrial, transformation, analysis, practice, creation, ai", "nearest_papers": [{"paper_id": "94bc88b88ae6", "title": "Design knowledge in the artistic‚Äìaesthetic development and transformation of the world", "cluster": -1, "distance": 0.7388028654221341}, {"paper_id": "2042efa7e455", "title": "The DSR grid: six core dimensions for effectively planning and communicating design science research projects", "cluster": 0, "distance": 0.7627955389090855}, {"paper_id": "a707fd62833a", "title": "Tracing the tensions surrounding understandings of agency and knowledge in technology design", "cluster": 0, "distance": 0.7661131433082267}, {"paper_id": "9eda131748eb", "title": "Engineering Design Principles for HCI as a Way Forward for HCI Design Knowledge", "cluster": -1, "distance": 0.777278778077545}, {"paper_id": "c90163fa7f57", "title": "A new model to express and capture the design rationale in the documents", "cluster": -1, "distance": 0.8080144814368531}], "theory_move_key": "n/a", "theory_move": "n/a", "theory_move_patterns": "n/a", "theory_move_support": "n/a", "contribution_type_key": "n/a", "contribution_type": "n/a", "contribution_type_secondary": "", "contribution_type_patterns": "n/a", "contribution_type_support": "n/a", "application_domains": "n/a", "application_domain_patterns": "n/a", "application_domain_support": "n/a"}, {"paper_id": "c5d4c66275a8", "title": "Towards a Theory Driven Foundational Model for Design: Rethinking Requirement Elicitation for Special Needs", "authors": "K. Venkatesh; Shakuntala Acharya; J. Allen; F. Mistree", "abstract": "Designing assistive devices involves complex interactions between design knowledge structures, requirement elicitation methods, and stakeholder engagement. Current co-design approaches, while effective, rely heavily on implicit knowledge transfer, particularly when designing for users unable to articulate their needs. In this paper we present the theoretical underpinnings of requirement elicitation as a design knowledge transformation process. It requires a comprehensive understanding of the special needs of the users, critical domain knowledge, interdisciplinary expertise and engagement with multiple stakeholders, presently well supported by co-design approaches. However, engaging with certain user groups, such as, children with special needs is particularly harrowing as they are unable to articulate their needs or offer consistent feedback. This often renders their needs missed, ill understood or inaccurately captured. Additionally, designers struggle to gather clinical requirements and mitigate the demands and aspirations of other stakeholders beyond the beneficiaries, and above all, prioritizing the requirements to systematically undertake design. These findings are corroborated between literature and primary research, emphasizing the need for a knowledge support in requirement elicitation. Therefore, an existing support, the Master List of Requirements (MLoR) is further investigated in this paper and validation is sought, with respect to two key hypotheses; H1: The knowledge content of the MLoR, (i.e., Requirement and its corresponding ontological tagging) is ‚Äòpractically sound‚Äô; and H2: A Master List of Requirement is an appropriate (type of) knowledge support for designing for Children with special needs (DfC*). An empirical validation study is undertaken with design and clinical experts, with respect to the Validation Square, and the results indicate several disagreements on the practical soundness and interpretation of the requirements and their priority in the MLoR. The experts confirm that requirements tend to be context-specific, and hence, the proposition of a generic, standardized MLoR poses difficulties in adapting to apply to various use-cases, however, they commend the ontology. The underlying phenomena leading to this ambiguity in interpretation of an explicit knowledge, such as a requirement, is due to the tacit nature of contextual knowledge. Thus, a concept of a Foundational Model for DfC* is proposed, leveraging an extended ontology on knowledge typology to offer a structured and explicit manner to capture implicit needs, and is intended to support both customized one-off solutions and generalizable frameworks by facilitating access to context-sensitive knowledge which is reflective of the complexities of the real world.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2025", "venue": "Digital Enterprise Co al platforms", "authors": "Thomas Derave; F. Gailly; T. P. Sales; G. Poels", "abstract": "In academic literature and in business communication digital platforms are categorized into different types including, but not limited to, multi-sided platform, digital marketplace, on-demand platform and sharing economy platform. Observing the substantial literature on these platform types, both in academia and professional contexts, there is lack of consensus on the definition of these digital platform types. On top of that, there is a lack of knowledge in the literature on the requirements and design of these digital platform types. We address the observed lack of shared conceptualizations by creating a taxonomy for digital platforms, by classifying digital platforms according to their distinctive features. Further, we address the lack of design knowledge with a digital platform reference ontology that describes the construction and operation of the different types of digital platform that are distinguished in the taxonomy. This reference ontology, developed using the Unified Foundational Ontology (UFO) and several of its core ontologies, is organized into different ontology modules, allowing to describe functionalities that are common to any digital platform and more specific functionalities that have their origin in the distinctive features that were used to construct the taxonomy. The taxonomy that we contribute helps to clearly define the different types of digital platform that can be observed today. It also helps analysing further evolutions in the platform domain. The contribution of a well-founded digital platform reference ontology is a step towards a better understanding of digital platform functionality, better communication be-tween stakeholders, and eventually may facilitate future research and development of", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2023", "venue": "Information Sys ld problems (vom Brocke et al. 2019). As such, DSR is considered particularly promising regarding its ability to contribute to practice through such means as digital innovation (Rai 2017) and to address our society‚Äôs (grand) challenges (Becker et al. 2015), such as that of ensuring environmental sustainability (Loos et al. 2011; Pernici et al. 2012; vom Brocke and Seidel 2012). Each DSR project is a complex matter with many aspects that must be considered. DSR is an iterative process, starting with the identification of a problem in the problem space and evaluating alternative solutions in the solution space. Through multiple iterations, a DSRproject seeks to contributemeans-end relationships between problem and solution spaces (Venable 2006). All DSR activities must be aligned to such intended contributions so modifications in such positioning lead to subsequent changes in how to scope and plan a DSR project. Multiple stakeholders are often involved in conducting DSR project, which makes it important to coordinate and communicate DSR research (vomBrocke and Lippe 2010). Stakeholders of DSR projects include researchers, industry partners, and editors. These roles should be considered in any DSR project e.g. in terms of their focus (e.g., domain expert or method expert) and seniority (e.g., Ph.D. student, Ph.D. supervisor). Such multi-stakeholder collaboration makes it important to communicate the manifold considerations of a DSR project in an efficient way. Based on our own experience as editors of DSR special issues, conferences and tracks, directors of many DSR projects and research programs, and mentors of Ph.D. students on DSR projects, we see great value in high-level representations of a DSR project that make it possible to capture on one page the project‚Äôs key aspects. Therefore, this article identifies six core dimensions of a DSR project that can lay the foundation for a high-level, one-page framework that describesDSRprojects. Similar approaches have been presented in other areas of research, including conceptual modeling (Frank et al. 2014) and reference modeling (vom Brocke 2007), where frameworks (specifically, process frameworks) provide a high-level conceptualization of various parts of more complex models (vom Brocke and Buddendick 2006; Legner et al. 2019), and business modeling, where the business model canvas (BMC) in particular provides a high-level conceptualization of the information needed to plan and communicate business models (Osterwalder and Pigneur 2010). Recently, we have seen an increase in contributions that have suggested canvas models, also referred to as visual inquiry tools, for many areas, and that have suggested principles for canvas design in general terms (Avdiji et al. 2019). In the DSR literature, too, This article is part of the Topical Collection on Science Research in the Networked Economy", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2019", "venue": "Electronic Markets", "doi": "", "url": "https://www.semanticscholar.org/paper/b4891a8c14bc74a60e95cce3915a3efae59ff889", "keyword": "Design knowledge", "cluster": 0, "cluster_theme_terms": "dsr, science, patterns, practices, prescriptive, heuristics, nature, interactive", "cluster_label_candidate": "Design Knowledge: Methodological Contribution | Domain: Environment, Resource, Energy; Education, Teaching, Research", "distinguishing_evidence_terms": "Dark Patterns, Solution Space, Design Science, Boundary Spanning", "cluster_summary_candidate": "The deterministic first-pass typology codes the primary research contribution as methodological contribution. The decision is supported by 13/24 papers; weighted score 69; matched indicators include explicit methodological output (23). Its application domain coding is Environment, Resource, Energy; Education, Teaching, Research. Representative papers include Guidelines supporting the formulation of design principles;   <script>
    const data = JSON.parse(document.getElementById('payload').textContent);
    const papers = data.papers;
    const palette = ['#f05a71','#4c78a8','#f58518','#54a24b','#b279a2','#72b7b2','#eeca3b','#ff9da6','#9d755d','#59a14f','#edc948','#76b7b2'];
    const colorFor = c => palette[Math.abs(Number(c)) % palette.length];
    const clusterName = c => Number(c) === -1 ? 'Unclustered papers' : `Cluster ${c}`;
    const clusterLegendLabel = c => {
      const label = String(c.label || c.theme || '').trim();
      if (!label) return clusterName(c.cluster);
      return /^Cluster\s+-?\d+:/i.test(label) ? label : `${clusterName(c.cluster)}: ${label}`;
    };
    const state = { selected: papers[0]?.paper_id || null };
    const svg = document.getElementById('plot');
    const details = document.getElementById('details');
    const status = document.getElementById('status');

    function initControls() {
      const clusterFilter = document.getElementById('clusterFilter');
      data.clusters.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.cluster;
        opt.textContent = `${clusterName(c.cluster)} (${c.count})`;
        clusterFilter.appendChild(opt);
      });
      ['clusterFilter'].forEach(id => {
        document.getElementById(id).addEventListener('input', render);
        document.getElementById(id).addEventListener('change', render);
      });
      renderLegend();
    }

    function filteredPapers() {
      const cluster = document.getElementById('clusterFilter').value;
      return papers.filter(p => {
        return (cluster === 'all' || String(p.cluster) === cluster);
      });
    }

    function renderLegend() {
      const legend = document.getElementById('legend');
      legend.innerHTML = '';
      data.clusters.forEach(c => {
        const item = document.createElement('span');
        item.className = 'legend-item';
        item.innerHTML = `<span class="swatch" style="background:${colorFor(c.cluster)}"></span> ${escapeHtml(clusterLegendLabel(c))}`;
        legend.appendChild(item);
      });
      const shapeNote = document.createElement('span');
      shapeNote.className = 'legend-item';
      shapeNote.innerHTML = '<span>◆ Discussion detected</span><span>● No explicit discussion</span>';
      legend.appendChild(shapeNote);
    }

    function render() {
      const shown = filteredPapers();
      status.textContent = `${shown.length} of ${papers.length} papers shown; ${data.clusters.length} clusters in this view. Axes are UMAP 1 and UMAP 2 coordinates, not interpretable variables.`;
      drawPlot(shown);
      renderDetails(papers.find(p => p.paper_id === state.selected) || shown[0] || papers[0]);
    }

    function drawPlot(shown) {
      const width = svg.clientWidth || 900;
      const height = svg.clientHeight || 560;
      const pad = 44;
      const xs = papers.map(p => p.umap_x), ys = papers.map(p => p.umap_y);
      let minX = Math.min(...xs), maxX = Math.max(...xs), minY = Math.min(...ys), maxY = Math.max(...ys);
      const xRange = Math.max(0.0001, maxX - minX);
      const yRange = Math.max(0.0001, maxY - minY);
      minX -= xRange * 0.08;
      maxX += xRange * 0.08;
      minY -= yRange * 0.08;
      maxY += yRange * 0.08;
      const sx = x => pad + ((x - minX) / Math.max(0.0001, maxX - minX)) * (width - pad * 2);
      const sy = y => height - pad - ((y - minY) / Math.max(0.0001, maxY - minY)) * (height - pad * 2);
      const shownIds = new Set(shown.map(p => p.paper_id));
      svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
      svg.innerHTML = '';
      for (let i = 0; i < 6; i++) {
        const x = pad + i * (width - pad * 2) / 5;
        const y = pad + i * (height - pad * 2) / 5;
        svg.insertAdjacentHTML('beforeend', `<line class="axis" x1="${x}" y1="${pad}" x2="${x}" y2="${height-pad}"></line>`);
        svg.insertAdjacentHTML('beforeend', `<line class="axis" x1="${pad}" y1="${y}" x2="${width-pad}" y2="${y}"></line>`);
      }
      svg.insertAdjacentHTML('beforeend', `<text x="${width / 2}" y="${height - 8}" text-anchor="middle" fill="#65758b" font-size="12">UMAP 1</text>`);
      svg.insertAdjacentHTML('beforeend', `<text x="16" y="${height / 2}" text-anchor="middle" fill="#65758b" font-size="12" transform="rotate(-90 16 ${height / 2})">UMAP 2</text>`);
      papers.forEach(p => {
        const visible = shownIds.has(p.paper_id);
        const selected = p.paper_id === state.selected;
        const x = sx(p.umap_x), y = sy(p.umap_y);
        const size = selected ? 7.5 : 6.5;
        const cls = `point ${visible ? '' : 'dim'} ${selected ? 'selected' : ''}`;
        const fill = colorFor(p.cluster);
        const node = document.createElementNS('http://www.w3.org/2000/svg', p.discussion_found ? 'path' : 'circle');
        node.setAttribute('class', cls);
        node.setAttribute('fill', fill);
        if (p.discussion_found) {
          const d = `M ${x} ${y - size} L ${x + size} ${y} L ${x} ${y + size} L ${x - size} ${y} Z`;
          node.setAttribute('d', d);
        } else {
          node.setAttribute('cx', x);
          node.setAttribute('cy', y);
          node.setAttribute('r', size);
        }
        node.addEventListener('click', () => {
          state.selected = p.paper_id;
          render();
        });
        node.appendChild(document.createElementNS('http://www.w3.org/2000/svg', 'title')).textContent = p.title;
        svg.appendChild(node);
      });
    }

    function renderDetails(p) {
      if (!p) return;
      const doi = p.doi ? `<a class="paper-link" href="https://doi.org/${escapeHtml(p.doi)}" target="_blank">DOI: ${escapeHtml(p.doi)}</a>` : '';
      const url = p.url ? `<a class="paper-link" href="${escapeAttr(p.url)}" target="_blank">Open paper URL</a>` : '';
      const nearest = (p.nearest_papers || []).map(n =>
        `<a class="paper-link" href="#" data-paper="${escapeAttr(n.paper_id)}">${clusterName(n.cluster)}, distance ${Number(n.distance).toFixed(3)}: ${escapeHtml(n.title)}</a>`
      ).join('');
      const discussionSummary = p.discussion_summary ?
        `<div class="section-title">Discussion Summary</div>${renderDiscussionSummary(p.discussion_summary)}` : '';
      const discussionExcerpt = '';
      const discussionStatus = p.discussion_found ?
        `<span class="pill">Discussion detected: ${p.discussion_paragraph_count} paragraphs</span>` :
        `<span class="pill">No explicit Discussion section detected</span>`;
      details.innerHTML = `
        <h2>${escapeHtml(p.title)}</h2>
        <div class="meta">${escapeHtml(p.authors)}<br>${escapeHtml(p.year)} · ${escapeHtml(p.venue)}</div>
        <span class="pill">${clusterName(p.cluster)}</span>
        <span class="pill">${escapeHtml(p.keyword)}</span>
        <span class="pill">Rep rank ${p.representative_rank}</span>
        <span class="pill">Medoid rank ${p.medoid_rank}</span>
        <span class="pill">LDA topic ${p.lda_topic} (${Math.round(p.lda_topic_probability * 100)}%)</span>
        ${discussionStatus}
        <div class="section-title">Cluster Descriptor</div>
        <div class="abstract">${escapeHtml(p.cluster_label_candidate)}</div>
        <div class="section-title">Distinguishing Evidence</div>
        <div class="abstract">${escapeHtml(p.distinguishing_evidence_terms || p.cluster_theme_terms || 'n/a')}</div>
        <div class="section-title">Cluster Summary Candidate</div>
        <div class="abstract">${escapeHtml(p.cluster_summary_candidate)}</div>
        <div class="section-title">Research Contribution &amp; Domain</div>
        <div>
          <span class="pill">Form: ${escapeHtml(p.design_knowledge_form || 'n/a')}</span>
          <span class="pill">Primary: ${escapeHtml(p.contribution_type || 'n/a')}</span>
          ${p.contribution_type_secondary ? `<span class="pill">Secondary: ${escapeHtml(p.contribution_type_secondary)}</span>` : ''}
          <span class="pill">Domain: ${escapeHtml(p.application_domains || 'n/a')}</span>
        </div>
        <div class="meta">Contribution support: ${escapeHtml(p.contribution_type_support || 'n/a')}</div>
        <div class="meta">Contribution patterns: ${escapeHtml(p.contribution_type_patterns || 'n/a')}</div>
        <div class="meta">Domain support: ${escapeHtml(p.application_domain_support || 'n/a')}</div>
        ${p.theory_move_key !== 'not_applicable' && p.theory_move_key !== 'n/a' ? `
        <div class="section-title">Path 1 Theory Move</div>
        <div>
          <span class="pill">Theory move: ${escapeHtml(p.theory_move || 'n/a')}</span>
          <span class="pill">Support: ${escapeHtml(p.theory_move_support || 'n/a')}</span>
        </div>
        <div class="meta">Matched patterns: ${escapeHtml(p.theory_move_patterns || 'n/a')}</div>` : ''}
        <div class="section-title">Paper-Oriented Facets</div>
        <div>
          <span class="pill">Context/Domain: ${escapeHtml(p.facet_population_or_context || 'n/a')}</span>
          <span class="pill">Population/Stakeholder: ${escapeHtml(p.facet_stakeholder_or_population || 'n/a')}</span>
          <span class="pill">Method/Lens: ${escapeHtml(p.facet_method_or_lens || 'n/a')}</span>
          <span class="pill">Artifact/System: ${escapeHtml(p.facet_artifact_or_domain || 'n/a')}</span>
          <span class="pill">Contribution Type: ${escapeHtml(p.facet_contribution_or_outcome || 'n/a')}</span>
        </div>
        <details class="lexical-evidence">
          <summary>Show lexical evidence</summary>
          <div class="evidence-block">
            <div class="section-title">Cluster Theme Evidence</div>
            <div class="abstract">${escapeHtml(p.cluster_theme_terms)}</div>
            <div class="section-title">Secondary Topic-Model Evidence</div>
            <div class="abstract">${escapeHtml(p.lda_topic_words)}</div>
          </div>
        </details>
        <div class="section-title">Abstract</div>
        <div class="abstract">${escapeHtml(p.abstract)}</div>
        ${discussionSummary}
        ${discussionExcerpt}
        <div class="section-title">Links</div>
        ${doi}${url}
        <div class="section-title">Nearest Papers by Cosine Distance</div>
        ${nearest || '<div class="meta">No nearest-paper data available.</div>'}
      `;
      details.querySelectorAll('[data-paper]').forEach(a => {
        a.addEventListener('click', evt => {
          evt.preventDefault();
          state.selected = a.getAttribute('data-paper');
          render();
        });
      });
      details.scrollTop = 0;
    }

    function renderDiscussionSummary(value) {
      const items = String(value || '').split('\n').map(line => line.replace(/^[-•]\s*/, '').trim()).filter(Boolean);
      if (!items.length) return '<div class="meta">No discussion summary available.</div>';
      return `<ul class="discussion-list">${items.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`;
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    }
    function escapeAttr(value) { return escapeHtml(value).replace(/`/g, '&#96;'); }

    initControls();
    render();
    window.addEventListener('resize', render);
  </script>
</body>
</html>
