<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <title>Paper Corpus Explorer (tfidf-svd, kmeans, overall view)</title>
  <style>
    :root {
      --ink: #253858;
      --muted: #65758b;
      --line: #d8e0ea;
      --bg: #f7f9fc;
      --panel: #ffffff;
      --accent: #2f7dd1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }
    header {
      padding: 18px 24px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }
    h1 { margin: 0; font-size: 22px; letter-spacing: 0; min-width: 0; }
    .controls {
      display: grid;
      grid-template-columns: 180px 210px;
      gap: 10px;
      align-items: center;
    }
    input, select, button {
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 10px;
      background: white;
      color: var(--ink);
      font-size: 14px;
    }
    button { background: var(--accent); color: white; border-color: var(--accent); cursor: pointer; }
    label.toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
    }
    label.toggle input { width: 16px; height: 16px; }
    main {
      display: grid;
      grid-template-columns: minmax(560px, 1fr) minmax(420px, 460px);
      gap: 14px;
      padding: 14px;
      min-height: calc(100vh - 92px);
      align-items: stretch;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .plot-panel { display: grid; grid-template-rows: auto 1fr auto; height: calc(100vh - 120px); min-height: 690px; }
    .status {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
    }
    svg { width: 100%; height: 100%; min-height: 560px; background: #fbfcfe; }
    .axis { stroke: #dfe6ef; stroke-width: 1; }
    .point { stroke: white; stroke-width: 1.5; cursor: pointer; opacity: 0.88; }
    .point.dim { opacity: 0.14; }
    .point.selected { stroke: #111827; stroke-width: 3; opacity: 1; }
    .legend, .cluster-list { padding: 10px 12px; border-top: 1px solid var(--line); }
    .legend { max-height: 118px; overflow-y: auto; }
    .legend-items { display: flex; flex-wrap: wrap; gap: 8px 14px; }
    .legend-item { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    .swatch { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .details { padding: 16px; overflow: auto; height: calc(100vh - 120px); min-height: 690px; align-self: stretch; }
    .details h2 { font-size: 18px; margin: 0 0 8px; line-height: 1.25; }
    .meta { color: var(--muted); font-size: 13px; line-height: 1.45; margin-bottom: 12px; }
    .pill {
      display: inline-flex;
      align-items: center;
      margin: 3px 5px 3px 0;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef4fb;
      color: #31577f;
      font-size: 12px;
    }
    .abstract { line-height: 1.5; font-size: 14px; color: #2f3b52; }
    details.discussion-full,
    details.lexical-evidence {
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      background: #fbfcfe;
    }
    details.discussion-full summary,
    details.lexical-evidence summary {
      cursor: pointer;
      color: #31577f;
      font-weight: 700;
      font-size: 13px;
    }
    details.lexical-evidence { margin-top: 16px; }
    .evidence-block { margin-top: 8px; }
    .discussion-list {
      margin: 6px 0 0;
      padding-left: 18px;
      line-height: 1.45;
      font-size: 14px;
      color: #2f3b52;
    }
    .discussion-list li { margin: 0 0 7px; }
    .section-title { margin: 16px 0 6px; font-weight: 700; font-size: 13px; text-transform: uppercase; color: var(--muted); }
    .paper-link { display: block; color: var(--accent); text-decoration: none; margin: 7px 0; font-size: 13px; line-height: 1.35; }
    .cluster-card { border-top: 1px solid var(--line); padding: 10px 12px; }
    .cluster-card button { height: 28px; padding: 0 8px; margin-top: 6px; font-size: 12px; }
    @media (max-width: 980px) {
      header { display: block; }
      h1 { margin-bottom: 12px; }
      .controls, main { grid-template-columns: 1fr; }
      .plot-panel { min-height: 560px; }
    }
  </style>

esign theory. I. Compactification of concept space", "authors": "Tomiyama, T.; Yoshikawa, H.", "abstract": "Some theorems are deduced from a hypothesis that states compactification of the entity concept space by topology of physical laws, and this space is called real knowledge. Design solutions are obtained as cluster points, and it is possible to get a partial sequence that converges to one of the cluster points. In order to discuss convergence policies in real knowledge, metamodel concept space is defined as a subset of the attribute concept space. If the design specifications are written in terms of physical laws, it is possible to solve the design by detailing the metamodel which is defined as the finite coverings for the design specifications. This study is necessary to establish the concept of future intelligent and integrated CAD systems.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Journal of the Japan Society of Precision Engineering", "doi": "", "url": "", "keyword": "Design theory", "cluster": 1, "cluster_theme_terms": "chronic, vsd, proof, patients, values, diseases, pedagogical, product", "cluster_label_candidate": "Synthesizes Design Theory into Shared Design Constructs", "cluster_summary_candidate": "This cluster synthesizes prior work on design theory, emphasizing how a design-knowledge construct is made explicit, organized, or put to work rather than only where it is applied. Related forms include Design Knowledge, Design Frameworks. The shared move also involves definition and conceptualization and evidence-based evaluation. Its contribution pattern is coded as Theoretical, Methodological, Artifact/System. Application and method terms are treated as supporting facets, especially methods or lenses such as Design Science and contexts such as Education / Learning. Representative papers include PEDAGOGICAL DESIGN: CONCEPT, PRINCIPLES, MODELS; Towards a design th elevant criterion variables as performance, motivation, satisfaction, absenteeism, and so forth. At present, the study of task design lacks a clear and demonstrable focus. The reasons relate to controversies and contradictions surrounding the dominant models and theories in the area. In an effort to reestablish focus and direction, the author proposes an integrated theory of task design which is viewed as a natural extension of existing models. After a brief review of the literature, several emerging questions and issues about the current viewpoints are explicated and discussed. The integrated theory is presented and its major concepts are identified and defined. The boundaries of the theory are delineated, system state dynamics are summarized and the nomological network among three central concepts of the theory is discussed. Each broad category of related variables is then introduced and appropriate interrelationships noted. The major elements of the theory are summarized as propositional statements and an overview of implications for future theory and research concludes the presentation.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "Apr-86", "venue": "", "doi": "", "url": "", "keyword": "Design theory", "cluster": 2, "cluster_theme_terms": "reich, psi, value, theory theory, theories, service, braha, focus", "cluster_label_candidate": "Defines Design Theory Through Conceptual Framing", "cluster_summary_candidate": "This cluster defines and conceptualizes design theory, emphasizing how a design-knowledge construct is made explicit, organized, or put to work rather than only where it is applied. Related forms include Design Principles, Design Frameworks. The shared move also involves synthesis of prior work and evidence-based evaluation. Its contribution pattern is coded as Theoretical, Methodological, Artifact/System. Application and method terms are treated as supporting facets, especiall  design theory conceptualization by incorporating aspects of design which occur in everyday technology use. Currently, design theory is focused solely on the artifact while obscuring the teleological information processes for which they are designed. We propose the addition of environments which can organize kernel theories and provide insight regarding interaction and influence of kernel theory in different use contexts. In addition, the modification of information artifacts and processes as users tinker with, and tailor systems is a necessary aspect of design theory specifications.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2009", "venue": "15th Americas Conference on Information Systems 2009, AMCIS 2009", "doi": "", "url": "", "keyword": "Design theory", "cluster": 0, "cluster_theme_terms": "theories, epistemology, management, public health, technique innovation, urban, shared body, pluralistic", "cluster_label_candidate": "Defines Design Theory Through Conceptual Framing", "cluster_summary_candidate": "This cluster defines and conceptualizes design theory, emphasizing how a design-knowledge construct is made explicit, organized, or put to work rather than only where it is applied. Related forms include Design Frameworks, Design Knowledge. The shared move also involves synthesis of prior work and organization and classification. Its contribution pattern is coded as Theoretical, Empirical, Artifact/System. Application and method terms are treated as supporting facets, especially methods or lenses such as Design Science, Case Study. Representative papers include Management design theories; Editorial: A Critical Look at Theories in Design Science Research.", "design_knowledge_form": "Design Theory", "design_knowledge_action": "defines and conceptualizes", "design_knowledge_contribution": "defines and conceptualizes Design Theory", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "Design Science, Case Study", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "Theoretical, Empirical, Artifact/System", "umap_x": 6.058460712432861, "umap_y": 1.534999966621399, "distance_to_centroid": 0.37163030220490634, "representative_rank": 3, "is_representative_top3": true, "medoid_rank": 3, "lda_topic": 5, "lda_topic_probability": 0.9866706610656877, "lda_topic_words": "science, theories, problem, value, oriented, solving, scientific, account", "nearest_papers": [{"paper_id": "c1db52f69aae", "title": "Editorial: A Critical Look at Theories in Design Science Research", "cluster": 0, "distance": 0.2630985733259914}, {"paper_id": "103eb1a8586b", "title": "Incommensurability and multi-paradigm grounding in design science research: Implications for creating knowledge", "cluster": 0, "distance": 0.5136904045333078}, {"paper_id": "c0372ed4d123", "title": "Web-based information systems: Developing a design theory", "cluster": 2, "distance": 0.6120281403176877}, {"paper_id": "c9175ef9ebfe", "title": "Management design theories", "cluster": 0, "distance": 0.7575592647020086}, {"paper_id": "b21a9b4cc5ef", "title": "C-K design theory: an advanced formulation", "cluster": 2, "distance": 0.766826937634689}]}, {"paper_id": "0ecb6c9b7eeb", "title": "Pluralism in Knowledge Management: a Review", "authors": "Sheffield, J. (1)", "abstract": "The purpose of this article is to review the role of simultaneous application of multiple perspectives, or pluralism, in knowledge management, and to describe theoretical frameworks that support pluralism. Pluralism is defined as support for all three of the systems perspectives - hard, soft, and critical - that are implicit in the popular Davenport and Prusak (1998) definition of knowledge. These perspectives are associated with research paradigms (positivist, interpretivist, pluralist) and knowledge perspectives (application, normalization, creation). A case study of coordinating work in a hospital is reviewed to illustrate the role played by pluralistic approaches in knowledge management. A literature search is conducted to find frameworks that support pluralism. The findings are as follow. In the hospital case study the introduction of a patient record system (hard system) was the occasion for changes to both coordination (soft systems) and power relations (critical systems). Facts, norms and feelings are intertwined. While the electronic tool by itself is neutral in the face of power relations, its use in organisations is not. In this case at least, a holistic and pluralistic approach to knowledge management is required. In the search for frameworks to support pluralism, more than 50 frameworks from the general knowledge management literature are identified. Of the eight selected for further study, three are found to be pluralistic. These three - critical systems, scientific discourses, and Habermasian inquiry - share common characteristics. All three recognise that conflict is the precondition to knowledge creation, and that power relations, value commitments, and ethics are central to knowledge management. It is concluded that the knowledge management literature as a whole favours a single systems perspective (hard systems); a single research paradigm (positivism, focusing on objective facts); and a single knowledge management domain (knowledge application). This singular (non-pluralistic) approach produces theories about knowledge that has already emerged. Yet the Davenport and Prusak (1998) definition of knowledge and the hospital case study include two other perspectives - soft systems and critical systems - that focus on the organizational and individual aspects of emergence, respectively. In practice, knowledge management must address the need to simultaneously solve technical problems, resolve interpersonal issues, and dissolve personal conflict. The contribution of the paper is the comparison of knowledge management frameworks on the basis of underlying system perspectives, and the identification, description, and application of some pluralistic frameworks. Each systems perspective constitutes a different discourse on the purposes served by knowledge management, and pluralisms are required to integrate them. Pluralisms constitute both a framework for inquiry in knowledge management and a design theory for collaborative technologies. The review is not exhaustive. It is beyond the scope of this paper to examine the link between the purposes served by knowledge management and the methodology required for development. The paper contributes to the literature that seeks to understand the complexity of knowledge management practice via 'awareness of the potential and the implications of the different discourses in the study of knowledge and knowledge management'.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Electronic Journal of Knowledge Management", "doi": "", "url": "", "keyword": "Design theory", "cluster": 0, "cluster_theme_terms": "theories, epistemology, management, public health, technique innovation, urban, shared body, pluralistic", "cluster_label_candidate": "Defines Design Theory Through Conceptual Framing", "cluster_summary_candidate": "This cluster defines and conceptualizes design theory, emphasizing how a design-knowledge construct is made explicit, organized, or put to work rather than only where it is applied. Related forms include Design Frameworks, Design Knowledge. The shared move also involves synthesis of prior work and organization and classification. Its contribution pattern is coded as Theoretical, Empirical, Artifact/System. Application and method terms are treated as supporting facets, especially methods or lenses such as Design Science, Case Study. Representative papers include Management design theories; Editorial: A Critical Look at Theories in Design Science Research.", "desig ies. As an alternative with greater potential for explanatory power and a framework for solving a wider array of design problems, we propose that a relational theory of design is needed. Such a relational theory should mirror those currently developed in mathematics, physics, computer science, and even philosophy. We develop a relational theory for design based on the concept of affordances from perceptual psychology. Affordances help to explain the entanglement between designers, users, and artifacts‚Äîrelationships that are not currently handled by function based approaches to design. Affordance based design, as developed in this paper, does not offer a radical new approach to doing design, but rather a shift in design thinking. Our focus in this paper is therefore on the explanatory power and potential innovation fostered by this change in design thinking, as illustrated through several examples, and not on specific methods.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Research in Engineering Design", "doi": "10.1007/s00163-008-0060-3", "url": "", "keyword": "Design theory", "cluster": 3, "cluster_theme_terms": "sonification, impact, methodology, negation, constructs, visualization, visual, focus", "cluster_label_candidate": "Defines Design Theory Through Conceptual Framing", "cluster_summary_candidate": "This cluster defines and conceptualizes design theory, emphasizing how a design-knowledge construct is made explicit, organized, or put to work rather than only where it is applied. Related forms include Design Principles, Design Methods. The shared move also involves synthesis of prior work and evidence-based evaluation. Its contribution pattern is coded as Theoretical, Methodological, Artifact/System. Application and method terms are treated as supporting facets, especially methods or lenses such as Design Science, Case Study and contexts such as Sustainability, Educatio Äù reflects the assumption that Design can be modelled as the interplay between two interdependent spaces with different structures and logics: the space of concepts (C) and the space of knowledge (K). Both pragmatic views of Design and existing Design theories define Design as a dynamic mapping process between required functions and selected structures. However, dynamic mapping is not sufficient to describe the generation of new objects and new knowledge which are distinctive features of Design. We show that C-K theory captures such generation and offers a rigorous definition of Design. This is illustrated with an example: the design of Magnesium-CO2 engines for Mars explorations. Using C-K theory we also discuss Braha and Reich‚Äôs topological structures for design modelling (Braha and Reich 2003). We interpret this approach as special assumptions about the stability of objects in space K. Combining C-K theory and Braha and Reich‚Äôs models opens new areas for research about knowledge structures in Design theories. These findings confirm the analytical and interpretative power of C-K theory.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Research in Engineering Design", "doi": "10.1007/s00163-008-0043-4", "url": "", "keyword": "Design theory", "cluster": 2, "cluster_theme_terms": "reich, psi, value, theory theory, theories, service, braha, focus", "cluster_label_candidate": "Defines Design Theory Through Conceptual Framing", "cluster_summary_candidate": "This cluster defines and conceptualizes design theory, emphasizing how a design-knowledge construct is made explicit, organized, or put to work rather than only where it is applied. Related forms include Design Principles, Design Frameworks. The shared move also involves synthesis of prior work and evidence-based evaluation. Its contribution pattern is coded as Theoretical, Methodological, Artifact/System. Application and meth , "abstract": "Learner engagement is important for learning, yet the question of how to design engaging learning experiences still lingers. One of the facets of computer games is that they tend to be engaging. In addition, they are designed experiences. By examining computer games as examples of the design of engaging experiences through the lens of design theory, it may be possible to extract more fundamental principles for the design of engagement. Such principles could inform the design of serious games and other learning experiences. This chapter uses Vincenti's fundamental design concept of operational principle to identify the core components and active principle that underlie the design of engagement in games. The chapter also introduces the concept of feedforward to describe the continual elicitation of anticipatory cognition and behavior by players/learners. This feedforward effect in the context of player/learner agency is essential to the active principle of engagement in computer games. ¬© 2010, IGI Global.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2010", "venue": "Gaming and Cognition: Theories and Practice from the Learning Sciences", "doi": "10.4018/978-1-61520-717-6.ch005", "url": "", "keyword": "Design theory", "cluster": 3, "cluster_theme_terms": "sonification, impact, methodology, negation, constructs, visualization, visual, focus", "cluster_label_candidate": "Defines Design Theory Through Conceptual Framing", "cluster_summary_candidate": "This cluster defines and conceptualizes design theory, emphasizing how a design-knowledge construct is made explicit, organized, or put to work rather than only where it is applied. Related forms include Design Principles, Design Methods. The shared move also involves synthesis of prior work and evidence-based evaluation. Its contribution pattern is coded as Theoretical, Methodological, Artifact/System. Application and method terms fact?", "authors": "Davern, Michael (1); Parkes, Alison (1)", "abstract": "There has been much debate and discussion in recent literature about the nature of information systems (IS) theory, the role of theory in design and the notions of design science and design theory. A central idea in much of this literature is the interplay between traditional theory-based research and the development of design theory through the building of information systems artefacts. In this chapter, we describe our recent experiences in the development of an artefact (a rule-based expert system called DG-In) based on a behavioural theory and the challenges we found as we attempted to reconcile it with relevant design theory. The potential for incommensurability in the research cycle between theory and artefact has significant implications for IS research-from both a design-science perspective and a behavioural-science perspective. It brings into question core ideas such as the development of a cumulative research tradition and notions of theory-based design and design theory more generally.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2010", "venue": "Information Systems Foundations: The Role of Design Science", "doi": "10.22459/isf.12.2010.04", "url": "", "keyword": "Design theory", "cluster": 2, "cluster_theme_terms": "reich, psi, value, theory theory, theories, service, braha, focus", "cluster_label_candidate": "Defines Design Theory Through Conceptual Framing", "cluster_summary_candidate": "This cluster defines and conceptualizes design theory, emphasizing how a design-knowledge construct is made explicit, organized, or put to work rather than only where it is applied. Related forms include Design Principles, Design Frameworks. The shared move also involves synthesis of prior work and evidence-based evaluation. Its contribution pattern is coded as Theoretical, Methodological, Artifact/System. Application an eller, C. (2); Carlsson, S.A. (3)", "abstract": "Synchronous e-learning has received much less research attention, as compared with asynchronous e-learning. Practitioners that consider using and designing synchronous e-learning are in urgent need of guidance. In order to address this need, we propose design exemplars for synchronous e-learning. They are directed towards a primary constituent community of teachers, administrators, managers and developers of e-learning. The exemplars have been theoretically as well as empirically grounded through cross-case analyses of studies conducted between 2003 and 2006. Moreover, the exemplars have been evaluated by conducting focus group sessions with experienced practitioners having experience of using and developing e-learning. Strong support was identified for each design exemplar. The exemplars can be used as research hypotheses and be tested in future design research. [All rights reserved Elsevier].", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Computers & Education", "doi": "10.1016/j.compedu.2010.02.025", "url": "", "keyword": "Design theory", "cluster": 1, "cluster_theme_terms": "chronic, vsd, proof, patients, values, diseases, pedagogical, product", "cluster_label_candidate": "Synthesizes Design Theory into Shared Design Constructs", "cluster_summary_candidate": "This cluster synthesizes prior work on design theory, emphasizing how a design-knowledge construct is made explicit, organized, or put to work rather than only where it is applied. Related forms include Design Knowledge, Design Frameworks. The shared move also involves definition and conceptualization and evidence-based evaluation. Its contribution pattern is coded as Theoretical, Methodological, Artifact/System. Application and method terms are treated as supporting facets, especially methods or lenses such as Design Science and contexts such as Education / Learning. Rep ates. Each state is customized to fulfill a specific set of functions, and the transformation between these multiple states allows for greater functionality and the elimination of many trade-offs between conflicting needs. Empirical examination of existing transforming systems and their similarities has led to a foundational transformation design theory, with meta-analogies and guidelines that explain how transformation processes occur, when they are useful, and how the designer can ensure their maximum benefit. The foundation of these principles and guidelines forms a meta-analogical framework for designing transformers and transformational systems. This paper presents a history of the development of transformational design theory, including the relationship of the research to case-based reasoning in other fields. Ideation methods are presented that specifically exploit the meta-analogies, i.e., categories of transformers. An example design problem is considered to illustrate the potential utility of this design-by-analogy approach. ¬© 2010 American Society of Mechanical Engineers.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2010", "venue": "Journal of Computing and Information Science in Engineering", "doi": "10.1115/1.3470028", "url": "", "keyword": "Design theory", "cluster": 1, "cluster_theme_terms": "chronic, vsd, proof, patients, values, diseases, pedagogical, product", "cluster_label_candidate": "Synthesizes Design Theory into Shared Design Constructs", "cluster_summary_candidate": "This cluster synthesizes prior work on design theory, emphasizing how a design-knowledge construct is made explicit, organized, or put to work rather than only where it is applied. Related forms include Design Knowledge, Design Frameworks. The shared move also involves definition and conceptualization and evidence-based evaluation. Its contribution pattern is coded as Theoretical, Methodological, Artif lications for creating knowledge", "authors": "Hovorka, Dirk S. (1)", "abstract": "The problem identification-design-build-evaluate-theorize structure of design science research has been proposed as an approach to creating knowledge in information systems and in broader organizational and social domains. Although the approach has merit, the philosophical foundations of two specific components warrant attention. First, the grounding of design theory on potentially incommensurate kernel theories may produce incoherent design theory. In addition, design theory has no strong logical connection to kernel theories, and so cannot be used to test or validate the contributing kernel theories. Second, the philosophical grounding of evaluation may inadvertently shift from functionally based measures of utility and efficiency, to evaluation based on the pragmatic fulfillment of multidimensional human actions as people encounter information systems, resulting in evaluation errors. Although design and evaluation from a single paradigm is not desirable, sufficient, or representative of design science research, multi-paradigm grounding of design and evaluation must be realized and used consciously by the research community if the design science approach is to remain a legitimate approach to knowledge creation. ¬© IFIP International Federation for Information Processing 2010.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2010", "venue": "IFIP Advances in Information and Communication Technology", "doi": "10.1007/978-3-642-12113-5_2", "url": "", "keyword": "Design theory", "cluster": 0, "cluster_theme_terms": "theories, epistemology, management, public health, technique innovation, urban, shared body, pluralistic", "cluster_label_candidate": "Defines Design Theory Through Conceptual Framing", "cluster_summary_candidate": "This cluster defines and conceptualizes design theory, emphasizing how a design-knowled d Analysis Using Value-Sensitive Design", "cluster": 1, "distance": 0.6891676198024224}, {"paper_id": "9049c4d2bbec", "title": "Towards a design theory of blended learning curriculum", "cluster": 1, "distance": 0.7543785640946064}, {"paper_id": "d2fba2826d90", "title": "Design Principles for Platform-Enabled Knowledge Commons with an Expository Instantiation", "cluster": 2, "distance": 0.8130103176491781}, {"paper_id": "dc61c8a1dcd6", "title": "Multiscale Design Strategies in a Landscape Architecture Classroom", "cluster": 3, "distance": 0.815916145539753}]}, {"paper_id": "2faef10b819d", "title": "A design theory for software engineering", "authors": "Jon G. Hall; L. Rapanotti", "abstract": "Context: Software Engineering is a discipline that has been shaped by over 50 years of practice. Many have argued that its theoretical basis has been slow to develop and that, in fact, a substantial theory of Software Engineering is still lacking.Objective: We propose a design theory for Software Engineering as a contribution to the debate. Having done this, we extend it to a design theory for socio-technical systems.Method: We elaborate our theory based on Gregors influential meta-theoretical exploration of the structural nature of a theory in the discipline of Information Systems, with particular attention to ontological and epistemological arguments.Results: We argue how, from an ontological perspective, our theory embodies a view of Software Engineering as the practice of framing, representing and transforming Software Engineering problems. As such, theory statements concern the characterisation of individual problems and how problems relate and transform to other problems as part of an iterative, potentially backtracking, problem solving process, accounting for the way Software Engineering transforms the physical world to meet a recognised need. From an epistemological perspective, we argue how the theory has developed through research cycles including both theory-then-(empirical-)research and (empirical-)research-then-theory strategies spanning over a decade; both theoretical statements and related empirical evidence are included.Conclusion: The resulting theory provides descriptions and explanations for many phenomena observed in Software Engineering and in the combination of software with other technologies, and embodies analytic, explanatory and predictive properties. There are however acknowledged limitations and current research to overcome them is outlined.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2017", "venue": "Information and Software Technology", "doi": "", "url": "https://www.semanticscholar.org/paper/01d6dabb554091dd3a9d65f13a80ead9b166bd79", "keyword": "Design theory", "cluster": 2, "cluster_theme_terms": "reich, psi, value, theory theory, theories, service, braha, focus", "cluster_label_candidate": "Defines Design Theory Through Conceptual Framing", "cluster_summary_candidate": "This cluster defines and conceptualizes design theory, emphasizing how a design-knowledge construct is made explicit, organized, or put to work rather than only where it is applied. Related forms include Design Principles, Design Frameworks. The shared move also involves synthesis of prior work and evidence-based evaluation. Its contribution pattern is coded as Theoretical, Methodological, Artifact/System. Application and method terms are treated as supporting facets, especially methods or lenses such as Design Science, Case Study and contexts such as Education / Learning. Representative papers include Design Theory in Information Systems; C-K design theory: an advanced formulation.", "design_knowledge_form": "Design Theory", "design_knowledge_action": "defines and conceptualizes", "design_knowledge_contribution": "defines and conceptualizes Design Theory", "facet_population_or_context": "Education / Learning", "facet_stakeholder_or_population": "Designers, Practi ory show that in decision‚Äêmaking situations, chimeras can be generated as nonfalsifiable existential statements about desirable alternatives and events. Moreover, design theory offers learning operations that handle nonfalsifiable statements to generate new real objects. This paper uses these operations to build a rational heuristic that may or may not transform initial chimeras into reality. Its main effect is to ensure that stimulated learning leads to decision alternatives (whether pre‚Äêexisting or novel) that surpass the initial optimal one. This paves the way for a class of design‚Äêbased heuristics extending the main functions of Bayesian learning to a non‚ÄêBayesian world.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2023", "venue": "European Management Review", "doi": "", "url": "https://www.semanticscholar.org/paper/046e1e9a9fc6dc38b07293cd91dbc526b1db8743", "keyword": "Design theory", "cluster": 1, "cluster_theme_terms": "chronic, vsd, proof, patients, values, diseases, pedagogical, product", "cluster_label_candidate": "Synthesizes Design Theory into Shared Design Constructs", "cluster_summary_candidate": "This cluster synthesizes prior work on design theory, emphasizing how a design-knowledge construct is made explicit, organized, or put to work rather than only where it is applied. Related forms include Design Knowledge, Design Frameworks. The shared move also involves definition and conceptualization and evidence-based evaluation. Its contribution pattern is coded as Theoretical, Methodological, Artifact/System. Application and method terms are treated as supporting facets, especially methods or lenses such as Design Science and contexts such as Education / Learning. Representative papers include PEDAGOGICAL DESIGN: CONCEPT, PRINCIPLES, MODELS; Towards a design theory of blended learning curriculum.", "design_knowledge_form": "Design Theory", "design_knowledge_action": "syn ucation are analyzed. A model of pedagogical design of a course consisting of 4 modules based on the ADDIE model is shown. Also, the pedagogical designer classifies the tasks to be solved and defines them. Reigeluth identifies three main characteristics that meet all the principles of pedagogical design theory. In the article, the concept of pedagogical design is considered, first of all, the creative activity of a teacher in creating, transforming and accompanying an information and educational environment in which the student is convenient to develop his psychological individual characteristics and achieve high results. And, secondly, this is the direction of pedagogical science associated with the study and development of strategies, learning scenarios and the creation of conditions for managing educational events with the help of various tools that ensure the mandatory achievement of the set goal with successful training. The article presents the structure and content of pedagogical design in the course of training from the author's point of view.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2023", "venue": "–ú–ê–¢–ï–ú–ê–¢–ò–ö–ê–ù–´, –§–ò–ó–ò–ö–ê–ù–´ –ñ”ò–ù–ï –ò–ù–§–û–†–ú–ê–¢–ò–ö–ê–ù–´ –û“ö–´–¢–£–î–´“¢ ”®–ó–ï–ö–¢–Ü –ú”ò–°–ï–õ–ï–õ–ï–†–Ü", "doi": "", "url": "https://www.semanticscholar.org/paper/1a8fe4b63d8b32fd0df817839f391b3a8d909fb4", "keyword": "Design theory", "cluster": 1, "cluster_theme_terms": "chronic, vsd, proof, patients, values, diseases, pedagogical, product", "cluster_label_candidate": "Synthesizes Design Theory into Shared Design Constructs", "cluster_summary_candidate": "This cluster synthesizes prior work on design theory, emphasizing how a design-knowledge construct is made explicit, organized, or put to work rather than only where it is applied. Related forms include Design Knowledge, Design Frameworks. The shared move also involves definition and conceptualization and ooge; P. le Masson", "abstract": "Abstract The literature on design distinguishes between exploration-based experimentation and validation-based experimentation. This typology relies on an assumption that exploration and validation cannot and should not be performed simultaneously in the same experimentation. By contrast, some practitioners, such as les Sismo, propose that proof of concept might combine these two logics. This raises the question of what design logic might enable this type of combination of exploration and validation. We first use design theory to build an experimentation design framework. This framework highlights a typology of proof logics in experimentation related to proof of the known and proof of the unknown. Second, we show that these proof models are supported by les Sismo's cases and describe a diversity of arrangements of exploration and validation mechanisms: sequential, parallel, and combinational. Through the formalisation of proof of concept as a double proof (proof of the known and proof of the unknown), we show that proof of concept can be more than a tool for the go/no-go decision by gradually validating propositions, questioning the relevance of propositions, and discovering new propositions to be investigated and tested.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2021", "venue": "Proceedings of the Design Society", "doi": "", "url": "https://www.semanticscholar.org/paper/2f013a55be5284205856b2e343329e282bcbdb09", "keyword": "Design theory", "cluster": 1, "cluster_theme_terms": "chronic, vsd, proof, patients, values, diseases, pedagogical, product", "cluster_label_candidate": "Synthesizes Design Theory into Shared Design Constructs", "cluster_summary_candidate": "This cluster synthesizes prior work on design theory, emphasizing how a design-knowledge construct is made explicit, organized, or put to work rather than only where it is applied. Related forms istance": 0.8664936773537171}]}, {"paper_id": "d2fba2826d90", "title": "Design Principles for Platform-Enabled Knowledge Commons with an Expository Instantiation", "authors": "M. Ramakrishnan; Shirley Gregor; Anup Shrestha; J. Soar", "abstract": "Knowledge commons play a pivotal role in knowledge creation and sharing in the digital economy.\nThe motivation for this research was the opportunity to develop a knowledge commons for IT service\nmanagement (ITSM) practitioners. To obtain guidance to design the knowledge commons, we\ncritically reviewed commons design principles (DPs) that were based on a well-established\neconomics theory. We observed that the commons DPs had significant gaps when applied to IS\npractice. Hence, we developed an alternate set of DPs that we refer to as platform-enabled knowledge\ncommons (PEKC) DPs that are relevant to IS practice. This paper discusses the development of\nPEKC DPs and applies them in instantiating an IS artifact, Service-Symphony. Service-Symphony is\na purpose-built, public-facing knowledge repository developed for the benefit of ITSM practitioners\nand students. Our research followed the design science research (DSR) paradigm and contributes to\nthe body of knowledge by establishing a multigrounded design theory comprising meta-requirements\nand DPs. To bridge theory and practice, we assessed the reusability of PEKC DPs through focus\ngroup interviews with IS architects. Our case study illustrates the complete life cycle of DPs covering\nconceptualization, initial formulation, iterative refinement, application to an important real-world\ninstantiation, and evaluation by a group of independent IS practitioners.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2023", "venue": "Journal of the AIS", "doi": "", "url": "https://www.semanticscholar.org/paper/3e67cd0d0c79603b5118e7a44b1153b4cd7553ad", "keyword": "Design theory", "cluster": 2, "cluster_them d prescription in entrepreneurship research", "cluster": 2, "distance": 0.5948790839780288}, {"paper_id": "43fee329f83e", "title": "Process design theory for digital information services", "cluster": 1, "distance": 0.7228174942919636}, {"paper_id": "5b52ec143fa6", "title": "The ECC Methodology for Architecture Design Theory and Practices Research", "cluster": 3, "distance": 0.727667633186947}, {"paper_id": "c1db52f69aae", "title": "Editorial: A Critical Look at Theories in Design Science Research", "cluster": 0, "distance": 0.7697425232059418}]}, {"paper_id": "68bf6cd63875", "title": "Design epistemology as innovation in public health research", "authors": "A. Estany", "abstract": "The idea of design has reached our theories of epistemology: a field that, at first glance, seems to be quite far removed from the analysis of practical situations. However, we should bear in mind that epistemology has shifted from an a priori perspective to a naturalized one, in the sense that we cannot engage in epistemology without taking into account the empirical results of science when it comes to configuring methodological models. The objective is to explore just how far design epistemology (DE) can be adopted as a methodological framework for research in biomedical sciences and in some of their applications as public health. To this end, we will analyze different approaches to DE and related terms and expressions such as ‚Äúdesign thinking‚Äù, ‚Äúdesign theory‚Äù and ‚Äúdesignedly ways of knowing‚Äù. One of the issues that we need to address is precisely the polysemy that exists in the field of design, related to many different concepts. Thus, it seems impossible not to engage in a certain amount of conceptual analysis before we can embark on the study of the role of DE in public health research. Another of the questions that we will consider here is where to place biomedical sciences within the field of academic knowledge and research. The disciplines involved in this field of research range from biology to medicine and also to the applications of these knowledges, as in the case of public health. We will examine some of the definitions provided by international organizations and we will locate public health within the framework of healthcare services and their organization. Finally, we will see how DE can offer proposals and solutions to the challenges that a phenomenon as complex as public health currently faces. That is, we will measure up DE proposals against public health research needs.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2020", "venue": "", "doi": "", "url": "https://www.semanticscholar.org/paper/49d0d80cace9913bdeabbd7376508b67572245a8", "keyword": "Design theory", "cluster": 0, "cluster_theme_terms": "theories, epistemology, management, public health, technique innovation, urban, shared body, pluralistic", "cluster_label_candidate": "Defines Design Theory Through Conceptual Framing", "cluster_summary_candidate": "This cluster defines and conceptualizes design theory, emphasizing how a design-knowledge construct is made explicit, organized, or put to work rather than only where it is applied. Related forms include Design Frameworks, Design Knowledge. The shared move also involves synthesis of prior work and organization and classification. Its contribution pattern is coded as Theoretical, Empirical, Artifact/System. Application and method terms are treated as supporting facets, especially methods or lenses such as Design Science, Case Study. Representative papers include Management design theories; Editorial: A Critical Look at Theories in Design Science Research.", "design_knowledge_form": "Design Theory", "design_knowledge_action": "defines and conceptualizes", "design_knowledge_contribution": "defines and conceptualizes Design Theory", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "Design Scie  key terms within the field, and most importantly the term that defines the field itself: Design. This position rests on the argument that theory‚Äîa key tool for managing complexity in design‚Äîis weakened by ambiguous terminology, and crucially, ambiguity of the word design. Although it has been well documented that design is a highly ambiguous term and that this is problematic for the field as a whole, many designers are resigned to this fact since it is unclear how one can resolve differences of opinion about what such a central and sensitive term means. This paper argues, though, that once designers have a better understanding of the process of definition‚Äîa process that has its own complexities‚Äîthey might see the benefit of trying to define design and other key terms. To this end, this paper provides an overview of definition, borrowing largely from philosophy, which includes a survey of the types and methods of definition and issues related to each. It will also explore methods and criteria by which one can evaluate various competing definitions. From this survey, I propose that designers use a stipulative and pragmatic approach to definition outlined by Edward Schiappa (2003). Schiappa's approach is useful because of these two key underlying assumptions: first, defining design (and related terms) is not a search for the record of past usage but an act to persuade others of how to use the word in the future, therefore the person defining must provide a compelling argument for why others' usage should be modified; second, defining design is not a search for the 'true' or 'real' meaning of a word but instead a goal-oriented process and, therefore, dependent on the context and purpose of those defining the word.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2010", "venue": "Proceedings of DRS", "doi": "", "url": "https://www.semanticscholar.org/paper/66340bc794b9f491a7459ed19271054c6 ept of ‚Äúdesign culture‚Äù, the content of which is revealed using the category of ‚Äúproektnost‚Äù. The proposed structure allows us to preserve the fundamental plurality of interpretations of the concept of design and justify the methodological pluralism of design practice.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2020", "venue": "", "doi": "", "url": "https://www.semanticscholar.org/paper/7d824a6668b58b3a5799c88bdd089a659751a214", "keyword": "Design theory", "cluster": 1, "cluster_theme_terms": "chronic, vsd, proof, patients, values, diseases, pedagogical, product", "cluster_label_candidate": "Synthesizes Design Theory into Shared Design Constructs", "cluster_summary_candidate": "This cluster synthesizes prior work on design theory, emphasizing how a design-knowledge construct is made explicit, organized, or put to work rather than only where it is applied. Related forms include Design Knowledge, Design Frameworks. The shared move also involves definition and conceptualization and evidence-based evaluation. Its contribution pattern is coded as Theoretical, Methodological, Artifact/System. Application and method terms are treated as supporting facets, especially methods or lenses such as Design Science and contexts such as Education / Learning. Representative papers include PEDAGOGICAL DESIGN: CONCEPT, PRINCIPLES, MODELS; Towards a design theory of blended learning curriculum.", "design_knowledge_form": "Design Theory", "design_knowledge_action": "synthesizes prior work on", "design_knowledge_contribution": "synthesizes prior work on Design Theory", "facet_population_or_context": "Education / Learning", "facet_stakeholder_or_population": "Practitioners, Designers", "facet_method_or_lens": "Design Science", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "Theoretical, Methodological, Artifact/System", "umap_x": 7.276348114013672, "umap_y": 4.294870853424072, "distance_to_centroid": 0.6931451622527061, "representative_rank": 15, "is_representative_top3": false, "medoid_rank": 15, "lda_topic": 2, "lda_topic_probability": 0.9898752601897325, "lda_topic_words": "impact, focus, engineering, management, scale, theory theory, multiscale, methodology", "nearest_papers": [{"paper_id": "7fb79f6d2f73", "title": "PEDAGOGICAL DESIGN: CONCEPT, PRINCIPLES, MODELS", "cluster": 1, "distance": 0.6942207528605875}, {"paper_id": "4db508a9681a", "title": "Philosophy of design: A meta-theoretical structure for design theory", "cluster": 2, "distance": 0.7137539100337036}, {"paper_id": "f0eab2f851e8", "title": "Design science‚àíthe need for a scientific basis for engineering design methodology", "cluster": 3, "distance": 0.7648729390270971}, {"paper_id": "bacdc4f76eea", "title": "Work system principles: towards a justified design theory on the grounds of socio-instrumental pragmatism", "cluster": 3, "distance": 0.7989295368433469}, {"paper_id": "83d1ebe7d6c0", "title": "Design Theory in Information Systems", "cluster": 2, "distance": 0.816472485780367}]}, {"paper_id": "3f7b5dc9fc40", "title": "Concerning the Epistemology of Design: The Role of the Eco-Cognitive Model of Abduction in Pragmatism", "authors": "Alger Sans Pinillos; A. Estany", "abstract": "Design has usually been linked to art and applied in scenarios related to everyday life. Even when design has, on occasion, made its way into the world of academia, it has always been closely linked to art and scenarios related everyday life. At last, however, the idea of design has reached the field of epistemology: an area within the very heart of philosophy that has always focused, in theory, on the foundations of knowledge. Consequently, design is being studied from different approaches interested in the foundation of knowledge, theoretical and practical. This is one of the reasons why abduction and pragmatism have been considered relevant from a design perspective. This paper first shows the main s. The first part suggests a typology for urban design theories in order to provide a new way of understanding the nature and function of the, seemingly opposing, debates existing in the field. This typology is based on distinguishing between subjects, object and knowledge of urban design. In the second part, the typology is applied to the shared body of knowledge. In order to do so, this article attempts to give an overview of the current shared body of knowledge in the field of urban design. The reading lists of urban design theory courses, drawn from different universities in the United States, United Kingdom and Australia, are analysed to identify common texts. These texts are then considered to be one reading of what constitutes the shared body of knowledge. A comparison is made between this list of titles and those texts offered in various urban design readers to provide a better overall picture of the shared body of knowledge. Finally, a chronological analysis is made to illustrate the development of the three types of urban design theory.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2015", "venue": "Urban Design International", "doi": "", "url": "https://www.semanticscholar.org/paper/89914fef1674939de30d51f67c4e54d2aee8e0dd", "keyword": "Design theory", "cluster": 0, "cluster_theme_terms": "theories, epistemology, management, public health, technique innovation, urban, shared body, pluralistic", "cluster_label_candidate": "Defines Design Theory Through Conceptual Framing", "cluster_summary_candidate": "This cluster defines and conceptualizes design theory, emphasizing how a design-knowledge construct is made explicit, organized, or put to work rather than only where it is applied. Related forms include Design Frameworks, Design Knowledge. The shared move also involves synthesis of prior work and organization and classification. Its contribution pattern is coded as Theoretical, Empi y and Practices Research", "authors": "Fathi Bashier", "abstract": "This study proposes the ECC methodology to improve design practices systematically. The article describes the research strategy called the evaluation-creation cycle (ECC) the foundation of the ECC methodology. Recent studies showed that a failure of desired outcomes is often a result of a failure of to understand existing practices. This suggests that improving design requires more than a theory of what exists, it also requires using this understanding to change the design process to one that leads from the existing to the desired through the evaluation-creation cycle approach. This requires understanding the relations of knowledge creation through the analytic and the synthetic practices within the design process, as well as the relations between the design process and the outer design context. The study draws insight from the Renaissance theory in order to obtain understanding the development of descriptive ‚Äòknowledge of design‚Äô focused on increasing design understanding, and based on this prescriptive ‚Äòknowledge for design‚Äô providing design support are created. This has informed the development of the evaluation-creation cycle (ECC) strategy and the ECC methodology based on it. The aims of the ECC methodology are the evaluation of existing practices and the principles that support them, and based on this the development of understanding with which to change the current situations into preferred ones. In this article the evaluation-creation cycle (ECC) approach is described and the ECC methodology based on it introduced, and the way in which design principles can be developed, improved and used to predict desired outcomes is discussed.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2021", "venue": "IOP Conference Series: Materials Science and Engineering", "doi": "", "url": "https://www.semanticscholar.org/paper/e2 hical sensitivities, and sense of well-being. In the end, Good Design emerges from the designers‚Äô wellarticulated ethos, and creates a ‚ÄúWow‚Äù through its impact. Taking our understanding and application of Design Impact to the next level, we worked with Singapore and the DesignSingapore (Dsg) Council [10] to explore, define and test design impact evaluation strategies as part of Singapore‚Äôs most prestigious national design award program, the President‚Äôs Design Award (P*DA; https://www.designsingapore.org/presidents-design-award) [11]. Through interviews with expert designers, a careful study of the design disciplines, and an understanding of design award programs across the world, the concept of a Design Impact framework was developed. This framework, as a unification of the concept of Design Impact across disciplines and scales, places emphasis on outcome-based design impact alongside recognition of excellence in design craftsmanship. Designers who bring together diverse skills and work collaboratively across disciplines to address complex issues are given significant recognition. This approach celebrates future-forward designs, designers and design processes that anticipate, envision and shape the world of tomorrow. 1 Sponsored by the DesignSingapore (Dsg) Council, as part of the President‚Äôs Design Award (P*DA). SUTD-MIT International Design Center (IDC) served as the official Knowledge Partner for the P*DA program. 2 SUTD-MIT International Design Center (IDC), Design Innovation (DI) Program, Singapore University of Technology and Design 3 Comcast Media and Technology Center (CMTC), College of Engineering, Design, and Computing, University of Colorado Denver 4 DesignSingapore (Dsg) Council, Singapore 5 McKinsey and Company, Singapore ASME International Design Engineering Technical Conference, Design Theory and Methodology (DTM) Conference, Presentation and Extended Abstract, 52944, August 2020. 2 As a tangible and extended idea of Design Impact, four Impact Areas were identified to constitute the framework, initially tested and utilized as part of the P*DA (Fig. 1): A. Enabling Economic Transformation B. Raising Quality of Life C. Advancing Brand, Culture and Community at Any Scale D. Making Ground-breaking Achievements in Design Figure 1. Design Impact Framework: Design Impact Areas (4), Outcomes (13), and DemonstratorsMetrics (57). Outcomes and demonstrators were developed to help define and assess each impact area. Examples include enhancing employee experience, enhancing living experience, empowering and facilitating positive user learning, increasing revenue, simplifying usage and increasing efficiency & effectiveness, increasing identity and bonds with community, and innovating processes and functionality. People are at the center of this understanding of Design Impact, and it is supported by a repeatable process to assess design impact across industry and government sectors. Using the Design Impact framework, we hypothesized that we may answer questions such as, ‚ÄúWhat could a hotel, a toolkit for non-profit organizations, and one of the largest 3D-printed structures have in common?‚Äù They are all examples of impactful designs, beautifully conceptualized and executed. The Design Impact framework considers different types of impact and shows that while certain types of ‚Äúimpact‚Äù can be quantified, we also now have other ways for measuring impact and widening its definition. To test the developed Design Impact framework, a submission portal was developed, through the DesignSingapore Council‚Äôs website, for designers and organizations, across disciplines and across project scales, to submit their designs as part of the Singapore President‚Äôs Design Award. Over a three-year ASME International Design Engineering Technical Conference, Design Theory and Methodology (DTM) Conference, Presentation and Extended Abstract, 52944, August 2020. 3 period, and across two cycles of submissions for the P*DA, hundreds of designs were submitted and juries of design experts shortlisted the submissions [12]. We then assessed the shortlisted designs using our developed Design Impact framework and assessment methodology, and reported Design Impact results back to the juries. Through these engagements, data were collected on all design submissions; coverage of the impact areas, outcomes and demonstrators; the level of impact of the submitted designs; and survey results of the members of the national award juries. These data were then analyzed across multiple factors, resulting in a number of insights about Design Impact and conclusions concerning the Design Impact framework. Overall, these insights and conclusions include: the Design Impact framework was effective and comprehensive in representing, understanding and measuring design impact; the Design Impact framework provided a basis and common language for discussing designs across disciplines and scale; and there is value in representing Design Impact for not only assessing designs, but for proactively planning impact in future designs. We believe that being able to do so will enable companies and designers to forecast project outcomes and drive teams more effectively. In this presentation, we motivate the need to investigate the area of Design Impact and develop a deeper understanding, representation, and method for measuring impact, across disciplines and scale. We then present our Design Impact framework and assessment methodology, along with our research methodology, data collection approach, results, analyses, and conclusions. Figure 2 provides exemplar research findings. Today design is at our fingertips, for all of us, for our organizations, and for our communities. We all can invest in learning and extending our skill sets in designerly ways. We can apply design and gaze through the lens of what constitutes good design and even design excellence, as we strive to make our lives and our world better. And ultimately we can know and embrace the unknowable ‚Äì Design Impact, applying it in all facets of our government, business and private lives. This is our challenge as a world community; let‚Äôs proceed forth and realize it every moment of every day. In the words of Dr Jeffrey Chan (2018), ‚ÄúToday, design is increasingly harnessed in the creation of new environments within already existing artificial environments and systems. In doing this, humanity has evolved from being merely a biological actor to a geological agent ‚Äì one that is equipped with an agency for creating successive layers of new design, which are rapidly accreting on prior layers of already existing artificial systems. Consequentially in the Anthroprocene, the focus has also shifted from the protection of the environment to the production of environments. And it is [through] the power of design that the Anthroprocene can be properly understood.‚Äù ASME International Design Engineering Technical Conference, Design Theory and Methodology (DTM) Conference, Presentation and Extended Abstract, 52944, August 2020. 4 Figure 2. Exemplar research findings: Design Impact Framework. References [1] Simon, H. A. (1988). The science of design: Creating the artificial. Design Issues, 67-82.. [2] Camburn, B. A., Auernhammer, J. M., Sng, K. H. E., Mignone, P. J., Arlitt, R. M., Perez, K. B., ..., & Wood, K. L. (2017, August). Design innovation: A study of integrated practice. In International Design Engineering Technical Conferences and Computers and Information in Engineering Conference (Vol. 58219, p. V007T06A031). American Society of Mechanical Engineers. [3] Tushar, W., Lan, L., Withanage, C., Sng, H. E. K., Yuen, C., Wood, K. L., & Saha, T. K. (2020). Exploiting design thinking to improve energy efficiency of buildings. Energy, 197, 117141. [4] Sng, K. H. E., Raviselvam, S., Anderson, D., ..., Camburn, B. A., & Wood, K. (2017). A design case study: Transferring design processes and prototyping principles into industry for rapid response and user impact. In DS 87-1 Proceedings of the 21st International Conference on Engineering Design (ICED 17) Vol 1: Resource Sensitive Design, Design Research Applications and Case Studies, Vancouver, Canada, 21-25.08. 2017 (pp. 349-358). [5] Seow, O., Tiong, E., Teo, K., Silva, A., Wood, K. L., Jensen, D. D., & Yang, M. C. (2018, August). Design Signatures: Mapping Design Innovation Processes. In International Design Engineering Technical Conferences and Computers and Information in Engineering Conference (Vol. 51845, p. V007T06A046). American Society of Mechanical Engineers. [7] Design Innovation (DI) Learning Modules. https://www.dimodules.com/. [8] Tiong, E., Seow, O., Camburn, B., Teo, K., Silva, A., Wood, K. L., ... & Yang, M. C. (2019). The Economies and Dimensionality of Design Prototyping: Value, Time, Cost, and Fidelity. Journal of Mechanical Design, 141(3). ASME International Design Engineering Technical Conference, Design Theory and Methodology (DTM) Conference, Presentation and", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2021", "venue": "", "doi": "", "url": "https://www.semanticscholar.org/paper/f8112d8b9e2da1801b40f5ecf119a41f9b7d6a78", "keyword": "Design theory", "cluster": 3, "cluster_theme_terms": "sonification, impact, methodology, negation, constructs, visualization, visual, focus", "cluster_label_candidate": "Defines Design Theory Through Conceptual Framing", "cluster_summary_candidate": "This cluster defines and conceptualizes design theory, emphasizing how a design-knowledge construct is made explicit, organized, or put to work rather than only where it is applied. Related forms include Design Principles, Design Methods. The shared move also involves synthesis of prior work and evidence-based evaluation. Its contribution pattern is coded as Theoretical, Methodological, Artifact/System. Application and method terms are treated as supporting facets, especially me ations cognitive, cooperative, setting argued functional, shown relevant", "label": "Defines Design Theory Through Conceptual Framing", "summary": "This cluster defines and conceptualizes design theory, emphasizing how a design-knowledge construct is made explicit, organized, or put to work rather than only where it is applied. Related forms include Design Knowledge, Design Principles. The shared move also involves synthesis of prior work and context-specific adaptation. Its contribution pattern is coded as Theoretical. Representative papers include The design process: frames, metaphors, and games; DESIGN PROCESS: FRAMES, METAPHORS, AND GAMES..", "representatives": [{"title": "The design process: frames, metaphors, and games", "year": "", "paper_id": "74beefd3ed50"}, {"title": "DESIGN PROCESS: FRAMES, METAPHORS, AND GAMES.", "year": "1983", "paper_id": "8abe5ed83bac"}]}], "keywords": ["Design theory"]}</script>
  <script>
    const data = JSON.parse(document.getElementById('payload').textContent);
    const papers = data.papers;
    const palette = ['#f05a71','#4c78a8','#f58518','#54a24b','#b279a2','#72b7b2','#eeca3b','#ff9da6','#9d755d','#59a14f','#edc948','#76b7b2'];
    const colorFor = c => palette[Math.abs(Number(c)) % palette.length];
    const clusterName = c => Number(c) === -1 ? 'Unclustered papers' : `Cluster ${c}`;
    const state = { selected: papers[0]?.paper_id || null };
    const svg = document.getElementById('plot');
    const details = document.getElementById('details');
    const status = document.getElementById('status');

    function initControls() {
      const clusterFilter = document.getElementById('clusterFilter');
      data.clusters.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.cluster;
        opt.textContent = `${clusterName(c.cluster)} (${c.count})`;
        clusterFilter.appendChild(opt);
      });
      ['clusterFilter','repOnly'].forEach(id => {
        document.getElementById(id).addEventListener('input', render);
        document.getElementById(id).addEventListener('change', render);
      });
      renderLegend();
    }

    function filteredPapers() {
      const cluster = document.getElementById('clusterFilter').value;
      const repOnly = document.getElementById('repOnly').checked;
      return papers.filter(p => {
        return (cluster === 'all' || String(p.cluster) === cluster) &&
          (!repOnly || p.is_representative_top3);
      });
    }

    function renderLegend() {
      const legend = document.getElementById('legend');
      legend.innerHTML = '';
      data.clusters.forEach(c => {
        const item = document.createElement('span');
        item.className = 'legend-item';
        item.innerHTML = `<span class="swatch" style="background:${colorFor(c.cluster)}"></span> ${clusterName(c.cluster)}: ${escapeHtml(c.label || c.theme)}`;
        legend.appendChild(item);
      });
      const shapeNote = document.createElement('span');
      shapeNote.className = 'legend-item';
      shapeNote.innerHTML = '<span>◆ Discussion detected</span><span>● No explicit discussion</span>';
      legend.appendChild(shapeNote);
    }

    function render() {
      const shown = filteredPapers();
      status.textContent = `${shown.length} of ${papers.length} papers shown; ${data.clusters.length} clusters in this view. Axes are UMAP 1 and UMAP 2 coordinates, not interpretable variables. Use "Top-3 reps only" to filter representative papers.`;
      drawPlot(shown);
      renderDetails(papers.find(p => p.paper_id === state.selected) || shown[0] || papers[0]);
    }

    function drawPlot(shown) {
      const width = svg.clientWidth || 900;
      const height = svg.clientHeight || 560;
      const pad = 44;
      const xs = papers.map(p => p.umap_x), ys = papers.map(p => p.umap_y);
      let minX = Math.min(...xs), maxX = Math.max(...xs), minY = Math.min(...ys), maxY = Math.max(...ys);
      const xRange = Math.max(0.0001, maxX - minX);
      const yRange = Math.max(0.0001, maxY - minY);
      minX -= xRange * 0.08;
      maxX += xRange * 0.08;
      minY -= yRange * 0.08;
      maxY += yRange * 0.08;
      const sx = x => pad + ((x - minX) / Math.max(0.0001, maxX - minX)) * (width - pad * 2);
      const sy = y => height - pad - ((y - minY) / Math.max(0.0001, maxY - minY)) * (height - pad * 2);
      const shownIds = new Set(shown.map(p => p.paper_id));
      svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
      svg.innerHTML = '';
      for (let i = 0; i < 6; i++) {
        const x = pad + i * (width - pad * 2) / 5;
        const y = pad + i * (height - pad * 2) / 5;
        svg.insertAdjacentHTML('beforeend', `<line class="axis" x1="${x}" y1="${pad}" x2="${x}" y2="${height-pad}"></line>`);
        svg.insertAdjacentHTML('beforeend', `<line class="axis" x1="${pad}" y1="${y}" x2="${width-pad}" y2="${y}"></line>`);
      }
      svg.insertAdjacentHTML('beforeend', `<text x="${width / 2}" y="${height - 8}" text-anchor="middle" fill="#65758b" font-size="12">UMAP 1</text>`);
      svg.insertAdjacentHTML('beforeend', `<text x="16" y="${height / 2}" text-anchor="middle" fill="#65758b" font-size="12" transform="rotate(-90 16 ${height / 2})">UMAP 2</text>`);
      papers.forEach(p => {
        const visible = shownIds.has(p.paper_id);
        const selected = p.paper_id === state.selected;
        const x = sx(p.umap_x), y = sy(p.umap_y);
        const size = selected ? 7.5 : 6.5;
        const cls = `point ${visible ? '' : 'dim'} ${selected ? 'selected' : ''}`;
        const fill = colorFor(p.cluster);
        const node = document.createElementNS('http://www.w3.org/2000/svg', p.discussion_found ? 'path' : 'circle');
        node.setAttribute('class', cls);
        node.setAttribute('fill', fill);
        if (p.discussion_found) {
          const d = `M ${x} ${y - size} L ${x + size} ${y} L ${x} ${y + size} L ${x - size} ${y} Z`;
          node.setAttribute('d', d);
        } else {
          node.setAttribute('cx', x);
          node.setAttribute('cy', y);
          node.setAttribute('r', size);
        }
        node.addEventListener('click', () => {
          state.selected = p.paper_id;
          render();
        });
        node.appendChild(document.createElementNS('http://www.w3.org/2000/svg', 'title')).textContent = p.title;
        svg.appendChild(node);
      });
    }

    function renderDetails(p) {
      if (!p) return;
      const doi = p.doi ? `<a class="paper-link" href="https://doi.org/${escapeHtml(p.doi)}" target="_blank">DOI: ${escapeHtml(p.doi)}</a>` : '';
      const url = p.url ? `<a class="paper-link" href="${escapeAttr(p.url)}" target="_blank">Open paper URL</a>` : '';
      const nearest = (p.nearest_papers || []).map(n =>
        `<a class="paper-link" href="#" data-paper="${escapeAttr(n.paper_id)}">${clusterName(n.cluster)}, distance ${Number(n.distance).toFixed(3)}: ${escapeHtml(n.title)}</a>`
      ).join('');
      const discussionSummary = p.discussion_summary ?
        `<div class="section-title">Discussion Summary</div>${renderDiscussionSummary(p.discussion_summary)}` : '';
      const discussionExcerpt = '';
      const discussionStatus = p.discussion_found ?
        `<span class="pill">Discussion detected: ${p.discussion_paragraph_count} paragraphs</span>` :
        `<span class="pill">No explicit Discussion section detected</span>`;
      details.innerHTML = `
        <h2>${escapeHtml(p.title)}</h2>
        <div class="meta">${escapeHtml(p.authors)}<br>${escapeHtml(p.year)} · ${escapeHtml(p.venue)}</div>
        <span class="pill">${clusterName(p.cluster)}</span>
        <span class="pill">${escapeHtml(p.keyword)}</span>
        <span class="pill">Rep rank ${p.representative_rank}</span>
        <span class="pill">Medoid rank ${p.medoid_rank}</span>
        <span class="pill">LDA topic ${p.lda_topic} (${Math.round(p.lda_topic_probability * 100)}%)</span>
        ${discussionStatus}
        <div class="section-title">Cluster Label Candidate</div>
        <div class="abstract">${escapeHtml(p.cluster_label_candidate)}</div>
        <div class="section-title">Cluster Summary Candidate</div>
        <div class="abstract">${escapeHtml(p.cluster_summary_candidate)}</div>
        <div class="section-title">Design-Knowledge Contribution</div>
        <div>
          <span class="pill">Form: ${escapeHtml(p.design_knowledge_form || 'n/a')}</span>
          <span class="pill">Action: ${escapeHtml(p.design_knowledge_action || 'n/a')}</span>
        </div>
        <div class="abstract">${escapeHtml(p.design_knowledge_contribution || '')}</div>
        <div class="section-title">Paper-Oriented Facets</div>
        <div>
          <span class="pill">Context/Domain: ${escapeHtml(p.facet_population_or_context || 'n/a')}</span>
          <span class="pill">Population/Stakeholder: ${escapeHtml(p.facet_stakeholder_or_population || 'n/a')}</span>
          <span class="pill">Method/Lens: ${escapeHtml(p.facet_method_or_lens || 'n/a')}</span>
          <span class="pill">Artifact/System: ${escapeHtml(p.facet_artifact_or_domain || 'n/a')}</span>
          <span class="pill">Contribution Type: ${escapeHtml(p.facet_contribution_or_outcome || 'n/a')}</span>
        </div>
        <details class="lexical-evidence">
          <summary>Show lexical evidence</summary>
          <div class="evidence-block">
            <div class="section-title">Cluster Theme Evidence</div>
            <div class="abstract">${escapeHtml(p.cluster_theme_terms)}</div>
            <div class="section-title">Secondary Topic-Model Evidence</div>
            <div class="abstract">${escapeHtml(p.lda_topic_words)}</div>
          </div>
        </details>
        <div class="section-title">Abstract</div>
        <div class="abstract">${escapeHtml(p.abstract)}</div>
        ${discussionSummary}
        ${discussionExcerpt}
        <div class="section-title">Links</div>
        ${doi}${url}
        <div class="section-title">Nearest Papers by Cosine Distance</div>
        ${nearest || '<div class="meta">No nearest-paper data available.</div>'}
      `;
      details.querySelectorAll('[data-paper]').forEach(a => {
        a.addEventListener('click', evt => {
          evt.preventDefault();
          state.selected = a.getAttribute('data-paper');
          render();
        });
      });
      details.scrollTop = 0;
    }

    function renderDiscussionSummary(value) {
      const items = String(value || '').split('\n').map(line => line.replace(/^[-•]\s*/, '').trim()).filter(Boolean);
      if (!items.length) return '<div class="meta">No discussion summary available.</div>';
      return `<ul class="discussion-list">${items.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`;
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    }
    function escapeAttr(value) { return escapeHtml(value).replace(/`/g, '&#96;'); }

    initControls();
    render();
    window.addEventListener('resize', render);
  </script>
