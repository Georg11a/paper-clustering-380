<html lang="en">
<head>

  <style>
    :root {
      --ink: #253858;
      --muted: #65758b;
      --line: #d8e0ea;
      --bg: #f7f9fc;
      --panel: #ffffff;
      --accent: #2f7dd1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }
    header {
      padding: 18px 24px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }
    h1 { margin: 0; font-size: 22px; letter-spacing: 0; min-width: 0; }
    .controls {
      display: grid;
      grid-template-columns: 180px 210px;
      gap: 10px;
      align-items: center;
    }
    input, select, button {
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 10px;
      background: white;
      color: var(--ink);
      font-size: 14px;
    }
    button { background: var(--accent); color: white; border-color: var(--accent); cursor: pointer; }
    label.toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
    }
    label.toggle input { width: 16px; height: 16px; }
    main {
      display: grid;
      grid-template-columns: minmax(560px, 1fr) minmax(420px, 460px);
      gap: 14px;
      padding: 14px;
      min-height: calc(100vh - 92px);
      align-items: stretch;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .plot-panel { display: grid; grid-template-rows: auto 1fr auto; height: calc(100vh - 120px); min-height: 690px; }
    .status {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
    }
    svg { width: 100%; height: 100%; min-height: 560px; background: #fbfcfe; }
    .axis { stroke: #dfe6ef; stroke-width: 1; }
    .point { stroke: white; stroke-width: 1.5; cursor: pointer; opacity: 0.88; }
    .point.dim { opacity: 0.14; }
    .point.selected { stroke: #111827; stroke-width: 3; opacity: 1; }
    .legend, .cluster-list { padding: 10px 12px; border-top: 1px solid var(--line); }
    .legend { max-height: 180px; overflow-y: auto; }
    .legend-items { display: flex; flex-wrap: wrap; gap: 8px 14px; }
    .legend-item { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    .swatch { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .details { padding: 16px; overflow: auto; height: calc(100vh - 120px); min-height: 690px; align-self: stretch; }
    .details h2 { font-size: 18px; margin: 0 0 8px; line-height: 1.25; }
    .meta { color: var(--muted); font-size: 13px; line-height: 1.45; margin-bottom: 12px; }
    .pill {
      display: inline-flex;
      align-items: center;
      margin: 3px 5px 3px 0;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef4fb;
      color: #31577f;
      font-size: 12px;
    }
    .abstract { line-height: 1.5; font-size: 14px; color: #2f3b52; }
    details.discussion-full,
    details.lexical-evidence {
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      background: #fbfcfe;
    }
    details.discussion-full summary,
    details.lexical-evidence summary {
      cursor: pointer;
      color: #31577f;
      font-weight: 700;
      font-size: 13px;
    }
    details.lexical-evidence { margin-top: 16px; }
    .evidence-block { margin-top: 8px; }
    .discussion-list {
      margin: 6px 0 0;
      padding-left: 18px;
      line-height: 1.45;
      font-size: 14px;
      color: #2f3b52;
    }
    .discussion-list li { margin: 0 0 7px; }
    .section-title { margin: 16px 0 6px; font-weight: 700; font-size: 13px; text-transform: uppercase; color: var(--muted); }
    .paper-link { display: block; color: var(--accent); text-decoration: none; margin: 7px 0; font-size: 13px; line-height: 1.35; }
    .cluster-card { border-top: 1px solid var(--line); padding: 10px 12px; }
    .cluster-card button { height: 28px; padding: 0 8px; margin-top: 6px; font-size: 12px; }
    @media (max-width: 980px) {
      header { display: block; }
      h1 { margin-bottom: 12px; }
      .controls, main { grid-template-columns: 1fr; }
      .plot-panel { min-height: 560px; }
    }
  </style>

iven examples or interpret the designation of the verbal description that should apply to their context of interest. To summarize, the prevalent means of specification are not sufficiently rigorous to allow unambiguous interpretation of design patterns.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "JOOP", "doi": "", "url": "", "keyword": "Design Patterns", "cluster": 0, "cluster_theme_terms": "patterns, software, analysis, solutions, language, structural, modeling, level", "cluster_label_candidate": "Design Patterns: Methodological Contribution | Domain: Software, System, Cybersecurity; Design, Creativity, Architecture; Media, Communication, Entertainment", "distinguishing_evidence_terms": "Software Development, Participatory Futures, Implementing Patterns, Object-oriented Technology", "cluster_summary_candidate": "The deterministic first-pass typology codes the primary research contribution as methodological contribution. The decision is supported by 47/50 papers; weighted score 237; matched indicators include explicit methodological output (79). Its application domain coding is Software, System, Cybersecurity; Design, Creativity, Architecture; Media, Communication, Entertainment. Representative papers include Understanding and using patterns in software development; Design pattern in object-oriented technology.", "design_knowledge_form": "Design Patterns", "design_knowledge_action": "Methodological Contribution", "design_knowledge_role": "Automatic first-pass coding", "design_knowledge_contribution": "Methodological Contribution", "facet_population_or_context": "Education / Learning, Sustainability", "facet_stakeholder_or_population": "Designers, Developers, Practitioners, Children", "facet_method_or_lens": "Prototype, Workshop", "facet_artifact_or_domain": "Tool, Interface, Game, Prototype", "facet_contribution_or_outcome": "Methodological, Artifact/System, Theoretical", "um er interaction, virtual environments, ubiquitous computing, hypermedia and Web engineering. This kind of patterns that describe successful solutions to recurring design problems in terms of a specific domain of application are known as domain-specific patterns. The increasing number of available design patterns is making difficult to find the most appropriate one given a specific problem since this task requires mastery on existing design patterns. Hence, there is a need to introduce a formalism to describe them accurately and to allow a rigorous reasoning process to assist users to retrieve those patterns that solve their problems. With this purpose, we propose a semantic representation for domain-specific patterns based on the domain knowledge for which they were written and for which an ontology-based approach is applied. This representation is used as an underlying armature for complementing the informal textual pattern description by means of semantic annotations. The combination of the literary pattern representation with its formal representation counterpart could assist an intelligent search engine that supports users not just for retrieval purposes but also for the discovery useful design solutions improving, therefore, their ability to develop quality software.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Metainformatics. International Symposium, MIS 2004. Revised Selected Papers (Lecture Notes in Computer Science Vol. 3511)", "doi": "", "url": "", "keyword": "Design Patterns", "cluster": 1, "cluster_theme_terms": "patterns, domain, business, computer, application, practice, team, alexander", "cluster_label_candidate": "Design Patterns: Methodological Contribution | Domain: Education, Teaching, Research; Software, System, Cybersecurity; Design, Creativity, Architecture", "distinguishing_evidence_terms": "Semantic Representation, Human-computer Interaction Patterns, D , "title": "Architecture pattern organization", "authors": "Kapadia, Riaz (1); Sarkar, Santonu (1); Modi, Reva (1)", "abstract": "The successful adoption of design patterns in the software industry has had an important follow up by an effort towards a pattern based approach to architecture. Proponents of the pattern oriented approach to architecture define an architecture patterns to be an abstraction higher than design patterns which focus on solving subsystem and component realization, organization and interaction problems. Architecture by definition is not only functional subsystem decomposition; it includes domain definition, software organization, deployment as well as infrastructure (hardware and network) definition. Since no single pattern catalog covers all the architecture concerns, architects don't have a frame of reference to understand where each of the patterns fit in the overall architecture definition lifecycle. In this paper we propose a comprehensive architecture pattern organization scheme that extends the Pattern Oriented System Architecture pattern categories to encompass end to end architecture concerns.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2004", "venue": "Proceedings of the International Conference on Software Engineering Research and Practice, SERP'04", "doi": "", "url": "", "keyword": "Design Patterns", "cluster": 0, "cluster_theme_terms": "patterns, software, analysis, solutions, language, structural, modeling, level", "cluster_label_candidate": "Design Patterns: Methodological Contribution | Domain: Software, System, Cybersecurity; Design, Creativity, Architecture; Media, Communication, Entertainment", "distinguishing_evidence_terms": "Software Development, Participatory Futures, Implementing Patterns, Object-oriented Technology", "cluster_summary_candidate": "The deterministic first-pass typology codes the primary research contribution as methodological code", "authors": "Gil, Joseph (1); Maman, Itay (1)", "abstract": "Micro patterns are similar to design patterns, except that micro patterns stand at a lower, closer to the implementation, level of abstraction. Micro patterns are also unique in that they are mechanically recognizable, since each such pattern can be expressed as a formal condition on the structure of a class. This paper presents a catalog of 27 micro-patterns defined on JAVA classes and interfaces. The catalog captures a wide spectrum of common programming practices, including a particular and (intentionally restricted) use of inheritance, immutability, data management and wrapping, restricted creation, and emulation of procedural-, modular-, and even functional- programming paradigms with object oriented constructs. Together, the patterns present a set of prototypes after which a large portion of all JAVA classes and interfaces are modeled. We provide empirical indication that this portion is as high as 75%. A statistical analysis of occurrences of micro patterns in a large software corpus, spanning some 70,000 JAVA classes drawn from a rich set of application domains, shows, with high confidence level that the use of these patterns is not random. These results indicate consciousness and discernible design decisions, which are sustained in the software evolution. With high confidence level, we can also show that the use of these patterns is tied to the specification, or the purpose, that the software realizes. The traceability, abundance and the statistical significance of micro pattern occurrence raise the hope of using the classification of software into these patterns for a more founded appreciation of its design and code quality. Copyright 2005 ACM.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2005", "venue": "Proceedings of the Conference on Object-Oriented Programming Systems, Languages, and Applications, OOPSLA", "d ove [outcome] in [domain].", "application_domain_definitions": "Software, System, Cybersecurity: Covers software development, systems engineering, IT operations, privacy, and cybersecurity. Design, Creativity, Architecture: Covers UI/UX, product, graphic, and industrial design, creative practice, craft, and architecture. Media, Communication, Entertainment: Covers news, social media, communication, content production, entertainment, games, and sports."}, {"paper_id": "7d99b05f405e", "title": "Design Patterns for AI-based Systems: A Multivocal Literature Review and Pattern Repository", "authors": "L. Heiland; M. Hauser; J. Bogner", "abstract": "Systems with artificial intelligence components, so-called AI-based systems, have gained considerable attention recently. However, many organizations have issues with achieving production readiness with such systems. As a means to improve certain software quality attributes and to address frequently occurring problems, design patterns represent proven solution blueprints. While new patterns for AI-based systems are emerging, existing patterns have also been adapted to this new context.The goal of this study is to provide an overview of design patterns for AI-based systems, both new and adapted ones. We want to collect and categorize patterns, and make them accessible for researchers and practitioners. To this end, we first performed a multivocal literature review (MLR) to collect design patterns used with AI-based systems. We then integrated the created pattern collection into a web-based pattern repository to make the patterns browsable and easy to find.As a result, we selected 51 resources (35 white and 16 gray ones), from which we extracted 70 unique patterns used for AI-based systems. Among these are 34 new patterns and 36 traditional ones that have been adapted to this context. Popular pattern categories include architecture (25 patterns), deployment (16), implementation (9), or security & safety (9). While some patterns d doctrines. By thinking about law through legal design patterns, living law becomes defined through interaction. I explore this connection between spatial and material arrangements and legal interaction they manifest and enable. This analysis makes it possible to compare law‚Äôs old material manifestations with its new places and things that rely on digital technologies. This shift of focus to legal interaction enables us to ask what legal interaction is, how it should be designed, and by whom, reconceptualising the dynamics of law, technology, and design. Ultimately, legal design patterns may provide us with conceptual and methodological tools for designing user-centric justice.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2024", "venue": "Digital Society", "doi": "", "url": "https://www.semanticscholar.org/paper/1011c572d0207c2203619839525ce10850c028e4", "keyword": "Design Patterns", "cluster": 1, "cluster_theme_terms": "patterns, domain, business, computer, application, practice, team, alexander", "cluster_label_candidate": "Design Patterns: Methodological Contribution | Domain: Education, Teaching, Research; Software, System, Cybersecurity; Design, Creativity, Architecture", "distinguishing_evidence_terms": "Semantic Representation, Human-computer Interaction Patterns, Domain, Overview", "cluster_summary_candidate": "The deterministic first-pass typology codes the primary research contribution as methodological contribution. The decision is supported by 14/17 papers; weighted score 60; matched indicators include explicit methodological output (20). Its application domain coding is Education, Teaching, Research; Software, System, Cybersecurity; Design, Creativity, Architecture. Representative papers include A pattern approach to interaction design; A pattern approach to interaction design.", "design_knowledge_form": "Design Patterns", "design_knowledge_action": "Methodological Contribu on_domain_support": "Software, System, Cybersecurity: 14/50 papers; Design, Creativity, Architecture: 8/50 papers; Media, Communication, Entertainment: 8/50 papers", "contribution_type_definition": "Develops a research or design method, evaluation approach, analytical framework, process, guideline, or principle.", "contribution_summary_fields": "method subtype; target activity; intended user; desired outcome; validation", "contribution_summary_template": "Proposes [guidelines/framework/method] for [design or research activity], intended to improve [outcome] in [domain].", "application_domain_definitions": "Software, System, Cybersecurity: Covers software development, systems engineering, IT operations, privacy, and cybersecurity. Design, Creativity, Architecture: Covers UI/UX, product, graphic, and industrial design, creative practice, craft, and architecture. Media, Communication, Entertainment: Covers news, social media, communication, content production, entertainment, games, and sports."}, {"paper_id": "0783409933b4", "title": "A Two-Dimensional Framework for AI Agent Design Patterns: Cognitive Function and Execution Topology", "authors": "Jia Huang; J. Zhou", "abstract": "Existing frameworks for LLM-based agent architectures describe systems from a single perspective: industry guides (Anthropic, Google, LangChain) focus on execution topology -- how data flows -- while cognitive science surveys focus on cognitive function -- what the agent does. Neither axis alone disambiguates architecturally distinct systems: the same Orchestrator-Workers topology can implement Plan-and-Execute, Hierarchical Delegation, or Adversarial Verification -- three patterns with fundamentally different failure modes and design trade-offs. We propose a two-dimensional classification that combines (1) a Cognitive Function axis with seven categories (Perception, Memory, Reasoning, Action, Reflection, Collaboration, Governance) and (2) an Execution Topology axis with six structural archetypes (Chain, Route, Parallel, Orchestrate, Loop, Hierarchy). The resulting 7x6 matrix identifies 28 named patterns, 15 with original names. We demonstrate orthogonality through systematic cross-axis analysis, define eight representative patterns in detail, and validate descriptive coverage across four real-world domains (financial lending, legal due diligence, network operations, healthcare triage). Cross-domain analysis yields five empirical laws of pattern selection governing the relationship between environmental constraints (time pressure, action authority, failure cost asymmetry, volume) and architectural choices. The framework provides a principled, framework-neutral, and model-agnostic vocabulary for AI agent architecture design.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2026", "venue": "", "doi": "", "url": "https://www.semanticscholar.org/paper/67855ed25bb27f6a2f8bae704fdd2d35c8891262", "keyword": "Design Patterns", "cluster": 0, "cluster_theme_terms": "patterns, software, analysis, solutions, language, structural, modeling, level", "cluster_label_candidate": "Design Patterns: Methodological Contribution | Domain: Software, System, Cybersecurity; Design, Creativity, Architecture; Media, Communication, Entertainment", "distinguishing_evidence_terms": "Software Development, Participatory Futures, Implementing Patterns, Object-oriented Technology", "cluster_summary_candidate": "The deterministic first-pass typology codes the primary research contribution as methodological contribution. The decision is supported by 47/50 papers; weighted score 237; matched indicators include explicit methodological output (79). Its application domain coding is Software, System, Cybersecurity; Design, Creativity, Architecture; Media, Communication, Entertainment. Representative papers include Understanding and using patterns in software development; Design pattern in object-oriented technology.", "de  offer high-level conceptual frameworks, these often lack the granularity necessary to support the practical needs of designers who must identify, understand, and apply specific mechanics in diverse game development contexts. This research addresses that gap by outlining the utility of a structured theoretical model that compiles and organises hundreds of individual game mechanics, not only describing them but also demonstrating a practice-oriented rationale. The model has two primary aims: to assist designers in conceptualising and navigating the broad array of mechanical possibilities, thereby supporting creative ideation and analytical problem-solving; and to provide a robust and pedagogically effective foundation for game design education. A theoretical model could bridge the gap between abstract theoretical models and the practical demands of game design practice. A model such as the one described here would enable a more direct and effective translation of theory into practice, equipping designers with a more precise vocabulary and educators with a clearer pedagogical structure for explaining complex gameplay systems. By refining the connection between gameplay theory and design implementation, this research contributes to the evolving body of knowledge in game studies and design education, offering a new perspective on how mechanical complexity can be better understood, taught, and applied in creative contexts. The framework also opens new avenues for further research into game design patterns, player experience, and curriculum development, reinforcing the central role of mechanics in shaping both game systems and player engagement.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2025", "venue": "European Conference on Games Based Learning", "doi": "", "url": "https://www.semanticscholar.org/paper/7f6e881f023b0fe5f2281893261c1c7df62ed203", "keyword": "Design Patterns", "cluster": 0, "c ern contexts, few studies analyse design patterns in an Asian, and in particular the Vietnamese context. More research is needed in the cross-cultural adaptation of educational design patterns that joins practice and theory.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2024", "venue": "Journal of Work-Applied Management", "doi": "", "url": "https://www.semanticscholar.org/paper/a289e650dcf66ee89360651d91afbb407cca0c77", "keyword": "Design Patterns", "cluster": 1, "cluster_theme_terms": "patterns, domain, business, computer, application, practice, team, alexander", "cluster_label_candidate": "Design Patterns: Methodological Contribution | Domain: Education, Teaching, Research; Software, System, Cybersecurity; Design, Creativity, Architecture", "distinguishing_evidence_terms": "Semantic Representation, Human-computer Interaction Patterns, Domain, Overview", "cluster_summary_candidate": "The deterministic first-pass typology codes the primary research contribution as methodological contribution. The decision is supported by 14/17 papers; weighted score 60; matched indicators include explicit methodological output (20). Its application domain coding is Education, Teaching, Research; Software, System, Cybersecurity; Design, Creativity, Architecture. Representative papers include A pattern approach to interaction design; A pattern approach to interaction design.", "design_knowledge_form": "Design Patterns", "design_knowledge_action": "Methodological Contribution", "design_knowledge_role": "Automatic first-pass coding", "design_knowledge_contribution": "Methodological Contribution", "facet_population_or_context": "Education / Learning", "facet_stakeholder_or_population": "Developers, Designers, Domain Experts, Practitioners", "facet_method_or_lens": "Interview, Ontology", "facet_artifact_or_domain": "Interface, Tool, Robot", "facet_contribution_or_outcome": "Methodological, Artifact/System, Theor ed pattern languages thus gave the teachers an overview of their practice that would otherwise be difficult to obtain. The content of the design patterns show what problems that are dealt with by the teachers through their design solutions. The structure of the final pattern language shows how problems and solutions are connected to larger goals for the teachers, such as improving the communication with students, as well as the importance of sharing good examples between colleagues.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2018", "venue": "", "doi": "", "url": "https://www.semanticscholar.org/paper/a61eca6d22ff2d451e296be24f69dcfa9aed96fd", "keyword": "Design Patterns", "cluster": 0, "cluster_theme_terms": "patterns, software, analysis, solutions, language, structural, modeling, level", "cluster_label_candidate": "Design Patterns: Methodological Contribution | Domain: Software, System, Cybersecurity; Design, Creativity, Architecture; Media, Communication, Entertainment", "distinguishing_evidence_terms": "Software Development, Participatory Futures, Implementing Patterns, Object-oriented Technology", "cluster_summary_candidate": "The deterministic first-pass typology codes the primary research contribution as methodological contribution. The decision is supported by 47/50 papers; weighted score 237; matched indicators include explicit methodological output (79). Its application domain coding is Software, System, Cybersecurity; Design, Creativity, Architecture; Media, Communication, Entertainment. Representative papers include Understanding and using patterns in software development; Design pattern in object-oriented technology.", "design_knowledge_form": "Design Patterns", "design_knowledge_action": "Methodological Contribution", "design_knowledge_role": "Automatic first-pass coding", "design_knowledge_contribution": "Methodological Contribution", "facet_population_or_context": "Educati em, Cybersecurity: software/system/cybersecurity setting; Design, Creativity, Architecture: design/creativity/architecture setting; Media, Communication, Entertainment: media/communication/entertainment setting", "application_domain_support": "Software, System, Cybersecurity: 14/50 papers; Design, Creativity, Architecture: 8/50 papers; Media, Communication, Entertainment: 8/50 papers", "contribution_type_definition": "Develops a research or design method, evaluation approach, analytical framework, process, guideline, or principle.", "contribution_summary_fields": "method subtype; target activity; intended user; desired outcome; validation", "contribution_summary_template": "Proposes [guidelines/framework/method] for [design or research activity], intended to improve [outcome] in [domain].", "application_domain_definitions": "Software, System, Cybersecurity: Covers software development, systems engineering, IT operations, privacy, and cybersecurity. Design, Creativity, Architecture: Covers UI/UX, product, graphic, and industrial design, creative practice, craft, and architecture. Media, Communication, Entertainment: Covers news, social media, communication, content production, entertainment, games, and sports."}, {"paper_id": "368e4036648e", "title": "From Directional Stimuli to Prompt Architectures: Documenting the Practice of Meta-Prompting", "authors": "D. Ligot", "abstract": "As large language models (LLMs) transition from experimental tools to core components of production systems, the limitations of ad-hoc, instance-specific prompting have become increasingly apparent. In response, practitioners and researchers have begun to adopt meta-prompting: a family of prompt engineering practices that operate at a higher level of abstraction by defining how prompts themselves should be structured, generated, and governed across classes of tasks. This paper documents and formalizes the practice of meta-prompting as a distinct design paradigm. \n\n We present a unified conceptual definition of meta-prompting, emphasizing its focus on reusable structures, task-level abstraction, and the separation of prompt logic from task content. Building on this definition, we introduce a layered model of prompt abstraction and a comprehensive taxonomy of meta-prompting practices, including framework based prompting, prompt-generation loops, structured prompt representations, reasoning templates, governance layers, and multi-agent orchestration. We further analyze the relationship between meta-prompting and directional stimulus prompting (DSP), positioning meta-prompting as an evolutionary generalization that extends instance-level steering into full prompt architectures.¬†\n\n\n Through concrete design patterns and real-world applications‚Äîranging from enterprise standardization and compliance workflows to agent systems and orchestration frameworks‚Äîwe demonstrate how meta-prompting enables scalable, consistent, and governable LLM deployments. We conclude by discussing key limitations, open challenges, and future research directions, including automated meta-prompt learning, formal evaluation metrics, and integration with LLM operations. Together, these contributions position meta-prompting as a foundational paradigm for the design and operation of modern AI systems.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2026", "venue": "Social Science Research Network", "doi": "", "url": "https://www.semanticscholar.org/paper/cc6622c7b5aec35fb3b4174aa730a28c6c5c0844", "keyword": "Design Patterns", "cluster": 0, "cluster_theme_terms": "patterns, software, analysis, solutions, language, structural, modeling, level", "cluster_label_candidate": "Design Patterns: Methodological Contribution | Domain: Software, System, Cybersecurity; Design, Creativity, Architecture; Media, Communication, Entertainment", "distinguishing_evidence_terms": "Software Development, Participatory Futures, I   <script>
    const data = JSON.parse(document.getElementById('payload').textContent);
    const papers = data.papers;
    const palette = ['#f05a71','#4c78a8','#f58518','#54a24b','#b279a2','#72b7b2','#eeca3b','#ff9da6','#9d755d','#59a14f','#edc948','#76b7b2'];
    const colorFor = c => palette[Math.abs(Number(c)) % palette.length];
    const clusterName = c => Number(c) === -1 ? 'Unclustered papers' : `Cluster ${c}`;
    const clusterLegendLabel = c => {
      const label = String(c.label || c.theme || '').trim();
      if (!label) return clusterName(c.cluster);
      return /^Cluster\s+-?\d+:/i.test(label) ? label : `${clusterName(c.cluster)}: ${label}`;
    };
    const state = { selected: papers[0]?.paper_id || null };
    const svg = document.getElementById('plot');
    const details = document.getElementById('details');
    const status = document.getElementById('status');

    function initControls() {
      const clusterFilter = document.getElementById('clusterFilter');
      data.clusters.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.cluster;
        opt.textContent = `${clusterName(c.cluster)} (${c.count})`;
        clusterFilter.appendChild(opt);
      });
      ['clusterFilter'].forEach(id => {
        document.getElementById(id).addEventListener('input', render);
        document.getElementById(id).addEventListener('change', render);
      });
      renderLegend();
    }

    function filteredPapers() {
      const cluster = document.getElementById('clusterFilter').value;
      return papers.filter(p => {
        return (cluster === 'all' || String(p.cluster) === cluster);
      });
    }

    function renderLegend() {
      const legend = document.getElementById('legend');
      legend.innerHTML = '';
      data.clusters.forEach(c => {
        const item = document.createElement('span');
        item.className = 'legend-item';
        item.innerHTML = `<span class="swatch" style="background:${colorFor(c.cluster)}"></span> ${escapeHtml(clusterLegendLabel(c))}`;
        legend.appendChild(item);
      });
      const shapeNote = document.createElement('span');
      shapeNote.className = 'legend-item';
      shapeNote.innerHTML = '<span>◆ Discussion detected</span><span>● No explicit discussion</span>';
      legend.appendChild(shapeNote);
    }

    function render() {
      const shown = filteredPapers();
      status.textContent = `${shown.length} of ${papers.length} papers shown; ${data.clusters.length} clusters in this view. Axes are UMAP 1 and UMAP 2 coordinates, not interpretable variables.`;
      drawPlot(shown);
      renderDetails(papers.find(p => p.paper_id === state.selected) || shown[0] || papers[0]);
    }

    function drawPlot(shown) {
      const width = svg.clientWidth || 900;
      const height = svg.clientHeight || 560;
      const pad = 44;
      const xs = papers.map(p => p.umap_x), ys = papers.map(p => p.umap_y);
      let minX = Math.min(...xs), maxX = Math.max(...xs), minY = Math.min(...ys), maxY = Math.max(...ys);
      const xRange = Math.max(0.0001, maxX - minX);
      const yRange = Math.max(0.0001, maxY - minY);
      minX -= xRange * 0.08;
      maxX += xRange * 0.08;
      minY -= yRange * 0.08;
      maxY += yRange * 0.08;
      const sx = x => pad + ((x - minX) / Math.max(0.0001, maxX - minX)) * (width - pad * 2);
      const sy = y => height - pad - ((y - minY) / Math.max(0.0001, maxY - minY)) * (height - pad * 2);
      const shownIds = new Set(shown.map(p => p.paper_id));
      svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
      svg.innerHTML = '';
      for (let i = 0; i < 6; i++) {
        const x = pad + i * (width - pad * 2) / 5;
        const y = pad + i * (height - pad * 2) / 5;
        svg.insertAdjacentHTML('beforeend', `<line class="axis" x1="${x}" y1="${pad}" x2="${x}" y2="${height-pad}"></line>`);
        svg.insertAdjacentHTML('beforeend', `<line class="axis" x1="${pad}" y1="${y}" x2="${width-pad}" y2="${y}"></line>`);
      }
      svg.insertAdjacentHTML('beforeend', `<text x="${width / 2}" y="${height - 8}" text-anchor="middle" fill="#65758b" font-size="12">UMAP 1</text>`);
      svg.insertAdjacentHTML('beforeend', `<text x="16" y="${height / 2}" text-anchor="middle" fill="#65758b" font-size="12" transform="rotate(-90 16 ${height / 2})">UMAP 2</text>`);
      papers.forEach(p => {
        const visible = shownIds.has(p.paper_id);
        const selected = p.paper_id === state.selected;
        const x = sx(p.umap_x), y = sy(p.umap_y);
        const size = selected ? 7.5 : 6.5;
        const cls = `point ${visible ? '' : 'dim'} ${selected ? 'selected' : ''}`;
        const fill = colorFor(p.cluster);
        const node = document.createElementNS('http://www.w3.org/2000/svg', p.discussion_found ? 'path' : 'circle');
        node.setAttribute('class', cls);
        node.setAttribute('fill', fill);
        if (p.discussion_found) {
          const d = `M ${x} ${y - size} L ${x + size} ${y} L ${x} ${y + size} L ${x - size} ${y} Z`;
          node.setAttribute('d', d);
        } else {
          node.setAttribute('cx', x);
          node.setAttribute('cy', y);
          node.setAttribute('r', size);
        }
        node.addEventListener('click', () => {
          state.selected = p.paper_id;
          render();
        });
        node.appendChild(document.createElementNS('http://www.w3.org/2000/svg', 'title')).textContent = p.title;
        svg.appendChild(node);
      });
    }

    function renderDetails(p) {
      if (!p) return;
      const doi = p.doi ? `<a class="paper-link" href="https://doi.org/${escapeHtml(p.doi)}" target="_blank">DOI: ${escapeHtml(p.doi)}</a>` : '';
      const url = p.url ? `<a class="paper-link" href="${escapeAttr(p.url)}" target="_blank">Open paper URL</a>` : '';
      const nearest = (p.nearest_papers || []).map(n =>
        `<a class="paper-link" href="#" data-paper="${escapeAttr(n.paper_id)}">${clusterName(n.cluster)}, distance ${Number(n.distance).toFixed(3)}: ${escapeHtml(n.title)}</a>`
      ).join('');
      const discussionSummary = p.discussion_summary ?
        `<div class="section-title">Discussion Summary</div>${renderDiscussionSummary(p.discussion_summary)}` : '';
      const discussionExcerpt = '';
      const discussionStatus = p.discussion_found ?
        `<span class="pill">Discussion detected: ${p.discussion_paragraph_count} paragraphs</span>` :
        `<span class="pill">No explicit Discussion section detected</span>`;
      details.innerHTML = `
        <h2>${escapeHtml(p.title)}</h2>
        <div class="meta">${escapeHtml(p.authors)}<br>${escapeHtml(p.year)} · ${escapeHtml(p.venue)}</div>
        <span class="pill">${clusterName(p.cluster)}</span>
        <span class="pill">${escapeHtml(p.keyword)}</span>
        <span class="pill">Rep rank ${p.representative_rank}</span>
        <span class="pill">Medoid rank ${p.medoid_rank}</span>
        <span class="pill">LDA topic ${p.lda_topic} (${Math.round(p.lda_topic_probability * 100)}%)</span>
        ${discussionStatus}
        <div class="section-title">Cluster Descriptor</div>
        <div class="abstract">${escapeHtml(p.cluster_label_candidate)}</div>
        <div class="section-title">Distinguishing Evidence</div>
        <div class="abstract">${escapeHtml(p.distinguishing_evidence_terms || p.cluster_theme_terms || 'n/a')}</div>
        <div class="section-title">Cluster Summary Candidate</div>
        <div class="abstract">${escapeHtml(p.cluster_summary_candidate)}</div>
        <div class="section-title">Research Contribution &amp; Domain</div>
        <div>
          <span class="pill">Form: ${escapeHtml(p.design_knowledge_form || 'n/a')}</span>
          <span class="pill">Primary: ${escapeHtml(p.contribution_type || 'n/a')}</span>
          ${p.contribution_type_secondary ? `<span class="pill">Secondary: ${escapeHtml(p.contribution_type_secondary)}</span>` : ''}
          <span class="pill">Domain: ${escapeHtml(p.application_domains || 'n/a')}</span>
        </div>
        <div class="meta">Contribution support: ${escapeHtml(p.contribution_type_support || 'n/a')}</div>
        <div class="meta">Contribution definition: ${escapeHtml(p.contribution_type_definition || 'n/a')}</div>
        <div class="meta">Contribution patterns: ${escapeHtml(p.contribution_type_patterns || 'n/a')}</div>
        <div class="meta">Domain support: ${escapeHtml(p.application_domain_support || 'n/a')}</div>
        <div class="meta">Domain definition: ${escapeHtml(p.application_domain_definitions || 'n/a')}</div>
        ${p.theory_move_key !== 'not_applicable' && p.theory_move_key !== 'n/a' ? `
        <div class="section-title">Path 1 Theory Move</div>
        <div>
          <span class="pill">Theory move: ${escapeHtml(p.theory_move || 'n/a')}</span>
          <span class="pill">Support: ${escapeHtml(p.theory_move_support || 'n/a')}</span>
        </div>
        <div class="meta">Matched patterns: ${escapeHtml(p.theory_move_patterns || 'n/a')}</div>` : ''}
        <div class="section-title">Paper-Oriented Facets</div>
        <div>
          <span class="pill">Context/Domain: ${escapeHtml(p.facet_population_or_context || 'n/a')}</span>
          <span class="pill">Population/Stakeholder: ${escapeHtml(p.facet_stakeholder_or_population || 'n/a')}</span>
          <span class="pill">Method/Lens: ${escapeHtml(p.facet_method_or_lens || 'n/a')}</span>
          <span class="pill">Artifact/System: ${escapeHtml(p.facet_artifact_or_domain || 'n/a')}</span>
          <span class="pill">Contribution Type: ${escapeHtml(p.facet_contribution_or_outcome || 'n/a')}</span>
        </div>
        <details class="lexical-evidence">
          <summary>Show lexical evidence</summary>
          <div class="evidence-block">
            <div class="section-title">Cluster Theme Evidence</div>
            <div class="abstract">${escapeHtml(p.cluster_theme_terms)}</div>
            <div class="section-title">Secondary Topic-Model Evidence</div>
            <div class="abstract">${escapeHtml(p.lda_topic_words)}</div>
          </div>
        </details>
        <div class="section-title">Abstract</div>
        <div class="abstract">${escapeHtml(p.abstract)}</div>
        ${discussionSummary}
        ${discussionExcerpt}
        <div class="section-title">Links</div>
        ${doi}${url}
        <div class="section-title">Nearest Papers by Cosine Distance</div>
        ${nearest || '<div class="meta">No nearest-paper data available.</div>'}
      `;
      details.querySelectorAll('[data-paper]').forEach(a => {
        a.addEventListener('click', evt => {
          evt.preventDefault();
          state.selected = a.getAttribute('data-paper');
          render();
        });
      });
      details.scrollTop = 0;
    }

    function renderDiscussionSummary(value) {
      const items = String(value || '').split('\n').map(line => line.replace(/^[-•]\s*/, '').trim()).filter(Boolean);
      if (!items.length) return '<div class="meta">No discussion summary available.</div>';
      return `<ul class="discussion-list">${items.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`;
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    }
    function escapeAttr(value) { return escapeHtml(value).replace(/`/g, '&#96;'); }

    initControls();
    render();
    window.addEventListener('resize', render);
  </script>
</body>
</html>
