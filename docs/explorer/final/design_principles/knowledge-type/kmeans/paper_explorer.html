<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paper Corpus Explorer (tfidf-svd, kmeans, knowledge-type view)</title>
  <style>
    :root {
      --ink: #253858;
      --muted: #65758b;
      --line: #d8e0ea;
      --bg: #f7f9fc;
      --panel: #ffffff;
      --accent: #2f7dd1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }
    header {
      padding: 18px 24px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }
    h1 { margin: 0; font-size: 22px; letter-spacing: 0; min-width: 0; }
    .controls {
      display: grid;
      grid-template-columns: 180px 210px;
      gap: 10px;
      align-items: center;
    }
    input, select, button {
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 10px;
      background: white;
      color: var(--ink);
      font-size: 14px;
    }
    button { background: var(--accent); color: white; border-color: var(--accent); cursor: pointer; }
    label.toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
    }
    label.toggle input { width: 16px; height: 16px; }
    main {
      display: grid;
      grid-template-columns: minmax(560px, 1fr) minmax(420px, 460px);
      gap: 14px;
      padding: 14px;
      min-height: calc(100vh - 92px);
      align-items: stretch;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .plot-panel { display: grid; grid-template-rows: auto 1fr auto; height: calc(100vh - 120px); min-height: 690px; }
    .status {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
    }
    svg { width: 100%; height: 100%; min-height: 560px; background: #fbfcfe; }
    .axis { stroke: #dfe6ef; stroke-width: 1; }
    .point { stroke: white; stroke-width: 1.5; cursor: pointer; opacity: 0.88; }
    .point.dim { opacity: 0.14; }
    .point.selected { stroke: #111827; stroke-width: 3; opacity: 1; }
    .legend, .cluster-list { padding: 10px 12px; border-top: 1px solid var(--line); }
    .legend { max-height: 118px; overflow-y: auto; }
    .legend-items { display: flex; flex-wrap: wrap; gap: 8px 14px; }
    .legend-item { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    .swatch { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .details { padding: 16px; overflow: auto; height: calc(100vh - 120px); min-height: 690px; align-self: stretch; }
    .details h2 { font-size: 18px; margin: 0 0 8px; line-height: 1.25; }
    .meta { color: var(--muted); font-size: 13px; line-height: 1.45; margin-bottom: 12px; }
    .pill {
      display: inline-flex;
      align-items: center;
      margin: 3px 5px 3px 0;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef4fb;
      color: #31577f;
      font-size: 12px;
    }
    .abstract { line-height: 1.5; font-size: 14px; color: #2f3b52; }
    details.discussion-full,
    details.lexical-evidence {
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      background: #fbfcfe;
    }
    details.discussion-full summary,
    details.lexical-evidence summary {
      cursor: pointer;
      color: #31577f;
      font-weight: 700;
      font-size: 13px;
    }
    details.lexical-evidence { margin-top: 16px; }
    .evidence-block { margin-top: 8px; }
    .discussion-list {
      margin: 6px 0 0;
      padding-left: 18px;
      line-height: 1.45;
      font-size: 14px;
      color: #2f3b52;
    }
    .discussion-list li { margin: 0 0 7px; }
    .section-title { margin: 16px 0 6px; font-weight: 700; font-size: 13px; text-transform: uppercase; color: var(--muted); }
    .paper-link { display: block; color: var(--accent); text-decoration: none; margin: 7px 0; font-size: 13px; line-height: 1.35; }
    .cluster-card { border-top: 1px solid var(--line); padding: 10px 12px; }
    .cluster-card button { height: 28px; padding: 0 8px; margin-top: 6px; font-size: 12px; }
    @media (max-width: 980px) {
      header { display: block; }
      h1 { margin-bottom: 12px; }
      .controls, main { grid-template-columns: 1fr; }
      .plot-panel { min-height: 560px; }
    }
  </style>
</head>

ncluding differentiation, and (iii) supporting alternative means for learners' action and expression to demonstrate acquired knowledge and skills. We anticipate the conceptualisation of CPELDS to stimulate the representational form of an LD tool towards supporting educators as designers of PL.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "2022 International Conference on Advanced Learning Technologies (ICALT)", "doi": "10.1109/ICALT55010.2022.00030", "url": "", "keyword": "Design principles", "cluster": 3, "cluster_theme_terms": "learners, special, cpelds, educational, personalised, learning framework, neurodiverse, education", "cluster_label_candidate": "Defines Design Principles Through Conceptual Framing", "cluster_summary_candidate": "This cluster defines and conceptualizes design principles, emphasizing how a design-knowledge construct is made explicit, organized, or put to work rather than only where it is applied. Related knowledge forms include Design Frameworks, Design Guidelines. The shared move also involves evidence-based evaluation and synthesis of prior work. Its contribution pattern is coded as Methodological, Artifact/System, Empirical. Application and method terms are supporting facets, especially contexts such as Education / Learning. Representative papers include Acquiring educational access for neurodiverse learners through multisensory design principles; Personalising learning: towards a coherent learning design framework.", "facet_population_or_context": "Education / Learning", "facet_stakeholder_or_population": "Designers, Developers, Children", "facet_method_or_lens": "", "facet_artifact_or_domain": "Interface, Tool", "facet_contribution_or_outcome": "Methodological, Artifact/System, Empirical", "umap_x": 6.855621814727783, "umap_y": -1.4101728200912476, "distance_to_centroid": 0.17589461467189005, "representative_rank": 2, "is_representative_top3": true experts in the field of open and distance education to obtain their feedback on its usability, applicability and significance. The qualitative data obtained in the first phase was analysed by using content analysis while the quantitative data obtained in the other phases were analysed by calculating the distribution of frequencies and measures of central tendency. Results of the Delphi rounds and the focus group interview yielded a checklist of adaptive gamification design principles for online courses comprising 102 design principles under 11 themes.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "", "venue": "Behaviour & Information Technology", "doi": "10.1080/0144929X.2020.1817559", "url": "", "keyword": "Design principles", "cluster": 0, "cluster_theme_terms": "adaptive, expectations, gamification, software, theoretical, courses, level, principles online", "cluster_label_candidate": "Defines Design Principles Through Conceptual Framing", "cluster_summary_candidate": "This cluster defines and conceptualizes design principles, emphasizing how a design-knowledge construct is made explicit, organized, or put to work rather than only where it is applied. Related knowledge forms include Design Theory. The shared move also involves synthesis of prior work and evidence-based evaluation. Its contribution pattern is coded as Methodological, Empirical, Artifact/System. Application and method terms are supporting facets, especially methods or lenses such as Case Study, Interview and contexts such as Education / Learning. Representative papers include Design Obligations for Software, with Examples from Data Abstraction and Adaptive Systems; Analysing adaptive gamification design principles for online courses.", "facet_population_or_context": "Education / Learning", "facet_stakeholder_or_population": "", "facet_method_or_lens": "Case Study, Interview", "facet_artifact_or_domain": "", "facet_contribution_or_outcome": "Methodological, Empirical, Artifact/System", "umap_x": 6.987399578094482, "umap_y": -2.0749168395996094, "distance_to_centroid": 0.22157078171894162, "representative_rank": 2, "is_representative_top3": true, "medoid_rank": 1, "lda_topic": 4, "lda_topic_probability": 0.9355398012650123, "lda_topic_words": "practice, analysis, literature, adaptive, approaches, education, principles data, aims", "nearest_papers": [{"paper_id": "fee96194a322", "title": "Personalising learning: towards a coherent learning design framework", "cluster": 3, "distance": 0.7709817555772821}, {"paper_id": "44848ca19e31", "title": "Design Obligations for Software, with Examples from Data Abstraction and Adaptive Systems", "cluster": 0, "distance": 0.788095904252681}, {"paper_id": "01467836cecf", "title": "Design principles for human-computer interfaces", "cluster": 1, "distance": 0.7942083406864371}, {"paper_id": "d893185b7873", "title": "Introduction to Initial HCI Engineering Design Principles for Domestic Energy Planning and Control", "cluster": 1, "distance": 0.8475766001908922}, {"paper_id": "0b35e34543e2", "title": "Designing Artificial Identity: The Identity Design Framework and Research Agenda", "cluster": 2, "distance": 0.8585388511295432}], "design_knowledge_form": "Design Principles", "design_knowledge_action": "defines and conceptualizes", "design_knowledge_contribution": "defines and conceptualizes Design Principles"}, {"paper_id": "31bdafb1fc73", "title": "Explainable Medical Imaging AI Needs Human-Centered Design: Guidelines and Evidence from a Systematic Review", "authors": "Chen, Haomin (1); Gomez, Catalina (1); Huang, Chien-Ming (1); Unberath, Mathias (1)", "abstract": "Transparency in Machine Learning (ML) attempts to reveal the working mechanisms of complex models. From a human-centered design perspective, transparency is not a property of the ML model but an affordance, i. e., a relationship between algorithm and user. Thus, prototyping and user evaluations are critical to attaining solutions that afford transparency. Following human-centered design principles in highly specialized and high stakes domains, such as medical image analysis, is challenging due to the limited access to end users. This dilemma is further exacerbated by the high knowledge imbalance between ML designers and end users. To investigate the state of transparent ML in medical image analysis, we conducted a systematic review of the literature by screening titles, abstracts, and keywords of all available records from January 2012 through July 2021 in PubMed, EMBASE, and Compendex databases. We identified 2508 records and 68 articles met the inclusion criteria. We found that current techniques in transparent ML are dominated by computational feasibility, and barely consider end users, during neither development nor evaluation. Despite the considerable difference between the roles and knowledge of ML developers and clinical stakeholders, no study reported formative user research to inform the design and development of transparent ML models. Only a few studies validated transparency claims through empirical user evaluations. These shortcomings put contemporary research on transparent ML at risk of being incomprehensible to users, and thus, clinically irrelevant. To alleviate these shortcomings in forthcoming research while acknowledging the challenges of human-centered design in healthcare, we introduce the INTRPRT guideline, a systematic design directive for transparent ML systems in medical image analysis. The INTRPRT guideline suggests human-centered design principles and highly recommends formative user research as the first step of transparent model design to understand user needs and domain requirements. It further provides alternatives to empirical user evaluation to support transparent ML design choices to facilitate the adoption of human-centered design principles. Following these guidelines and a human-centered design process increases the likelihood that the algorithms afford transparency and enables stakeholders to capitalize on the benefits of transparent ML. ¬© 2021, CC BY.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2021", "venue": "arXiv", "doi": "", "url": "", "keyword": "Design principles", "cluster": 1, "cluster_theme_terms": "engineering, energy, computer, domestic, centered, control, planning, chapter", "cluster_label_candidate": "Synthesizes Design Principles into Shared Design Constructs", "cluster_summary_candidate": "This cluster synthesizes prior work on design principles, emphasizing how a design-knowledge construct is made explicit, organized, or put to work rather than only where it is applied. Related knowledge forms include Design Theory, Design Guidelines. The shared move also involves definition and conceptualization and evidence-based evaluation. Its contribution pattern is coded as Methodological, Artifact/System, Theoretical. Application and method terms are supporting facets, especially methods or lenses such as Systematic Review, Prototype and contexts such as Healthcare. Representative papers include Introduction to Initial HCI Engineering Design Principles for Domestic Energy Planning and Control; Design principles for human-computer interfaces.", "facet_population_or_context": "Healthcare", "facet_stakeholder_or_population": "Designers, Developers", "facet_method_or_lens": "Systematic Review, Prototype", "facet_artifact_or_domain": "Interface, Prototype", "facet_contribution_or_outcome": "Methodological, Artifact/System, Theoretical", "umap_x": 8.870421409606934, "umap_y": -2.8082053661346436, "distance_to_centroid": 0.39998303646261724, "representative_rank": 4, "is_representative_top3": false, "medoid_rank": 4, "lda_topic": 5, "lda_topic_probability": 0.9581794736607911, "lda_topic_words": "following, evidence, systematic, review, attempts, needs, mechanisms, perspective", "nearest_papers": [{ ed Sonic Meditation design practice and previous research in DMI design principles, neuroscience research in meditation, Crikszentmihalyi‚Äôs Flow Theory, and the criteria of efficiency, music subjectivity, affordance, culture constraints, and meaning-making. I then make reference to three proof-of-concept case studies that have explored these ideas. I argue that Embodied Sonic Meditation affords an opportunity for sound art to mediate cultures, improve people‚Äôs wellbeing, and better connect people to their inner peace and the outer world. ¬© 2020 Wu.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2021", "venue": "ICMC 2021 - Proceedings of the International Computer Music Conference 2021", "doi": "", "url": "", "keyword": "Design principles", "cluster": 6, "cluster_theme_terms": "sonic, technical, meditation, embodied, heuristics, ussf, socio, instrument", "cluster_label_candidate": "Evaluates Design Principles Through Empirical Evidence", "cluster_summary_candidate": "This cluster evaluates with evidence design principles, emphasizing how a design-knowledge construct is made explicit, organized, or put to work rather than only where it is applied. Related knowledge forms include Design Heuristics, Design Frameworks. The shared move also involves synthesis of prior work and definition and conceptualization. Its contribution pattern is coded as Methodological, Theoretical, Empirical. Application and method terms are supporting facets, especially methods or lenses such as User-centered Design, Heuristic Evaluation and contexts such as Education / Learning, Accessibility, Privacy / Security, Healthcare. Representative papers include USSF: A Unified Framework for Screen Standardization in Software Systems; Designing Embodied Sonic Meditation.", "facet_population_or_context": "Education / Learning, Accessibility, Privacy / Security, Healthcare", "facet_stakeholder_or_population": "", "facet_me tion. Before we can develop the necessary design principles to guide game design or the assessment tools to determine the impact of collaborative video games, we must first understand the concept of collaboration. Unfortunately, collaboration is ambiguous, and contradictory definitions exist throughout literature. To reconcile the research space and develop a concrete understanding of collaboration, we analyzed over 25 existing studies and surveys from a wide range of disciplines and with diverse target demographics. The resulting multilevel taxonomy has four main components: group quality, coordination, communication, and support, which in turn are split into subcomponents. Our taxonomy can be used by researchers to inform study design, by game creators to develop design principles, and by educators to guide collaboration assessment.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2015", "venue": "", "doi": "10.1109/GEM.2015.7377203", "url": "", "keyword": "Design principles", "cluster": 5, "cluster_theme_terms": "games, player, video, collaboration, genre, creativity, collaborative, currently", "cluster_label_candidate": "Defines Design Principles Through Conceptual Framing", "cluster_summary_candidate": "This cluster defines and conceptualizes design principles, emphasizing how a design-knowledge construct is made explicit, organized, or put to work rather than only where it is applied. The shared move also involves organization and classification and evidence-based evaluation. Its contribution pattern is coded as Methodological, Empirical, Artifact/System. Application and method terms are supporting facets, especially contexts such as Education / Learning. Representative papers include Toward an effective approach to collaboration education: A taxonomy for game design; Form and Function: Toward a Better Understanding of Design-Based Games.", "facet_population_or_context": "Education / Learning", "facet_stakeholder_or_population": "Designers, Players", "facet_method_or_lens": "", "facet_artifact_or_domain": "Game, Tool", "facet_contribution_or_outcome": "Methodological, Empirical, Artifact/System", "umap_x": 9.425102233886719, "umap_y": -0.8725800514221191, "distance_to_centroid": 0.03312505033755986, "representative_rank": 1, "is_representative_top3": true, "medoid_rank": 2, "lda_topic": 4, "lda_topic_probability": 0.6110208368579806, "lda_topic_words": "practice, analysis, literature, adaptive, approaches, education, principles data, aims", "nearest_papers": [{"paper_id": "2280b868ea5f", "title": "Form and Function: Toward a Better Understanding of Design-Based Games", "cluster": 5, "distance": 0.13030566343050864}, {"paper_id": "d0a936b480d4", "title": "Acquiring educational access for neurodiverse learners through multisensory design principles", "cluster": 3, "distance": 0.7885374242026466}, {"paper_id": "1445730be68b", "title": "A problem-based approach to the advancement of heuristics for socio-technical evaluation", "cluster": 6, "distance": 0.8481822222052299}, {"paper_id": "d893185b7873", "title": "Introduction to Initial HCI Engineering Design Principles for Domestic Energy Planning and Control", "cluster": 1, "distance": 0.8766805541015681}, {"paper_id": "83aa5bd0e6f8", "title": "Designing Embodied Sonic Meditation", "cluster": 6, "distance": 0.8847646977293173}], "design_knowledge_form": "Design Principles", "design_knowledge_action": "defines and conceptualizes", "design_knowledge_contribution": "defines and conceptualizes Design Principles"}, {"paper_id": "44848ca19e31", "title": "Design Obligations for Software, with Examples from Data Abstraction and Adaptive Systems", "authors": "M. Shaw", "abstract": "Producing a good software design involves not only writing a definition that satisfies the syntax of the chosen language or structural constraints of a design paradigm. It also involves upholding a variety of expectations about the behavior of the system-the semantic expectations. These expectations may apply not only at the code level, but also to more abstract system structures such as software architectures. Such high-level design paradigms provide a vocabulary of components or other constructs and ways to compose those constructs, but not all expressible designs are well-formed, and even well-formed designs may fail to satisfy the expectations of the paradigm. Unfortunately, these expectations are often implicit or documented only informally, so they are challenging to discover, let alone uphold. They may for example, require correct use of complex structures, internal consistency, compliance with external standards, adherence with design principles, etc. Further, the reasons for design decisions that uphold these expectations are often not explicit in the code or other representation of the system. I introduce the idea of design obligations, which are constraints on allowable designs within a given design paradigm that help to assure appropriate use of the paradigm. To illustrate this idea, I discuss design obligations for two paradigms: data abstraction and a class of adaptive based on feedback control.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2025", "venue": "", "doi": "10.1109/Designing66910.2025.00016", "url": "", "keyword": "Design principles", "cluster": 0, "cluster_theme_terms": "adaptive, expectations, gamification, software, theoretical, courses, level, principles online", "cluster_label_candidate": "Defines Design Principles Through Conceptual Framing", "cluster_summary_candidate": "This cluster defines and conceptualizes design principles, emphasizing how a design-knowledge construct is made explicit, organized, or put to work rather than only where it is applied. Related knowledge forms include Design Theory. The shared move also involves synthesis of prior work and evidence-based evaluation. Its c USSF: A Unified Framework for Screen Standardization in Software Systems", "authors": "H. Hristov", "abstract": "This paper introduces the Unified Screen Standardization Framework (USSF), a methodological model that consolidates the heterogeneous principles (such as Nielsen‚Äôs heuristics, ISO 9241 principles, WCAG accessibility recommendations, Shneiderman‚Äôs Eight Golden Rules, Norman‚Äôs design principles, etc.) into a coherent, hierarchical structure. USSF employs two novel mechanisms: (1) artifact-based indexing (APP, SCR, DIA, FRM, CMP, WID) to represent application elements in hierarchical form and (2) inheritance with override rules for systematically applying and adapting standards across different levels of user interface elements. The framework enables traceability, scalability and methodological clarity, supporting both usability evaluation and future integration with automated design tools. The USSF could acts as a composite high-level standard that integrates existing standards, principle, heuristics, established usability and accessibility guidelines into a unified model. An illustrative example demonstrates the framework‚Äôs applicability, while a discussion highlights its benefits, limitations and potential for empirical validation. The USSF thus provides a novel contribution to human-computer interaction by bridging established guidelines and enabling standardized, traceable and adaptable screen design.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2025", "venue": "", "doi": "10.1109/CIEES66347.2025.11300084", "url": "", "keyword": "Design principles", "cluster": 6, "cluster_theme_terms": "sonic, technical, meditation, embodied, heuristics, ussf, socio, instrument", "cluster_label_candidate": "Evaluates Design Principles Through Empirical Evidence", "cluster_summary_candidate": "This cluster evaluates with evidence design principles, emphasizing how a design-knowledge con orms include Design Heuristics, Design Frameworks. The shared move also involves synthesis of prior work and definition and conceptualization. Its contribution pattern is coded as Methodological, Theoretical, Empirical. Application and method terms are supporting facets, especially methods or lenses such as User-centered Design, Heuristic Evaluation and contexts such as Education / Learning, Accessibility, Privacy / Security, Healthcare. Representative papers include USSF: A Unified Framework for Screen Standardization in Software Systems; Designing Embodied Sonic Meditation.", "representatives": [{"title": "USSF: A Unified Framework for Screen Standardization in Software Systems", "year": "2025", "paper_id": "b77e7d67555e"}, {"title": "Designing Embodied Sonic Meditation", "year": "2021", "paper_id": "83aa5bd0e6f8"}, {"title": "A problem-based approach to the advancement of heuristics for socio-technical evaluation", "year": "", "paper_id": "1445730be68b"}]}], "keywords": ["Design principles"]}</script>
  <script>
    const data = JSON.parse(document.getElementById('payload').textContent);
    const papers = data.papers;
    const palette = ['#f05a71','#4c78a8','#f58518','#54a24b','#b279a2','#72b7b2','#eeca3b','#ff9da6','#9d755d','#59a14f','#edc948','#76b7b2'];
    const colorFor = c => palette[Math.abs(Number(c)) % palette.length];
    const clusterName = c => Number(c) === -1 ? 'Unclustered papers' : `Cluster ${c}`;
    const state = { selected: papers[0]?.paper_id || null };
    const svg = document.getElementById('plot');
    const details = document.getElementById('details');
    const status = document.getElementById('status');

    function initControls() {
      const clusterFilter = document.getElementById('clusterFilter');
      data.clusters.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.cluster;
        opt.textContent = `${clusterName(c.cluster)} (${c.count})`;
        clusterFilter.appendChild(opt);
      });
      ['clusterFilter','repOnly'].forEach(id => {
        document.getElementById(id).addEventListener('input', render);
        document.getElementById(id).addEventListener('change', render);
      });
      renderLegend();
    }

    function filteredPapers() {
      const cluster = document.getElementById('clusterFilter').value;
      const repOnly = document.getElementById('repOnly').checked;
      return papers.filter(p => {
        return (cluster === 'all' || String(p.cluster) === cluster) &&
          (!repOnly || p.is_representative_top3);
      });
    }

    function renderLegend() {
      const legend = document.getElementById('legend');
      legend.innerHTML = '';
      data.clusters.forEach(c => {
        const item = document.createElement('span');
        item.className = 'legend-item';
        item.innerHTML = `<span class="swatch" style="background:${colorFor(c.cluster)}"></span> ${clusterName(c.cluster)}: ${escapeHtml(c.label || c.theme)}`;
        legend.appendChild(item);
      });
      const shapeNote = document.createElement('span');
      shapeNote.className = 'legend-item';
      shapeNote.innerHTML = '<span>◆ Discussion detected</span><span>● No explicit discussion</span>';
      legend.appendChild(shapeNote);
    }

    function render() {
      const shown = filteredPapers();
      status.textContent = `${shown.length} of ${papers.length} papers shown; ${data.clusters.length} clusters in this view. Axes are UMAP 1 and UMAP 2 coordinates, not interpretable variables. Use "Top-3 reps only" to filter representative papers.`;
      drawPlot(shown);
      renderDetails(papers.find(p => p.paper_id === state.selected) || shown[0] || papers[0]);
    }

    function drawPlot(shown) {
      const width = svg.clientWidth || 900;
      const height = svg.clientHeight || 560;
      const pad = 44;
      const xs = papers.map(p => p.umap_x), ys = papers.map(p => p.umap_y);
      let minX = Math.min(...xs), maxX = Math.max(...xs), minY = Math.min(...ys), maxY = Math.max(...ys);
      const xRange = Math.max(0.0001, maxX - minX);
      const yRange = Math.max(0.0001, maxY - minY);
      minX -= xRange * 0.08;
      maxX += xRange * 0.08;
      minY -= yRange * 0.08;
      maxY += yRange * 0.08;
      const sx = x => pad + ((x - minX) / Math.max(0.0001, maxX - minX)) * (width - pad * 2);
      const sy = y => height - pad - ((y - minY) / Math.max(0.0001, maxY - minY)) * (height - pad * 2);
      const shownIds = new Set(shown.map(p => p.paper_id));
      svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
      svg.innerHTML = '';
      for (let i = 0; i < 6; i++) {
        const x = pad + i * (width - pad * 2) / 5;
        const y = pad + i * (height - pad * 2) / 5;
        svg.insertAdjacentHTML('beforeend', `<line class="axis" x1="${x}" y1="${pad}" x2="${x}" y2="${height-pad}"></line>`);
        svg.insertAdjacentHTML('beforeend', `<line class="axis" x1="${pad}" y1="${y}" x2="${width-pad}" y2="${y}"></line>`);
      }
      svg.insertAdjacentHTML('beforeend', `<text x="${width / 2}" y="${height - 8}" text-anchor="middle" fill="#65758b" font-size="12">UMAP 1</text>`);
      svg.insertAdjacentHTML('beforeend', `<text x="16" y="${height / 2}" text-anchor="middle" fill="#65758b" font-size="12" transform="rotate(-90 16 ${height / 2})">UMAP 2</text>`);
      papers.forEach(p => {
        const visible = shownIds.has(p.paper_id);
        const selected = p.paper_id === state.selected;
        const x = sx(p.umap_x), y = sy(p.umap_y);
        const size = selected ? 7.5 : 6.5;
        const cls = `point ${visible ? '' : 'dim'} ${selected ? 'selected' : ''}`;
        const fill = colorFor(p.cluster);
        const node = document.createElementNS('http://www.w3.org/2000/svg', p.discussion_found ? 'path' : 'circle');
        node.setAttribute('class', cls);
        node.setAttribute('fill', fill);
        if (p.discussion_found) {
          const d = `M ${x} ${y - size} L ${x + size} ${y} L ${x} ${y + size} L ${x - size} ${y} Z`;
          node.setAttribute('d', d);
        } else {
          node.setAttribute('cx', x);
          node.setAttribute('cy', y);
          node.setAttribute('r', size);
        }
        node.addEventListener('click', () => {
          state.selected = p.paper_id;
          render();
        });
        node.appendChild(document.createElementNS('http://www.w3.org/2000/svg', 'title')).textContent = p.title;
        svg.appendChild(node);
      });
    }

    function renderDetails(p) {
      if (!p) return;
      const doi = p.doi ? `<a class="paper-link" href="https://doi.org/${escapeHtml(p.doi)}" target="_blank">DOI: ${escapeHtml(p.doi)}</a>` : '';
      const url = p.url ? `<a class="paper-link" href="${escapeAttr(p.url)}" target="_blank">Open paper URL</a>` : '';
      const nearest = (p.nearest_papers || []).map(n =>
        `<a class="paper-link" href="#" data-paper="${escapeAttr(n.paper_id)}">${clusterName(n.cluster)}, distance ${Number(n.distance).toFixed(3)}: ${escapeHtml(n.title)}</a>`
      ).join('');
      const discussionSummary = p.discussion_summary ?
        `<div class="section-title">Discussion Summary</div>${renderDiscussionSummary(p.discussion_summary)}` : '';
      const discussionExcerpt = '';
      const discussionStatus = p.discussion_found ?
        `<span class="pill">Discussion detected: ${p.discussion_paragraph_count} paragraphs</span>` :
        `<span class="pill">No explicit Discussion section detected</span>`;
      details.innerHTML = `
        <h2>${escapeHtml(p.title)}</h2>
        <div class="meta">${escapeHtml(p.authors)}<br>${escapeHtml(p.year)} · ${escapeHtml(p.venue)}</div>
        <span class="pill">${clusterName(p.cluster)}</span>
        <span class="pill">${escapeHtml(p.keyword)}</span>
        <span class="pill">Rep rank ${p.representative_rank}</span>
        <span class="pill">Medoid rank ${p.medoid_rank}</span>
        <span class="pill">LDA topic ${p.lda_topic} (${Math.round(p.lda_topic_probability * 100)}%)</span>
        ${discussionStatus}
        <div class="section-title">Cluster Label Candidate</div>
        <div class="abstract">${escapeHtml(p.cluster_label_candidate)}</div>
        <div class="section-title">Cluster Summary Candidate</div>
        <div class="abstract">${escapeHtml(p.cluster_summary_candidate)}</div>
        <div class="section-title">Design-Knowledge Contribution</div>
        <div>
          <span class="pill">Form: ${escapeHtml(p.design_knowledge_form || 'n/a')}</span>
          <span class="pill">Action: ${escapeHtml(p.design_knowledge_action || 'n/a')}</span>
        </div>
        <div class="abstract">${escapeHtml(p.design_knowledge_contribution || '')}</div>
        <div class="section-title">Paper-Oriented Facets</div>
        <div>
          <span class="pill">Context/Domain: ${escapeHtml(p.facet_population_or_context || 'n/a')}</span>
          <span class="pill">Population/Stakeholder: ${escapeHtml(p.facet_stakeholder_or_population || 'n/a')}</span>
          <span class="pill">Method/Lens: ${escapeHtml(p.facet_method_or_lens || 'n/a')}</span>
          <span class="pill">Artifact/System: ${escapeHtml(p.facet_artifact_or_domain || 'n/a')}</span>
          <span class="pill">Contribution Type: ${escapeHtml(p.facet_contribution_or_outcome || 'n/a')}</span>
        </div>
        <details class="lexical-evidence">
          <summary>Show lexical evidence</summary>
          <div class="evidence-block">
            <div class="section-title">Cluster Theme Evidence</div>
            <div class="abstract">${escapeHtml(p.cluster_theme_terms)}</div>
            <div class="section-title">Secondary Topic-Model Evidence</div>
            <div class="abstract">${escapeHtml(p.lda_topic_words)}</div>
          </div>
        </details>
        <div class="section-title">Abstract</div>
        <div class="abstract">${escapeHtml(p.abstract)}</div>
        ${discussionSummary}
        ${discussionExcerpt}
        <div class="section-title">Links</div>
        ${doi}${url}
        <div class="section-title">Nearest Papers by Cosine Distance</div>
        ${nearest || '<div class="meta">No nearest-paper data available.</div>'}
      `;
      details.querySelectorAll('[data-paper]').forEach(a => {
        a.addEventListener('click', evt => {
          evt.preventDefault();
          state.selected = a.getAttribute('data-paper');
          render();
        });
      });
      details.scrollTop = 0;
    }

    function renderDiscussionSummary(value) {
      const items = String(value || '').split('\n').map(line => line.replace(/^[-•]\s*/, '').trim()).filter(Boolean);
      if (!items.length) return '<div class="meta">No discussion summary available.</div>';
      return `<ul class="discussion-list">${items.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`;
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    }
    function escapeAttr(value) { return escapeHtml(value).replace(/`/g, '&#96;'); }

    initControls();
    render();
    window.addEventListener('resize', render);
  </script>
