<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Small Keyword Group – Paper Map</title>
  <style>
    :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #f5f7fb; color: #17233b; }
    main { display: grid; grid-template-columns: minmax(0, 1.55fr) minmax(330px, .75fr); gap: 12px; min-height: 100vh; padding: 14px; }
    .panel { min-width: 0; overflow: hidden; border: 1px solid #dbe4f0; border-radius: 10px; background: #fff; box-shadow: 0 5px 18px rgba(38, 57, 89, .05); }
    .plot-panel { display: grid; grid-template-rows: auto minmax(380px, 1fr) auto; }
    .plot-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; padding: 16px 18px 6px; }
    h1 { margin: 0; font-size: clamp(20px, 2.5vw, 27px); }
    .status { margin-top: 5px; color: #63718a; font-size: 13px; }
    .small-note { max-width: 410px; color: #63718a; font-size: 12px; line-height: 1.4; text-align: right; }
    #clusterFilter { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; }
    .chart-wrap { min-height: 0; padding: 0 12px 4px; }
    svg { display: block; width: 100%; height: 100%; min-height: 380px; }
    .grid-line { stroke: #edf1f6; stroke-width: 1; }
    .axis-line { stroke: #aebbd0; stroke-width: 1.2; }
    .axis-label { fill: #6e7d94; font-size: 13px; }
    .point { cursor: pointer; stroke: #fff; stroke-width: 3; transition: opacity 140ms ease, r 140ms ease; }
    .point:hover, .point.selected { r: 13; stroke: #17233b; stroke-width: 2; }
    .paper-label { cursor: pointer; fill: #34425a; font-size: 11px; font-weight: 650; paint-order: stroke; stroke: #fff; stroke-width: 3px; stroke-linejoin: round; }
    .legend { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 7px 12px; padding: 10px 18px 16px; border-top: 1px solid #edf1f6; }
    .legend-item { display: flex; gap: 7px; min-width: 0; color: #526178; font-size: 12px; line-height: 1.3; cursor: pointer; }
    .swatch { flex: 0 0 auto; width: 9px; height: 9px; margin-top: 3px; border-radius: 50%; }
    .details { padding: 20px; overflow-y: auto; }
    .details h2 { margin: 0; font-size: 22px; line-height: 1.28; }
    .meta { margin-top: 8px; color: #63718a; font-size: 14px; line-height: 1.45; }
    .badges { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 13px; }
    .badge { padding: 5px 9px; border-radius: 999px; background: #e8f1ff; color: #175da8; font-size: 12px; font-weight: 750; }
    .section { margin-top: 23px; }
    .section-title { margin-bottom: 7px; color: #7b879a; font-size: 11px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; }
    .cluster-summary { padding: 13px 14px; border-left: 4px solid #2d7bc1; border-radius: 6px; background: #f3f7fc; font-size: 15px; font-weight: 700; line-height: 1.45; }
    .abstract { color: #405069; font-size: 14px; line-height: 1.6; }
    .id { color: #8490a3; font: 12px ui-monospace, SFMono-Regular, Menlo, monospace; }
    .links { display: flex; flex-wrap: wrap; gap: 10px; }
    .links a { padding: 7px 10px; border: 1px solid #bdd1e8; border-radius: 6px; color: #1769b0; text-decoration: none; font-size: 13px; font-weight: 700; }
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
      .details { min-height: 420px; }
    }
    @media (max-width: 620px) {
      main { padding: 8px; }
      .plot-header { display: block; }
      .small-note { margin-top: 7px; text-align: left; }
      .legend { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <section class="panel plot-panel">
      <div class="plot-header">
        <div>
          <h1 id="heading">Small-group paper map</h1>
          <div class="status" id="status"></div>
        </div>
        <div class="small-note">Each paper is shown as its own singleton display cluster. Positions support browsing only; they should not be interpreted as reliable small-sample clusters.</div>
      </div>
      <select id="clusterFilter" aria-label="Cluster filter"><option value="all">All papers</option></select>
      <div class="chart-wrap"><svg id="map" viewBox="0 0 820 550" role="img" aria-label="Paper similarity map"></svg></div>
      <div class="legend" id="legend"></div>
    </section>
    <aside class="panel details" id="details" aria-live="polite"></aside>
  </main>
  <script>
    const groups = {
      'Design frameworks': [
        { id: '7afa6519f6fc', x: .67, y: .08, title: 'The experience, dynamics and artifacts framework: towards a holistic model for designing serious and entertainment games', authors: 'Natucci, G.C.; Borges, M.A.F.', year: '', venue: '2021 IEEE Conference on Games (CoG)', doi: '10.1109/CoG52621.2021.9619144', summary: 'Experience–Dynamics–Artifacts framework for holistic game design', abstract: 'Proposes a holistic framework that connects player experience, game dynamics, and artifacts when designing serious and entertainment games.' },
        { id: '268903a30da5', x: .59, y: .51, title: 'Systematic Review of Systemic Design Frameworks for Complex Challenges', authors: 'Skye Smith; Eleni Kalantidou', year: '2025', venue: 'Strategic Design Research Journal', url: 'https://www.semanticscholar.org/paper/0ad5afc83d67ef0110cda1d9f605336b53447b1a', summary: 'Systemic-design frameworks for complex interconnected challenges', abstract: 'Reviews systemic-design literature to clarify how systems thinking, design thinking, and complexity-oriented methods can be integrated into a coherent framework.' },
        { id: '560be0c20de7', x: .92, y: .56, title: 'Designing for Trust, Progress, and Dignity: A Conceptual Framework for Reliability, Responsiveness, and Relational Quality in AI-Enabled Service Systems', authors: 'M. Colgate; Orla Colgate', year: '2026', venue: 'Information', url: 'https://www.semanticscholar.org/paper/51493efcd757168bfe90566436e0982efe07bfd9', summary: 'Trust and relational quality in AI-enabled services', abstract: 'Develops a conceptual framework connecting reliability, responsiveness, progress, dignity, and relational quality in services that use generative AI.' },
        { id: '1e7ab64c6cf9', x: .59, y: .90, title: 'Commentary: Strength-based co-design that EMPOWERs – Lessons from codesigning with older adults', authors: 'Bernardo Figueiredo; T. Aleti; Diane M. Martin; Mike Reid; Jacob Sheahan; Larissa Hjorth', year: '2023', venue: 'Journal of Services Marketing', url: 'https://www.semanticscholar.org/paper/66872f88e4301696a2c140413d0072fc0e04dd88', summary: 'EMPOWER framework for strength-based inclusive co-design', abstract: 'Introduces the EMPOWER framework as a memorable, strength-based approach for addressing empowerment challenges when co-designing with people experiencing vulnerability.' },
        { id: '660ca24145b2', x: .10, y: .63, title: 'The E-Design Assessment Tool: an evidence-informed approach towards a consistent terminology for quantifying online distance learning activities', authors: 'Helen Walmsley-Smith; Lynn Machin; G. Walton', year: '2019', venue: 'Research in Learning Technology', url: 'https://www.semanticscholar.org/paper/b16b678f10cc89599644f2c85895dbff730b3569', summary: 'Consistent assessment terminology for online learning design', abstract: 'Presents an evidence-informed assessment tool for defining and quantifying online distance-learning activities, including interaction and feedback.' },
        { id: 'e09769771b82', x: .72, y: .15, title: 'The Experience, Dynamics and Artifacts Framework: Towards a Holistic Model for Designing Serious and Entertainment Games', authors: 'Gabriel C. Natucci; M. A. Borges', year: '2021', venue: '2021 IEEE Conference on Games (CoG)', url: 'https://www.semanticscholar.org/paper/c99ce43ca2809df3634eb95801e9f47fa335d56f', summary: 'Holistic experience and dynamics model for game design', abstract: 'Connects educational and entertainment components through an Experience, Dynamics and Artifacts model intended to support holistic game design.' }
      ],
      'Design expertise': [
        { id: '64085b9b57e4', x: .25, y: .58, title: 'Towards an integrative approach to researching design expertise', authors: 'Tan, Stella', year: '2021', venue: 'Design Studies', doi: '10.1016/j.destud.2021.101017', summary: 'Integrating social context into models of design expertise', abstract: 'Compares major models of expertise development and argues for an integrative approach that better accounts for the social context in which designers develop expertise.' },
        { id: 'f51b21c51194', x: .75, y: .42, title: 'Understanding database design expertise', authors: 'Storey, V.C.; Thompson, C.B.; Ram, S.', year: '', venue: 'Data & Knowledge Engineering', doi: '10.1016/0169-023X(95)00012-H', summary: 'Conceptual framework for database-design expertise', abstract: 'Examines the knowledge involved in database design and proposes a conceptual framework for explaining expertise across phases of the database-design process.' }
      ],
      'Design Procedures': [
        { id: '1217bfc6316e', x: .27, y: .43, title: 'Design research', authors: 'Gosling, W.', year: '', venue: 'Conference on electronics design', summary: 'Review and classification of design-research procedures', abstract: 'Reviews design research, relates a psychological model of design activity to existing research, and discusses methodology, simulation, and opportunities for mechanisation.' },
        { id: '6ea89aad84f6', x: .73, y: .57, title: 'Development of Sustainable Integrated Design Framework for Stream Restoration', authors: 'Kidoo Park; Kil-Seong Lee', year: '2019', venue: 'Sustainability', url: 'https://www.semanticscholar.org/paper/2d6d2d98a2743302a62da00967844cdc92ff28c4', summary: 'Integrated procedures for sustainable stream restoration', abstract: 'Synthesizes existing restoration guidelines into an integrated design framework and procedure for sustainable stream restoration and watershed management.' }
      ]
    };
    const colors = ['#2d7bc1', '#ef7d32', '#39a56b', '#9a65c7', '#d75272', '#7a8b32'];
    const keyword = new URLSearchParams(location.search).get('keyword') || 'Design frameworks';
    const papers = groups[keyword] || [];
    const filter = document.getElementById('clusterFilter');
    const map = document.getElementById('map');
    const legend = document.getElementById('legend');
    const details = document.getElementById('details');
    document.getElementById('heading').textContent = keyword;
    document.title = `${keyword} – ${papers.length} paper clusters`;
    papers.forEach((paper, index) => {
      paper.cluster = String(index);
      paper.color = colors[index % colors.length];
      const option = document.createElement('option');
      option.value = paper.cluster;
      option.textContent = `Cluster ${index + 1}: ${paper.summary}`;
      filter.appendChild(option);
    });

    function svgElement(name, attrs = {}) {
      const element = document.createElementNS('http://www.w3.org/2000/svg', name);
      Object.entries(attrs).forEach(([key, value]) => element.setAttribute(key, value));
      return element;
    }

    function drawMap() {
      map.replaceChildren();
      [150, 285, 420, 555, 690].forEach(x => map.appendChild(svgElement('line', { x1: x, y1: 40, x2: x, y2: 485, class: 'grid-line' })));
      [90, 185, 280, 375, 470].forEach(y => map.appendChild(svgElement('line', { x1: 85, y1: y, x2: 755, y2: y, class: 'grid-line' })));
      map.appendChild(svgElement('line', { x1: 85, y1: 485, x2: 755, y2: 485, class: 'axis-line' }));
      map.appendChild(svgElement('line', { x1: 85, y1: 40, x2: 85, y2: 485, class: 'axis-line' }));
      const xLabel = svgElement('text', { x: 420, y: 530, 'text-anchor': 'middle', class: 'axis-label' });
      xLabel.textContent = 'Map 1 (display coordinate)';
      map.appendChild(xLabel);
      const yLabel = svgElement('text', { x: 24, y: 265, 'text-anchor': 'middle', transform: 'rotate(-90 24 265)', class: 'axis-label' });
      yLabel.textContent = 'Map 2 (display coordinate)';
      map.appendChild(yLabel);
      const selected = filter.value;
      papers.forEach((paper, index) => {
        const cx = 105 + paper.x * 620;
        const cy = 465 - paper.y * 395;
        const visible = selected === 'all' || selected === paper.cluster;
        const point = svgElement('circle', { cx, cy, r: 10, fill: paper.color, class: `point${selected === paper.cluster ? ' selected' : ''}`, opacity: visible ? 1 : .13, tabindex: 0, role: 'button', 'aria-label': paper.title });
        point.addEventListener('click', () => selectPaper(paper.cluster));
        point.addEventListener('keydown', event => { if (event.key === 'Enter' || event.key === ' ') selectPaper(paper.cluster); });
        map.appendChild(point);
        if (papers.length <= 2) {
          const label = svgElement('text', { x: cx, y: cy - 19, 'text-anchor': 'middle', class: 'paper-label', opacity: visible ? 1 : .15 });
          label.textContent = `Cluster ${index + 1}`;
          label.addEventListener('click', () => selectPaper(paper.cluster));
          map.appendChild(label);
        }
      });
    }

    function drawLegend() {
      legend.replaceChildren();
      papers.forEach((paper, index) => {
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = `<span class="swatch" style="background:${paper.color}"></span><span><strong>Cluster ${index + 1}:</strong> ${paper.summary}</span>`;
        item.addEventListener('click', () => selectPaper(paper.cluster));
        legend.appendChild(item);
      });
    }

    function showDetails(paper) {
      const index = papers.indexOf(paper);
      const link = paper.doi ? `https://doi.org/${paper.doi}` : paper.url;
      details.innerHTML = `
        <h2>${paper.title}</h2>
        <div class="meta">${[paper.authors, paper.year, paper.venue].filter(Boolean).join(' · ')}</div>
        <div class="badges"><span class="badge">Singleton cluster ${index + 1}</span><span class="badge">${keyword}</span></div>
        <div class="section"><div class="section-title">Cluster name / paper summary</div><div class="cluster-summary" style="border-color:${paper.color}">${paper.summary}</div></div>
        <div class="section"><div class="section-title">Paper-oriented summary</div><div class="abstract">${paper.abstract}</div></div>
        <div class="section"><div class="id">paper_id: ${paper.id}</div></div>
        ${link ? `<div class="section links"><a href="${link}" target="_blank" rel="noopener noreferrer">Open paper source</a></div>` : ''}`;
    }

    function selectPaper(cluster) {
      filter.value = cluster;
      filter.dispatchEvent(new Event('change', { bubbles: true }));
    }

    filter.addEventListener('change', () => {
      const selected = filter.value;
      const shown = selected === 'all' ? papers : papers.filter(paper => paper.cluster === selected);
      document.getElementById('status').textContent = `${shown.length} of ${papers.length} papers shown · ${papers.length} singleton display clusters`;
      drawMap();
      showDetails(shown[0] || papers[0]);
    });
    drawLegend();
    filter.dispatchEvent(new Event('change'));
  </script>
</body>
</html>
