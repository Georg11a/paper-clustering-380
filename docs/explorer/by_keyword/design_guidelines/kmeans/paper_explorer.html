<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paper Corpus Explorer (tfidf-svd, kmeans, method view)</title>
  <style>
    :root {
      --ink: #253858;
      --muted: #65758b;
      --line: #d8e0ea;
      --bg: #f7f9fc;
      --panel: #ffffff;
      --accent: #2f7dd1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }
    header {
      padding: 18px 24px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }
    h1 { margin: 0; font-size: 22px; letter-spacing: 0; min-width: 0; }
    .controls {
      display: grid;
      grid-template-columns: 180px 210px;
      gap: 10px;
      align-items: center;
    }
    input, select, button {
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 10px;
      background: white;
      color: var(--ink);
      font-size: 14px;
    }
    button { background: var(--accent); color: white; border-color: var(--accent); cursor: pointer; }
    label.toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
    }
    label.toggle input { width: 16px; height: 16px; }
    main {
      display: grid;
      grid-template-columns: minmax(560px, 1fr) minmax(420px, 460px);
      gap: 14px;
      padding: 14px;
      min-height: calc(100vh - 92px);
      align-items: stretch;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .plot-panel { display: grid; grid-template-rows: auto 1fr auto; height: calc(100vh - 120px); min-height: 690px; }
    .status {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
    }
    svg { width: 100%; height: 100%; min-height: 560px; background: #fbfcfe; }
    .axis { stroke: #dfe6ef; stroke-width: 1; }
    .point { stroke: white; stroke-width: 1.5; cursor: pointer; opacity: 0.88; }
    .point.dim { opacity: 0.14; }
    .point.selected { stroke: #111827; stroke-width: 3; opacity: 1; }
    .legend, .cluster-list { padding: 10px 12px; border-top: 1px solid var(--line); }
    .legend { max-height: 118px; overflow-y: auto; }
    .legend-items { display: flex; flex-wrap: wrap; gap: 8px 14px; }
    .legend-item { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    .swatch { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .details { padding: 16px; overflow: auto; height: calc(100vh - 120px); min-height: 690px; align-self: stretch; }
    .details h2 { font-size: 18px; margin: 0 0 8px; line-height: 1.25; }
    .meta { color: var(--muted); font-size: 13px; line-height: 1.45; margin-bottom: 12px; }
    .pill {
      display: inline-flex;
      align-items: center;
      margin: 3px 5px 3px 0;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef4fb;
      color: #31577f;
      font-size: 12px;
    }
    .abstract { line-height: 1.5; font-size: 14px; color: #2f3b52; }
    details.discussion-full,
    details.lexical-evidence {
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      background: #fbfcfe;
    }
    details.discussion-full summary,
    details.lexical-evidence summary {
      cursor: pointer;
      color: #31577f;
      font-weight: 700;
      font-size: 13px;
    }
    details.lexical-evidence { margin-top: 16px; }
    .evidence-block { margin-top: 8px; }
    .discussion-list {
      margin: 6px 0 0;
      padding-left: 18px;
      line-height: 1.45;
      font-size: 14px;
      color: #2f3b52;
    }
    .discussion-list li { margin: 0 0 7px; }
    .section-title { margin: 16px 0 6px; font-weight: 700; font-size: 13px; text-transform: uppercase; color: var(--muted); }
    .paper-link { display: block; color: var(--accent); text-decoration: none; margin: 7px 0; font-size: 13px; line-height: 1.35; }
    .cluster-card { border-top: 1px solid var(--line); padding: 10px 12px; }
    .cluster-card button { height: 28px; padding: 0 8px; margin-top: 6px; font-size: 12px; }
    @media (max-width: 980px) {
      header { display: block; }
      h1 { margin-bottom: 12px; }
      .controls, main { grid-template-columns: 1fr; }
      .plot-panel { min-height: 560px; }
    }
  </style>

to which they can rely on the system (Schlicker et al. 2022). The field of pragmatics offers valuable insights into the communication processes essential for developing accurate trustworthiness assessments by helping to find strategies to bridging the gap between user expectations and system capabilities, emphasizing the importance of context and mutual understanding in communication. We propose six design guidelines to help designers to optimize for accurate trustworthiness assessments, thus fostering ethical, and responsible human-automation interactions. The proposed guidelines are derived from existing literature in various fields, such as human-computer interaction, cognitive psychology, automation research, user-experience design, and ethics. We are incorporating key principles from the field of pragmatics, specifically the cultivation of common ground (H. H. Clark 1996) and Gricean communication maxims (Grice 1975). These principles are essential for the design of automated systems because the user‚Äôs perception of the system‚Äôs trustworthiness is shaped by both environmental contexts, such as organizational culture or societal norms, and by situational context, including the specific circumstances or scenarios in which the interaction occurs (Hoff and Bashir 2015). Pragmatics principles provide valuable insights into these contexts, thus enhancing our understanding and design of trustworthy systems. Our proposed guidelines provide actionable insights for designers to create automated systems that make relevant trustworthiness cues available. This would ideally foster calibrated trust and more satisfactory, productive, and safe interactions between humans and automated systems. Furthermore, the proposed heuristics might work as a tool for evaluating to what extent existing systems enable users to accurately assess a system‚Äôs trustworthiness. ¬© 2025, CC BY-NC-ND.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_ se these axes to reason about design study contributions, their suitability, and uniqueness from other approaches. The proposed methodological framework consists of 9 stages: learn, winnow, cast, discover, design, implement, deploy, reflect, and write. For each stage we provide practical guidance and outline potential pitfalls. We also conducted an extensive literature survey of related methodological approaches that involve a significant amount of qualitative field work, and compare design study methodology to that of ethnography, grounded theory, and action research.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2012", "venue": "", "doi": "10.1109/TVCG.2012.213", "url": "", "keyword": "Design Guidelines", "cluster": 1, "cluster_theme_terms": "visualization, task, geo, map, portals, provide, guidelines, aesthetics", "cluster_label_candidate": "Cluster 1: Design Guidelines through prior-work synthesis around Geo Portals", "distinguishing_evidence_terms": "Geo Portals, Interfaces Interactions, Experience Professional Map, Visualization Constraints Actionable", "cluster_summary_candidate": "Compared with the sibling clusters in this view, this cluster is most clearly marked by Geo Portals, Interfaces Interactions, Experience Professional Map. Its main design-knowledge move is synthesis of prior work of design guidelines, which differs from the majority pattern in this keyword view. The contribution coding is Methodological, Artifact/System, Theoretical. Representative papers include Design Study Methodology: Reflections from the Trenches and the Stacks; Formalizing Visualization Design Knowledge as Constraints: Actionable and Extensible Models in Draco.", "design_knowledge_form": "Design Guidelines", "design_knowledge_action": "synthesizes prior work on", "design_knowledge_role": "Conceptual Framework", "design_knowledge_contribution": "synthesizes prior work on Design Guidelines", "facet_pop hip, and diminishes authentic self-expression ‚Äì especially among marginalized communities. The unchecked development of immersive platforms threatens to create oppressive environments due to power imbalances and a lack of regulation. This paper addresses the urgent need for emancipatory design guidelines to prevent such outcomes. By integrating critical theory with Participatory Design, we propose Emancipatory Participatory Immersive Platforms. These platforms involve users in their design and dismantle oppressive structures through four emancipatory tools (i.e., agency, dialogue, inclusion, and rationality), substantiated by eight actionable design principles. Our framework aims to empower users, promote inclusivity, and ensure rational engagement ‚Äì and thereby foster immersive platforms that maintain functional benefits while enhancing freedom and equity.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2025", "venue": "Journal of strategic information systems", "doi": "", "url": "https://www.semanticscholar.org/paper/0118e4e235a32b2389d0a4caf0344774b888ca5c", "keyword": "Design Guidelines", "cluster": 2, "cluster_theme_terms": "guidelines, rural, natural, self, control, components, platforms, domain", "cluster_label_candidate": "Cluster 2: Design Guidelines through definition and conceptual framing around Enterprise Engineering", "distinguishing_evidence_terms": "Enterprise Engineering, Virtual Dystopia Theory, Guidelines Domain Specific, Ethical Responsible Automation", "cluster_summary_candidate": "Compared with the sibling clusters in this view, this cluster is most clearly marked by Enterprise Engineering, Virtual Dystopia Theory, Guidelines Domain Specific. Its main design-knowledge move is definition and conceptualization of design guidelines; because that move is common in this view, the evidence terms above do most of the distinguishing work. The contribution coding is Methodolo ne structure of interaction, which emerges from validated theories, clear principles, and actionable guidelines. In turn, this knowledge becomes easy to apply when it is embedded in programming tools that favor human control. The examples clarify the key ideas of supporting users to express their intent through visual interfaces (although auditory and haptic interfaces are also valuable in many situations and for users with disabilities). These designs give users informative feedback about the machine state, with progress indicators and completion reports, thereby giving users meaningful control.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2022", "venue": "Human-Centered AI", "doi": "", "url": "https://www.semanticscholar.org/paper/48814299c7a7b6cbb6072c1a2afd03eb0ab7b7b4", "keyword": "Design Guidelines", "cluster": 2, "cluster_theme_terms": "guidelines, rural, natural, self, control, components, platforms, domain", "cluster_label_candidate": "Cluster 2: Design Guidelines through definition and conceptual framing around Enterprise Engineering", "distinguishing_evidence_terms": "Enterprise Engineering, Virtual Dystopia Theory, Guidelines Domain Specific, Ethical Responsible Automation", "cluster_summary_candidate": "Compared with the sibling clusters in this view, this cluster is most clearly marked by Enterprise Engineering, Virtual Dystopia Theory, Guidelines Domain Specific. Its main design-knowledge move is definition and conceptualization of design guidelines; because that move is common in this view, the evidence terms above do most of the distinguishing work. The contribution coding is Methodological, Artifact/System, Theoretical. Representative papers include Design Guidelines and Examples; Six Guidelines for Trustworthy, Ethical and Responsible Automation Design.", "design_knowledge_form": "Design Guidelines", "design_knowledge_action": "defines and conceptualizes", "design_knowledge_role": "Conceptual Framework", "design_knowledge_contribution": "defines and conceptualizes Design Guidelines", "facet_population_or_context": "", "facet_stakeholder_or_population": "", "facet_method_or_lens": "", "facet_artifact_or_domain": "Tool", "facet_contribution_or_outcome": "Methodological, Artifact/System, Theoretical", "umap_x": 1.5102611780166626, "umap_y": -4.13447904586792, "distance_to_centroid": 0.3898294707365475, "representative_rank": 1, "is_representative_top3": true, "medoid_rank": 1, "lda_topic": 1, "lda_topic_probability": 0.9558854174879934, "lda_topic_words": "guidelines, visualization, aesthetics, tools, self, immersive, control, lack", "nearest_papers": [{"paper_id": "85ba95ab4fa0", "title": "Six Guidelines for Trustworthy, Ethical and Responsible Automation Design", "cluster": 2, "distance": 0.647425456398081}, {"paper_id": "139a1e71d8dc", "title": "Separation of Modeling Principles and Design Principles in Enterprise Engineering", "cluster": 2, "distance": 0.776023136495478}, {"paper_id": "ca185d91b684", "title": "Embracing Non-Natural Design in Human-Computer Interaction", "cluster": 2, "distance": 0.7935132693737734}, {"paper_id": "ee0a5b26f6dc", "title": "Formalizing Visualization Design Knowledge as Constraints: Actionable and Extensible Models in Draco", "cluster": 1, "distance": 0.8029829474120365}, {"paper_id": "d0a17557440f", "title": "Avoiding virtual dystopia: A design theory for emancipatory participatory immersive platforms", "cluster": 2, "distance": 0.8091925017970005}]}, {"paper_id": "2cceb8eaa8c9", "title": "Design Guidelines and Strategies for Interim Innovation", "authors": "Xin An Chen", "abstract": "This study introduces and explores the concept of 'interim innovation' as a novel category of innovation. While sharing some innovative functions, interim innovations demonstrate a unique ability to overcome traditional innovation resistances. Despite their potential significance, scholarly research on interim innovations remains scarce. Thus, this study aims to identify and analyze the patterns and characteristics of interim innovations, with the ultimate goal of developing comprehensive design guidelines and strategic frameworks for effectively fostering and implementing these innovations.Every year, innovative products with unique or advanced functionalities emerge in the market. However, these innovations often face slow adoption due to significant barriers such as high costs and performance uncertainties, with early benefits typically accruing to consumers in premium markets. Addressing this gap, this study introduces the concept of 'interim innovation.' An interim innovation incorporates innovative functions derived from an emerging product and is specifically designed to function as an accessory for an established mainstream product. For instance, an electric stand-capable desk converter, placed on a regular desk, mimics the functionalities of an electrically height-adjustable standing desk. Similarly, an electrical bike conversion kit can transform a standard bicycle into an electric bike. These interim innovations not only replicate the functions of more advanced products but also offer considerable advantages in reducing resistance to innovation and accelerating market diffusion. Despite their potential impact, academic exploration in this field is limited. This study, therefore, seeks to analyze interim innovations and establish detailed design guidelines and strategic approaches to effectively nurture and implement these innovations.This study adopts a case study methodology to explore the under-researched area of interim innovations, focusing on their patterns and characteristics. Interim innovations are categorized into three distinct groups: electric interim products, non-electric interim products, and exceptions. Each case study involves a comparative analysis between an interim innovation and its corresponding innovation. Employing the framework of innovation diffusion theory, the study analyzes these innovations across seven key characteristics: relative advantage, compatibility, complexity, trialability, observability, perceived risks, and familiarity. The findings from these case studies are then synthesized to develop practical design guidelines and strategic recommendations for interim innovation development.Interim innovations are a strategic approach to product development. This approach involves integrating emerging innovations as compatible add-ons to existing mainstream products. By combining these two, innovative features are created. This makes interim innovations notable for their cost-effectiveness and high compatibility with mainstream products. Additionally, they provide opportunities for promoting sustainability and inclusion. However, there are risks associated with interim innovations, such as a slight reduction in utility compared to the corresponding emerging innovations and concerns with their aesthetic appeal. This study addresses this gap in research by establishing guidelines and strategies for the development of interim innovation products. It emphasizes enhancing their functionality, compatibility, and appeal within the market.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2024", "venue": "Creativity, Innovation and Entrepreneurship", "doi": "", "url": "https://www.semanticscholar.org/paper/4ea3c5beca8287f43cdecca8c3ae507628cb8817", "keyword": "Design Guidelines", "cluster": 3, "cluster_theme_terms": "fidelity, interim, tacit, characteristics, guidelines, training, innovation, graphic", "cluster_label_candidate": "Cluster 3: Design Guidelines through prior-work synthesis around Changing Focus", "distinguishing_evidence_terms": "Changing Focus, Concept Sidewalk, Characteristics Instances, Training Considerations Proposal", "cluster_summary_candidate": "Compared with the sibling clusters in this view, this cluster is most cl f759265f23", "title": "The equitable use concept in sidewalk design", "cluster": 3, "distance": 0.8061725165190685}]}, {"paper_id": "0ef759265f23", "title": "The equitable use concept in sidewalk design", "authors": "Mahdi Aghaabbasi; M. Moeinaddini; Zohreh Asadi-Shekari; M. Z. Shah", "abstract": "Abstract Equitable use (EU) is the first principle of universal design and promotes the usefulness and marketability of products for people with diverse abilities. Sidewalks, as the main circulation path for pedestrian transportation, can be designed and assessed based on this principle to improve their usability for all pedestrians. Currently, there is no clear definition of EU in the sidewalk design criteria; consequently, no design and assessment guidelines are based on this concept. This study aims to remedy this shortcoming in knowledge by defining and translating the theoretical and conceptual components of the characteristics of EU for sidewalks. This study also attempts to identify the contributions of sidewalk design factors in the main dimensions of EU applied to sidewalks. To achieve these objectives, we conduct an extensive literature review of available universal design guidelines and handbooks as well as scientific articles regarding the implementation of EU in outdoor environments and sidewalks. The results of this review contribute to the development of conceptual models to define EU in sidewalk design. A questionnaire was administered to collect data to test the fitness of these conceptual models. Fitness tests are conducted with structural equation modelling (SEM). The EU translation can be useful for designing and assessing sidewalks to ensure that sidewalks serve people with various abilities on an equal basis.", "discussion_summary": "", "discussion_excerpt": "", "discussion_found": false, "discussion_paragraph_count": 0, "year": "2019", "venue": "Cities", "doi": "", "url": "https://www.semanticscholar.org/paper/5a686e01a536a318c32f70e8b1eb114fd34c05de   <script>
    const data = JSON.parse(document.getElementById('payload').textContent);
    const papers = data.papers;
    const palette = ['#f05a71','#4c78a8','#f58518','#54a24b','#b279a2','#72b7b2','#eeca3b','#ff9da6','#9d755d','#59a14f','#edc948','#76b7b2'];
    const colorFor = c => palette[Math.abs(Number(c)) % palette.length];
    const clusterName = c => Number(c) === -1 ? 'Unclustered papers' : `Cluster ${c}`;
    const clusterLegendLabel = c => {
      const label = String(c.label || c.theme || '').trim();
      if (!label) return clusterName(c.cluster);
      return /^Cluster\s+-?\d+:/i.test(label) ? label : `${clusterName(c.cluster)}: ${label}`;
    };
    const state = { selected: papers[0]?.paper_id || null };
    const svg = document.getElementById('plot');
    const details = document.getElementById('details');
    const status = document.getElementById('status');

    function initControls() {
      const clusterFilter = document.getElementById('clusterFilter');
      data.clusters.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.cluster;
        opt.textContent = `${clusterName(c.cluster)} (${c.count})`;
        clusterFilter.appendChild(opt);
      });
      ['clusterFilter','repOnly'].forEach(id => {
        document.getElementById(id).addEventListener('input', render);
        document.getElementById(id).addEventListener('change', render);
      });
      renderLegend();
    }

    function filteredPapers() {
      const cluster = document.getElementById('clusterFilter').value;
      const repOnly = document.getElementById('repOnly').checked;
      return papers.filter(p => {
        return (cluster === 'all' || String(p.cluster) === cluster) &&
          (!repOnly || p.is_representative_top3);
      });
    }

    function renderLegend() {
      const legend = document.getElementById('legend');
      legend.innerHTML = '';
      data.clusters.forEach(c => {
        const item = document.createElement('span');
        item.className = 'legend-item';
        item.innerHTML = `<span class="swatch" style="background:${colorFor(c.cluster)}"></span> ${escapeHtml(clusterLegendLabel(c))}`;
        legend.appendChild(item);
      });
      const shapeNote = document.createElement('span');
      shapeNote.className = 'legend-item';
      shapeNote.innerHTML = '<span>◆ Discussion detected</span><span>● No explicit discussion</span>';
      legend.appendChild(shapeNote);
    }

    function render() {
      const shown = filteredPapers();
      status.textContent = `${shown.length} of ${papers.length} papers shown; ${data.clusters.length} clusters in this view. Axes are UMAP 1 and UMAP 2 coordinates, not interpretable variables. Use "Top-3 reps only" to filter representative papers.`;
      drawPlot(shown);
      renderDetails(papers.find(p => p.paper_id === state.selected) || shown[0] || papers[0]);
    }

    function drawPlot(shown) {
      const width = svg.clientWidth || 900;
      const height = svg.clientHeight || 560;
      const pad = 44;
      const xs = papers.map(p => p.umap_x), ys = papers.map(p => p.umap_y);
      let minX = Math.min(...xs), maxX = Math.max(...xs), minY = Math.min(...ys), maxY = Math.max(...ys);
      const xRange = Math.max(0.0001, maxX - minX);
      const yRange = Math.max(0.0001, maxY - minY);
      minX -= xRange * 0.08;
      maxX += xRange * 0.08;
      minY -= yRange * 0.08;
      maxY += yRange * 0.08;
      const sx = x => pad + ((x - minX) / Math.max(0.0001, maxX - minX)) * (width - pad * 2);
      const sy = y => height - pad - ((y - minY) / Math.max(0.0001, maxY - minY)) * (height - pad * 2);
      const shownIds = new Set(shown.map(p => p.paper_id));
      svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
      svg.innerHTML = '';
      for (let i = 0; i < 6; i++) {
        const x = pad + i * (width - pad * 2) / 5;
        const y = pad + i * (height - pad * 2) / 5;
        svg.insertAdjacentHTML('beforeend', `<line class="axis" x1="${x}" y1="${pad}" x2="${x}" y2="${height-pad}"></line>`);
        svg.insertAdjacentHTML('beforeend', `<line class="axis" x1="${pad}" y1="${y}" x2="${width-pad}" y2="${y}"></line>`);
      }
      svg.insertAdjacentHTML('beforeend', `<text x="${width / 2}" y="${height - 8}" text-anchor="middle" fill="#65758b" font-size="12">UMAP 1</text>`);
      svg.insertAdjacentHTML('beforeend', `<text x="16" y="${height / 2}" text-anchor="middle" fill="#65758b" font-size="12" transform="rotate(-90 16 ${height / 2})">UMAP 2</text>`);
      papers.forEach(p => {
        const visible = shownIds.has(p.paper_id);
        const selected = p.paper_id === state.selected;
        const x = sx(p.umap_x), y = sy(p.umap_y);
        const size = selected ? 7.5 : 6.5;
        const cls = `point ${visible ? '' : 'dim'} ${selected ? 'selected' : ''}`;
        const fill = colorFor(p.cluster);
        const node = document.createElementNS('http://www.w3.org/2000/svg', p.discussion_found ? 'path' : 'circle');
        node.setAttribute('class', cls);
        node.setAttribute('fill', fill);
        if (p.discussion_found) {
          const d = `M ${x} ${y - size} L ${x + size} ${y} L ${x} ${y + size} L ${x - size} ${y} Z`;
          node.setAttribute('d', d);
        } else {
          node.setAttribute('cx', x);
          node.setAttribute('cy', y);
          node.setAttribute('r', size);
        }
        node.addEventListener('click', () => {
          state.selected = p.paper_id;
          render();
        });
        node.appendChild(document.createElementNS('http://www.w3.org/2000/svg', 'title')).textContent = p.title;
        svg.appendChild(node);
      });
    }

    function renderDetails(p) {
      if (!p) return;
      const doi = p.doi ? `<a class="paper-link" href="https://doi.org/${escapeHtml(p.doi)}" target="_blank">DOI: ${escapeHtml(p.doi)}</a>` : '';
      const url = p.url ? `<a class="paper-link" href="${escapeAttr(p.url)}" target="_blank">Open paper URL</a>` : '';
      const nearest = (p.nearest_papers || []).map(n =>
        `<a class="paper-link" href="#" data-paper="${escapeAttr(n.paper_id)}">${clusterName(n.cluster)}, distance ${Number(n.distance).toFixed(3)}: ${escapeHtml(n.title)}</a>`
      ).join('');
      const discussionSummary = p.discussion_summary ?
        `<div class="section-title">Discussion Summary</div>${renderDiscussionSummary(p.discussion_summary)}` : '';
      const discussionExcerpt = '';
      const discussionStatus = p.discussion_found ?
        `<span class="pill">Discussion detected: ${p.discussion_paragraph_count} paragraphs</span>` :
        `<span class="pill">No explicit Discussion section detected</span>`;
      details.innerHTML = `
        <h2>${escapeHtml(p.title)}</h2>
        <div class="meta">${escapeHtml(p.authors)}<br>${escapeHtml(p.year)} · ${escapeHtml(p.venue)}</div>
        <span class="pill">${clusterName(p.cluster)}</span>
        <span class="pill">${escapeHtml(p.keyword)}</span>
        <span class="pill">Rep rank ${p.representative_rank}</span>
        <span class="pill">Medoid rank ${p.medoid_rank}</span>
        <span class="pill">LDA topic ${p.lda_topic} (${Math.round(p.lda_topic_probability * 100)}%)</span>
        ${discussionStatus}
        <div class="section-title">Cluster Descriptor</div>
        <div class="abstract">${escapeHtml(p.cluster_label_candidate)}</div>
        <div class="section-title">Distinguishing Evidence</div>
        <div class="abstract">${escapeHtml(p.distinguishing_evidence_terms || p.cluster_theme_terms || 'n/a')}</div>
        <div class="section-title">Cluster Summary Candidate</div>
        <div class="abstract">${escapeHtml(p.cluster_summary_candidate)}</div>
        <div class="section-title">Design-Knowledge Contribution</div>
        <div>
          <span class="pill">Form: ${escapeHtml(p.design_knowledge_form || 'n/a')}</span>
          <span class="pill">Action: ${escapeHtml(p.design_knowledge_action || 'n/a')}</span>
          <span class="pill">Auto role: ${escapeHtml(p.design_knowledge_role || 'n/a')}</span>
        </div>
        <div class="abstract">${escapeHtml(p.design_knowledge_contribution || '')}</div>
        <div class="section-title">Paper-Oriented Facets</div>
        <div>
          <span class="pill">Context/Domain: ${escapeHtml(p.facet_population_or_context || 'n/a')}</span>
          <span class="pill">Population/Stakeholder: ${escapeHtml(p.facet_stakeholder_or_population || 'n/a')}</span>
          <span class="pill">Method/Lens: ${escapeHtml(p.facet_method_or_lens || 'n/a')}</span>
          <span class="pill">Artifact/System: ${escapeHtml(p.facet_artifact_or_domain || 'n/a')}</span>
          <span class="pill">Contribution Type: ${escapeHtml(p.facet_contribution_or_outcome || 'n/a')}</span>
        </div>
        <details class="lexical-evidence">
          <summary>Show lexical evidence</summary>
          <div class="evidence-block">
            <div class="section-title">Cluster Theme Evidence</div>
            <div class="abstract">${escapeHtml(p.cluster_theme_terms)}</div>
            <div class="section-title">Secondary Topic-Model Evidence</div>
            <div class="abstract">${escapeHtml(p.lda_topic_words)}</div>
          </div>
        </details>
        <div class="section-title">Abstract</div>
        <div class="abstract">${escapeHtml(p.abstract)}</div>
        ${discussionSummary}
        ${discussionExcerpt}
        <div class="section-title">Links</div>
        ${doi}${url}
        <div class="section-title">Nearest Papers by Cosine Distance</div>
        ${nearest || '<div class="meta">No nearest-paper data available.</div>'}
      `;
      details.querySelectorAll('[data-paper]').forEach(a => {
        a.addEventListener('click', evt => {
          evt.preventDefault();
          state.selected = a.getAttribute('data-paper');
          render();
        });
      });
      details.scrollTop = 0;
    }

    function renderDiscussionSummary(value) {
      const items = String(value || '').split('\n').map(line => line.replace(/^[-•]\s*/, '').trim()).filter(Boolean);
      if (!items.length) return '<div class="meta">No discussion summary available.</div>';
      return `<ul class="discussion-list">${items.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`;
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    }
    function escapeAttr(value) { return escapeHtml(value).replace(/`/g, '&#96;'); }

    initControls();
    render();
    window.addEventListener('resize', render);
  </script>
